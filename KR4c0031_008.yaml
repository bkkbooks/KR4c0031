  text: 晝上人集卷第八
  hash: sha256:57b839cba2bccb52406ae879bf470a5e7e3b69dbbaf3ef3c1c59d2836873dcf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_008-1a}
body:
  text: 呉興釋皎然唐杭州靈隱山天竺寺故大和尚墖銘并序水之性不動而鍳得非夫實相之體耶雖積為洪溟而未嘗變其真我自在之玅致也如来大師獨秉至教群聖拱手俾冥冥倒識破堅氷之惑豈逾一念之哉靈隱大師雖外精律儀而苐一義諦素所長也故小子誌之大師生縁錢唐范氏諱守真字堅道齊信安太守瑝之八葉禮既冠衆君子器之夙有丘園之期不顧玄纁之錫遂詣蘇州支硎寺園大師受具足戒是夜眼中光現長一丈餘乆而方沒葢得戒之禛也後至荆府依真公三年苦行尋禮天下二百餘聖教所至無不至焉至無畏三藏受菩薩戒香普寂大師傳楞伽心印講起信宗論三十餘遍南山律鈔四十遍平等一雨小大䨇機在我圎音未甞異也乃發殊碩誦持花嚴遂扵中宵甞夢神人施珠一顆及覺惘然如珠在握是歲入五臺山轉華嚴經二百遍追宿心也又轉大藏經三遍廣正見也至開元二十六年有制舉髙行道俗請正名隷大林寺後移籍天竺住靈隱峰時大暦二年也至五年三月寓于龍興淨土院謂左右曰夫至人乗如而来亦乗如而厺示其必然也而瞽夫欲以以長繩繫彼白日安可得乎非至人而有其盡以此月二十九日告終于兹地春秋七十一僧臘四十五其間臨壇既多度人無數今不復紀也顯名弟子蘇州辨秀湖州恵普道荘越州清江清源杭州擇隣神偃常州道進如何鸑鷟之彩共集旃檀之枝江淮名僧難出其右晝之身戒亦忝門人幸参四子之科獨許一時之學斯文在我何敢譲焉詞曰房星在天降爲應平聲真好爵縻我視如埃塵既投其簪亦壞其服戒月纔佩禪香乃沐四十餘夏振振盛名大江東南爲平聲㳒長城宣尼既殁微言乃絶我師云亡真乗亦輟靈隱峰上春日秋天風生松柏如師存焉持教門人楚英呉傑儒方荀孟道比文列宿習未盡妄涕猶雪宿巳忘真師眞如月古之君子名書彛器大師不書将墜于地紀功者銘傳心者燈藏諸名山不騫不崩唐蘇州東武丘寺律師墖銘并序律者聖道㳺入之津為心見所瑕多溺近果不然則極地之階乎武丘律師諱齊翰字等至通教之士也呉興沈氏之子高祖陳國子祭酒曽祖某隋魏州司馬祖考二丗不仕律師綺歲從大人至山寺覩高静無塵之䠱惻然有宿命之知因請出家大人從之至天寳八年八月五日奉制度配名永定九年十月依分壇受具足戒後移名開元大暦中移名武丘皆兩州道俗所請也律師道性淵黙水則澹然迹不近名身不關事長在一室寂如無人豈比夫駢行鼓簧之士哉始疑斯人未造精極因問業報之理如何師對曰夫鼓毗嵐之風有物皆壊而靈空不動葢無相也心且無相業何累焉但懼䧟扵偏空妄撥無耳繇是始知律師心之所至精相部義窟洞㳒華經王蘇湖戒壇每當諸首大暦十年某月入流水念佛道塲是夜西方念中頓現葢精誠之所致也至某年春秋六十八僧夏四十七遇疾之日謂弟子曰有鶴従空飛下徊翔我前爾軰見乎必謝之期小聖猶病安能免哉即以某年某月終于本院受業門人如隱壇塲門人宣兊誠肅禪心律儀有時譽晝則律師之郷僧也戒有一日之長許為汯兄昔媿随肩今傷分影有清䂓之可採則文石而言焉銘曰澷澷去聲情海多生沒兮超超我師一念越兮舊寺龜谿為僧傑兮新居武丘匠時哲兮適来示生亦示㓕兮山上人間有遺轍兮故雲茫茫餘水泱泱留廢房兮黄蘗心苦青松節寒對空壇兮升堂門人結社居士依扇履兮或刻貞石㦯書勝幡思師存兮唐蘇州開元寺律和尚墳銘并序至人扵生死一也物有之我亦有之若日月可食靈空可汙乎在至人為宅心之地誠瞽夫不返之瀑流㦲扵戲我法自五天掦于漢庭八俊四賢横世傑出後之學者聆休風企高䠱何吾師之穆其芬馥歟吾師諱其字某先劉氏之子漢楚王交三十一代孫列祖某永嘉南遷爲丞相掾四代祖逺随東陽守顯其遺榮之迹略載本枝全其㧞俗之高不書後葉葢亦垂訓之意乎吾師㓜孤伯父哀字禮如教立孝自天生而宿植縁深心田欲稔因請伯父從師出家伯父哀而捨之事靈隱某禪師因問師入道之次師語曰夫爝火大眀乎太虗以爝火之心當太虗之境境非心外心非境中兩不相存兩不相廢今我所證是爾所知曷有萬法之深淺優劣乎畢如凉風入懐醒然清悟天寳四年受戒扵東海大師覽真傳講扵㑹稽大師曇一至徳中舉高行􅘗名開元乾元中有詔天下二十五寺各定大徳七人長講戒律吾師其選也頃年淨土一門不愆于念甞謂人曰㫺聞西方之行是有相大乗此乃蓬心不直逹之說何者夫出言即性發意皆如而一色一香無非中道况我正念乎于時年六十七天年三十六僧夏十六壇塲孤制律樞正持僧綱自緝湖南北皆宗仰焉以建中元年六月十五日寝疾而逝其時有庭樹一夲枝葉扶踈及吾師将亡之朝花正拆而遽萎條始繁而方折亦恒河水上旃檀樹枝榮枯之意也其年七月五日遷靈龕扵武丘西寺松門之右烏乎青山不歸日林長謝秋原之上萬境皆悲雨冥冥而晝隂水浼浼而東逝門人道亮道該清㑹亮以毗尼繼其行㑹以才學儔其賢該以詞華蹤其羙三子之外居廓廡者充江漢焉故觀察使韋公元甫觀察使李公栖筠今虢州刺史李公紓今御史中丞李公道昌林下之迹可追山隂之逰尚想懐人撫事相顧泫然晝實謏才曷足揄揚盛羙以吾釋門之事安敢譲焉銘曰本師示終兮玄綱絶香山崩兮杳海竭大地動兮旃擅折人天㝠兮千光㓕我師出嗣兮遺教張如何斯人兮天不臧星既雨兮地亦霜生涯昧昧兮四流長捧遺言兮循徃迹庭無人兮月寂寂百年遐夀兮日長夕萬春上服兮塵巳襞門人慟兮丗人悲瞻影墖兮山之垂宿㫺經行兮舊路岐雲渺渺兮雨霏霏方域盡兮長桑移樂石香名兮不騫不虧唐石圯山故大禪師墖銘并序天作髙山山孕人靈其間氣則賢人當之而動用有異夫黄鶴逰乎天驪龍樂乎淵従其性也賢人治丗則匡贊我后出則誕敷上乗圯山禪祖其人也師諱神悟字通性隴西李氏之子其先属西晉版蕩遷家于呉之長水丗襲儒素㓜為諸生及冠忽嬰業疾有不可救之状咎心𥙷行力将何施開元中詣前谿光律師請醫王之方執門人之禮師示以遣業之教一日理懴二日事懴此仁聖所授行必有徴遂扵菩提像前秉不屈之心爇難捨之指異光如月曈曨紺宫極苦可以感眀神至精可以動天地葢菩薩之難事歟泊天四中受具足戒身始披緇天公中舉尤異行名􅘗寺逮其晩節益見苦心每歲置汯華道塲九旬入長行禮念觀佛三昧扵斯現前因語門人曰夫隂薄日而何傷風運空而不動苟逹扵妄誰非性耶方結宇扵勞勞山東中據石圯逺分仙渚猛獸馴扵禪榻祥雲低扵汯堂中夜有山神現謂禪師曰弟子即隋故新成曹世安生為列侯死典南嶺今和尚至止碩以此永奉經行言訖隱而不見故吏部貟外李公華今殿中侍御史崔公益甞問孔老聖教優劣于吾師師對曰路伽耶典籍皆心外汯味之者勞而無證其猶澤朽思春乾水取月之相厺天何逺乎夫辛邜年春寢疾大漸於戲悼死樂生下士之事吾師了性空豈關情哉便趺坐告終歸于寂樂其時丗夀六十三恵夀二十六闍維之日獲舍利五百餘粒珠顆纍纍粲然在矚葢由夫精之所致門人湛一圓一潔身力行夏淺功崇亦分河不絶之意也吾聞古之君子生有名而死有謚勲業昭乎彛器箴規焕乎方冊何有哲匠人天師遺徳不書吾誰仰則銘曰聲傳于籥剖之無根象出于鍳窮之不源至人應物體寂名存寂可神照名冝性泯玅用無生示生而盡燈留火續骨化珠分真子徒仰慈聲不聞堂披遺影地起方墳萬木春折諸天晝臐年年丗上空望歸雲唐杭州華嚴寺大律師墖銘并序魏晉中頴邁之士多尚出塵白足髙歩扵海隅青目遐視扵湘表千有餘祀禪律宗師吾知若人出秉伊說之鈞處躡黄綺之躅亦躬珪之扵和璞隱顯之殊乎我律師其人也汯諱道光俗姓禇氏踰齓出家方冠受具詣光州和尚學通毗尼于時夏淺徳崇壇塲属望葢天賚真士爲東南義虎雲雨慈味笙鏞道聲常常持㳒華兼創佛廟洎沒身不怠也丗壽七十九恵夀五十八上元庚子歲秋仲月示㓕扵夲寺是日馳陽昧昧滛雨颸冽風崇朝嘉木為折乃東土福盡之徴也俄然憙氣五色亭亭如葢移晷不散偏映精廬即西方徃生之意也𥘉吾師未殁其月三日質眀支疾凝神依色身觀彌陁具相忽現師前滿庭碧花㫺所未覩其四日昧爽有異人請師為和尚遂開目彈指曰但發菩提心五之日㬅陁羅花自天而雨悲夫非哲匠厺丗安至是耶門人神烈義津等攝齋何仰繞墖徒哀履名迹而可師書琬琰之不墜詞曰我㳒未季哲人是生真慈在物澤灑飊清高戒嚴身佩月與瓔貽訓徒張逝不可作瑞花冥𪷟卿雲縈薄靈輀何止于此山椒寒鼯㫁續影墖蕭寥五峰諸子泣望終朝唐湖州佛川寺故大師墖銘并序夫萬有朝徹獨立而不改其玅空乎洎鴻𪷟己還民溺情海安不㓜之跡䘮全真之㫖若識浪不作㓜何有哉我釋迦本師獨開宗極遽而告㓕降藴魔也在而言逝爲狂子也以八萬四千正㳒首付飲光飲光己下二十四聖降及菩提逹磨繼傳心教有七祖焉苐六祖曹谿能公能公傳方巗策公乃永嘉覺荷澤㑹之同學也方巖即佛川大師也大師諱恵眀俗姓陳氏漢太丘長寔之後丗居順顯祖某永嘉南遷爲司徒掾陳氏受禪四代祖仲文有佐命之勲封丹陽公祖某雙谿榖􅍄二縣宰考某蘭陵人也大師雖世有榮閥而未甞自稱葢䖏塵丗之餘累矣先夫人𥘉感之日如持佛戒足惡履扵葷圃口不甞扵鱻器神夢彷佛長聞㳒音既而誕焉年漸及丱方祈捨俗大人従之至受具時即開元七年也耳未誘扵色界眼不瑕扵耳塵清行剋終如鍳寒玉嘗謂人曰㫺者繁刑首作伯成子高遁焉吾雖不捨律儀而悪乎浄論紛若心印心之㳒至矣哉西詣方巖頓開心地於戲冥冥其機赫赫其師寂乎大空之淵而不疑放乎萬缘之律而不變天寳年将有碩扵清凉山淮汴阻兵師乃旋策偶與禪侣西之宛陵扵上石門置蘭若三所有大虥来擾如撫狵焉既属時艱民多饑荐群盗欲至輒號呼先報往往徴焉先是楚郷戈獵為事不聞佛号但狥殺心我大師以慈行之至尚能使猛虎不㬥騰猿不擾而况于人乎故舉郷之甿浣心革面撤網裂罟子来于我至天寳五稔爰止乎魚陂道塲有瑀公者白土史宗之流跡邇行微世莫之識始相見曰南祖傳教菩薩来何晚耶他日與瑀公登魚陂峯頂見東南有山蒼琅獨秀謂瑀公曰吾與此山宿有縁矣天寳八年有制度人州将韋公南金舉高行黒白狀請􅘗名州中寕化道塲大師固辤韋公不屈其志遂改􅘗佛川即疇昔魚陂所望之峯梁呉均故宅之所地志云青山東南掘得古像二軀莫知年代也獲像之地靈泉忽湧因此名為佛川焉泉側有呉王古廟風俗滛祀濫以犧牲扵是大師哀之乃詣祠宫禪坐洎夕中夜雷雨洊至林摧瓦飛頃之雨収月在見一丈夫容甚盛大師謂曰居士生為賢人死為神眀奈何使我蒼生每𬒳血食豈知此事殃爾業耶神曰非弟子本意人自為之禮懴再三大師乃授以菩薩戒神欣然曰若和尚移寺弟子願捨此處永奉禪居言畢不見其後果移寺焉扵祠側獲銅盤之底篆文是吾師㳒號更有異器畧而不書建中元年春忽顧左右愀然而歎曰夫人生百年葢一念耳昧者安知掲日月以趨新㢤吾将徃淨方爾曹勉之于時報年八十四僧臘五十一以其年正月十一日有疾其日庭木春悴山雨晝冥猛虎繞垣悲嘯而去十二日奄然長徃二月十二日建墖扵佛川西山有慈烏滿林舉衆驚異受㳒門人自湘谿淮楚不逺而至有若孤秉律綱黙持心印恵解比丘即其人也徳與物敷言隨性寝聲采不飾丗謂渾金恵敷比丘即其人也外學以文内修心行跡不疑聖機能造微如知比丘即其人也菩薩戒弟子刺史盧公㓜平顔公真卿獨孤公問俗杜公位裴公清惟彼數公深扵禪者也謝太傅之通扵宗要殷淵源之造扵精微常恐大師之言将墜扵地顧謂小子志之予曰必使覩至人之奥知地位之極則未敢聞命若盛羙之跡人所見聞何嘗敢忘請退而記之刻諸靈石詞曰青山我廬白雲我曺吾師䖏焉人遐跡髙跡高伊何降心錬魔傳教方巖傾珠竭河持而不撿放而不過匪雲異月如水與波見獨超超證㳒無兩生死誰覊我不可鞅若揺空輪如蹵風響何為告㓕亦由狂子忽示雙桐空隻履佛厺川在人亡寺留吾舊境寂寞長秋泣露草繁悲風樹滿此物無心盡如凄㫁門人千萬昔為法来悟者不蹙常情自哀祥花雨墜靈墖峰開真子相顧謂全身在㦲墖銘并序東漢始有佛塔之制或冶金埏坏琢琰彫杼觸類可作葢恵門之扃鐍也我唐大暦丁巳歲建子月某日沙門某洎居士若干人扵思村東北古隄之上樹修墖焉粉櫺素檐炯如雪積雖埃氛晝晦月魄宵淪重重入空千里可矚使夫倦鳥有托迷客知歸燎􅙕􅋶弧以革心漁童卷緡而易慮作者之志其仁博哉崇崇靈墖掃氛孤出平砌沓雲層輪麗日瓊容皓曜雁影依俙𥘉驚地湧忽視天飛墖何情矣監惡斯止墖何言哉誘善不回至人黙黙與我同徳寂語忘教而人自効眀眀者曷可攀焉上階于天下窮于淵深谷為陵其功不騫唐洞庭山福碩寺律和尚墖銘并序道賢上㳺其徳如陽和亭毒萬物生而不子成而不有或曰異扵是盖由無生空恵冥乎其間哉曁洪唐盛眀之朝我㳒尤重五教四分飊揚景張南山律宗居天下苐一後弟子如大師鮮矣大師望出徐氏諱神皓字弘度八代祖摛齊竟陵王西邸學士子陵梁尚書左㒒射其文與庾子山齊名逮陳氏革命囙佐呉邑遂家姑蘇髙祖碩學通三禮中年即丗曽祖曇隨王府咨議参軍祖徳恭潯陽郡詞曺考君定深扵釋典不屑名宦大師天情耿潔風韻朗邁㓜負脫俗之姿甞有言曰沙門者高㓗其道秉空王平等之性一念不昧坐登佛階吾自知此生履龍淵取眀月曷有三圭之貴重侯之高而能動我心㢤乃依杭州龍泉道塲一和尚出家敗損容越出流軰鏗然㳒器如琢玉焉天寳六年天降极詔精擇真行一州許度三人獨居薦首吾以是知大師𥘉披佛教滌心地也今奉國㤙止世名也因􅘗僧籍扵色山福碩道塲𥘉具扵興大師次通鈔扵曇一大師五夏未登學精三藏天台宗㫖難為等夷淵玄絶思之科如良庖之道大􅑆也十講律鈔三昇壇塲傾江而東碩禮其足後生學者仰其聰眀恵性如追麒麟之歩大師甞引錫西望想包山舊居包山即洞庭仙都之一峯湖澄氣清日出水上疊嶂合沓生乎影中得非天遺此中與成道耶乃命舟而還使野童誅茒山童掃石顧左右㫺者如来崇飾墖廟乃是啓發群信開人天淨境豈為巳哉此寺隳廢乆之非先師夲意乃闢僧院創食堂衆有怠慢者醜其行而理之舍有傾者惡其邪而正之墾田置庄開畎泄澮功既成矣業亦博矣百千人俱皆受其賜曩日洞山水滸業湖之氓􅊻􅧡咽川繪繳亘渚大師以如来不殺之戒黜彼鱻食廻小人之腹為君子之慮乾元祀有詔天下二十七寺各奏大徳七人長講律戒因請住開元寺欲果願具且懼簡書遂僶俛從命奉戒弟子開州刺史陸公向前給事中嚴公說服道弟子禮部侍郎劉公太真前大理評事張公象欽風弟子前亷使亞相李公栖筠天誘厥衷俾揚我㳒精識通敏言為世程謝太傅之流也其時常􅍄地偏僧多闕行李亞相欲以徳撫乃請大師統而正之一化而革心再化而知道三化而闔邑従風大師末年工扵圎宗縱心皆是以文字而用不以文字為病是念佛冩經備行教法置西方社廣淨土因􅌹誦㳒華經九千餘帀逰四大寺登五老峯遍欲觀古僧得道之所此亦至人之餘事應物如動自視闕然貞元六年十月春秋七十五僧臘四十三真月在開元遇疾忽言曰吾愛夫得道者心如澄溟知如晨曦不染如浮雲自在如㳺鴻吾雖非斯人亦未肎以有生爲累其月十一日顧門人維諒我厺世後汝若置墖可歸洞庭故山言畢而逝是夜琉璃色天星霣如雨往往有西方之應覩而不書奉遺命也門人維諒有文有道獨歩當時執師之丧不以證而廢教也列座門人道超靈俊道濬道稜維譲維誠皆積解以詣空門邁徳以藩象教吾聞古之僧髙者述誺與碑自晋朝始也二三子思吾師盛徳将欲鎔黄金勒貞右垂𥙿後使昭昭之教長燭扵人天銘曰扵穆大師立言可經身佩戒光髙月亭亭怖魔以祛襲知以醒如何斯人忽號冥冥天樹春折曇花夜零空㽞一燈寂寂青熒伊昔行道坦素履迹難可攀行不可擬乃知我師應世無巳優逰人天自在生死門人維諒躡彼髙塵嶷嶷靈墖紀功于人于山之峯于湖之濱風凄逺鐸月惨重輪瞻禮雲上如逢化身畫救苦觀世音菩薩讚并序繪工匠意通幽若菩薩出現湛兮凝心于内怡然示相于表非㳒王玅用何哉誰其主人即湖州刺史諫議大夫樊公夫人范陽縣君盧氏所造也𥘉夫人有恤胤之兆常念觀音夢雲𥘉懐育月方誕命曰是女且不正名盖取冝子之意也公以積徳樹仁膺其錫羡雖菩薩大慈不昧亦江漢間氣所鍾詩云維岳降神生甫及申之儔乎扵戲至誠既敷上碩思畣乃于寶勝殿内按經圖變祗于壁上觀示現之門不捨毫端禮分身之國詞曰至人之體兮有而無迹至人之心兮用而常寂公之小君兮恵性造微我之大士兮慈心莫違保㓜子兮永貞無悔覿真儀兮常眀不昧慈為雨兮恵為風灑芳襟兮襲輕𬒮畫藥師琉璃光佛讚并序佛以大慈療生死臣瘵示藥師名以大智證圎眀玅身受琉璃稱無私之鍳湛乎不動誠懇之至感而遂通湖州刺史諌議大夫樊公夫人范陽縣君盧氏得之矣頃因懐姙黙念于心先徵佩印之祥載見懸弧之志遂圗此變以畣佛慈光射金扉日月不開于天上影朧珠綴烟霄自出扵壁間東方如来瞻仰長世輒掦盛羙有媿䛕才詞曰藥師之光隨心至兮十二上碩慈不遺兮琉璃之身為我示兮八十種好相畢備兮繪像報徳公夫人兮𥘉祝㣧子果克禋兮早見才童邁人倫兮将成大器應申甫兮如来恵父長可親兮貽厥孫謀壽萬春兮蘭亭古石橋柱讚并序山隂有古卧石一枚即晋永和中蘭亭廢橋柱也大暦八年春大理少卿盧公㓜平承詔祭㑹稽山攜居士陸羽因而得之生好古者與吾同志故讚云古橋石柱亭亭殊類渾璞璘玢亂錢蒼翠遺在蘭渚遷于客位雲状未銷水痕猶潰在物頗重則人無棄石豈有心求人所貴若瓊與玉呈磂藴異如彼陸生不文其器此猶可轉豈君同志烏程李眀府水堂觀玄真子置酒張樂叢筆亂揮畫武城讚烏程魯邑異日同風洋洋弦歌復聞我公玄真跌宕筆狂神王楚奏鏗鍧呉聲瀏亮舒縑雪似頒綵霞状點不誤揮毫無虗放藹藹武城披圖可望咫尺之内天髙水清月疑山吐風恐松聲晴雨雲住春冬艸榮比公為政徳暖生成盛烈暉暉雙揚厥靈逹磨大師㳒門義讚我師西来傳乎真訣大輪當路小乗亡轍冥冥世人𥘉見日月權跡有歸光雲不㓕天台和尚㳒門義讚我立三觀即假而真如何果外强欲眀因萬象之性空江月輪以此江月還名㳒身二宗禪師讚裁玉為璧一體殊稱二聖淵淵異名同證安讚天后寂佐玄宗卷道就跡與時從容邈邈安公行越常致髙天無言九有咸庇大海無言百川同味不授心印但以无言應丗而物無不化曈曈大照有跡可覩不異六宗無慚七祖禪岡一傾人天何怙能秀二祖讚二公之心如月如日四方無雲當空而出三乗同軌萬㳒斯一南北分宗工言之失志公讚大動之地我安其中高景無氛靈鶴在空出生死泥随物有終𠢐形駭俗借繢開蒙常攜刀尺精意誰通唐大通和尚㳒門義讚觀静之筌斯言不住四色蓮花白花為喻應知離相或未圎通吾師恵心雲開天空唐鶴林和尚㳒門義讚真見之體知而不性知猶無主禪何有支我夲圎寂湛而不移聿來化人慈力所為大雲寺逸公冩真讚盡與理冥兩身不異淵情洞識睂睫斯備欲發何言正思何事一牀獨坐道具長随缾執堪㵼珠傳以移清風拂素若整威儀洞庭山福碩寺神皓和尚冩真讚虎頭將軍藝何極但是風神非畫色方顙眀眸亦全得我豈無言道貴黙雙扉曙啟趺坐時百千門人自疑惑沈君寫真讚誰識英姿披圗宛在月動光芒風生神彩匀毫點朕天質無改聽似欲言窺不可怠佩可鳴玉冠冝附蟬鸞翔鶴顧志氣翛然侯伯之量扵斯鑒焉王安吉冩真讚性正氣髙外爽神徹逺水濴渟秋天寥沉銳工傅逸點漆開頥風儀秀發毫髪無遺當獨立䖏似不言時如嚬如顧何慮何思披影相對真身是誰楊逵䖏士冩真讚識洞才髙天貸神與霜縑之上逢君不語聳聳山立翹翹鶴舉置之巗石邈然無侣晝上人集卷第八
