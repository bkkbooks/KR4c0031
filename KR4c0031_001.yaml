  text: 晝上人集卷第一
  hash: sha256:265d392b88523f1fca7429779e2a3145304b97ac36769aea7cf1416830ab6126
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_001-1a}
body:
  text: 吳興釋皎然五言奉酬于中丞使君郡齊卧病見示一首宿昔祖師教了空無不可枯稿未死身理心寄行坐仁公施春令和氣來澤我生成一草木大道無負荷論入空王室明月開心胸性起妙不染心行寂無蹤若非禪中侣君為雷次宗比聞朝端名今貽郡齊作真思凝瑶瑟髙情屬雲鶴抉得驪龍珠光彩耀掌握若作詩中友君為謝康樂盤薄西山氣貯在君子襟澄淡秋水影用為字人心群物如鳬鷖游翔愛清深格居第一品髙步凌前躅精義究天人四坐聽不足伊昔栁太守曾賞汀洲蘋如何五百年重見江南春公每省往事詠歌懷昔辰以兹得髙卧任物化自淳還因訪禪隱知有雪山人郡齊卧疾贈晝上人上人早名皎然晚字畫湖州刺史于頔夙陪翰墨徒深論窮文格麗則風騷後然公我詞客晚依方外友極理探精𦣱􅘈合南北宗晝公我禪伯光眀性不染故我行貞白隨順令得解故我言芳澤霅水漾清潯吳山橫碧岑含珠復藴玉價重雙南金的皪曜竒彩凄清流雅音商聲發楚調調􅋀諧瑶琴吳山為我髙霅水為我深萬景徒有象孤雲本無心衆木豈無聲椅桐有清響衆耳豈不聆鍾期有真賞髙潔古人操素懷夙所仰覿君氷雪姿祛我淫滯想常吟桞惲詩苕浦久相思逮此逺為郡蘋洲芳草衰逢師年臘長值我病容羸共話無生理聊用契心期五言贈李中丞一首深沉閫外略奕世當榮寄地裂大將封家傳介圭瑞至今漳河俗猶受仁人賜公初鎮惟邢决勝無精兵重圍逼大敵六月守孤城政用仁恕立恩由賞罰明遂令麾下士感德不顧生于時聞王師諸將兵頗瀆天子狩南漢烟塵滿函谷純臣獨耿介下士多反覆眀公仗忠節一言感萬夫物性如蒺藜化作春蘭敷見說金被爍終期玉有瑜移官萬里道君子情何如伊昔避心事乃是方𫀆客頓了空王㫖仍髙致君䇿安知七十年一朝值宗伯言如及清風醒然開我懷晏息與逰樂不將衣褐乖海底取明月鯨波不可渡上有巨蠎吞下多毒龍護一與吾師言乃于中心悟咄哉冥冥子胡為自塵汚五言杼山禪居寄贈東溪吳處士馮一首青雲何潤澤下有賢人隱路入菱湖深蹟與黃鶴近野風歌白芷山月搖清軫詩祖吳叔庠致君才不盡身當青山秀詩曰家住青山下青山有吳均故宅後改為吳均山文體多郢聲澄徹湘水碧泬寥楚山清時人格不同至今罕知名昔賢敦師友此道君獨行既得廬霍趣乃髙雷逺情别時春風多掃盡雪山雪為君中夜起孤坐石上月悠然遺塵想邈矣逹性說故人不在兹幽桂惜未結五言妙喜寺髙房期靈徹上人不至重招之一首晨起峰頂心懷人望空碧掃雪開寺門灑水淨僧席言笑形外阻風儀想中覿馳心驚葉動傾耳聞泉滴豈慮咆虎逢乍疑崩湍隔前期或不顧知爾隳常格如今誰山下秋霖步浙瀝吾亦聊自得行禪荷䡖策松聲暢幽情山意導遐蹟舉目無世人題詩足竒石貧山何所有特此邀來客五言奉和薛貟外誼贈湯評事衡反招隱之蹟兼見寄十二韻喜友稱髙儒曠懷美無度近為東田誘遂耽西山趣庭有介隱心得無雲泉誤府公中司貴頻貽咫尺素郡佐仙省髙亦贈瓊瑶句誚兹長往志紆彼獨遊步禪子方外期夢想山中路艱難親稼穡晨夕苦烟霧曷若孟嘗門日榮國士遇鏗鏘聆綺瑟攀折邇瓊樹幽踐隨鹿麋久期怨蟾兔情同不繫舟有跡道所惡五言畣黎士曹黎生前適越後之楚楚木紛如麻髙松自孤直願得苦寒枝與君比顏色故鄉眇天末羈旅滄江隅委質在忠信苦心無變渝何由表明義贈君金轆轤何以美知才投我懸黎珠遽為千里别南風思越絶愛君隨海鷗倚棹宿沙月不栖惡木上肯蹈巴蛇穴台人表朝逆命故君不踐其土一上蕭然峰擬縱幽人轍晨興獨西望郢水期泝㳂夜到洞庭月秋經雲夢天黎生知吾道此地不澘然欲寄楚人住學拏漁子船奈何北風至攪我窗中絃逰子動歸思江蘺亦綿綿篋中封禪書欲獻無由緣豈乏晨風翼翻飛到日邊五言畣豆盧次方吾愛道交論為髙貴世名昔稱柴桑令今聞豆盧生彼生清淮氣獨鍾文中彩近作公宴詩如逢何栁在吾用古人耳採君四坐珍賢士勝朝暉溫溫無冬春朝暉爍我肌賢士清我神微爾與雲鵠幽懷何由申别來秋風至獨坐楚山碧髙月當清冥禪心正寂歷增波徒相駭人逺情不隔有書遺瓊什以代貂䄡䄖風教凌越絶聲名掩吳趨懸璧安可酬徙倚還踟蹰五言畣蘇州韋應物郎中詩教殆淪缺庸音互相傾忽觀風騷韻㑹我夙昔情蕩漾學海資鬱為詩人英格將寒松髙氣與秋江清何必鄴中作可為千載程受詞分堯竹萬里臨江城到日掃煩政况今休瀆兵應憐禪家子林下寂無營跡隳世上華心得道中精脫略文字纍免為外物嬰書衣流埃積研石駮蘚生恨未識君子空傳手中瓊安可誘我性始碩愆素誠為無鸑鷟音繼公雲和笙吟之向禪藪反愧幽松聲寄皎然上人韋應物吳興老釋子野雪蓋精廬詩名徒自振道心長晏如想兹棲禪夜見月東峰初鳴鐘驚巗壑㷊香滿空虛叨慕端成舊未識豈為踈碩以碧雲思方君怨别餘茂苑文華地流水古僧居何當一逰詠倚閣吟躊蹰五言畣鄭方回獨禪外念入中夜不成定顧我憔悴容澤君陽春詠詞貞思且逸瓊彩何暉映如聆雲和音况覩聲明盛琴語掩為去聲聞山心聲宜聽是時寒光徹萬境澄以靜髙秋日月清中氣天他正逺情偶兹夕道用增寥􅳋思君處虗室一操不可更時美城北徐家承谷口鄭軒車未有轍蒿蘭且同徑莊生誡近名夫子罕言命是時耕楚田曠然殊獨行萎㽔鸞鳯彩特逹圭璋性通隱嘉黃綺髙儒重荀孟世汚平聲我未起道蹇吾猶病逸翮思冥冥濳鱗樂遊泳宗師許學外恨不逢孔聖說詩迷頽靡偶俗傷趨競此道誰共詮因君情欲罄五言畣俞校書冬夜夜間禪用精空界亦清逈子真仙曹吏好我如宗炳一宿覿幽勝形清煩慮屏新聲殊激楚麗句同歌郢遺此感豫懷沉吟忘夕永月彩散瑶碧示君禪中境真思在杳冥浮念寄形影遙得四眀心答四眀何須蹈岑嶺詩情聊作用空性惟寂靜若許林下期看君辭簿領五言妙喜寺逹公禪齊寄李司直公孫房都曹德𥙿從事方舟顔武康士騁四十二韻我祖傳六經精義思朝徹莊子曰守之九日而後能外生外生而後能朝徹方舟頗周覽逸書亦傋閲墨家傷刻薄墨流刻薄而不仁可以理身不可以濟世儒氏知優劣弱植庶可雕苦心未嘗輟中年慕仙術永碩傳其訣歲駐若木景日飱瓊禾屑嬋娟羡門子斯語豈徒設天上生白榆葳㽔信好折實可返柔顔花堪養玄髮求之性分外業弃金亦竭藥化成白雲形雕辭素穴素穴山名一聞西天㫖初禪巳無熱苐四禪中有天台無熱無三災之患故以為名今初禪即得蓋詩人美巳證超出常㳙子非我宗然公有真訣却尋丘壑趣始與纓􅌧别野飯敵膏粱山楹代藻梲與君比巗侣逰寓日常昳靜對春谷泉晴披陽林雪境清覺神王道勝知機滅詣寂常杳冥忘歸暫采擷物生豈有心麗容俟豫别桂子何蓂苓琪葩亦皎潔此木生意髙亦與衆芳列賞墨識屢换省躬悟彌􅋀微尚若不虧足以全吾莭北風吹蕙帶蕭寥聞蜻蛚宿昔廬峰期流芳巳再歇不有清屏鍳使我商弦絶碩寄千里心月髙不可掇優遊邦之直逺矣踵肯烈立俗忘毁譽遇物遺巧拙真氣獨翛然軒裳詎能紲都曹風韻整綱紀信明决於交必傾寫立行豈矜伐政與清渭同分流自澄徹裴侯資亮直中誠豈徒說古人比明義清士碩交結溫溫躬圭彩終始聲不缺顔生炯介士有志不可越仗義冒險艱持操厺淄涅丗論髙二賢即魯公猶子也賢賢繼前哲四子遭明盛褎然皆秀傑理名雖殊迹悟道寧異轍愛爾竹柏姿為豫寒不折五言遙酬袁使君髙春暮行縣過報德寺見懷江春行求瘼偶與真景期見說三陵下前朝開佛祠停舟仰麗剎繡組發香墀咫尺空界色天人花落時盛游限羸疾悚踴矅旌旗峰翠羡閒步松聲入遙思素髙淮陽理况負東山姿逮此一登覽深情見新詩五言冬日遙和盧使君幼平綦母居士游法華寺髙頂臨湖亭仁坊標絶境亷守躡高踪天曉才分剎風傳欲盡鍾城中歸路逺湖上碧山重水照千花界雲開七葉峯寒空艾綬滿空翠白綸濃逸韻知難繼佳逰恨不逢仍聞撫禪石為我久從容五言秋日遙和盧使君逰何山寺宿􅏡上人房論涅槃經義江郡當秋景期將道者同跡髙憐竹寺夜靜賞蓮宫古磬清霜下寒山曉月中詩情緣境發法性寄筌空翻譯推南本何人繼謝公五言酬秦山人題贈出齊步杉影手自開禪扉花滿不汚地雲多從觸衣思山石癬淨擬客露葵肥果得宗居士論心到極微五言奉酬袁使君高寺院新亭對雨其亭即使君所創兹亭跡素淺勝事併隨公法界飄香雨禪窗灑竹風浮烟披夕景髙鶴下秋空冥寂四山久寧期此㑹同五言奉使君真卿見過郭中寺寺無山水之賞故豫述其意以畣焉州西桞家寺禪舍隱人間證性䡖觀水栖心不買山履聲知客貴雲影悟身間彥㑹前賢事方今可得攀五言酬烏程楊明府華雨後小亭對月見呈夜凉喜無訟霽色搖閒情暑退不因雨陶家風自清凝弦停片景發詠靜秋聲何事禪中隱詩題忽記名五言自蘇州訪醫回酬盧士關判官見贈尋醫初疾理忽憶故山雲逺訪桑公子還依栁使君周還承惠愛佩服比蘭薰從事因髙唱秋風起處聞五言畣李師尚雅篇忽見遺婉開緘發惠風搖精思瓊蘂疑花空門青山月潘生獨不見清景屢盈缺林下長寂寥人間自離别何時解䡖佩來稅丘中轍五言贈烏程李明府伯冝沈兵曺仲昌水國苦雕瘵東皋豈遺黍雲隂無盡時日出常帶雨昨夜西溪漲扁舟入檐廡野人同鳥巢㬥客若蜂聚歲晏無斗粟寄身欲何所空羡鸞鶴姿翩翩自䡖舉五言奉酬顔使君真卿王貟外圎宿寺兼送貟外使回魯公邀省客貧寺人過少錦帳唯野花竹屏有窗篠朝行日色淨夜聽泉聲小釋事情巳髙依禪境無擾超遙長路首悵望空林杪離思從此生還將此心了五言杼山上峯和顔使君真卿袁侍御五韻賦得印字仍期眀日登開元寺樓之㑹道情寄逺嶽放曠臨千仞香路延絳騶華泉寫金印日欹諸天近雨過三華潤留客雲外心忘機松中韻靈嘉早晚期為布東山信五言同薛員外誼喜雨詩兼上楊使君積旱忽飛澍蒸民心亦傾郊雲不待簇雨色飛江城燋稼濯又發敗荷滋更榮時隨霧縠重乍集栁絲䡖一宿恐魚飛數朝徴鸛鳴毒暑澄為冷髙塵滌還清乃知隂隲數制在造化情及此接歡賀臨風聞頌聲五言南湖春泛有客自北至說友人岑元和見懷因叙相思之志以寄焉故人隔楚水日夕望芳洲春草思渺渺征雲暮悠悠心期無形影跡曠成阻修有客江上至知君佐雄州鏗鏘佩蒼玉躞蝶驅絳騶伊昔中峰心從來非此流資子長生訣豫嘗受以胎息之訣希彼髙仙儔此情今如何宿昔師吾謀别後謁禪老更添石室籌深見人間世飄如水上漚蟬號齊王邸月苦隨帝樓聲華盡冥寞麋鹿徒􅊯􅊯我有一字教坐似遺此憂何煩脫圭組不用辭王侯秪在名位中空門兼可逰五言同薛貟外誼久旱感懷兼寄呈上楊使君皇天鑒不昧愐農何亢極絲雨久愆期綺霞徒相惑隂雲舒又卷濯枝安可得涸井不纍瓶乾溪一憑軾赤地芳草死颷塵驚四塞戎冦夜刺關民荒歲傷國賴以王猷盛中原無凶慝楊公當此辰省災常旰食獨感下堂雨自州南諸鄉降甘澤長城顧渚平地雨一尺水分流澤數鄉也偏嘉越境域秋郊天根見我疆看稼穡請回雲漢詩為君歌樂職五言兵後早春登故鄣南樓望崑山寺白鶴觀示清道人並沈道士新陽故樓上眇眇傷遐眷違世情易忘羈時得無倦春歸華樓發丗故陵谷變擾擾陌上心悠悠夢中見蒼林有靈境杳映遙可羡春心倚東峯華泉落西甸鐘聲在空碧幡影搖葱蒨緬想山中人神期如㑹面别離芳月積𡵨路浮雲遍正入空門仙君依苦縣隳形捨簪􅌧烹玉思精練事外宜我心人間豈豫戀身遺丗自薄道勝名必賤耳目何所娛白雲與黃卷五言酬烏程楊眀府華將赴渭北對月見懷釋印及秋夜身閒境亦清風襟自瀟灑月意何髙明聞說武安君萬里驅妖精開府秀士先招士林英晉家用元凱亦是魯諸生北望撫長劔感君知已行邉塵昏玉帳殺氣凝金鉦大敵折齊爼一書下聊城翻飛青雲路宿昔滄洲情答云詩中悠然顧仙侣之句五言酬邢端公濟春日蘇臺有呈袁州李使君兼書并寄辛陽王三侍御大賢佐當世堯時難退身如何丹霄侣却在滄江濵桞色變又遍鶯聲聞亦頻賴逢冝春守共賞南湖春營道知止足飾躬無淄磷家將詩流近跡與禪僧親放曠臨海門翺翔望雲津雖髙空王說不久山中人上句答端公學無為之句五言奉和裴使君清春夜南堂聽陳山人彈白雪春宵凝麗思閒坐開南圍郢客彈白雪紛綸發金徽􅤖從天上至集向瓊臺飛弦上疑颯颯虗中想霏霏通幽鬼神駭合道精鑒稀變態風更入含情月初歸方知阮太守一聽識其微五言畣孟秀才羸疾依小院空閒趣自深躡苔憐淨色掃樹共芳隂物外好風至意中佳客尋虗名誰欲纍世事我無心投贈荷君芷馨香滿幽襟五言酬崔侍御見贈市隱何妨道禪栖不廢詩與君為此說長破小乘疑五言贈栁喜得嵩山法門自號嵩山老一見嵩山老吾生恨太遲問君年幾許曽出上皇時五言酬李補闕紓不住東林寺雲泉處處行近臣那得識禪客本無名七言兵後經永安法空寺寄悟禪師其寺賊所㷊常說人間法自空何言出丗法還同微蹤舊是香林下餘燼今成火宅中後夜池心生素月春天樹色起悲風吾知世代相看盡誰悟浮生似影公七言春日杼山寄李員外縱南山唯與北山鄰古寺連拳伴我身黃鶴有心多不位白雲無事獨相親閒持竹錫深看水懶繫麻衣出見人欲掇幽芳聊贈逺郎官那賞石門春七言酬秦山人贈别二首知君髙隱占賢星卷葉時時注佛經姓被名公題舊里秦君里詩將麗句號新亭麗句亭來觀新月依清室欲漱香泉護觸瓶我有主人江太守如何相伴住禪靈江淹為宣城守常㑹禪靈寺又誰知卧疾不妨禪跡寄詩流性似偏葉示黃金童子愛書題青字古人傳時髙獨鶴來雲外每羡閒花在眼前對此留君還欲别因思石瀃訪春泉七言山居示靈徹上人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閒始覺隳名是心了方知苦行非外物寂中誰似我松聲草色共無機七言遙和康録事李侍御蕚小寒食夜重集康氏園林習家寒食㑹何頻應恐流芳不待人巳愛治書詩句逸更聞從事酒名新􅒉蕪暗積承雙履林花雷飛瀑幅巾誰見奈園時節共還持緑茗賞殘春七言釋裴循春愁蝶舞鶯歌喜歲芳栁絲􅒁裊蕙帶長江南春色共君有何是君心獨自傷十言西白溪期裴方舟不至望君不見復何情野草閒雲處處生應向秦時武陵路花開寂歷一人行七言勞山憶栖霞寺道素上人久期不至逺寺蕭蕭獨坐心山情自得趣何深泉聲稍滳芙蓉漏月影才分鸚鵡林滿地雲䡖常礙屐繞松風近每吹襟貪閒不記前心偈念别聊為出世吟更待花開山似雪山山相似若為尋七言酬秦山人出山見尋手攜酒榼共書幃回語長松我即歸若是出山機巳息嶺雲何事背君飛七言酬秦山人見尋左右香童不識君擔簦訪我領鷗群山僧待客無俗物唯有窗前片碧雲奉寄晝公蓑笠雙童傍酒船湖山相引到房前芭蕉何事教人見暫借空牀守坐禪七言宿法華寺簡靈徹上人至道無機但杳冥孤燈寒竹自青熒不知何處小乘客一夜風來聞誦經晝上人集卷苐一
