front:
  text: 晝上人集卷第三
  hash: sha256:0cc72a6ea5539b08a157b7435d8a8e74d7974441715b3db6c07c55b99985a938
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_003-1a}
body:
  text: 吳興釋皎然五言奉和顏使君真卿與陸處士羽登妙喜寺三癸亭即陸生所創秋意西山多列岑縈左次繕亭歷三癸疏趾鄰竹寺元化隱靈蹤始君啓髙誄誅榛飬翹楚鞭草理芳穗俯砌披水容逼天掃峯翠境新耳目换物逺風煙異倚石忘丗情援雲得真意嘉林幸勿翦禪侶欣可庇衛法大臣過佐逰群英萃龍池護清徹虎節到深邃徒想􅌘頂期于今沒遺記五言奉陪陸使君長源裴端公樞奉逰東西武丘寺雲水夾雙剎遙疑湧平陂入門見藏山元化何由窺曵組探詭怪停驄訪幽竒情髙氣為爽德暖春亦隨瑶草自的皪蕙樓爭蔽虧金精落壞陵劒彩沉靈池一覽匝天界中峯步未移應嘉生公石列坐援松枝五言奉和陸使君長源夏月逰太湖此時公權領湖州庾公心曠逺府事局耳目遂與南湖逰襟滌煩燠始知皇天意積水在亭育細流信不讓動物欣所蓄萬頃合天容洗然無雲族峻蒨矚仙嶺神仙傳洞庭神仙所居也超遙隨眀牧知公愛澄清波靜氣亦肅巳見橫流極况聞長鯨戮會北使至王師巳收長安中洲暫採即栁惲汀洲採白蘋之意也南郡思剖竹公時改授信州向夕分好風飄然送歸舳五言奉和崔中丞使君論李侍御登爛柯山宿石橋寺效小謝體常愛謝公郡幽期碩相從果回青驄臆共躡玄仙蹤靈境若倣佛爛柯思再逢飛梁丹霞接古局蒼菭封往想冥昧理誰親氷雪容蕙樓聳空界蓮宇開中峰今為仙寺普是仙山遺局古橋升仙之處見在昔化沖虗鶴今藏護法龍雲窺香樹沓月見色天重永夜寄幽寂清言滌心􅎍盛逰千年後書在巖中松五言同顏使君真卿李侍御蕚逰法華寺登鳯翅山望太湖雙峰開鳳翅秀出南湖州地勢抱郊樹山威增郡樓正逢周柱史來會魯諸侯緩步凌彩蒨清鐃發颼飀披雲得靈境拂石臨芳洲積翠遙空碧含風廣澤秋蕭辰資麗思髙論驚精修何似鍾山集徵文及惠休五言奉陪陸使君長源諸公逰支硎寺寺即支公學道處嘗覽髙逸傳山僧有遺蹤佐逰繼雅篇嘉會何由逢塵世即下界色天當上峯春暉遍衆草寒色留高松繚繞彩雲合參差綺樓重瓊葩灑巾舄石瀃清心胸靈境若可託道情知所從五言奉陪鄭使君諤逰太湖至洞庭山登上真觀却望湖水郡齋得無事放舟下南湖湖中見仙邸果與心賞俱不逺風物變忽如寰宇殊背雲視層崖别是登蓬壺突兀盤水府參差沓天衢回瞻平蕪盡洪流豁中區氣吞江山勢色淨氛靄無靈長習水德勝勢當地樞朝宗動歸心萬里思鴻途五言奉和袁使君髙郡中新亭會張練師晝會二上人置亭隱城堞事簡迹易幽公性崇儉素雅才非廣求傍簷竹雨清拂按杉松秋不移府中步登兹如逺逰坐覺詩思髙俯知物伇休虛寂偶禪子逍遙親道流更聞臨川作下節安能酬五言奉和陸使君長源水堂納涼效曹劉體栁家陶暑亭意逺不可齊煩襟蕩朱絃髙步援緑荑愛公滿亭客來是清風攜瀅渟前溪上曠望古郡西六月正中伏水軒氣常凄野香襲荷芰道性親鳬鷖禪子顧惠林逸民重劉黎乃知髙丗量不以出處暌五言夏日奉陪陸使君長源公堂集府中自清逺六月高梧間寥亮泛雅瑟逍遙扣玄關嶺雲與人靜庭鶴隨公間動息諒兼遂兹情即東山五言伏日就湯評事衡湖上避暑大火方燥召停雲晝亦收將從賞心侣寸景難逺逰擁几苦炎伏出門望汀洲回溪照軒宇廣陌臨梧楸釋悶命雅瑟放情思亂流更持無生論可以清煩憂五言奉和顏使君真卿修韻海畢會諸文生東堂重校外學宗碩儒遊焉從後進恃以仁恕廣不學門欄峻著書禆理化奉上表誠信探討始河圖紛綸歸海韻親承大匠琢况覩頽波振錯簡記鉛暫音籖閲書移玉鎮曷由旌不朽盛美流歌引五言喜義興權眀府自君山至集陸處士羽青塘别業應難久辭秩暫寄君陽隱巳見縣名花會逢闈是粉本自尋人至寧因看竹引身關白雲多門占青山盡最賞無事心籬邊釣溪近五言夏日集李司直縱溪齋修景屬良會逺飈生煩襟泄雲收淨緑衆木積芳隂疏滌府中務迢遙湖上心習間得招我賞夜冝泛琴山近資性靜月來寄情深淡然若事外豈隨隳華簪五言夏日題桐廬楊眀府納涼山齋陶家無炎暑自有林中峰席上落山影桐梢回水容放懷涼風至緩步清隂重何事親堆桉猶多髙丗蹤五言和楊眀府早秋逰法華寺釋事出縣閣初聞兹山靈寺扉隱天色影剎遙丁丁碧峰委合沓香蔓垂蓂苓清景為公有放曠雲邉亭秋賞石潭潔夜嘉山月青誦空性不昧助道迹又經是以于物理紛然若未形移來字人要全與此道冥五言宿道士觀古觀秋木秀泠然屬鮮颷瓊葩被修蔓柏實滿寒條影殿山寂寂寥天月昭昭幽期寄仙侣習定至中宵清佩聞虛步真官方宿朝五言冬日天井西峰張錬師所居採旅逢野泉漸見栖間所坎坎山上聲幽幽林中語仙卿何代隱鄉服言亦楚開水淨藥苗掃雲候山侣零葉聚敗籬幽花積寒渚冥冥孤鶴性天外思輕舉五言奉同顔使君真卿開元寺經藏院會觀樹文殊碑萬國布殊私千年降祖師雁門傳法至龍藏立言時故實刋周典新聲播魯詩六銖那更拂劫石盡無期五言奉同盧使君幼平逰精舍寺剎影西方在虛空翠色分人天霽後見猿鳥定中聞真界隱青壁春山凌白雲今朝石門會千古仰斯文五言奉同顏使君真卿袁侍御駱駝橋玩月山中常見月不及共逰時水上恐將缺林端愛落遲烏驚憲府客人咏鮑家詩永夜南橋望徘徊若有期五言奉和邢端公登春臺春望句句有春字之什春日繡衣輕春臺别有情春煙間草色春鳥隔花聲春樹亂無次春山遙得名春風正飄蕩春甕莫須傾五言經仙人渚即沈山下古人沈義白日升仙處日月人間短何時此得仙古山春巳盡遺渚事空傳不見騰雲駕徒臨洗藥泉如今成逝水翻使恨流年五言獨逰二首性野趣無端春晴路又乾逢泉岐石弄放鶴向雲看好僻誰相似從狂我自安芳洲亦有意步上白沙灘又臨水興不盡虛舟可同嬉還雲與歸鳥若共山僧期世事吾不預此心誰得知西峰有禪老應見獨逰時五言逰溪待月溪色思泛月沿洄欲未歸殘燈逢水店踈磬憶山扉夜浦魚驚少空林鵲繞稀可中才望見撩亂搗寒衣五言西溪獨泛道情何所寄素舸漫流間真性憐高鶴無名羡野山經寒叢竹秀入靜片雲間泛泛誰為侣唯應共月還五言早秋陪韓眀府泛阮元公溪公嘗言禪功可入而官情詎能忘故詩中有此意戲之雨信清殘暑蕭條古縣西早涼生浦溆秋意滿髙低前事雖堆案間情得泝溪何言戰未勝空寂用還齊五言九日顔使君真卿登水樓重陽荆楚尚髙會此難陪偶見登龍客同逰戲馬臺風文向水疊雲態擁歌回持菊煩相問捫襟愧不才五言與盧孟眀别後宿南湖對月五湖生夜月千里滿寒流曠望煙霞盡凄涼天地秋相思路眇眇獨夢水悠悠何處空江上徘徊送客舟五言自義亭驛送李長史後夜宿臨平東湖長亭賓馭散岐路起悲風千里勤王事驅車明月中寒生洞庭水夜度塞門鴻處處堪傷别歸來山又空五言出逰少時不見山便覺無竒趣狂發從亂歌情來任間步此心誰共證笑看風吹樹五言界石守風望天竺靈隱二寺山頂東西寺江中旦暮潮歸心不可到松路在青霄五言奉和顏使君修海韻畢州中重宴世學髙南郡身封盛魯邦九流宗韻海七字揖文江借賞雲歸堞留歡月在窗不知名教樂千載與誰雙五言晦日陪顔使君白蘋洲集南朝分古郡山水似湘東隄月吳風在湔𥚑楚客同桂寒初結斾蘋小欲成叢時晦佳遊促高歌聽未終五言冬至日陪裴端公使君清水堂集亞歲崇髙宴華軒照渌波渚芳迎氣早山翠向晴多推往知時訓書雲辨政和從公借日短留賞夜如何五言陪盧判官水堂夜宴暑氣當宵盡徘徊坐月前靜依山堞近涼入水扉偏久是栖林客初逢佐幕賢愛君高野意烹茗釣淪漣五言新秋同盧侍御薛貟外白蘋洲月夜隔暑蘋洲近迎涼欲泛舟榮從憲府至喜會夕郎遊氣奪滄江色風吹汗漫流誰言三伏夜獨此月前秋五言夏日集裴録事北亭避暑前林夏雨歇為我生涼風一室煩暑外衆山清景中忘歸親野水適性喜雲鴻蕭散都曹吏還將靜者同五言與王録事會張徴君姊妹錬師院玩雪兼懷清會上人何意廉從事還來會默仙寒空驚雪遍春意入歌偏瑶草三花發瓊林七葉連飄颻過桞寺應滿驛經前五言和李侍御蕚歲初夜集處士書閣書閣即侍御所創遲賢新置閣高意此郊居古徑行春早新窗見月初放歌還倚瑟講道亦觀書為我留禪位來逢此會踈五言湯評事衡水亭會覺禪師山侣相逢少清晨會水亭雪晴松葉翠煙暖藥苗青靜對滄洲鶴間看古寺經應憐叩關子了義共心冥五言與朝陽山人張朝夜集湖亭賦得各言其志洞庭孤月在秋色望無邊零露積衰草寒螿鳴古田茫茫區中想寂寂塵外緣從此悟浮丗胡為傷暮年五言晦夜李侍御蕚宅集招潘述湯衡海上人飲茶賦晦夜不生月琴軒猶為開墻東隱者在淇上逸僧來茗愛傳花飲詩看卷素裁風流髙此會曉景屢徘徊五言寄昱上人上方居猒向人間住逢山欲懶歸片雲間似我白日在禪扉地靜松隂遍門空鳥語稀夜涼踈磬盡師友自相依五言夏日與綦母居士昱上人納涼為依爐峰住境勝增道情涼日暑不變空門風自清坐援香實近轉愛緑蕪生宗炳青霞士如何知我名五言建元寺集皇甫侍御書閣不因居佛里無事得相逢名重朝端望身髙俗外蹤公愛講佛經嘗云慕劉處士深詣至理機間看淨水境寂聽踈鐘宣室恩長在知君志未從五言郭北尋徐主簿别業近依城北住幽徑少人知積雪行深巷間雲繞古籬竹花冬更發橙實晚仍垂還共巗中鶴今朝下渌池五言題報德寺清幽上人西峯寺即陳文帝故鄉陳丗凋亡後仁祠識舊山帝鄉喬木在空見白雲還雙塔寒林外三陵暮雨間此中難戰勝君獨啓禪關五言題鄭谷江畔桐齋鄭生好琴性逹兼寡欲客齊開别住坐占緑江濆流水非外物間雲嘗屬君浮榮未可纍曠逹若為群風起髙梧下清絃日日聞五言和閻士和李蕙冬夜重集郡理日間曠洗心宿香峰雙林秋見月萬壑靜聞鐘佩玉行山翠交麾動水容如何股肱守塵外得相從五言春日陪顏使君真卿皇甫曽西亭重會海韻諸生為重南臺客朝朝會魯儒暄風衆木變清景片雲無峰翠飄簷下溪光照座隅不將簪艾隔知與道情俱五言寒食日同陸士行報德寺宿解公房古寺章陵下潛公住幾年安心生軟草灌頂引春泉寂寂傳燈地寥寥禁火天丗間多暗室白日為誰懸五言兵馬曺季良宅夜集清景不可失尋君趣有餘身髙避事後道長問心初出處名則異逰從迹何踈吟看刻盡燭笑卷讀殘書露彩生筆研風音入庭除平眀山侣散觳觫動回車五言同李侍御萼李判官集陸處士羽新宅素風千户𫾣新語陸生能借宅心常逺移籬更弘釣絲初種竹衣帶近裁藤戎佐推兄弟詩流得友朋栁隂容過客花徑許招僧不為墻東隱人家到未曽五言題報恩寺惟照上人房上界雨色乾涼官日遲遲水文披菡萏山翠動罘罳中有清真子愔愔步間墀手縈頗黎縷碩證黃金姿旋草階下生看心當此時亦名苾芻草枝葉皆右旋故名旋草草有五德七言尋天目徐君常見仙翁變姓名豈知松子號初平逢人不道往來處賣藥還將雞犬行獨鶴天邊俱得性浮雲世上共無情三花落盡君猶在笑撫安期昨日生七言同李著作縱題塵外上人院百緣唯有什公瓶万法但看一字經從遣鳥喧心不動任教香醉境常冥蓮花天漏浮雲捲貝葉官春好月停禪伴欲邀何著作空音冝向夜中聽七言題周諫别業豫寺與周生所俱臨苕水隱身苕上欲如何不著青入水籬從破許船過昻藏獨鶴間心逺寂歷秋花野意多若訪禪齋遙可見竹窗書幌共煙波七言同李中丞洪水亭夜集佳人且莫吹參差正憐月色生酒巵山公取醉不關我為愛尊前白鷺鷥七言題秦系山人麗句亭獨將詩教領諸生但看青山不愛名滿院竹聲堪愈疾亂牀花片足忘情七言春夜集陸處士玩月欲賞芳菲肯待辰忘情人訪有情人西林可是無清景祗為忘情不記春七言寄題雲門寺梵月無側房時人相傳是實月道人後身也越山千万雲門絶西僧貌古還名月清朝掃石行道歸林下眠禪看松雪七言法花寺上方題江上人禪室路入松聲逺更竒山光水色共參差中峯禪寂一僧在坐對梁朝老桂枝五言冬日山行遇薛徴君我行倦修坂四顧無平陸雨霽鳴鷹鸇天寒聚麋􅎷幽人訪名士家在南岡曲菜實縈小園稻花繞山屋深居寡憂悔勝境怡耳目徴心尚與我永言謝浮俗雜言往丹陽尋陸處士不遇逺客殊未歸我來幾惆悵叩關一日不見人繞屋寒花笑相向寒花寂寂遍芳阡栁色蕭蕭愁暮蟬行人無數不相識獨立雲陽古驛邊鳯翅山中思本寺魚竿村口望歸船歸船不見見寒煙離心逺水共悠然他日相期那可定間僧著處即經年五言集湯評事衡湖上望微雨蒼涼逺景中雨色緣山有雲送滿洞庭風吹繞楊栁蕭蕭解輕𬒮盡日隨林叟五言九日與陸處士羽飲茶九日山僧院東籬菊也黃俗人多泛酒誰解助茶香七言夜過康録事造會兄弟愛君門館夜來清瓊樹雙枝是弟兄月在詩家偏足思風過客位更多情晝上人集卷第三
