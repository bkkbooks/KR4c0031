  text: 晝上人集卷第十
  hash: sha256:82371a955a08e3272c50d3dcfdfc73a6d961a44ebcd04c7486f2b779955b7e0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_010-1a}
body:
  text: 吳興釋皎然四言講德聮句潘述湯衡釋晝先王設位以正邦國建立大官封殖有德述二南敷化四嶽述職其言不朽其儀不忒衡暨于嬴劉乃創程式罷侯置守剖竹分域晝赫矣皇唐康哉立極精選藩翰庸資正直述爰命我公東土作則克巳恭儉疲人休息衡濟濟閭閈油油黍稷既冨既教足兵足食晝恤其凋瘵剪其荆棘威懷逋叛撲滅蝥賊述疾惡如讐聞善不惑哀矜鱞寡旌禮儒墨衡乃修隄防乃濬溝洫以利通商以溉嘉榖晝徴賦以節計㓛以時人胥懷惠吏不能欺述我政載孚我邦載綏猛獸不暴嘉魚維滋衡肅恭眀神齋沐不虧歲或驕陽雨無愆期晝帝嘉有庸寵命來斯紫紱載綏金章陸離述資忠履考閲禮敦詩眀德惟馨自天祐之衡四言講古文聮句潘述裴濟釋晝湯衡帝出于震文眀始敷述山嶽降氣龜龍負圗濟爰有書契乃立典謨晝先知孔聖飛步大衢衡漢承秦弊尊儒尚學述百氏六經九流七略濟屈宋接武班馬繼作晝或頌燕然或􅐌麟閣衡降及三祖始變二雅述仲宣間和公幹蕭灑晝士衡安仁不史不野晝左張精粵稽阮髙寡衡暨于江表其文鬱興衡綺麗爭發繁蕪則懲述詞曄春華思清冬氷述景純跌宕逰仙獨步衡青雲其情白壁其句衡靈運山水實多竒趣述逺派孤峯龍騰鳳翥述陶令田園匠意真直晝春栁寒松不凋不飾晝江淹雜體方見才力衡擬之信工似而不逼衡鮑昭從軍立意危苦述氣勝其詞雅愧于古述隱侯似病創制規矩晝時見琳琅惜哉榛苦晝謝眺秀發詞理翩翩衡孤標爽邁深造精研衡惠休翰林别白離堅述有會必愜無慚曩賢述吳均頗徑失于典裁晝竟乏波瀾徒工邉塞晝彼柳吳興髙視時輩衡汀洲一篇風流寡對衡何遜清􅋀所得必新述緣情既密象物又真述江㧾徴正未越常倫晝時合風興或無淄磷晝二杜繁俗三劉瑣碎衡陳徐之流隂張之輩衡伊數公者閫域之外述吁此以還有同自鄶述五言項王古祠聮句潘述釋晝湯衡遺廟風塵積荒途歲月侵述英靈今寂寞容衛尚森沉晝霸楚志何在平秦功亦深衡諸侯歸復背青史古將今述星聚分巳定天亡力豈任晝采蘩如可薦舉酒瀝空林衡五言還丹可成詩羽化自仙骨延年資飬生晝金經啓靈祕玉液流至精述八石思共煉九丹知可成衡吾心苟無妄神理期合并晝封竈用六一置門考休京述浮光含日彩圎質焕雲英衡持此保壽命服之頥性情晝跂豫望仙侣髙詠升天行述鶴駕方可致霓裳定將迎衡不因五色藥安著七真名晝揮妙在微密全功知感誠述與君棄城市攜手逰蓬瀛衡五言建元寺晝公與崔秀才見過聮句與鄭奉禮説同作人間宜歲晚道者訪幽期獨與寒山别行當暮雪時皇甫曽柏臺辭漢主竹寺寄潛師荷䇿知君待開門笑我遲晝暮階懸雨足吹繞松枝理辨塵心妄經分梵字疑鄭説久承黃𥿄詔曽賦碧雲詩然諾警相許風流話所思崔子向筌忘心巳默磬發夜何其願結求羊侣名山從所之曾五言建元寺皇甫侍御院寄李貟外縱聮句一首寄隱霜臺客相思粉署人子向奉上侍御誠知阡陌近無奈别離輕曽奉奉禮夜色迷雙樹鐘聲警四鄰説奉奉禮秀才散才徒仰鮑歸夢逺知秦台上雨帶清笳發花驚夕漏春晝超􅸚隨步錫倣佛聽行輪子向奉侍御要路推髙足空林寄一身曽奉奉禮盛名知獨擅良會憶相親説奉崔十二稍滌心中垢都遺陌上塵子向奉今霜此堂集何事少遺民晝五言冬日建安寺西院喜晝公自吳興至聮句一首宗系傳康樂精修學逺公祠部郎中兼侍御史王遘相尋當暮歲行李犯寒風駕部貟外李縱纍積浮生裡機慚半偈中前太常寺奉禮郎鄭説傳家知業墜繼祖忝聲同晝雲與輕帆至山將夲寺空崔子向向來忘起滅留我宿花宫前吏部郎中兼括州刺史齊翔五言建安寺西院喜王郎中遘恩命𥘉至聮句時郎中正入西方道場迹就空門退官從畫省遷住持良有願朝謁冗無緣遘身淨金繩內心馳玉扆前晝榮添一兩日恩從九霄年翔慕法能輕冕追非欲佩弦縱棲間那可久鴛鷺待行聮子向五言建安寺夜會對雨懷皇甫侍御曾聮句相思非是逺風雨遣情多晝碩欲披雲見難堪候曉過縱夜長同歲月地近極山河説戒相𥘉傳授文章舊􅋀磋遘時稱洛下詠人許郢中歌子向惆悵徒延首其如一水何珝五言泛長城東溪暝宿崇光寺寄處士陸羽聮句箬水青似箬玉山碧于玉子向逼霄沓萬狀截地分千曲晝萍解深可窺林豁遙在矚子向巳髙物外賞稍滌區中欲晝野鶴翔又飛世人羈且局子向沉吟迹所誤放浪心自足晝緬懷虗舟客碩寄生芻束子向説詩整頽波立義激浮俗晝荆吳僃登歷風土隨編録子向恨與清景别擬教長路促晝溪鳥語鸝嘍寺花翻躑躅子向印圍水壇淨香護蓮衣觸晝捧經啓紗燈收祍禮金粟子向安得扣關子玄言對吾屬晝五言與崔子向泛舟自招橘經箬里宿天居寺憶侍御蕚渚山春逰後期不及聮一十六韻以寄之晴日春態深寄逰恣所適晝寧妨花木亂轉覺心耳寂子向取性憐鶴髙謀開任山僻晝倚絃惜空曲捨屨行淺磧子向渚箬入里逢野梅到村摘晝碑殘飛雉䫈井翳潛龍宅即陳帝宅子向壞寺鄰壽陵古壇留劫石晝穿階筍節露拂瓦松梢碧子向天界細雲還墻隂雜英積晝懸燈繼前熖遙月升圎魄子向何意清夜期坐為高峰隔晝茗園可交𬒮藤潤好停錫子向微雨聽濕巾迸流從點席晝戲猿隔枝透驚鹿逢人擲子向覩物賞巳竒感時思彌極晝芳菲如馳箭望望共君惜子向五言渚山春暮會顧丞茗舍聮句效小庾體誰是惜暮人相攜送春日因君過茗舍留客開蘭室陸士修濕菭滑行屐柔草低藉瑟鵲喜語成雙花狂落非一崔子向煙濃山焙動泉破水春疾莫拗挂飄枝會移閬書帙晝頗容樵與隱豈問禪兼律闌竹不求踈網藤從更密士修池添逸少墨園雜莊生漆景晏枕猶欹酒醒頭懶櫛子向雲教淡機慮地可遺名實應待御荈青幽期踏芳出晝七言與李司直令從荻塘聮句一首畫舸悠悠荻塘路真僧與我相隨厺寒花似菊不知名霜葉如楓似何樹李令從倦客經秋夜共歸情多語盡眀相顧遙城候騎來仍少傍䫈哀猿發無數晝心間清淨問禪寂興逸縱橫問章句蟲聲􅋀切草間悲螢影紛紛月前度令從撩亂雲降好賦詩嬋姢水月堪為喻與君出處夲不同從此還依舊山住晝三言擬五雜組聮句八首五雜組盤上葅往復還頭懶梳不得巳􅊻裡魚李萼五雜組郊外蕪往復還櫪上駒不得巳谷中愚殷佐明五雜組繡與錦往復還興又寢不得巳病伏枕顔真卿五雜組星與辰往復還有情人不得巳客傷春晝五雜組酒與肉往復還東籬菊不得巳醉便宿袁髙五雜組闤闠間往復還門上關不得巳鬢毛班五雜組繡紋線往復還春來燕不得巳入征戰蔣至三言重擬五雜組聮句四首五雜組四豪客往復還阡與陌不得巳長沙謫豸五雜組五辛盤往復還馬上鞍不得巳左降官萼五雜組甘鹹醋往復還烏與兔不得巳韶光度真卿五雜組五色絲往復還回文詩不得巳失佳期晝三言重擬五雜組五雜組篋中線往復還雙飛燕不得巳長門怨晝五言月夜啜茶聮句一首泛夜邉坐客代飲引情言陸士修醒酒冝華席留僧想獨園張豸不須攀月桂何假樹庭萱李萼御史秋風徑尚書北斗尊崔萬流華淨肌骨疏瀹清心源真卿不似春醪醉何辭緑菽蘩晝素瓷傳靜夜芳氣滿間軒袁髙五言夜宴詠燈聮句一首桂酒牽詩興蘭釭照客情士修詎慚珠乘朗不讓月輪眀豸破暗光𥘉白浮雲色轉清真卿帶花疑在樹比燎欲分庭晝顧巳慙微照開簾識近汀髙三言喜皇甫侍御見過南樓玩月聮句一首喜嘉客闢前軒天月淨水雲昏真卿雁聲苦蟾影寒聞裛浥滴檀欒陸羽歡宴處江湖濶皇甫曽卷翠幕吟佳句恨清光留不住李萼髙駕動清角催惜歸華重徘徊晝露欲晞客將醉猶宛轉照深意陸士修七言重聮句一首須持憲節推髙步獨占詩流橫素波不是中情深惠好誰能千里逺經過真卿詩書宛似陪康樂少長還同宴永和夜酌此時看振玉晨趨幾日重鳴珂曽萬井更深空寂寞千方霧起隱嵳峩熒熒逺火分漁浦歷出栁城晝五言重送橫飛聮句一首春田草未齊春水滿長溪萼上士元兄出餞風初暖攀光日漸西真卿歸期江上逺别思月中遲晝七言大言聮句髙歌閬風步瀛洲晝燂鵬瀹鯤飱未休真卿四方上下無外頭萼一啜頓涸滄溟流豸七言小言聮句長路遙遙𧖟吐絲真卿焦螟蚊睷察難知晝七言樂語聮句一首苦河既濟真僧喜萼新知滿座笑相視真卿戎客歸來見妻子晝學生放假偷向市豸七言饞語聮句一首拈䭔舐指不知休萼欲炙待立涎文流真卿過屠大嚼豈知羞晝食店門外強淹留豸七言滑語聮句一首雨裡下山踏榆皮真卿莓菭石橋步難移晝蕪荑醬醋喫煮葵令白縫靴蠟線油塗錐萼急逢龍背須且騎益七言醉語聮句一首逢糟遇麴便酩酊令白覆車墜馬皆不醒真卿倒著接㒿髮垂領晝七言逺意聮句家在炎洲往朔方疾豈知于闐望瀟湘澄曽經隴底復遼陽巨川更憶東厺採扶桑晝查客三千路未央伯均燭龍之地日無光疾將逰莾蒼窮大荒晝車轍馬足逐周王均七言暗思聮句斜風飄雨三十夜疾鄰女餘光不相借巨川迹滅塵生古人畫晝洞房重扉無隟罅均燭滅更深月西謝從心七言樂意聨句一首良朋益友自逺來均萬里鄉書對酒開晝子孫蔓衍負竒才疾承顔弄鳥詠南陔澄鼓腹擊壤歌康哉巨川七言恨意聮句一首同心同縣不相見疾獨採蘼蕪詠團扇均莫聽東林搗霜練晝逺憶征人淚如霰澄長信空階荒草遍從心眀妃𥘉别昭陽殿杭六言秋日盧郎中使君幼平泛舟聮句一首共載清秋客船同瞻皂蓋朝天盧藻悔使比來相得如今欲别澘然幼平漸驚徒馭分散愁望雲山接連晝魏闕馳心日日吳城揮手年年陸羽送逺巳傷飛雁裁詩更􅋀嘶蟬潘述空懷鄠杜心醉永望門闌脰悁李恂别思無窮無限還如秋水秋煙鄭述誠七言重聮句一首相將惜别且遲遲未到新豐欲醉時幼平厺郡獨攜程氏酒入朝可忘習家池羽仍憐故吏依依戀自有清光處處隨述晚景南徐何處宿秋風北固不堪辭晝吳中詩酒饒佳興秦地關山引夢思藻對酒巳傷嘶馬厺銜恩只待掃門期惸五言與潘述集湯衡宅懷司直縱聮句幽獨何以慰友人顧茒茨衡巳忘歲月念載説清間時述旭日舒朱槿柔風引緑葹晝迢迢青溪路耿耿芳樹枝衡執祍空躑躅來城自逶迤述相思寄採掇景晏獨驅馳晝三言安吉崔眀府山院聮句一首人不擾政巳和丗慮寡山情多晝禪客至墨卿過興既洽情如何逵四言重聮一首肅肅清院翛翛碧鮮巳見心逺何關地偏晝自公退食升堂草玄紛紛巳隔雲心淡然逵五言重聮句一首瀑􅘇聞窗外晴峯逼座間晝挂冠徒有意芳桂杳難攀逵六言重聮句一首清高素非宦侶踈散從來道流今日還輕墨綬知君意在滄洲晝浮雲任從飄蕩寄隱也信沉浮不似漳南地僻道安為我淹留逵七言重聮句一首劉令興多常步履柴桑事少但援琴間招法侣從山寺每掇幽芳傍竹林晝卷簾只愛荆峰色入座偏冝郢谷吟誰許近來輕印綬因君昨夜悟禪心述五言秋日潘述自長城至霅上與晝公湯評事逰集纍日時司直李公瑕往蘇州有阻良會與二公聮句以寄之離念非前期秋風忽巳至述藝黃衆芳晚搖蕩居人思晝白霜凄以積髙梧颯而墜衡悠然越山川復此恨離異述時景易遷謝歡難兼遂晝惜分緩回舟懷遙企歸駟衡休浣情自髙來思日云未述五言喜晝公尋山回相遇聮句一首幾年無此會今日喜相從述後夏仍多病前書逹幾封晝水華迎暮雨松吹引踈鐘晝出谷隨𥘉月尋僧説五峰述五言道觀中和潘丞觀青溪圖聮句畫得青溪樣冝于紫府觀晝日眀煙靄薄楓落水容寬萬畫野髙低接商工井邑攢述疏川因稼穡出使問艱難晝五言春日對雨聮句一首春煙帶微雨漠漠連城邑桐葉生微隂桃花更冝濕韓章蕭條暗楊栁散漫下原隰歸路不我從遙心空佇立晝林低山影近岸轉水流急芳草自堪逰白雲如可揖章尋山禪客意苦雨陶公什逰衍情未終歸飛暮相及晝峯髙日色轉潭淨天光入却欲學神仙空思謝朋執章為道貴逍遙趨時多苦集瓊英若可飱青𬗋徒勞拾晝五言春日會韓武康章後亭聮句後園堪寄賞日日對春風客位繁隂下公墻細栁中晝坐看青嶂逺心與白雲同韓章林暗花隂入池深逺水通楊秦卿井桃新長蕊欄藥未成叢仲文松竹宜禪客山泉入謝公晝砌香翻芍藥簷靜倚梧桐章外意隨簾卷忘情與道空秦卿楚僧招惠逺蜀客挹楊雄仲文便寄柴桑隱何勞訪剡東晝五言送晝公聮句相逢情不厭惜别意難為章吾道應無住前期未可知晝輕霜凋古木寒水縮荒陂章賓雁依沙嶼浮雲慘路岐晝林踈看野逈岸轉覺山移章寄賞驚搖落歸心歎别離晝草堂思偃蹇麈尾厺相隨顧况勿謂光音逺禪房會一窺五言康録事宅送僧聮句蓮衣冝著雨竹錫好隨雲晝見鶴還因飬逢鷗自作群崔子向五言與邢端公李台題庭石聮句共題詩句遍爭坐蘚文稀晝五言奉同顔使君夜集聮句寒花護月色墜葉占風音四言與昻上人兩字繼合四句𥘉字日有一鳥雛凌寒獨宿若逢雲雨兩兩相逐次日野外有一人獨立無四鄰彼見是我身我見是彼身晝上人集卷第十
