  text: 晝上人集卷第四
  hash: sha256:d3a2d7f8a692332957c5ba96fae08d69e109d85c2318be5a67f870d0f961d59d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_004-1a}
body:
  text: 吳興釋皎然五言送梁拾遺肅歸朝眀主重文諫才臣出江東束書辭東山改服臨北風萬里望皇邑九重當曙空天開芙蓉闕日上蒲桃宫天子初未起金閨籍先通身逢軒轅丗名貴鵷鸞中故人榮此别何用悲絲桐奉陪楊使君頊送假校書赴南海幕碩賢靜廣州信為天下貞屈茲大將佐藉彼延閣英聲動栁吳興郊餞意不輕吾知假夫子高論關蒼生處以德為籓出則道可行遙知南樓會新景當詩情天髙林瘴洗秋逺海色清時泰罷飛檄唯應頌功成五言送陸侍御士佳赴上京長安三千里喜行不言永清路黃塵飛大河滄流靜更懷四川府主公昔和鼎伊鬱瑶瑟情威遲花驄影此時已難别日又無停景出餞闕相從心隨過前嶺五言奉陪顔使君真卿登峴山送張侍御嚴歸堂峴首千里情北轅自兹發煙霞正登覽簪筆限趨謁黃鶴望天衢白雲歸帝闕客心南浦栁離思西樓月留賞不延景感時方易歇他晨有山信一為訪林樾五言酬元主簿子球别贈故人方逺適訪我陳别情此夜偶禪室一言了無生覽君緘中寶如搴青玉瑛胡為藴髙價歲晚徒營營辭秩貧且病何人見艱貞出無黃金槖空歌白苧行威遲䇿駑馬獨望故關樹渺渺千里心春風起中路近聞新拜命鸞鳯猶棲棘勸君寄一枝且飬冥冥翼甘泉多竹花眀年待君食畣道素上人别春色遍逺道寂寞閩中行碧水何渺渺白雲亦英英離人不可望日暮芳洲情黃鶴有逸翮翹白雲傾欲為山中侣肯私遼天聲藍縷真子褐葳㽔近臣纓以兹奪爾懷常恐道不成吾門弟子中不減惠休名一性研巳逺五言功更精從君汗漫遊莫廢學無生忍草肯搖落禪枝不枯榮采采慰長路知吾心不輕幻情有厺住真性無離别留取老桂枝歸來共攀折霅溪館送韓明府章辭滿歸洛令從告還故人東門餞惠愛三年積軒車一夜逺曉月離館空秋風故山晚榮君有佳薦碩我阻逰衍宿昔峯頂心依依不可卷送穆寂赴舉天子錫玄纁傾山禮隱淪君拋青霞厺榮資觀國賔劒光既陸離瓊彩何璘珍夙駕別情逺啇弦秋意新冥冥鴻鵠姿數尺看蒼旻殘寇近宋郊西行惡颷塵立身素耿介處難思經綸春府搜才日髙科得一人送張仲彛歸長沙早聞凌雲彩謂在鴛鷺儔華髮始相遇滄江仍旋逰䇿名忘苟進淡慮輕所求常服逺逰戒緬懷經丗謀片帆背風渚萬里還湘洲别望荆雲積歸心漢水流蘭苕行采采桂棹思悠悠宿昔無機者為君動離憂秋日昆陵南寺送潘述之揚州孤客秋易傷嘶蟬靜仍續佳辰亦巳屢歡會常不足禪地非路岐我心豈拘束情生逺别時坐恨清景促望中千里隔暮歸西山曲蕭條月中道彩蒨原上緑不見同心人幽懷增躑躅春日又送潘述之揚州别渚望𨝍城岐路春日遍柔風吹楊桞芳景流郊甸日日東林期今夕異鄉縣文房曠佳士禪室阻清眄潘生曽受禪印離恨奪賞心不得諧所碩莫憶山中人碧雲遙可見新秋送盧判官故人念宿昔欲别增逺情入座炎氣屏為君秋景清由來空山客不怨離弦聲唯有暮蟬起相思碧雲生奉送袁髙使君詔徴赴行在效曹劉體皇心亭毒廣蝥賊皆陶甄未刈蚩尤旗方同軒后年天子幸漢中轘轅阻氛煙璽書召英牧名在列嶽仙國難倚長城廟謨資大賢清損休汝騎仁留述職篇遐路渺天末繁笳思何邊飾徒促逺期祗命赴急宣謏才豈足稱深仁碩何偏那堪臨流意千里望旗旃奉送陸中丞長源詔徴入朝詔下鄼侯幕徴賢寵上勳才當持漢典道可致堯君藩牧今榮餞詩流此盛文水從吳渚别樹向楚門分宿寺期嘉月看山識故雲歸心復何託惆悵在江濆奉送中丞道昌入朝文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新銜鳳車看舊飾熊去思今武子餘教昔文翁清在如江水仁留是國風光徴二千石掃苐望司空奉送顏延之眀府撫州覲叔父臨川千里别惆悵上津橋日暮人歸盡山空雪未銷鄊雲心渺渺楚水路遙遙林下方歡會山中獨寂寥天寒驚斷雁江信望回潮歲晚流芳歇思君在此宵五言送關小師還金陵如何有歸思愛别欲忘難白鷺汀沙晚青龍水寺寒蕉花鋪淨地桂子落空壇持此心為境應堪月夜看五言峴山送裴秀才赴舉漢家招秀士峴上送君行萬里見秋色兩河傷逺情王師出西鎬虜冦避東平天府登名後回看楚水清五言酬别襄陽詩僧少徴詩中答上人歸夢之意證心何有夢示説夢歸頻文字齎秦本詩騷學楚人蘭開衣上色栁向手中春别後須相見浮雲是我身五言送契上人逰揚州西陵古江口逺見東揚州渌水不同泛春山應獨逰尋僧白巖寺望月謝家樓宿昔心期在人寰非久留五言送沈秀才之閩中越客不成歌春風起渌波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何五言送德清衛眀府赴選時栁黜陟有薦狀八使慎求能東人獨薦君身猶千里限名巳九霄聞逺路翻喜别離言暫惜分鳯門多士會擁佩入卿雲五言送鄭孝亷淮西覲省離袂翠華滿晨羞欲早行春風生楚樹曉角發隨城野靄濕衣綵江鴻增客情征途不用戒坐見白波清五言送清會上人逰佳逰限衰疾一笑向西風思見青門外曽臨素滻東峰眀雲際寺寺名日出霧寒宫宫名行道禪長在香塵不染空五言送居士還太原辭鄉因丗難家族盛南朝名重郊居賦沈休文之作郊居賦才髙獨酌謡沈文子作浪花飄一葉峰色向三條髙逸雖成性弓旌肯望招奉同顔使君真卿峴山送李法曹陽冰西上獻書時會有詔徴赴京漢日中郎妙周王太史才雲書捧日厺鶴版下天來草見吳洲發花思御苑開芉公惜風景欲别幾遲徊五言兵後送姚太祝赴選兩河兵巳偃處處見歸舟日夜故人散江皋芳樹秋楚雲傷逺思秦月憶佳逰名動春官籍翩翩才少儔五言兵後送薛居士移家安吉舊逰經喪亂道在復何人寒草心易折間雲性常真交情别後見詩句比來新向我挑州住惜君東嶺春五言送塢傪之洪州覲兄弟年少足詩情西江楚月清書囊山翠濕琴匣雪花輕久别經離亂新正憶弟兄贈君題樂府為是豫章行五言送乾封李成羽檄飛來息離情逺近同感君由泛瑟關我是征鴻渺默歸人盡踈蕪夜渡空還期當歲晚獨在路行中五言送崔判官還揚子輕傳秪逺役依依下姑亭秋聲滿揚栁暮色繞郊坰煙水搖歸思山當楚驛青奉酬袁使君西樓送秦山人與晝同赴李侍御招三韻秋風怨别情江守上西城竹署寒流淺琴窗宿雨晴治書招逺意知共楚狂行送清涼上人何意欲歸山道髙由境勝花空覺性了月靜知心證永夜出禪吟清猿自相應送李丞使宣州結駟何翩翩落葉暗寒渚夢裡春穀泉愁中洞庭雨聊持剡山茗以代宣城醑五言送至洪沙門逰越知爾學無生不應傷此别相逢宿我寺獨往逰靈越早晚花會中經行剡山月七言送皇甫侍御曽還丹陽别業雲陽别夜憶春耕花發菱湖問厺程積水悠揚何處夢亂山稠疊此時情將離有月教弦斷贈逺無蘭覺意輕朝右要君持漢典眀年北墅可須營白蘋洲送洛陽李丞使還蘋洲北望楚山重千里回軺止一封臨水情來還共載看花醉厺更相從罷官風渚何時別寄隱雲陽幾處逢後會那應似疇昔年年覺老雪山容送履霜上人還金陵西山攜錫西山步緑莎禪心未了奈情何湘宫水寺清秋夜月落風悲松柏多送辨聰上人還廣陵莫學休公學逺公了心須與我心同隋家古栁數株在看取人間萬事空送清勵上人逰福建禪子自矜禪性成將來擬照建溪清南看閩樹花不落更取何緣了妄情送顧道士逰洞庭山見説洞庭無上路春逰亂踏五靈芝含桃風起花狼籍正是仙翁碁散時送邢台州濟海上仙山屬使君石橋琪樹古來聞他時畫出白團扇乞取天台一片雲送栁察諫議叔東城南陌強經過怨别無心亦放歌眀日院公應問我間雲長在石門多送栁淡扶侍赴洪州此子素少官情共豫有西山之好中林許師友忽阻夙心期自顧青緺好來將黃鶴詞少年輕逺涉丗道得無欺煙雨孤舟上晨昏千里時離魂渺天末相望在江湄無限江南栁春風卷亂絲同李司直縱題武丘寺兼留諸公與陸羽之無錫陵寢成香阜禪枝出白楊劒池留故事月樹即他方應丗緣須别栖心趣不忘還將陸居士晨發泛歸航夏日題鄭谷江上納涼館迢遙山意外清風又對君若為于此地翻作路岐分别館琴徒語前洲鶴自群眀朝天畔逐何處逐間雲太湖館送殷秀才赴舉春風洞庭路搖落暮天多衰疾見芳草别離傷逺波詩名推首薦賦甲擬前科數日聞天府山衣製芰荷送重鈞上人逰天台漸看華頂出幽意尚隨生十里行松色千重過水聲海容雲正盡山態雪初晴事事將心證知君道可成早春送顔主簿逰越東兼謁元中丞輕軻趣不巳東風吹緑蘋欲看梅市雪知賞栁家春别意傾吳醑芳聲動越人山隂三月會內史得嘉賔同顔使君清眀日逰因送蕭主簿誰知賞佳節别意忽相和暮色汀洲遍春情楊栁多髙城戀旌斾極浦宿風波惆悵友山月今宵不再過送道琚上人還金陵一與鍾山别山中得信稀經年求法後及夏問安歸野實充甘膳池花當彩衣慈親莫返拜外禮欲無為送裴雍之上京辭山偶世清挾䇿忽西行帆過隋江疾衣霑楚雪輕尚文須獻賦重道莫論兵東觀今多事應髙白馬生送珍上人還天竺兼寄廣通上人秦山人江寺名天竺多君躡逺蹤春帆依栁浦輕履上蓮峯禪子兼三隱空書共一封因君逹山信應向白雲逢送張孝廉赴舉名在諸生右家經見素風春田休學稼秋賦出儒宫别路殘雲濕離情晚桂叢眀年石渠署應繼叔孫通送劉司法之越州蕭蕭鳴夜角驅馬背城濠雨後寒流急秋來朔吹髙三山期望海八月欲觀濤幾日西陵路應逢謝法曺送簡栖上人之建州覲使君舅亂峰江上色羡爾及秋行釋氏推真子郗家許貴甥氎花新雨淨帆葉好風輕海人以木葉為帆千里以元舅回潮亦有情登開元寺樓送雀少府還平望驛登望思慮積長亭樹連連悠揚下樓日杳映傍帆煙入夜四郊靜南湖月待船送王居士遊越野性配雲泉詩情屬風景愛作爛熳逰間尋東路永何山最好望須上蕭然嶺雜言重送皇甫侍御曽人獨歸日將暮孤帆帶孤嶼逺水連逺樹難作别時心還看别時路送大寶上人歸楚山猒上烏橋送别頻湖花爛熳望行人欲將夜舸陪嘉月肯住空林伴老身獨鶴翩翻飛不定歸雲蕭散會無因從何得道懷惆悵莫是人間屢見春送演上人之撫州覲使君叔臨川內史憐諸謝爾在生緣比惠宗逺別應捋秦本厺幽尋定有楚僧逢停船夜坐親孤月把錫秋行入亂峰便道須過太守寺白蓮池上訪髙蹤送侯秀才南逰芳草隨君自有情不關山色與猿聲為看嚴子灘頭石曽憶題詩不著名别洞庭維諒上人白雲關我不關他此物留君情最多情著春風生橘樹歸心不怕洞庭波康造録事宅送太祝姪之虔吉訪兄弟阮咸别曲四座愁賴是春風不是秋漫漫江行訪兄弟猿聲幾夜到蘆洲冬日梅溪送裴方舟之宣州平眀匹馬上村橋花發梅溪雪未銷日短天寒愁送客楚山無限路遙遙送韋向睦州謁獨孤使君汜才子南看多逺情間舟蕩漾任春行新安江色長如此何似新安太守清送至嚴山人歸山𥘉到人間栁始隂山書昨夜報春深朝朝花落幾株樹惱殺禪僧未證心送僧逰揚州平眀擇鉢向風輕正及隋隄栁色行知爾禪心還似我故宫春物可傷情晝上人集卷第四
