front:
  text: 晝上人集卷第五
  hash: sha256:c6fc5bbebd3ea0b71d9fba208a5a597ebd5de23c29687499c5a2218124e7da9a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_005-1a}
body:
  text: 呉興釋皎然兵後餘不亭重送盧孟眀逰江西并序孟眀常引支子元道人修習禪心兼餌芝术遂與予有栖山之契其宦情未遣故勸勉之攜手曽此分怳如隔呉越倫侯古封邑榮盛風雨歇飢鼯號空亭野草生故轍如何此路岐更作千里别慿軾望逺道春山無㫁絶朝行入郢樹夜泊依楚月佳士持操髙揚才日昭晰離言何所贈盈满有虧缺時節傷蟪姑芳菲忌鶗鴂予思鹿門隱心跡貴冥㓕頽顔返芝术㫺㒵成氷雪歲晏期爾来銷聲坐巗穴别山詩幷序時因主人寄風谿蘭若與道士石脇峯相隣禪僧仙師時得道㑹至秋中值外縁有請别山懐舊遂有是詩山翁亦好禪借我風谿樹採藥多近峯汲泉有春波幽僧時相偶仙子或與晤自許戰勝心彌髙獨㳺歩如何區中事奪我林栖趣辤山下復上戀石行仍顧宿昔情或乖庶㡬跡無誤松聲莫相誚此心冥厺住五言同袁髙使君送李判官使廻庾公歡此别路逺意猶賖為出塘栁榮歸府中花馳陽照古堞遥思凝寒笳延歩下前渚沂觴臨淺沙湖光引行色䡖舸傍殘霞五言陪顔使君餞宣諭蕭常侍江濤凋瘵後逺使發天都昏墊宸心及哀矜詔命敷恤民驅急傳訪舊枉征艫外鎮藩條最中朝顧問殊文皆正風俗名共溢寰區巳事方懐闕歸期早戒塗繁笳咽水閣髙葢擁雲衢暮色生千嶂秋聲入五湖離歌猶宛轉歸馭巳踟蹰今夕庾公意西樓月亦孤奉陪顏使君修韻海畢東谿泛舟餞諸文士諸侯崇魯學羔雁日成群外史刋新韻中郎定古文魯公著書依切韻起東字脚皆列古篆菁華兼百氏縑素備三墳國語思開物王言欲致君研精業巳就歡宴惜應分獨望西山厺将身寄白雲五言今上初登極歲送皇甫孝亷赴選孝亷即故大夫之子行應㑹府春欲勸及芳辰北極天文正東風漢律新少年逢聖代歡笑别情親况是勲庸後恩榮襲爾身五言同楊使君白蘋洲送侍御士佳入朝乆愛呉興客來依道徳藩旋師聞杖杜歸路憶轘轅舊佩蒼玉在新歌白芷繁今朝天地静北望重飛飜五言雪夜送海上人常州覲叔父上人殷仲文後繼世風流在傳心向一燈望雲裁衲慣翫雪歩花能交戰情忘久銷魂别未曽眀朝阮家集知有竹林僧五言送常清上人還舒州灊徐林反人思爾㳒楚信有廻船估客親宵語閒鷗偶晝禪經聲含石㶑麈尾拂江烟常說歸山意誅茅廬霍前五言峴山送崔子向之宣州謁裴使君楚思入詩清晨登峴山情秋天水西寺古木宛陵城琴匣應将徃書車亦共行吾知江太守一顧重君名五言送嚴眀府入關謁黎京兆春日異秋風何為怨别同潮廻芳渚沒花落晝山空旅候聞嘶馬殘陽望㫁鴻應思右内史相見直城中五言送丘秀才逰越山情與詩思爛熳欲何從夜舸誰相逐空江月自逢春期越草秀晴憶剡雲濃便擬将䡖錫攜居入亂峯五言送楊校書還濟源妖烽昨日静故里近嵩丘楚月揺歸夢江楓見早秋鄊心無逺道北信减離憂禪子還無事辤君買沃洲五言送楊遂初赴選秋風吹别𬒮客思在長安若得臨觴醉何須减瑟弹秉心凌竹柏杖信越波瀾春㑹文昌府思君每北㸔五言送贇上人還京久逰春草盡還寄北船歸沙鳥窺中食江雲满淨衣秦原山色近楚寺磬聲㣲見說翻經館多聞似爾稀五言送廣通上人逰江西香鑪七嶺秀秋色九江清自古多禪隱吾常愛此行尋師經鄂渚受請到青城離别人間事何關道者情五言送羅判官還壽州幕君章才五色知爾得家風故里旋歸駕夀春思奉戎天寒長虵伏颷烈文虎雄定頌張征虜桓桓戡難功五言送李秀才赴婺州招山開江色上孤賞厺應遲渌水近呉牓秋風入楚詞猿清獨宿䖏木落逺行時見說東陽守登樓為爾期五言送薛逢之宣州謁廢使六月鵬盡化鴻飛獨冥冥秋蜂家不定險路客頻經牛渚何時到漁船㡬䖏停遥知詠史夜謝守月中聴五言送徳守二叔姪上人還國清寺覲師道賢齊二阮俱向竹林歸古偈穿花線春装卷葉衣僧墟廻水寺佛隴啟山扉愛别吾何有人心强有違五言同眀府章送沈秀才還石門山讀書身為印令客心許楚山雲文墨應經世林泉澷誘君欲隨樵子厺惜與道流分肯謝申公軰治詩事漢文五言送吉判官還京赴崔尹幕江南梅雨天别思極春前長路飛鳴鶴離帆聚散烟清晨趨九陌秋色望三邊見說王都尹山陽辟一賢五言送裴判官赴商幕商洛近京師才難赴幕時離歌紛白紵候騎擁青絲㑹喜疲人息應逢滑虜衰㸔君䇿髙足自此烟霄期五言送李喻之䖏士洪州謁曺王獨思賢王府遂作豫章行雄鎮廬霍秀髙秋江漢清見聞驚苦節艱故傷逺情西邸延佳士遺才得正平五言送唐贊善逰越田園臨漢水離亂寄隋關今日烟塵盡東西又未還長亭百越外孤棹五湖間何處㳺芳草雲門千萬山五言送韋秀才晨裝行墮葉萬里望桑乾舊說涇關險猶聞易水寒黄雲戰後積白草暮來㸔近得君苗信時教旅思寛五言送陳秀才赴舉諸侯懼削地選士皆不覊休隱脫荷芰将鳴矜羽儀甲科爭玉片詩句擬花枝君實三楚秀承家有清䂓五言烏程李眀府水堂同盧使君㓜平送奘上上人逰五臺身將劉令隱經共謝公翻有此宗師在應知我㳒存問心恒寂樂爲别豈傷魂獨訪華泉厺秋風入雁門五言送李季良北歸風吹殘栁絲孤客欲歸時掩抑楚弦絶離披湘葉衰前軍猶轉戰故國杳難期北望雁門雪空吟平子詩五言送淳于蘭陵覲省歡言欲忘别風信忽相驚桞浦歸人思蘭陵春草生擷芳心未及視枕戀常盈此厺非長路還如千里情五言送至洪沙彌卦上元受戒上元江中蔡洲有梁戒壇不肯資章甫勝衣被木蘭今隨秣陵信欲及蔡州壇野寺鐘聲逺春山戒足寒歸來次苐學應見後心難五言九日同盧使君㓜平呉興郊外送李司倉赴選重陽千騎出送客為踟蹰曠野多揺落寒山满路隅晴空懸蒨斾秋色起菱湖㡬日登司㑹揚才盛五都五言送盧孟眀還上都江皋北風至歸客獨傷魂楚水逢郷雁平陵憶故園征驂嘶别館落日隱寒原應及秦川望春華满國門五言送李少賓赴舉豈謂江南别心如塞上行苦雲揺陣色亂木攪秋聲周谷雨未散漢河流尚横春司遲爾䇿方用靜妖兵五言留别閻士和不慣人間别多應望别時逢山又逢水只畏却來遲五言送李道士常隨山上下忽限江南北共是忘情人何由肎相憶七言送裴參軍還下邳舊居北望烟鋪驃騎營虜烽無火楚天晴此時千里西歸客泗上春風得及耕七言送文㑹上人還冨陽悠悠渺渺屬寒波故寺思歸意若何長憶孤洲二三月春山偏愛冨春多七言送維諒上人歸洞庭從来湖上勝人間逺愛浮雲獨自還孤月空天見心地寥寥一水鏡中山七言九月八日送蕭少府之洪州眀日重陽今日歸布帆絲雨望霏霏行過鶴渚知堪住家在龍沙意有違七言同顔魯泛舟送皇甫侍御曽維舟若許暫從容送過重江不猒重霜簡别来今始見雪山歸厺又難逢五言送孫侍御逰越不知持斧客吟㑹是何情丹陛恩猶在滄洲賞暫行江橈隨月泛山䇿逐雲行佳句傳零雨詩流許盛名五言送顏䖏士還長沙覲省西候風信起三湘孤客心天寒漢水廣郷逺楚雲深服綵将侍饍擷芳思满襟歸人望艱阻别恨獨何任五言送還本上人逰江西欲廣分何教心將江漢期雲招望寺處月待泝盃時真侣誰傷别降猿汝自悲多應過廬阜幽賞却来遲五言送路少府使京兼覲侍御兄國賦推能吏今朝發貢湖佇瞻雙闕鳳思見柏臺烏樹向秦關逺江分楚驛孤榮君有兄弟相繼騁長途五言扵武原從送盧士舉落日獨歸客空山走馬嘶蕭條古關外岐路更東西大澤雲寂寂長亭雨凄凄君還到湘水寒夜满猿啼五言送烏程李眀府得􅕾狀赴京驛吏滿江城深仁見此情士林推玉振公府薦氷清爲政移風久承恩就日行仲容綸綍貴南巷有光榮五言送裴秀才徃㑹稽山讀書一身齎萬卷編室寄烟蘿硯滴穿池小書衣種楮多吟詩山響畣泛瑟竹聲和鶴版求儒術深居意若何五言送崔詹事論之上都崔嘗典呉興金虎城池在銅龍劒佩新重看前浦栁猶憶舊洲蘋逺思秦雲暮歸心臘月春青園㫺逰䖏惆悵别離人五言京口送孟眀還揚州蕭蕭北風起孤棹江江濆暮客厺来盡春流南北分萋萋御亭草渺渺蕪城雲相送日千里空山獨望君五言送沙彌文智㳺五臺童年隨㳒侣家丗本儒流章句三生學清凉萬里㳺雲歸龍沼暗木落雁門秋長老應相問傳予向祖州五言送禀上人逰越雲泉誰不賞獨見爾情高投石䡖龍窟臨流笑鷺濤折荷為片席灑水淨方𫀆剡路逢禪侣多應問我曺五言送潘秀才之舒州楚水清風生揚舲泛月行荻洲寒露彩雷岸曙潮聲東道思才子西人望客卿從来金谷集相繼有詩名五言送王山人逰廬山千里訪靈竒山資亦相隨葉舟過鶴市花漏宿龍池峯頂應閒散人間足白離白雲将丗事吾見爾心知五言送道契上人之越覲大夫叔楚僧推後軰唐本學新經外國傳香氎何人施竹瓶秋風别李寺春日向柯亭大阮今為郡看君眼最青五言送沙彌長文逰京白版年猶小黄花偈巳通若為詩思逸早欲似休公邁俗多真氣傳家有素風應須學心地宗㫖在關東五言送擇高上人往江西謁曺王超然獨逰趣無限别山情予病不同賞雲閒應共行齋容秋水照香氎早風輕曽被陳王識遥知江上迎七言送如獻上人逰長安關子四子教猶存見說新經待爾翻為㳒應過七祖寺忘名不到五侯門閑尋鄠杜看修竹獨上風凉望古原髙逸詩情無别怨春逰從遣落花繁七言送日曜上人還潤州送君何䖏最堪思孤月停空欲别時露茗猶芳邀重㑹寒花落盡不成期鶴令先厺看山近雲愛初飛到寺遲莫倚禪功放心定蕭家陵樹誤人悲七言寺院聴胡笳送李殷一奏胡笳客未停野僧還欲廢禪聽難将此意臨江别無限春風葭菼青七言送僧繹斜日揺揚在栁絲孤亭寂寂水逶迤誰堪别後行人盡唯有春風起路岐七言畣裴評事澄荻花間送梁肅拾遺波上荻花非雪花風吹撩亂满袈裟如今歲晏無芳草獨對離尊作物華七言送勝雲小師昨日雪山記爾名吾今坐石巳三生少年道性易流動莫遣秋風入别情雜言誚士和别今日同眀日隔何事悠悠久爲客君憐谿上厺來雲我羡磷磷水中石五言送吳􅑀逰京北期何意促蕙草夜来繁清月思淮水春風望國門此時休旋逸萬里忽飛翻若憶山隂㑹孤琴爲我援七言送僧逰宣州楚山千里一僧行念爾初緣道未成莫向舒姑泉口泊此中嗚咽為傷情晝上人集卷第五
