  text: 晝上人集卷第七
  hash: sha256:135498841f59ae35138f081241d077fef52097b71372b8cabf8add6507c3f006
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_007-1a}
body:
  text: 吳興釋皎然弔靈均詞昧天道兮有無聽汨音覓渚兮躊躇期靈均兮若存問神理兮何如願君精兮為月出孤影兮示豫天獨何兮有君君在萬兮不群既氷心兮皎潔上問天兮胡不聞天不聞神莫覩若雲冥冥兮雷霆怒蕭條杳眇兮餘草莾古山春兮為誰今猿哀兮何思風激冽兮楚竹死國殤人悲兮雨颸颸雨颸颸兮望君時光茫蕩漾兮化為水萬古忠貞兮徒爾為步虗詞豫因覽真訣遂感西城君玉皇下青冥人間未曽聞日華錬精魄精魄無垢氛謂我有仙骨且令餌氤氲俯仰愧靈顔碩隨鸞鵠群俄然動風馭縹眇歸青雲奉應顔尚書真卿觀玄真子置酒張樂舞破陳畫洞庭三山歌道流迹異人共驚寄向畫中觀道情如何萬象自心出而心淡然無所營手援毫足蹈莭披縑灑墨稱麗絶石文亂點急管催雲態徐揮慢歌發樂音洛縱酒酣狂更好攢峰若雨縱橫掃尺波澶漫意無涯片嶺崚嶒勢將倒盼睞方知造境難象忘神遇非茟端昨日幽竒湖上見今朝舒卷手中看興餘輕拂逺天色曽向峯東海邉識秋容暮景颯颯容翻疑是真畫不得顔公素高山水意常恨三山不可至賞君狂畫忘逺逰不出軒遲坐蒼翠答韋山人隱起龍文藥瓢歌野人藥瓢天下絶全如渾金割如月彪炳文章智使然生成在我不在天若言有物不由物何意中虛道性全韋生能詩兼好異從此靈瓢逺相遺仙侯玉帖人漫傳若士青囊丗何祕一捧一開如見君藥盛五色香氛氲背上驪龍蟠不睡張鱗擺領生風雲丗人強知金丹道默仙不成畏仙老年少紛如陌上塵不見吾瓢盡枯稿聊將繫肘步何䡖便有三山孤鶴情東方小兒乏此物遂令仙籍獨無名桃花石枕歌贈康從事卞山幽石産竒璞荆人至死采不著何人琢枕持贈君片片桃花開未落劒工見兮可為劔昆吾石鐵可鑄為劒玉工辨兮知非石至寶由來覽者稀今君獨鍳應欲惜何辭售與韋天真幸得提攜近玉人可中棄置君不顧天生秀色徒璘玢四座喧喧爭目恱巧過造化稱一絶莫言昨日因錯磨看取從來無點缺六月江南暑未䦨一尺花氷試枕看髙窗正午風颯變室中不減春天寒主人所重重枕德文章外飾徒相惑更有堅貞不易心與君天下為士則張伯英草歌伯英死後生伯高朝看手把山中毫先賢草律我草狂風雲陳發愁鍾王須臾變態皆自我象形類物無不可閬風逰雲千萬朵驚龍蹴踏飛欲隨更覩鄧林花落朝狂風亂攪何飄颻有時凝然茟空握情在寥天獨飛鶴有時取勢氣更高憶得春江千里濤張生竒態難再遇王小令草書古今稱草絶草罷臨風展輕素隂慘陽舒如有鬼狀魑容若可懼黃公酒壚興偏入阮籍不嗔嵇亦顧長安酒榜醉後書此日騁君千里步寒栖子歌曽居廬山欲有事羅浮之行君在廬山知有疑是鶴又是雲生死塵埃汙不得眼前榮利徒紛紛今日惠然來訪我酒榼書囊肩背荷拂除衣上餌烟霞昨日胥門宿蔡家天然不飲亦不食拋名换姓覓不得且向人間作酒仙不肯將身生羽翼停形為餌天地根胎息道成丗人皆死我獨存洗慮因吞清眀籙世人皆貪我常足栖子妙今道巳成手把玄樞心運冥能令鬼哭神敢靈身如飄風不可絆朝逰崆峒夕汗漫向來坐客猶未散忽憶羅浮欲厺時遙指孤雲作路岐海上仙逰不可見人間日落空桑枝翔隼歌送王端公古人賞神駿何如秋隼擊獨立髙標整霜翮應看天宇如咫尺低回拂地凌風翔鵬雛敢下雁斷行晴空四顧忽不見有時獨出青霞傍窮隂萬里落寒曰氣殺草枯增奮逸雲塞斜飛攪葉迷雪天直上穿花疾見君髙情有所屬贈别因歌翔隼曲離亭慘慘客散時歌盡路長意不足白雲歌寄中丞使君長源一見西山雲使人情意逺慿高發詠何超遙道妙如君有舒卷縈空疊景多麗容衆峯峯上自為峯潔白不由隂雨積高眀肯共雜烟重萬物有形皆有著白雲有形無繫縳黃金𬒳爍玉亦瑕一片飄然汚不得或逢天下㦯人間人自營營雲自閒忽爾飛來暫為侣忽然飛去莫能攀逸民對雲效髙致禪子逢雲增道意白雲遇物無偏頗自是人心見同異閶闔天門冝曙看為纓為蓋擁千官從龍合沓臨清暑殿名就日逶迤繞露寒宫名誰憐西山雲亭亭處幽絶坐石長看非我羈手中欲攬待君說貞白先生那得知只向空山自怡恱裴端公使君清席賦得青桂歌送徐長史昔年攀桂為留人今朝攀桂送歸客秋風桃李搖落盡為君青青伴松柏謝公南樓送客還髙歌桂樹凌寒山應憐獨秀空林上空賞敷華積雪間昨夜一枝生在月嬋姢可望不可折若為天上堪贈行徒使亭亭照離别周長史昉畫毗沙天王歌長史畫神獨感神髙步區中無兩人雅而逸高且真形生虗無忽可親降魔大㦸縮在手倚天長劒橫諸紳慈威示物雖凛凛在德無秋唯有春吾知真象夲非色此中妙用君心得苟能下筆合神造誤點一點亦為道寫出霜縑可舒卷何人應識此情逺秋齊清寂無外物盥水㷊香聊自展憶昔胡兵圍未解感得此神天上擺至今雲旗圗我形為君一顧烟塵清奉和顔魯公真卿落玄真子舴艋舟歌楚章華臺成影願諸侯落之滄浪子後玄真子冥冥釣隱江之汜刳木薪成舴艋舟諸侯落舟自兹始得道身不繫無機舟亦間從水逺逝兮任風還朝五湖兮夕三山停綸乍入芙蓉浦擊洑時過眀月灣太公取璜我不取龍伯釣鼇我不釣竹竿嫋嫋魚篩篩此中自得還自笑汗漫一逰何可期後來誰遇氷雪姿上古𥘉聞出堯世今朝還見在堯時鄭容全成蛟形木几歌萬物貴天然天然不可得渾朴無勞剖劂工幽姿自可蛟龍質欲騰未厺何翩翩揚𬒮爭前誰敢拂可中風雨一朝至還應不是池中物蒼山萬重採一枝形如器車生意竒風號雨噴心不折衆木千叢君獨知廣德中鄭生避賦吳興毗山于稠人之中遇豫獨見稱賞高人心多越格有時就月吟春風持來座右驚神客愛君開閣江之濵白雲黃鶴長相親南郭子綦君不識非君獨是何人奉同顔使君真卿清風樓賦得洞庭山歌送吳錬師歸林屋洞名山洞府到金庭三十六洞稱最靈不有古仙啓其祕今日安知靈寶經中山錬師栖白雲道成仙秩號元君安之高仙者有元君次有夫人元有君秩比左仙公三千甲子朝玉帝丗上如今名始聞吐納青牙飬肌髮花冠玉舄何髙潔不聞天上來謫仙自是人間受真訣吳興太守道家流仙師逺放清風樓應將內景還飛厺且從分風當此留湖之山兮樓上見山冥冥兮水悠悠世人不到君自到縹眇仙都誰與儔黃鶴孤雲天上物物外飄然自天匹一别千年未可期仙家不數人間日戞銅碗為龍吟歌并序唐故太尉房公琯早歲常隱終南山峻壁之下往往聞龍吟聲清而靜滌人邪想時有好事僧潜戞之以三金寫之唯銅聲酷似他日房公偶至山寺聞林嶺間有此聲乃曰龍吟復遷于兹矣僧因出其器以告公命戞之驚曰真龍吟也大曆十三祀秦僧傳至桐江豫使童兒戞金倣之亦不减秦聲也緇人或有譏者曰此逹僧之事可以嬉嬋爾曺無以瑣行自拘因賦龍吟歌以見其意逸僧戞碗為龍吟丗上未曽聞此音一從太尉房公賞遂使秦人傳至今𥘉戞徐徐聲漸顯樂音不管何人辨似出龍泉萬丈底乍怪聲來近西逺未必全由戞者功真生虗無非碗中寥亮掩清狖縈回凌細風遙聞不斷在烟杪萬籟無聲天境空聽􅌹一境則衆音不聞非萬籟之無聲也乍向天台宿華頂秋霄一吟更清逈能令聽者易常性憂人忘憂躁人靜今日鏗鍠江上聞蛟螭奔飛如得群聲過陰嶺恐成雨響駐晴天將起雲坐來吟盡空江碧却尋向者聽無跡人生萬事將此同暮賤朝榮動還寂飲茶歌誚崔石使君越人遺我剡溪茗採得金芽㸑金鼎素瓷雪色縹沫香何似諸仙瓊繠漿一飲滌昏寐情來朗爽滿天地再飲清我神忽如飛雨灑䡖塵三飲便得道何須苦心破煩惱此物清髙世莫知丗人飲酒多自欺愁看畢卓甕間夜笑向陶潜籬下時崔侯啜之意不巳狂歌一曲驚人耳孰知全道全爾真唯有丹丘得如此買茶歌送楊山人華隂少年何所希欲餌丹砂化骨飛江南藥少淮南有暫别胥門上京口京口斜通江水流徘徊應上青山頭夜驚潮沒鸕鷀堰朝看日出芙蓉樓搖蕩春風亂帆影片雲無數是揚州揚州喧喧賣藥市浮俗無由識仙子荷間姹女直千金紫陽夫人服不死吾于此道復何如昨朝新得蓬萊書薛卿教長行歌時量移湖州别駕桂楊仙栁道家說昔傳蘇君今是薛聊將握槊偶時人便𬒳人間稱冠絶黃楊文局龜螭蟠琢成骰子雙琅玕𥘉疑月破雲中隨復怪星移指下攢誰識兵竒勢可保坐看將軍上一道長行有將軍槊有時彩王去聲非所希笑擎單于出重圍鳬驚隼擊疾若飛左顧右盻生光輝家本聮􅊚漢戚里身是長安貴公子名高藝絶何翩翩幾回决勝君王前扈逰長樂與祈年人望青雲白日邉謫官江南歲隂晚還將此道聊自遣由來君子行最長長行經有君子行小人行豫亦知君寄心逺桃花石枕歌送安吉康丞并序安吉古桃州也今為吳興右邑士遐副焉于南山獲桃花石異而重之珍于席上士遐將赴京師故帥詩人以君所寶之物髙歌贈行君吏桃州尚竒跡桃州採得桃花石爛疑朝日照已舒含似春風吹未坼圭璋特逹丗所珍吾知此物亦其倫應羡花開不凋悴應嘉玉片無緇潾立性堅剛平若砥君子偏將交道比何人亦比堅剛姿吾見君心得如此君心所好我獨知别多見少長相思從來賞玩安左右萬里提攜君莫辭賦得吳王送女潮歌送李判官之河中府見說吳王送女時行宫直到荆溪口溪上千年送女潮為感吳王至今有乃知㫺人由志誠流水無情翻有情平波忽起二三尺此上疑與神仙宅今人猶望荆之湄長令望者增所思吳王巳殁女不返潮水無情那有期溪草河草號帝女溪竹河竹號湘妃靈濤旦暮自堪傷的皪嬋姢又爭發客歸千里自兹始覽古高歌感行子不知别後相見期君意何如此潮水觀李中丞洪二美人唱歌軋筝歌時量移湖州長史君家雙美姬善歌工筝人莫知軋用蜀竹弦楚絲清哇哇娃音歌聲也宛轉聲相隨夜靜酒䦨佳月前髙張水引何淵淵美人矜名曲不誤蹙響時時如迸泉趙琴素所嘉齊謳世稱絶筝歌一動凡音輟凝弦且莫停金罍淫聲巳闋雅聲來遊魚噞喁鶴徘徊主人髙情始為開髙情放浪出常格偶丗有名道無跡勳業先登上將科文章巳冠諸人籍每笑石崇無道情䡖身重色􅍔亦成君有佳人當禪伴于中不廢學無生愛君天然性寡欲家貧祿薄常知足謫宦無愠如古人交道忘言比前躅不意全家萬里來湖中再見春山緑吳興公舍幽且閒何妨寄隱在其間時議名齊謝太傅更有攜妓似東山陳氏童子草書歌書家孺子有竒名天然大草令人驚僧䖍老時把筆法孺子如今皆暗合飊揮電灑眼不及但覺毫端鳴颯颯有時作點險且能大行片石看欲崩偶然長掣濃又燥少室枯松欹不倒夏室炎炎少人歡山軒日色在䦨干桐花飛盡子規思主人高歌興不至濁醪不飲嫌昏沉欲玩草書開我襟龍瓜狀竒鼠鬚鋭氷箋白晢越人惠王家小令草最狂為豫灑出驚騰勢飲茶歌送鄭容丹丘羽人䡖玉食採茶飲之生羽翼天台記云丹丘出大茗服之羽化名藏仙府丗空知骨化雲宫人不識雲山童子調金鐺楚人茶經虗得名霜天半夜芳草折爛熳緗花啜又生賞君此茶祛我疾使人胸中蕩憂慓日上香爐情未畢辭踏虎溪雲高歌送君出花石長枕歌畣章居士贈楚山有石郢人琢琢成長枕知是玉全疑氷片坐恐銷間發花叢驚不足贈豫比之金琅玕瓊花爛爛浮雲端吾師遣吾不執寶今日感君因執看試扣鏗然應清律纎塵不留蠅敢拂萬物皆因造化資如何獨負清真質南山有雲鵠在空長松為我生凉風高友朗詠樂其中行住四儀皆道意不學小乘一曲士唯將此物安坐隅取次間眠有禪味觀王右丞維滄洲圖歌滄洲誤是真凄凄忽盈視便有春渚情褰裳掇芳芷颯然風至草不動始悮丹青得如此丹青變化不可尋翻空作有移人心猶言雨色斜拂座乍似水凉來入襟滄洲說近三湘口誰知卷得在君手披圗擁褐臨水時翛然不異滄洲叟洞庭山維諒上人院階前孤生橘樹歌洞庭仙山但生橘不生凡木與梨栗真子無私自不栽感得一株階下出細葉繁枝委露新四時常緑不關春若言此物無道性何意孤生就來人二月三月山𥘉暖最愛低檐數枝短白花不用鳥銜來自有風吹手中滿九月十月爭破顔金實離離色殷殷一夜天晴香滿山天生珍木異于俗俗士來逢不敢觸清隂獨步禪起時徙倚前看看不足春夜賦得漉水囊歌送鄭眀府吳縑楚練何白皙居士持來遺禪客禪客能裁漉水囊不用衣工秉刀尺先師遺我或無缺一濾一翻心敢賖夕望東峰思漱盥朧朧斜月懸燈紗徙倚花前漏𥘉斷白猿爭嘯驚禪伴玉瓶徐瀉賞㳙㳙濺著蓮衣水珠滿因識仁人為宦情還如漉水愛蒼生聊歌一曲與君别莫忘寒泉見底清湛處士枸杞架歌天生靈草生靈地誤生人間人不貴獨君上有一根始覺人間衆芳異拖線垂絲冝曙看徘徊滿架何珊珊春風亦解愛此物裊裊時來傍香實濕雲綴葉擺不去翠羽銜花驚畏失肯羡孤松不凋色皇天正氣肅不得我獨全生異此輩順時榮落不相背孤松自破斧斤傷獨我柔枝保無害黃油酒囊石棋局吾羡湛生心出俗擷芳坐影風灑懷其致翛然此中足觀裴秀才松石障歌誰工此松唯拂墨巧思丹青管不得𥘉寫松梢風正生此中勢與真松爭高柯細葉動颯颯乍聽幽飀如有聲左右雙松更竒絶龍鱗麈尾仍半折經春寒色聚不散逼座隂隂將下雪荆門石狀凌璵璠蹙成數片倚松根何年蒨蒨菭黏跡幾夜潺潺水擊痕裴生詩家後來客為我開圖玩松石對之自有髙丗心何事勞君上山屐送顧處士歌即吳興丘司儀之女壻即况也吳門顧子豫早聞風貌真古誰似君人中黃憲與顔子物表孤髙將片雲性背時人髙且逸平生好古無儔匹醉書在篋稱絶倫神畫開厨怕飛出謝氏檀郎亦可儔道情還似我家流安貧日日讀書坐不見將名干五侯知君别業長洲外欲行去聲秋田循畎澮門前便取觳觫乘腰上還將鹿盧佩禪子有情非丗情御荈貢餘聊贈行滿道喧喧遇君别爭窺玉潤與氷清水清數珠歌西方真人為行密臂上記珠皎如日佛名無著心亦空珠去珠來體常一誰道佛身千里身重重只向心中出兵後西日溪行并序沈羲仙記銅峴地肺可以逃水又聖桃源記天地改桃源在即此地也此一章靈徹上人可以志之一從清氣上為天仙叟何年見海乾黃河幾度濁復清此水如今未曽改西尋仙人渚誤入桃花穴風吹花迸使我迷時時問山驚踏雪石梁丹竈意更竒石梁丹竈銅峴山人渚靈跡有四所春草不生多故轍我來隱道非隱身如今世上無風塵路似武陵路人非秦代人飯松得髙侣濯足偶清津𢾗片昔賢盤石在幾回茲坐戴綸巾姑蘇行古臺不見秋草衰却憶吳王全盛時千年月照秋草上吳王在時幾回望至今月出君不還丗人空對姑蘇山山中精靈安可覩轍迹人蹤麋鹿聚嬋姢西子傾國容化作寒陵一堆土短歌行古人若不死吾亦何所悲蕭蕭烟雨九原上白楊青松葬者誰貴賤同一塵死生同一指人生在丗共如此何似浮雲與流水短歌行短歌無窮日巳傾鄴宫梁苑徒有名春草秋風傷我情何為不學金仙侣一悟空王無死生山月行家家望秋月不及秋山望山心萬境長寂寥夜夜孤眀我山上海人皆言生海東山人自謂出山中憂虞歡樂皆占月月夲無心同不同自從有月山不改古人望盡今人在不知萬丗今夜時孤月將誰更待顧渚行寄裴方舟我有雲泉臨渚山山中茶事頗相關鶗鴂鳴時芳草死山家漸欲收茶子伯勞飛日芳草滋山僧又是採茶時由來慣採無近逺隂䫈長兮陽崖淺大寒山下葉未生小寒山中葉𥘉卷二山名吳姹攜籠上翠微蒙蒙香刺罥春衣迷山乍𬒳落花亂度水時驚啼鳥飛家園不逺乘露摘歸時露彩猶滴瀝𥘉看怕出欺玉英更取煎來勝金液昨夜西峯雨色過朝尋新茗復如何女宫露澀青牙老堯市人稀紫笋多𬗋笋青芽誰得識日暮採之長太息清冷真人待子元仙傳清冷真人裴君與道人支子元為友貯此芳香思何極武原行贈丘卿岑㫺年群盜阻江東吳山搖蕩楚澤空齊人亦戴蜂蠆毒美稷花為荆棘叢胸胸四顧多窟穴浮雲白波名不同萬人死地當虎口一旦生涯懸殼中昨日將軍徇死莭悉向生民陷成血胸中豹略張陳雲握內蛇矛揮白雪長洲南厺接孤城居人散盡鼓譟驚三春不見芳草色四面唯聞刀斗聲此時狂寇紛如市君當要衝固深壘縱橫計出皆獲全士卒身先每輕死掃平氛祲望吳門人間歲美桑柘繁比屋生全受君賜連營罷戰賴君恩如何棄置功不録通籍無名滯江曲灞亭不重李將軍漢爵猶輕蘇屬國荒營寂寂隱山椒春意空驚故栁條野戰攻城盡如此即今誰是靈嫖姚長安少年行翠樓春酒蝦蟇陵長安少年皆共矜紛紛半醉緑槐道蹀躞花驄驕不勝風入松西嶺松聲落日秋千枝萬葉風飀飀美人援琴弄成曲寫得松間聲斷續琴聲清我魂流波壞陵安足論美人夜坐眀月禋含少商兮點清徴風何凄兮飄飄攬寒松兮又夜起夜未央曲何長金徽更促聲泱泱何人此時不得意意苦弦悲聞客堂晝上人集卷第七
