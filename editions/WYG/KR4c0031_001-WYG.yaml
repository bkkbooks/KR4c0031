body:
  text: 杼山集巻一唐釋皎然撰五言奉酬于中丞使君郡齋臥病見示一首宿昔祖師教了空無不可枯槁未死身理心寄行坐仁公施春令和風来澤我生成一草木大道無負荷論入空王室明月開心胸性起妙不染心行寂無蹤若非禪中侶君為雷次宗比聞朝端名今貽郡齋作真思凝瑶瑟髙情屬雲鶴抉得驪龍珠光彩曜掌握若作詩中友君為謝康樂盤薄西山氣貯在君子衿澄澹秋水影用為字人心群物如鳬鷖游翺愛清深格居第一品髙步凌前躅精義究天人四坐聽不足伊昔栁太守曾賞汀洲蘋如何五百年重見江南春公每省往事詠歌懐昔辰以茲得髙臥任物化自淳還因訪禪隠知有雪山人附郡齋臥疾贈晝上人上人早名皎然晚字畫湖州刺史于頔夙陪翰墨徒深論窮文格麗則風騷後然公我詞客晚依方外友極理探精賾曶合南北宗書公我禪伯光明性不染故我行貞白隨順令得解故我言芳澤霅水漾清潯呉山横碧岑含珠復藴玉價重雙南金的皪曜竒彩凄凄流雅音商聲發楚調調切諧瑶琴呉山為我髙霅水為我深萬景徒有象孤雲本無心衆木豈無聲椅桐有清響衆耳豈不聆鍾期有真賞髙潔古人操素懐夙所仰覿君水雪姿祛我淫滯想常吟栁惲詩苕浦乆相思逮此逺為郡蘋洲芳草衰逢師年臘長值我病容羸共話無生理聊用契心期五言贈李中丞一首深沉閫外畧奕世當榮寄地裂大將封家傳介珪瑞至今漳河俗猶受仁人賜公初鎮惟邢决勝無精兵重圍逼大敵六月守孤城政用仁恕立恩繇賞罰明遂令麾下士感徳不顧生于時聞王師諸將兵頗黷天子狩南漢煙塵滿凾谷純臣獨耿介下士多反覆明公仗忠節一言感萬夫物性如蒺䔧化作春蘭敷見説金被爍終期玉有瑜移官萬里道君子情何如伊昔避事心乃是方袍客頓了空王旨仍髙致君䇿安知七十年一朝值宗伯言如及清風醒然開我懐宴息與游樂不將衣褐乖海底取明月鯨波不可渡上有巨蟒吞下有毒龍䕶一與吾師言乃於中心悟咄哉㝠㝠子胡為自塵汚五言杼山禪居寄贈東溪呉處士馮一首青雲何潤澤下有賢人隠路入菱湖深跡與黄鶴近野風歌白芷山月揺清軫詩祖呉叔庠致君名不盡身當青山秀詩曰家住青山下青山有呉筠故宅後改為呉筠山文體多郢聲澄澈湘水碧泬寥楚山青時人格不同至今罕知名昔賢敦師友此道君獨行既得廬霍趣乃髙雷逺情别時春風多掃盡雪山雪為君中夜起孤坐石上月悠然遺塵想邈矣逹性説故人不在茲幽桂惜未結五言妙喜寺髙房期靈澈上人不至重招之一首晨起峰頂心懐人望空碧掃雪開寺門灑水浄僧席言笑形外阻風儀想中覿馳心驚葉動傾耳聞泉滴豈慮咆虎逢乍疑崩湍隔前期或不顧知爾隳常格如今誰山下秋霖步淅瀝吾亦聊自得行禪荷輕䇿松聲暢幽情山意導遐跡舉目無世人題詩足竒石貧山何所有特此邀來客五言奉和薛員外誼贈湯評事衡反招隠之跡兼見寄十二韻喜友稱髙儒曠懐美無度近為東田誘遂耽西山趣庭有介隠心得無雲泉誤府公中司貴頻貽咫尺素郡佐仙省髙亦贈瓊瑶句誚茲長往志紆彼獨遊步禪子方外期夢想山中路艱難親稼穡晨夕苦煙霧曷若孟嘗門日榮國士遇鏗鏘聆綺瑟攀折邇瓊樹幽踐隨鹿麋乆期怨蟾兔情同不繫舟有跡道所惡五言荅黎士曹黎生前適越後之楚楚木紛如麻髙松自孤直願得苦寒枝與君比顔色故鄉渺天末羇旅滄江隅委質在忠信苦心無變渝何繇表名義贈君金轆轤何以美知才投我懸黎珠遽為千里别南風思越絶愛君隨海鷗倚棹宿沙月不棲惡木上肯蹈巴蛇穴台人表朝逆命故君不踐其土一上蕭然峰擬蹤幽人轍晨興獨西望郢水期泝沿夜到洞庭月秋經雲夢天黎生知吾道此地不澘然欲寄楚人住學拏漁子船奈何北風至攪我窓中絃遊子動歸思江蘺亦綿綿篋中封禪書欲獻無繇縁豈乏晨風翼翻飛到日邊五言荅豆盧次方吾愛道交論為髙貴世名昔稱柴桑令今聞豆盧生彼生清淮氣獨鍾文中彩近作公讌詩如逢何栁在吾用古人耳採君四坐珍賢士勝朝暉温温無冬春朝暉爍我肌賢士清我神微爾與雲鵠幽懐何繇申别来秋風至獨坐楚山碧髙月當清㝠禪心正寂厯增波徒相駭人逺情不隔有書遺瓊什以代貂襜褕風教凌越絶聲名掩呉趨懸壁安可酧徙倚還踟蹰五言荅蘇州韋應物郎中詩教殆淪缺庸音互相傾忽觀風騷韻㑹我夙昔情蕩漾學海資欝為詩人英格將寒松髙氣與秋江清何必鄴中作可為千載程受辭分虎竹萬里臨江城到日掃煩政况今休黷兵應憐禪家子林下寂無營跡隳世上華心得道中精脱畧文字累免為外物攖書衣流埃積硯石駮蘚生恨未識君子空傳手中瓊安可誘我性始願愆素誠為無鸑鷟音繼公雲和笙吟之向禪藪反媿幽松聲五言荅鄭方囘獨禪外念入中夜不成定顧我顦顇容澤君陽春詠詞貞思且逸瓊彩何暉映如聆雲和音况覩聲名盛琴語掩為去聲聞山心聲宜聽是時寒光澈萬境澄以浄髙秋日月清中氣天地正逺情偶茲夕道用增寥夐思君處虚空一操不可更時美城北徐家承谷口鄭軒車未有轍蒿蘭且同徑莊生誡近名夫子罕言命是以耕楚田曠然殊獨行萎蕤鸞鳯彩特逹珪璋性通隠嘉黄綺髙儒重荀孟世汚平聲我未起道蹇吾猶病逸翮思㝠㝠潛鱗樂游泳宗師許學外恨不逢孔聖説詩迷頽靡偶俗傷趨競此道誰共詮因君情欲罄五言荅俞校書冬夜夜閑禪用精空界亦清迥子真仙曹吏好我如宗炳一宿覿幽勝形清煩慮屏新聲殊激楚麗句同歌郢遺此感予懐沉吟忘夕永月彩散瑶碧示君禪中境真思在杳㝠浮念寄形影遥得四明心荅四明何須蹈岑嶺詩情聊作用空性惟寂靜若許林下期看君辭簿領五言妙喜寺逹公禪齋寄李司直公孫房都曹徳裕従事方舟顔武康士騁四十二韻我祖傳六經精義思朝徹莊子曰守之九日而後能外生外生而後能朝徹方舟頗周覽逸書亦備閲墨家傷刻薄墨流刻薄而不仁可以理身不可以濟世儒氏知優劣弱植庻可彫苦心未嘗輟中年慕仙術永願傳其訣嵗駐若木景日飡瓊禾屑嬋娟羨門子斯語豈徒設天上生白榆葳蕤信好折實可反柔顔花堪養𤣥髪求之性分外業棄金亦竭藥化成白雲形彫辭素穴素穴山名一聞西天㫖初禪已無熱第四禪中有天名無熱無三災之患故以為名今初禪即得葢詩人美已證超出常涓子非我宗然公有真訣却尋邱壑趣始與纓紱別野飯敵膏梁山楹代藻棁與君北巖侶遊寓日常昳靜對春谷泉晴披陽林雪境清覺神王道勝知機滅詣寂長杳㝠忘歸暫采擷物生豈有心麗容俟予别桂子何蓂苓琪葩亦皎潔此木生意髙亦與衆芳列賞墨識屢換省躬悟彌切㣲尚若不虧足以全吾節北風吹蕙帶蕭寥聞蜻蛚宿昔廬峰期流芳已再歇不有清屏鑒使我商絃絶願寄千里心月髙不可掇優游邦之直逺矣踵前烈立俗忘毁譽遇物遺巧拙真氣獨翛然軒裳詎能紲都曹風韻整綱紀信明決於交必傾寫立行豈矜伐政與清渭同分流自澄澈裴侯資亮直中誠豈徒説古人比明義清士願交結温温躬珪彩終始聲不缺顔生烱介士有志不可越仗義冒險難持操去淄涅世論髙二賢即魯公猶子也賢賢繼前哲四子遭明盛裒然皆秀傑理名雖殊迹悟道寧異轍愛爾竹栢姿為予寒不折五言遥酬袁使君髙春暮行縣過報徳寺見懐江春行求瘼偶與真境期見説三陵下前朝聞佛祠停舟仰麗刹繡組發香墀咫尺空界色天人花落時盛游限羸疾悚踈瞻旌旗峰翠羨閑步松聲入遥思素髙淮陽理况負東山姿迨此一登覽深情見新詩五言冬日遥和盧使君幼平綦母居士游法華寺髙頂臨湖亭仁坊標絶境㢘守躡髙蹤天曉纔分刹風傳欲盡鍾城中歸路逺湖上碧山重水照千花界雲開七葉峰寒空艾綬滿空翠白綸濃逸韻知難繼佳遊恨不逢仍聞撫禪石為我乆従容五言秋日遥和盧使君遊何山寺宿􅆒上人房論涅槃經義江郡當秋景期將道者同跡髙憐竹寺夜靜賞蓮宮古磬清霜下寒山曉月中詩情縁境發法性寄筌空翻譯推南本何人繼謝公五言酬秦山人系題贈出齋步杉影手自開禪扉花滿不汚地雲多従觸衣思山石蘚浄欵客露葵肥果得宗居士論心到極微五言奉酬袁使君髙寺院新亭對雨其亭即使君所創茲亭跡素淺勝事併隨公法界飄香雨禪窓灑竹風浮煙披夕景髙鶴下秋空㝠寂四山乆寧期此㑹同五言奉酬顔使君真卿見過郭中寺寺無山水之賞故予述其意以荅焉州西栁家寺禪舍隠人間證性輕觀水棲心不買山履聲知客貴雲影悟身閑彦㑹前賢事方今可得攀五言酬烏程楊明府華雨後小亭對月見呈夜凉喜無訟霽色揺閑情暑退不因雨陶家風自清凝絃停片景發詠靜秋聲何事禪中隠詩題忽記名五言自蘇州訪醫廻酬盧士關判官見贈尋醫初疾理忽憶故山雲逺訪桑公子還依栁使君周旋承惠愛佩服比蘭薫従事因髙唱秋風起處聞五言題沈道士新亭何處好攀躋新亭俯舊溪坐中千里近簷下四山低小浦依林曲廻塘遶郭西桃花春滿地歸路莫相迷五言送盧仲舒移家海陵世故多離散東西不可嗟小秦非本國楚塞後移家海島無隣里鹽居少物華山中吟夜月相送在天涯五言陪盧使君登樓送方巨之還京一首萬里汀洲上東樓欲别難春風潮水漫正月栁條寒旅逸逢漁浦清髙愛鳥冠雲山寧不起今日向長安五言同裴録事樓上望􅅲食髙樓上湖山向晚晴桐花落萬井月影出重城水竹凉風起簾幃暑氣清蕭蕭獨無事因見蒞人情雜言寓興天下生白榆白榆直上連天根髙枝不知㡬萬丈世人仰望徒攀援誰能上天採其子種向人間笑桃李因問老仙求種法老仙咍我口不荅始知此道無所成還如瞽夫學長生七言寄常一上人鴈塞五山臨汗漫雲州一路出青㝠何因請住嘉祥寺内史新修湖上亭五言送祕上人遊京共居方異路山伴與誰同日冷行人少時清古鎮空煖瓶和雪水鳴錫帶江風撩亂終南色遥應入夢中五言賦得啼猿送客萬里巴江外三聲月峡深何年有此路幾客共沾襟斷壁分垂影流泉入苦吟悽涼離别後聞此更傷心五言南樓望月夜月家家望亭亭愛此樓纎雲溪上斷踈栁影中秋漸映千峰出遥分萬𣲖流關山誰復見應獨起邊愁五言尋陸鴻漸不遇移家雖帶郭野徑入桑麻近種籬邊菊秋来未著花扣門無犬吠欲去問西家報道山中去歸時每日斜五言懐舊山一坐西林寺従来未下山不因尋長者無事到人間宿雨愁為客寒花笑未還空懐舊山月童子念經閑五言宿呉匡山破寺雙峰百戰後真界滿塵埃蔓草縁空壁悲風起故臺野花寒更發山月暝還来何事池中水東流獨不囘五言九月十日愛爾柴桑隠名溪近訟庭掃沙開野步揺舸出閑汀宿簡邀詩伴餘花在酒瓶悠然南望意自有峴山情七言晚秋破山寺秋風落葉滿空山古寺殘燈石壁間昔日經行人去盡寒雲夜夜自飛還七言青陽上人院説金陵故事君説南朝全盛日秣陵才子更多人千年秋色古池館誰見齊王西邸春七言送僧之京師綿綿渺渺楚雲繁萬里西歸望國門禪子初心易悽斷秋風莫上少陵原七言送許丞還洛陽剡茗情来亦好斟空門一别肯沾襟悲風不動罷瑶軫忘却洛陽歸客心七言題湖上草堂山居不買剡中山湖上千峰處處閑芳草白雲留我住世人何事得相關五言酬李司直縦諸公冬日遊妙喜寺題照昱二上人房寄長城潘丞述逹賢貴貞隠常懼迹不滅遂與永公期遺身坐林樾華軒何轔轔為我到幽絶心境寒草花空門青山月潘生獨不見清景屢盈缺林下常寂寥人間自離别何時解輕佩来税邱中轍五言贈烏程李明府伯宜沈兵曹仲昌水國苦彫瘵東臯豈遺黍雲陰無盡時日出常帶雨昨夜西溪漲扁舟入簷廡野人同鳥巢暴客若峰聚嵗晏無斗粟寄身欲何所空羨鸞鶴姿翩翩自輕舉五言奉酬顔使君真卿王員外圓宿寺兼送員外使廻魯公邀省客貧寺人過少錦帳惟野花竹屏有窗篠朝行石色浄夜聽泉聲小釋事情已髙依禪境無擾超遥長路首悵望空林杪離思従此生還將此心了五言杼山上峰和顔使君真卿袁侍御五韻賦得印字仍期明日登開元寺樓之㑹道情寄逺岳放曠臨千仞香路延絳騶華泉寫金印日欹諸天近雨過三華潤留客雲外心忘機松中韻靈嘉早晚期為布東山信五言同薛員外誼喜雨詩兼上楊使君積旱忽飛澍烝民心亦傾郊雲不待簇雨色飛江城燋稼濯又發敗荷滋更榮時隨霧縠重乍集栁絲輕一宿恐魚飛數朝徵鸛鳴毒暑澄為冷髙塵滌還清乃知陰隲數制在造化情及此接歡賀臨風聞頌聲五言南湖春泛有客自北至説友人岑元和見懐因叙相思之志以寄焉故人隔楚水日夕望芳洲春草思眇眇征雲暮悠悠心期無形影跡曠成阻修有客江上至知君佐雄州鏗鏘佩蒼玉躞蹀驅絳騶伊昔中峰心従来非此流資予長生訣予嘗授以胎息之訣希彼髙仙儔此情今如何宿昔師吾謀别後謁禪老更添石室籌深見人間世飄如水上漚蟬號齊王邸月苦隋帝樓聲華盡㝠寞麋鹿徒呦呦我有一字教坐然遺此憂何煩脱珪組不用辭王侯秪在名位中空門兼可遊五言同薛員外誼大旱感懐寄兼呈上楊使君皇天鑒不昧愐想何亢極絲雨乆愆期綺霞徒相惑陰雲舒乂巻濯枝安可得涸井不纍瓶乾溪一憑軾赤地芳草死飈塵驚四塞戎寇夜刺閨民荒嵗傷國賴以王猷盛中原無凶慝楊公當此晨省災常旰食獨感下堂雨自州南諸鄉降甘澤長城顧堵平地雨一尺水分流澤數鄉也偏嘉越境或秋郊天根見我疆看稼穡請廻雲漢詩為君歌樂職五言兵後早春登故鄣南樓望崑山寺白鶴觀示清道人并沈道士新陽故樓上眇眇傷遐睠違世情易忘羇時得無倦春歸華栁發世故陵谷變擾擾陌上心悠悠夢中見蒼林有靈境杳映遥可羨春日倚東峰華泉落西甸鍾聲在空碧幡影揺蔥蒨緬想山中人神期如㑹面别離芳月積岐路浮雲遍正値入空門仙君依苦縣隳形捨簮紱烹玉思精鍊事外宜我心人間豈予戀身遺世自薄道勝名必賤耳目何所娯白雲與黄巻五言酬烏程楊明府華將赴渭北對月見懐釋印及秋夜身閑境亦清風襟自瀟灑月意何髙明聞説武安君萬里驅妖精開府集秀士先招士林英晉家用元凱亦是魯諸生北望撫長劍感君知已行邊塵昏玉帳殺氣凝金鐙大敵折齊爼一書下聊城翻飛青雲路宿昔滄洲情荅云詩中悠然顧山侶之句五言酬邢端公濟春日蘇臺有呈袁州李使君兼書并寄辛陽王三侍御大賢當佐世堯時難退身如何丹霄侶却在滄江濵栁色變乂遍鸎聲聞亦頻賴逢宜春守共賞南湖春營道知止足飾躬無緇磷家將詩流近跡與禪僧親放曠臨海門翺翔望雲津雖髙空王説不久山中人上句荅端公學無為之句五言奉和裴使君清春夜南堂聽陳山人彈白雪春宵凝麗思閑坐開南圍郢客彈白雪紛綸發金徽散従天上至集向瓊臺飛絃上疑颯颯虚中想霏霏通幽鬼神駭合道精鑒稀變態風更入含情月初歸方知阮太守一聽識其微五言荅孟秀才羸疾依小院空閑趣自深躡苔憐靜色掃樹共芳陰物外好風至意中佳客尋虚名誰欲累世事我無心投贈荷君芷馨香滿幽襟五言酬崔侍御見贈市隠何妨道禪棲不廢詩與君為此説長破小乗疑五言贈栁喜得嵩山法門自號嵩山老一見嵩山老吾生恨太遲問君年幾許曾出上皇時五言酬李補闕紓不住東林寺雲泉處處行近臣那得識禪客本無名五言湖南蘭若示大乗諸公未到無為岸空憐不繫舟東山白雲意嵗晚尚悠悠七言兵後經水安法空寺寄悟禪師其寺賊所焚常説人間法自空何言出世法還同微蹤舊是香林下餘燼今成火宅中後夜池心生素月春天樹色起悲風吾知世代相看盡誰悟浮生似影公七言春日杼山寄李員外縦南山唯與北山隣古樹連拳伴我身黄鶴有心多不住白雲無事獨相親閑持竹錫深看水嬾繫麻衣出見人欲掇幽芳聊贈逺郎官那賞石門春七言酬秦山人贈别二首知君髙隠占賢星巻葉時時注佛經姓被名公題舊里秦君里詩將麗句號新亭麗句亭来觀新月依清室欲漱香泉䕶觸瓶我有主人江太守如何相伴住禪靈江淹為宣城守常㑹禪靈寺又誰知臥病不妨禪跡寄詩流性似偏葉示黄金童子愛書題青字古人傳時髙獨鶴来雲外每羨閑花在眼前對此留君還欲别應思石瀃訪春泉七言山居示靈澈上人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閑始覺隳名是心了方知苦行非外物寂中誰似我松聲草色共無機七言遥和康録事李侍御蕚小寒食夜重集康氏園林習家寒食㑹何頻應恐流芳不待人已愛治書詩句逸更聞従事酒名新庭蕪暗積承雙履林蘤雷飛灑幅巾誰見奈園時節共還持緑茗賞殘春七言釋裴循春愁蝶舞鸎歌喜嵗芳栁絲裊裊蕙帶長江南春色共君有何事君心獨自傷七言西白溪期裴方舟不至望君不見復何情野草閑雲處處生應向秦時武陵路花間寂厯一人行七言勞山憶棲霞寺道素上人乆期不至逺寺蕭蕭獨坐心山情自得趣何深泉聲稍滴芙蓉漏月影纔分鸚鵡林滿地雲輕長礙屣繞松風近每吹襟貪閑不記前心偈念别聊為出世吟更待花開遍山雪山山相似若為尋七言酬秦山人出山見呈手攜酒榼共書幃廻語長松我即歸若是出山機已息嶺雲何事背君飛七言酬秦山人見尋左右香童不識君擔簦訪我領鷗群山僧待客無俗物唯有窓前片碧雲七言宿法華寺簡靈澈上人至道無機但杳𡨕孤燈寒竹自青熒不知何處小乗客一夜風来聞誦經杼山集巻一
