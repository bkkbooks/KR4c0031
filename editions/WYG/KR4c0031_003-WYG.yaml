body:
  text: 杼山集巻三唐釋皎然撰五言奉和顔使君真卿與陸處士羽登妙喜寺三癸亭亭即陸生所創秋意西山多列岑縈左次繕亭厯三癸疏趾隣什寺元化隠靈蹤始君啓髙誄誅榛養翹楚鞭草理芳蕙俯砌披水容逼天掃峰翠境新耳目換物逺風煙異倚石忘世情援雲得真意嘉林幸勿剪禪侣欣可庇衛法大臣過佐遊群英萃龍池䕶清澈虎節到深邃徒想嵊頂期于今没遺記五言奉陪陸使君長源裴端公樞春遊東西武邱寺雲水夾雙刹遥疑涌平陂入門見蔵山元化何繇窺曳組探詭怪停驄訪幽竒情髙氣為爽徳暖春亦隨瑶草自的皪蕙樓爭蔽虧金精落壊陵劍彩沉古池一覽帀天界中峰步未移應嘉生公石列坐援松枝五言奉和陸使君長源夏月遊太湖此時公權領湖州庾公心曠逺府事局耳目遂與南湖遊虚襟滌煩燠始知皇天意積水在亭育細流信不讓動物欣所蓄萬頃合天容洗然無雲族峭蒨曯仙嶺神仙傳洞庭神仙所居也超遥隨明牧知公愛澄清波靜氣亦肅已見横流極况聞長鯨戮㑹北信至王師已收長安中洲暫採蘋即栁惲汀洲採白蘋之意也南郡思剖竹公時改授信州向夕分好風飄然送歸舳五言奉和崔中丞使君論李侍御登爛柯山宿石橋寺効小謝體常愛謝公郡幽期願相従果廻青驄臆共躡𤣥仙蹤靈境若髣髴爛柯思再逢飛梁丹霞接古局蒼苔封往想㝠昧理誰親氷雪容蕙樓聳空界蓮宇開中峰今為仙寺晉是仙山遺局古橋昇仙之處見在昔化冲虚鶴今蔵䕶法龍雲窺香樹沓月見色天重永夜寄岑寂清言滌心胸盛遊十年後書在巖中松五言同顔使君真卿李侍御蕚遊法華寺登鳯翅山望太湖雙峰開鳯翅秀出南湖州地勢抱郊樹山威增郡樓正逢周柱史来㑹魯諸侯緩步凌彩蒨清鐃發颼颼披雲得靈境拂石臨芳洲積翠遥空碧含風廣澤秋蕭辰資麗思髙論驚精修何似鍾山集微文及惠休五言奉陪陸使君長源諸公遊支硎寺寺即支公學道處嘗覽髙逸傳山僧有遺蹤佐遊繼雅篇嘉㑹何繇逢塵世即下界色天當上峰春暉遍衆草寒色留髙松繚繞彩雲合參差綺樓重瓊葩灑巾舄石瀃清心胸靈境若可託道情知所従五言奉陪鄭使君諤遊太湖至洞庭山登上真觀却望湖水郡齋得無事放舟下南湖湖中見仙邸果與心賞俱不逺風物變忽如寰宇殊背雲視層崕别是登蓬壺突兀盤水府參差沓天衢廻瞻平蕪盡洪流豁中區氣呑江山勢色淨氛靄無靈長習水徳勝勢當地樞朝宗動歸心萬里思鴻途五言奉和袁使君髙郡中新亭㑹張鍊師晝㑹二上人置亭隠城堞事簡跡易幽公性崇儉素雅才非廣求傍簷竹雨清拂案杉風秋不移府中步登茲如逺遊坐覺詩思髙俯知物役休虚寂偶禪子逍遥親道流更聞臨川作下節安能詶五言奉和陸使君長源水堂納涼効曹劉體栁家陶暑亭意逺不可齊煩襟蕩朱絃髙步援緑荑愛公滿亭客来是清風攜瀅渟前溪上曠望古郡西六月正中伏水軒氣常凄野香襲荷芰道性親鳬鷖禪子顧惠休逸民重劉黎乃知髙世量不以出處暌五言夏日奉陪陸使君長源公堂集府中自清逺六月髙梧間寥亮泛雅瑟逍遥扣𤣥關嶺雲與人靜庭鶴隨公閑動息諒兼遂茲情即東山五言伏日就湯評事衡湖上避暑大火方燥石停雲晝亦收將従賞心侶寸景難逺遊擁几苦炎伏出門望汀洲廻溪照軒宇廣陌臨梧楸釋悶命雅瑟放情思亂流更持無生論可以清煩憂五言奉和顔使君真卿修韻海畢㑹諸文生東堂重挍外學宗碩儒游焉従後進恃以仁恕廣不學門欄峻著書禆理化奉上表誠信探討始河圖紛綸歸海韻親承大匠琢况覩頽波振錯簡記鈆槧音籖閲書移玉鎮曷繇旌不朽盛美流歌引五言喜義興權明府自君山至集陸處士羽青塘别業應難乆辭秩暫寄君陽隠已見縣名花㑹逢闈是粉本自尋人至寧因看竹引身關白雲多門占春山盡最賞無事心籬邊釣溪近五言夏日集李司直縦溪齋修景屬良㑹逺飈生煩襟泄雲收浄緑衆木積芳陰疏滌府中務迢遥湖上心習閑得招我賞夜宜泛琴山近資性靜月来寄情深澹然若事外豈藉隳華簮五言夏日題桐廬楊明府納涼山齋陶家無炎暑自有林中峰席上落山影桐梢廻水容放懐涼風至緩步清陰重何事親堆按猶多髙世蹤五言和楊明府早秋遊法華寺釋事出縣閤初聞茲山靈寺扉隠天色影刹遥丁丁碧峰委合沓香蔓垂蓂苓清景為公有放曠雲邊亭秋賞石潭潔夜嘉杉月清誦空性不昧助道跡又經是以於物理紛然若未形移来字人要全與此道㝠五言宿道士觀古觀秋木秀泠然屬鮮飈瓊花被修蔓栢實滿寒條影殿山寂寂寥天月昭昭幽期寄仙侶習定至中宵清佩聞虚步真官方宿朝五言冬日天井西峰張鍊師所居採薪逢野泉漸見栖閑所坎坎山上聲幽幽林中語仙卿何代隠鄉服言亦楚開水淨藥苗掃雪候山侶零葉聚敗籬幽花積寒渚㝠㝠孤鶴性天外思輕舉五言奉同顔使君真卿開元寺經蔵院㑹觀樹文殊碑萬國布殊私千年降祖師鴈門傳法至龍蔵立言時故實刋周典新聲播魯詩六銖那更拂刼石盡無期五言奉同盧使君幼平遊精舍寺影刹西方在虚空翠色分人天霽後見猿鳥定中聞真界隠青壁春山凌白雲今朝石門㑹千古仰斯文五言奉同顔使君真卿袁侍御駱駝橋翫月山中常見月不及共遊時水上恐將缺林端愛落遲鳥驚憲府客人詠鮑家詩永夜南橋望徘徊若有期五言和邢端公登臺春望句句有春字之什春日繡衣輕春臺别有情春煙間草色春鳥隔花聲春樹亂無次春山遥得名春風正飄蕩春甕莫須傾五言經仙人渚即沈山下古人沈義白日昇天處日月人間短何時此得仙古山春已盡遺渚事空傳不見騰雲駕徒臨洗藥泉如今成逝水翻使恨流年五言獨遊二首性野趣無端春晴路又乾逢泉破石弄放鶴向雲看好僻誰相似従狂我自安芳洲亦有意步上白沙灘又臨水興不盡虚舟可同嬉還雲與歸鳥若共山僧期世事吾不預此心誰得知西峰有禪老應見獨遊時五言遊溪待月溪色思泛月沿洄欲未歸殘燈逢水店踈磬憶山扉夜浦魚驚少空林鵲遶稀可中纔望見撩亂𢷬寒衣五言西溪獨泛道情何所寄素舸漫流間真口憐髙鶴無名羨野山經寒叢竹秀入靜片雲閒泛泛誰為侶唯應共月還五言早秋陪韓明府泛阮元公溪公嘗言禪功可入而官情詎能忘故詩中有此意戲之雨信清殘暑蕭條古縣西早涼生浦溆秋意滿髙低前事雖堆案閒情得泝溪何言戰未勝空寂用還齊五言九日陪顔使君真卿登水樓重陽荆楚尚髙㑹此難陪偶見登龍客同遊戲馬臺風文向水疊雲態擁歌廻持菊煩相問捫襟愧不才五言與盧孟明别後宿南湖對月五湖生夜月千里滿寒流曠望煙霞盡凄涼天地秋相思路渺渺獨夢水悠悠何處空江上徘徊送客舟五言自義亭驛送李長史縦夜泊臨平東湖長亭賔馭散岐路起悲風千里勤王事驅車明月中寒生洞庭水夜度塞門鴻處處堪傷别歸来山又空五言出遊少時不見山便覺無竒趣狂發従亂歌情来任閒步此心誰共證笑看風吹樹五言界石守風望天竺靈隠二寺山頂東西寺江中旦暮潮歸心不可到松路在青霄五言奉和顔使君真卿修韻海畢州中重宴世學髙南郡身封盛魯邦九流宗韻海七字揖文江借賞雲歸堞留歡月在窓不知名教樂千載與誰雙五言晦日陪顔使君白蘋洲集南朝分古郡山水似湘東堤月呉風在湔裾楚客同桂寒初結斾蘋小欲成叢時晦佳游促髙歌聽不終五言冬至日陪裴端公使君清水堂集亞嵗崇佳宴華軒照渌波渚芳迎氣早山翠向晴多推往知時訓書祥辨政和従公惜日短留賞夜如何五言陪盧判官水堂夜宴暑氣當宵盡徘徊坐月前靜依山堞近涼入水扉偏乆是棲林客初逢佐幕賢愛君髙野意烹茗釣淪漣五言新秋同盧侍御薛員外白蘋洲月夜隔暑蘋洲近迎涼欲泛舟榮従憲府至喜㑹夕郎遊氣奪滄浪色風欺汗漫流誰言三伏夜獨此月前秋五言夏日集裴録事北亭避暑前林夏雨歇為我生涼風一室煩暑外衆山清景中忘歸親野水適性許雲鴻蕭散都曹吏還將靜者同五言與王録事㑹張徵君姊妹鍊師院翫雪兼懐清㑹上人何意亷従事還来㑹黙仙寒空驚雪遍春意入歌偏瑶草三花發瓊林七葉連飄颻過栁寺應滿譯經前五言和李侍御蕚嵗初夜集處士書閣書閣即侍御所創遲賢新置閣髙意此郊居古逕行春早新窓見月初放歌還倚瑟講道亦觀書為我留禪位来逢此㑹疎五言湯評事衡水亭㑹覺禪師山侶相逢少清晨㑹水亭雪晴松葉翠煙暖藥苖青靜對滄洲鶴閑看古寺經應憐叩關子了義共心㝠五言與朝陽山人張朝夜集湖亭賦得各言其志洞庭孤月在秋色望無邊零露積衰草寒螿鳴古田茫茫區中想寂寂塵外縁従此悟浮世胡為傷暮年五言晦夜李侍御蕚宅集招潘述湯衡海上人飲茶賦晦夜不生月琴軒猶為開墻東隠者在淇上逸僧来茗愛傳花飲詩看巻素裁風流髙此㑹曉景屢徘徊五言寄昱上人上方居厭向人間住逢山欲懶歸片雲閑似我日日在禪扉地靜松陰遍門空鳥語稀夜涼踈磬盡師友自相依五言夏日與綦母居士昱上人納涼為依爐峰住境勝增道情涼日暑不變空門風自清坐援香實近轉愛緑蕪生宗炳青霞士如何知我名五言建元寺集皇甫侍御書閣不因居佛里無事得相逢名重朝端望身髙俗外蹤公愛講佛經嘗云暮劉處士深詣至理機閑看淨水境寂聽踈鐘宣室恩長在知君志未従五言郭北尋徐主簿别業近依城北住幽逺少人知積雪行深巷閑雲繞古籬竹花冬更發橙實晚仍垂還共巖中鶴今朝下渌池五言題報恩寺清幽上人西峰寺即陳文帝故鄉陳世凋亡後仁祠識舊山帝鄉喬木在空見白雲還雙塔寒林外三陵暮雨間此中難戰勝君獨啟禪關五言題鄭谷江畔桐齋鄭生好琴性逹兼寡欲客齋開别住坐占緑江濆流水非外物閑雲長屬君浮榮未可累曠逹若為群風起髙梧下清絃日日聞五言和閻士和李蕙冬夜重集郡理日閑曠洗心宿香峰雙林秋見月萬壑靜聞鐘珮玉行山翠交麾動水容如何股肱守塵外得相従五言春日陪顔使君真卿皇甫曾西亭重㑹韻海諸生為重南臺客朝朝㑹魯儒暄風衆木變清景片雲無峰翠飄簷下溪光照座隅不將簪艾隔知與道情俱五言寒食日同陸士行報徳寺宿解公房古寺章陵下潛公住幾年安心生輭草灌頂引春泉寂寂傳燈地寥寥禁火天世間多暗室白日為誰懸五言兵馬曹季良宅夜集清景不可失尋君趣有餘身髙避事後道長問心初出處名則異遊従跡何踈吟看刻盡燭笑巻讀殘書露彩生筆硯風音入庭除平明仙侶散觳觫動廻車五言同李侍御蕚李判官集陸處士羽新宅素風千户敵新語陸生能借宅心常逺移籬力更𢎞釣絲初種竹衣帶近裁藤我佐推兄弟詩流得友朋栁陰容過客花逕許招僧不為墻東隠人家到未曾五言題報恩寺惟照上人房上界雨色乾涼宮日遲遲水文披􅔽萏山翠動罘罳中有清真子愔愔步閑墀手縈頗黎縷願證黄金姿旋草堦下生看心當此時亦名苾蒭草枝葉皆右旋故名旋草草有五徳七言尋天目徐君常見仙翁變姓名豈知松子號初平逢人不道往来處賣藥還將鷄犬行獨鶴天邊俱得性浮雲世上共無情三花落地君猶在笑撫安期昨日生七言同李著作縱題塵外上人院百縁唯有什公瓶萬法但看一字經従遣鳥喧心不動任教香醉境常㝠蓮花天晝浮雲巻貝葉宮春好月停禪伴欲邀何著作空音宜向夜中聴七言題周諫别業予寺與周生所俱臨苕水隠身苕上欲如何不著青袍愛緑蘿栁巷任踈容馬入水籬従破許船過昻藏獨鶴閑心逺寂厯秋花野意多若訪禪齋遥可見竹窓書幌共煙波七言同李中丞洪水亭夜集佳人但莫吹參差正憐月色生酒巵山公取醉不關我為愛樽前白鷺鶿七言題秦系上人入麗句亭獨將詩教領諸生但看青山不愛名滿院竹聲堪愈疾亂牀花片足忘情七言春夜集陸處士翫月欲賞芳菲肯待辰忘情人訪有情人西林可是無清景祗為忘情不記春七言寄題雲門寺梵月無側房時人相傳是寳月道人後身也越山千萬雲門絶西僧貌古還名月清朝掃石行道歸林下眠禪看松雪七言法華寺上方題江上人禪室路入松聲逺更竒山光水色共參差中峰禪寂一僧在坐對梁朝老桂枝五言冬日山行過薛徵君我行倦修坂四顧無平陸雨霽鳴鷹鸇天寒聚麋鹿幽人訪名士家在南崗曲菜實縈小園稻花遶山屋深居寡憂悔勝境怡耳目徵心尚與我永言謝浮俗雜言往丹陽尋陸處士不遇逺客殊未歸我来幾惆悵叩關一日不見人繞屋寒花笑相向寒花寂寂遍荒阡栁色蕭蕭愁暮蟬行人無數不相識獨立雲陽古驛邊鳯翅山中思本寺魚口村口望歸船歸船不見見寒煙離心逺水共悠然他日相期那可定閑僧著處即經年五言集湯評事衡湖上望微雨蒼涼逺景中雨色縁山有雲送滿洞庭風吹繞楊栁蕭蕭解輕袂盡日隨林叟五言九日與陸處士羽飲茶九日山僧院東籬菊也黄俗人多泛酒誰解助茶香七言夜過康録事造㑹兄弟愛君門館夜来清瓊樹雙枝是弟兄月在詩家偏足思風過客位更多情五言題沈少府書齋不下南昌縣書齋每日閑野花當砌落溪鳥逐人還有興常臨水無時不見山千峰數可盡不出小窓間杼山集巻三
