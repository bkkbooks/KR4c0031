body:
  text: 杼山集巻八唐釋皎然撰唐杭州靈隠山天竺寺故大和尚塔銘并序水之性不動而鑒得非無實相之體耶雖積為洪溟而未嘗變其真我自在之妙致也如来大師獨秉至教群聖拱手俾㝠㝠倒識破堅氷之惑豈逾一念之真哉靈隠大師雖外精律儀而第一義諦素所長也故小子誌之大師生縁錢塘范氏諱守真字堅道齊信安太守瑝之八葉禮既冠衆君子器之夙有邱園之期不顧𤣥纁之錫遂詣蘇州支硎寺圓大師受具足戒是夜眼中光現長一丈餘乆而方没葢得戒之禎也後至荆府依真公三年苦行尋禮天下二百餘聖教所至無不至焉至無畏三蔵受菩薩戒香普寂大師傳楞伽心印講起信宗論三十餘遍南山律鈔四十遍平等一雨小大雙機在我圓音未嘗異也乃發殊願誦持華嚴遂於中宵嘗夢神人施珠一顆及覺惘然如珠在握是嵗入五臺山轉華嚴經二百遍追宿心也又轉大蔵經三遍廣正見也至開元二十六年有制舉髙行道俗請正名𨽻大林寺後移籍天竺住靈隠峰時大厯二年也至五年三月寓于龍興淨土院謂左右曰夫至人乗如而来亦乗如而去示其必然也而瞽夫欲以長繩繫彼白日安可得乎非至人而有其盡以此月二十九日告終于茲地春秋七十一僧臈四十五其間臨壇既多度人無數今不復紀也顯名弟子蘇州辨秀湖州惠普道莊越州清江清源杭州擇隣神􅅯常州道進如何鸑鷟之彩共集旃檀之枝江淮名僧難出其右晝之身戒亦忝門人幸參四子之科獨許一時之學斯文在我何敢讓焉詞曰房星在天降為應平聲真好爵縻我視如埃塵既投其簪亦壊其服戒月纔佩禪香乃沐四十餘夏振振盛名大江東南為平聲法長城宣尼既殁微言乃絶我師云亡真乗亦輟靈隠峰上春日秋天風生松柏如師存焉持教門人楚英呉傑儒方荀孟道比文列宿習未盡妄涕猶雪宿已忘真師真如月古之君子名盡彞器大師不書將墜于地紀功者銘傳心者燈蔵諸名山不騫不崩唐蘇州東武邱寺律師塔銘并序律者聖道游入之津為心見所瑕多溺近果不然則極地之階乎武邱律師諱齊翰字等至通教之士也呉興沈氏之子髙祖陳國子祭酒曾祖某隋魏州司馬祖考二世不仕律師綺嵗従大人至山寺覩髙靜無塵之䠱惻然有宿命之知因請出家大人従之至天寳八年八月五日奉制度配名永定九年十月依分壇受具足戒後移名開元大厯中移名武邱皆兩州道俗所請也律師道性淵黙水則淡然跡不近名身不關事長在一室寂如無人豈比夫駢行鼓簧之士哉晝始疑斯人未造精極因問業報之理如何師對曰夫鼓毗嵐之風有物皆壊而靈空不動葢無相也心且無相業何累焉但懼陷於偏空妄撥無耳繇是始知律師心之所至精相部義窟洞法華經王蘇湖戒壇每當諸首大厯十年某月入流水念佛道塲是夜西方念中頓現葢精誠之所致也至某年春秋六十八僧夏四十七遇疾之日謂弟子曰有鶴従空飛下徊翔我前爾曹見乎必謝之期小聖猶病安能免哉即以某年某月終于本院受業門人如隠壇場門人宣兌誠肅禪心律已有時譽晝則律師之鄉僧也戒有一日之長許為法兄昔媿隨肩今傷分影有清規之可採則文石而言焉銘曰漫漫去聲情海多生沒兮超超我師一念越兮舊寺龜溪為僧傑兮新居武邱匠時哲兮適来示生亦示滅兮山上人間有遺轍兮故雲茫茫餘水泱泱留廢房兮黄蘗心苦青松節寒對空壇兮升堂門人結社居士依屝履兮或刻貞石或書勝幡思師存兮唐蘇州開元寺律和尚墳銘并序至人於生死一也物有之我亦有之若日月可蝕靈空可汙乎在至人為宅心之地誡瞽夫不返之瀑流哉於戲我法自五天揚于漢廷八俊四賢横世傑出後之學者聆休風企髙躅何吾師之穆其芬馥歟吾師諱某字某先劉氏之子漢楚王交三十一代孫列祖某永嘉南遷為相丞掾四代祖逺隨東陽守顯其遺榮之跡略載本枝全其拔俗之髙不書後葉葢亦垂訓之意乎吾師幼孤伯父哀字禮如教立孝自天生而宿植縁深心田欲稔因請伯父従師出家伯父哀而捨之事靈隠某禪師因問師入道之次師語曰夫爝火大明乎太虚以爝火之心當太虚之境境非心外心非境中兩不相存兩不相廢今我所證是爾所知曷有萬法之深淺優劣乎畢如涼風入懐醒然清悟天寳四年受戒於東海大師覽真傳講於㑹稽大師曇一至徳中舉髙行𨽻名開元乾元中有詔天下二十五寺各定大徳七人長講戒律吾師其選也頃年淨土一門不愆于念嘗謂人曰昔聞西方之行是有相大乗此乃蓬心不直逹之説何者夫出言即性發意皆如而一色一香無非中道况我正念乎于時六十七天年三十六僧夏十六壇場孤制律樞正持僧綱自緝湖南北皆宗仰焉以建中元年六月十五日寢疾而逝其時有庭樹一本枝葉扶疎及吾師將亡之朝花正新而遽萎條始繁而方折亦恒河水上旃檀樹枝榮枯之意也其年七月五日遷靈龕於武邱西寺松門之右嗚呼青山不歸日林長謝秋原之上萬境皆悲雨㝠㝠而晝陰水浼浼而東逝門人道亮道該清㑹亮以毗尼繼其行會以才學儔其賢該以詞華蹤其美三子之外居廊廡者充江漢焉故觀察使韋公元甫觀察使李公栖筠今虢州刺史李公紓今御史中丞李公道昌林下之跡可追山陰之遊尚想懐人撫事相顧泫然晝實謏才曷足揄揚盛美以吾釋門之事安敢讓焉銘曰本師示終兮𤣥綱絶香山崩兮香海竭大地動兮旃檀折人天㝠兮千光滅我師出嗣兮遺教張如何斯人兮天不臧星既雨兮地亦霜生涯昧昧兮四流長捧遺言兮循徃跡庭無人兮月寂寂百年遐夀兮日長夕萬春上服兮塵已襞門人慟兮世人悲瞻影塔兮山之垂宿昔經行兮舊路岐雲眇眇兮雨霏霏方域盡兮長桑移樂石香名兮不騫不虧唐石圯山故大禪師塔銘并序天作髙山山孕人靈其間氣則賢人當之而動用有異夫黄鶴遊乎天驪龍樂乎淵従其性也賢人治世則匡贊我后出世則誕敷上乗圯山禪祖其人也師諱神悟字通性隴西李氏之子其先屬西晉版蕩遷家于呉之長水世襲儒素幼為諸生及冠忽嬰業疾有不可救之狀咎心補行力將何施開元中詣前溪光律師請醫王之方執門人之禮師示以遣業之教一日理懴二日事懴此仁聖所授行必有徵遂於菩提像前秉不屈之心爇難捨之指異光如月朣朦紺宫極苦可以感明神至精可以動天地葢菩薩之難事歟洎天四中受具足戒身始披緇天八中舉尤異行名𨽻寺逮其晚節益見苦心每嵗置法華道塲九旬入長行禮念觀佛三昧於斯現前因語門人曰夫陰薄日而何傷風運空而不動茍逹於妄誰非性耶方結宇於勞勞山東中據石圯逹分仙渚猛獸馴於禪榻祥雲低於法堂中夜有山神現謂禪師曰弟子即隋故新成曹世安生為列侯死典南嶺今和尚至止願以此永奉經行言訖隠而不見故吏部員外李公華今殿中侍御史崔公益嘗問孔老聖教優劣於吾師師對曰路伽耶典籍皆心外法味之者勞而無證其猶澤朽思春乾水取月之相去天何逺乎去辛夘年春寢疾大漸於戲悼死樂生下士之事吾師了性空豈關情哉便趺坐告終歸于寂樂其時世夀六十三惠夀二十六闍維之日獲舍利五百餘粒珠顆纍纍粲然在矚葢繇専精所致門人湛一圓一潔身力行夏淺功崇亦分河不絶之意也吾聞古之君子生有名而死有諡勲業昭乎彝器箴規煥乎方册何有哲匠作人天師遺徳不書吾誰仰則銘曰聲傳于籥剖之無根象出于鑒窮之不源至人應物體寂名存寂可神照名宜性泯妙用無生示生而盡燈留火續骨化珠分真子徒仰慈聲不聞堂披遺影地起方墳萬木春析諸天晝臐年年世上空望歸雲唐杭州華嚴寺大律師塔銘并序魏晉中穎邁之士多尚出塵白足髙步於海隅青目遐視於湘表千有餘祀禪律宗師吾知若人出秉伊説之鈞處躡黄綺之躅亦躬珪之與和璞隠顯之殊乎我律師其人也法諱道光俗姓褚氏踰齔出家方冠受具詣光州和尚學通毗尼于時夏淺徳崇壇場屬望葢天賚真士為東南義虎雲雨慈味笙鏞道聲常持法華兼創佛廟洎沒身不怠也世夀七十九惠夀五十八上元庚子嵗秋仲月示滅于本寺是日馳陽昧昧滛雨颸颸冽風崇朝嘉木為折乃東土福盡之徵也俄然憙氣五色亭亭如葢移晷不散偏映精廬即西方徃生之意也初吾師未殁其月三日質明支疾凝神依色身觀彌陁其相忽現師前滿庭碧花昔所未覩其四日昧爽有異人請師為和尚遂開目彈指曰但發菩提心五之日曼陁羅花自天而雨悲夫非哲匠去世安至是耶門人神烈義津等攝齋何仰繞塔徒哀履名跡而可師書琬琰之不墜詞曰我法未季哲人是生真慈在物澤灑飈清髙戒嚴身佩月與瓔貽訓徒張逝不可作瑞花㝠濛卿雲縈薄靈輀何止于此山椒寒鼯斷續影塔蕭寥五峰諸子泣望終朝唐湖州佛川寺故大師塔銘并序夫萬有朝徹獨立而不改其玅空乎洎鴻濛已還民溺情海安不幻之跡喪全真之旨若識浪不作幻何有哉我釋迦本師獨開宗極遽而告滅降藴魔也在而言逝為狂子也以八萬四千正法首付飲光飲光已下二十四聖降及菩提逹磨繼傳心教有七祖焉第六祖曹溪能公能公傳方巖策公乃永嘉覺荷澤㑹之同學也方巖即佛川大師也大師諱惠明俗姓陳氏漢太邱長寔之後世居順顯祖某永嘉南遷為司徒掾陳氏受禪四代祖仲文有佐命之勲封丹陽公祖某雙溪穀熟二縣宰考某蘭陵人也大師雖世有榮閥而未嘗自稱葢處塵世之餘累矣先夫人初感之日如持佛戒足惡履於葷圃口不嘗於鱻器神夢髣髴長聞法音既而誕焉年漸及丱方祈捨俗大人従之至受具時即開元七年也耳未誘於聲界眼不瑕於色塵清行尅終如鑒寒玉嘗謂人曰昔者繁刑首作伯成子髙遁焉吾雖不捨律儀而惡乎淨論紛若心即心之法至矣哉西詣方巖頓開心地於戲㝠㝠其機赫赫其師寂乎大空之淵而不疑放乎萬縁之律而不變天寳年將有願於清涼山淮汴阻兵師乃旋䇿偶與禪侶西之宛陵闕文於上石為神明奈何使我蒼生每被血食豈知此事殃爾業耶神曰非弟子本意人自為之禮懴再三大師乃授以菩薩戒神欣然曰若和尚移寺弟子願捨此處永奉禪居言畢不見其後果移寺焉於祠側獲銅盤之底篆文是吾師法號更有異器畧而不書建中元年春忽顧左右愀然而歎曰夫人生百年葢一念耳昧者安知掲日月以趍新哉吾將徃淨方爾曹勉之于時報年八十四僧臈五十一以其年正月十一日有疾其日庭木春悴山雨晝㝠猛虎繞垣悲嘯而去十二日奄然長徃二月十二日建塔於佛湘川西山有慈烏滿林舉衆驚異受法門人自湘淮楚不逺而至有若孤秉律網黙持心印惠解比邱即其人也徳與物敷言隨性寢聲采不飾世謂渾金惠敏比邱即其人也外學以文内修心行跡不疑聖機能造微如知比邱即其人也菩薩戒弟子刺史盧公幼平顔公真卿獨孤公問俗杜公位裴公清惟彼數公深於禪者也謝太傅之通於宗要殷淵源之造於精微常恐大師之言將墜于地顧謂小子志之予曰必使覩至人之奥知地位之極則未敢聞命若盛美之跡人所見聞何嘗敢忘請退而記之刻諸靈石詞曰青山我廬白雲我曹吾師處焉人遐跡髙跡髙伊何降心鍊魔傳教方巖傾珠竭河持而不檢放而不過匪雲異月如水與波見獨超超證法無兩生死誰羈我不可鞅若揺空輪如蹵風響何為告滅亦繇狂子忽示雙桐空棺隻履佛去川在人亡寺留使吾舊境寂寞長秋泣露草繁悲風樹滿此物無心盡如凄斷門人千萬昔為法来悟者不蹙常情自哀祥花雨墜靈峰晝開真子相顧謂全身在哉塔銘并序東漢始有佛塔之制或冶金埏坏琢琰彫杼觸類可作葢惠門之扄鐍也我唐大厯丁已嵗建子月某日沙門某洎居士若干人於思村東北古堤之上樹修塔焉粉欞素簷炯如雪積雖埃氛晝晦月魄宵淪重重入空千里可矚使夫倦鳥有託迷客知歸燎叟弢弧以革心漁童巻緡而易慮作者之志其仁溥哉崇崇靈塔埽氛孤出平砌沓雲層輪麗日瓊容皓曜鴈影依稀初驚地踴忽視天飛塔何情矣監惡斯止塔何言哉誘善不囘至人黙黙與我同徳寂語忘教而人自效明明者闕曷可齊焉上階于天下窮于淵深谷為陵其功不騫唐洞庭山福願寺律和尚墳塔銘并序道賢上游其徳如陽和亭毒萬物生而不子成而不繇或曰異於是葢繇無生空惠㝠乎其間哉暨洪唐盛明之朝我法尤重五教四分飈揚景張南山律宗居天下第一後弟子如大師鮮矣大師望出徐氏諱神皓字𢎞度八代祖摛齊竟陵王西邸學士子陵梁尚書左僕射其文與庾子山齊名逮陳氏革命因佐呉邑遂家姑蘇髙祖碩學通三禮中年即世曾祖曇隨王府咨議參軍祖徳恭潯陽郡詞曹考君定深於釋典不屑名宦大師天情耿潔風韻朗邁幼負脱俗之姿嘗有言曰沙門者髙潔其道秉空王平等之性一念不昧坐登佛階吾自知此生履龍淵取明月曷有三圭之責重侯之髙而能動我心哉乃依杭州龍泉道塲一和尚出家敗髪損容越出流輩鏗然法器如琢玉焉天寳六年天降板詔精擇真行一州許度三人獨居薦首吾以是知大師初扳佛教滌心地也今奉國恩正世名也因𨽻僧籍於包山福願道塲初進具於興大師次通鈔於曇一大師五夏未登學精三蔵天台宗旨難為等夷淵𤣥絶思之科如良庖之導大窽也十講律鈔五昇壇塲傾江而東願禮其足後生學者仰其聰明惠性如追騏驎之步大師嘗引錫西望想包山舊居包山即洞庭仙都之一峰湖澄氣清日出水上疊嶂合沓生乎影中得非天遺此中與師成道耶乃命舟而還使野童誅茅山童埽石顧左右昔者如来崇飾塔廟乃是啟發群信開人天淨境豈為已哉此少隳廢乆之非先師本意乃闢僧院創食堂衆有怠慢者醜其行而理之舍有傾者惡其邪而正之墾田置庄開畎泄澮功既成矣業亦博矣百千人俱皆受其賜曩日洞山水滸業湖之氓罾􅧡咽川繒繳亘渚大師以如来不殺之戒黜彼鱻食廻小人之腹為君子之慮乾元祀有詔天下二十七寺各奏大徳七人長講律戒因請住開元寺欲果願具且懼簡書遂僶俛従命奉戒弟子開州刺史陸公向前給事中嚴公涚服道弟子禮部侍郎劉公太真前大理評事張公象欽風弟子前亷使亞相李公栖筠天誘厥𠂻俾揚我法精識通敏言為世程謝太傅之流也其時常熟地偏僧多闕行李亞相欲以徳撫乃請大師綂而正之一化而革心再化而知道三化而闔邑従風大師末年工於圓宗縦心皆是以文字而用不以文字為病是念佛寫經備行教法置西方社廣淨土因専誦法華經九千餘匝遊四大寺登五老峰遍欲觀古僧得道之所此亦至人之餘事應物如動自視缺然貞元六年十月春秋七十五僧臈四十三其月在開元遇疾忽言曰吾愛夫得道者心如澄溟知如晨曦不染如浮雲自在如游鴻吾雖非斯人亦未肯以有生為累其月十一日顧門人維諒我去世後汝若置塔可歸洞庭故山言畢而逝是夜琉璃色天星霣如雨徃徃有西方之應覩而不書奉遺命也門人維諒有文有道獨步當時執師之喪不以證而廢教也列座門人道超靈俊道濬道稜維誠皆積解以詣空門邁徳以藩象教吾聞古之僧髙者述誄與碑自晉朝始也二三子思吾師盛徳將欲鎔黄金勒貞石垂裕後使昭昭之教長燭於人天銘曰於穆大師立言可經身佩戒光髙月亭亭怖魔以祛襲智以醒如何斯人忽號㝠㝠天樹春折雲花夜零空留一燈寂寂青熒伊昔行道坦坦素履跡難可攀行不可擬乃知我師應世無已優游人天自在生死門人維諒躡彼髙塵嶷嶷靈塔紀功與人于山之峰于湖之濵風凄逺鐸月慘重輪瞻禮雲上如逢化身畫救苦觀世音菩薩讚并序繪工匠意通幽若菩薩出現湛兮凝心于内怡然示相于表非法王妙用何哉誰其主人即湖州刺史諫議大夫樊公夫人范陽縣君盧氏所造也初夫人有恤𦙍之兆常念觀音夢雲初懐育月方誕命曰是女且不正名葢取宜子之意也公以積徳樹仁膺其錫羨雖菩薩大慈不昧亦江漢間氣所鍾詩云維岳降神生甫及申之儔乎於戯至誠既敷上願思荅乃於寳勝殿内按經圖變祗於壁上觀示現之門不捨毫端禮分身之國祠曰至人之體兮有而無迹至人之心兮用而常寂公之小君兮惠性造微我之大士兮慈心莫違保幼子兮永貞無悔覿真儀兮常明不昧慈為雨兮惠為風灑芳襟兮襲輕珮畫藥師琉璃光佛讚并序佛以大慈療生死巨瘵示藥師名以大智證圓明妙身受琉璃稱無私之鑒湛乎不動誠懇之至感而遂通湖州刺史諫議大夫樊公夫人范陽縣君盧氏得之矣頃因懐妊黙念于心先徵佩印之祥載見懸弧之志遂圖此變以荅佛慈光射金扉日月不開於天上影朧珠綴煙霄自出於壁間東方如來瞻仰長世輙揚盛美有愧䛕才詞曰藥師之光隨心至兮十二上願慈不遺兮琉璃之身為我示兮八十種好相畢備兮繪象報徳公夫人兮初祝㣧子果克禋兮早見才童邁人倫兮將成大器應甫申兮如来惠父長可親兮貽厥孫謀夀萬春兮蘭亭古石橋柱讚并序山陰有古卧石一枚即晉永和中蘭亭廢橋柱也大厯八年春大理少卿盧公幼平承詔祭㑹稽山攜至居士陸羽因而得之生好古者與吾同志故讚云古橋石柱亭亭殊類渾璞璘玢亂錢蒼翠遺在蘭渚遷于客位雲狀未銷水痕猶潰在物頗重則人無棄石豈有心求人所貴若瓊與玉呈􅀈藴異如彼陸生不文其器此猶可轉豈君同志烏程李明府水堂觀𤣥真子置酒張樂叢筆亂揮畫武城讚烏程魯邑異日同風洋洋絃歌復聞我公𤣥真跌宕筆狂神王楚奏鏗鍧呉聲瀏亮舒縑雪似頒彩霞狀㸃不誤揮毫無虚放藹藹武城披圖可望咫尺之内天髙水清月疑山吐風恐松聲晴雨雲住春冬草榮比公為政徳暖生成盛烈暉暉雙揚厥靈逹磨大師法門義讚我師西来傳乎真訣大輪當路小乗亡轍㝠㝠世人初見日月權跡有歸光雲不滅天台和尚法門義讚我立三觀即假而真如何果外强欲明因萬象之性空江月輪以此江月還名法身二宗禪師讚裁玉為璧一體殊稱二聖淵淵異名同證安讚天后寂佐𤣥宗巻道就跡與時従容邈邈安公行越常致髙天無言九有咸庇大海無心百川同味不授心印但以無言應世而物無不化曈曈大照有跡可覩不異六宗無慙七祖禪岡一傾人天何怙能秀二祖讚二公之心如月如日四方無雲當空而出三乗同軌萬法斯一南北分宗工言之失志公讚大動之地我安其中髙景無氛靈鶴在空出生死泥隨物有終􅋇形駭俗借繢開蒙常攜刀尺精息誰通唐大通和尚法門義讚觀淨之筌斯言不住四色蓮花白花為喻應知離相或未圓通吾師惠心雲開天空唐鶴林和尚法門義讚真見之體知而不知性猶無主禪何有支我本圓寂湛而不移聿来化人慈力所為大雲寺逸公寫真讚盡與理㝠兩身不異淵情洞識眉睫斯備欲發何言正思何事一牀獨坐道具長隨缾執堪瀉珠傳似移清風拂素若整威儀洞庭山福願寺神皓和尚寫真讚虎頭將軍藝何極但是風神非畫色方顙明眸亦全得我豈無言道貴黙雙扉曙啟趺坐時百千門人自疑惑沈君寫真讚誰識英姿披圖宛在月動光芒風生神彩勻毫㸃天質無改聽似欲言窺不敢怠佩可鳴玉冠宜附蟬鸞翔鶴顧志氣翛然侯伯之量於斯鑒焉王安吉寫真讚性正氣髙外爽神徹逺水瀅渟秋天寥泬鋭工傳逸㸃漆開頤風儀秀發毫髪無遺當獨立處似不言時如嚬如顧何慮何思披影相對真身是誰楊逵處士寫真讚識洞才髙天貸神與霜縑之上逢君不語聳聳山立翹翹鶴舉置之巖石邈然無侣杼山集巻八
