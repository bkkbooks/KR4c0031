body:
  text: 杼山集巻五唐釋皎然撰兵後餘不亭重送盧孟明遊江西并序孟明常引支子元道人修習禪心兼餌芝术遂與予有棲山之契其宦情未遣故勸勉之攜手曾此分怳如隔胡越倫侯古封邑榮盛風雨歇饑鼯號空亭野草生故轍如何此路岐更作千里别馮軾望逺道春山無斷絶朝行入郢樹夜泊依楚月佳士持操髙揚才日昭晰離言何所贈盈滿有虧缺時節傷蟪蛄芳菲忌鶗鴂予思鹿門隠心跡貴㝠滅頽顔反芝术昔貌成氷雪嵗晏期爾来銷聲坐巖穴别山詩并序時因主人寄風溪蘭若與道士石脇峰相鄰禪僧仙師時得道會至秋中值外縁有請别山懐舊遂有是詩山翁亦好禪借我風溪樹採藥多近峰汲泉有春渡幽僧時相偶仙子或與晤自許戰勝心彌髙獨遊步如何區中事奪我林棲趣辭山下復上戀石行仍顧宿昔情或乖庶幾跡無誤松聲莫相誚此心㝠去住五言同袁髙使君送李判官使廻庾公歡此别路逺意猶賖為出塘口栁榮歸府中花馳陽照古堞遥思凝寒笳延步下前渚泝觴流淺沙湖光引行色輕舸傍殘霞五言陪顔使君餞宣諭蕭常侍江濤凋瘵後逺使發天都昏墊宸心及哀矜詔命敷恤民驅急傳訪舊枉征艫外鎮藩條最中朝顧問殊文皆正風俗名共溢寰區已事方懐闕歸期早戒塗繁笳咽水閣髙葢擁雲衢暮色生千嶂秋聲入五湖離歌猶宛轉歸馭已踟蹰今夕庾公意西樓月亦孤奉陪顔使君修韻海畢東溪泛舟餞諸文士諸侯崇魯學羔鴈日成群外史刋新韻中郎定古文魯公著書依切韻起東字脚皆列古篆菁華兼百氏縑素備三墳國語思開物王言欲致君研精業已就歡宴惜應分獨望西山去將身寄白雲五言今上初登極嵗送皇甫孝亷赴選孝亷即故大夫之子行應㑹府春欲勸及芳辰北極天文正東風漢律新少年逢聖代歡笑别情親况是勲庸後恩榮襲爾身五言同楊使君白蘋洲送陸侍御士佳入朝乆愛呉興客来依道徳藩旋師聞枤杜歸路憶轘轅舊佩蒼玉在新歌白芷繁今朝天地靜北望重飛翻五言雪夜送海上人常州覲叔父上人殷仲文後繼世風流在傳心向一燈望雲裁衲慣翫雪步花能交戰情忘乆銷魂别未曾明朝阮家集知有竹林僧五言送常清上人還舒州􅈞徐林反人思爾法楚信有廻船估客親宵語閑鷗偶晝禪經聲含石瀲塵尾拂江煙常説歸山意誅茅廬霍前五言峴山送崔子向之宣州謁裴使君楚思入詩清晨登峴山情秋天水西寺古木宛陵城琴匣應將往書車亦共行吾知江太守一顧重君名五言送嚴明府入關謁黎京兆春日異秋風何為怨别同潮廻芳渚沒花落晝山空旅候聞嘶馬殘陽望斷鴻應思右内史相見直城中五言送邱秀才遊越山情與詩思爛熳欲何従夜舸誰相逐空江月自逢春期越草秀晴憶剡雲濃便擬將輕錫携居入亂峰五言送楊校書還濟源妖烽昨日靜故里近嵩邱楚月揺歸夢江楓見早秋鄉心無逺道北信减離憂禪子還無事辭君買沃州五言送楊遂初赴選秋風吹别袂客思在長安若得臨觴醉何須减瑟彈秉心凌竹栢㐲信越波瀾春㑹文昌府思君每北看五言送贇上人還京乆遊春草盡還寄北船歸沙鳥窺中食江雲入浄衣秦原山色近楚寺磬聲微見説翻經館多聞似者稀五言送廣通上人遊江西香爐七嶺秀秋色九江清自古多禪隠吾常愛此行尋師經鄂渚受請到青城離别人間事何關道者情五言送羅判官還夀州幕君章才五色知爾得家風故里旋歸駕夀春思奉戎天寒長虵伏飈烈文虎雄定頌張征虜桓桓戡難功五言送李秀才赴婺州招山開江色上孤賞去應遲渌水近呉榜秋風入楚詞猿清獨宿處木落逺行時見説東陽守登樓為爾期五言送薛逢之宣州謁廢使六月鵬盡化鴻飛獨㝠㝠秋烽家不定險路客頻經牛渚何時到漁船幾處停遥知詠史夜謝守月中聽五言送徳守二叔姪上人還國清寺覲師道賢齊二阮俱向竹林歸古偈穿花線春裝巻葉衣僧墟廻水寺佛隴啟山扉愛别吾何有人心强有違五言同明府章送沈秀才還石門山讀書身為郢令客心許楚山雲文墨應經世林泉漫誘君欲隨樵子去惜與道流分肯謝申公輩治詩事漢文五言送吉判官還京赴崔尹幕江南梅雨天别思極春前長路飛鳴鶴離帆聚散煙清晨趨九陌秋色望三邊見説王都尹山陽辟一賢五言送裴判官赴商幕商洛近京師才難赴幕時離歌紛白紵候騎擁青絲㑹喜疲人息應逢猾虜衰看君策髙足自此煙霄期五言送李喻之處士洪州謁曹王獨思賢王府遂作豫章行雄鎮廬霍秀髙秋江漢清見聞驚苦節艱故傷逺情西邸延嘉士遺才得正平五言送唐賛善遊越田園臨漢水離亂寄隋關今日煙塵盡東西又未還長亭百越外孤棹五湖間何處遊芳草雲門千萬山五言送韋秀才晨裝行墮葉萬里望桑乾舊説涇關險猶聞易水寒黄雲戰後積白草暮来看近得君苖信時教旅思寛五言送陳秀才赴舉諸侯懼削地選士皆不羈休隠脱荷芰將鳴矜羽儀甲科争玉片詩句擬花枝君實三楚秀承家有清規五言烏程李明府水堂同盧使君幼平送奘上人遊五臺身將劉令隠經共謝公翻有此宗師在應知我去存問心常寂樂為别豈傷魂獨訪華泉去秋風入鴈門五言送李季良北歸風吹殘栁絲孤客欲歸時掩抑楚絃絶離披湘葉衰前軍猶轉戰故國杳難期北望鴈門雪空吟平子詩五言送淳于蘭陵覲省歡言欲忘别風信忽相驚栁浦歸人思蘭陵春草生擷芳心未及視枕戀常盈此去非長路還如千里情五言送至洪沙彌赴上元受戒上元江中蔡州有梁戒壇不肯資章甫勝衣被木蘭今隨秣陵信欲及蔡州壇野寺鐘聲逺春山戒足寒歸来次第學應見後心難五言九日同盧使君幼平呉興郊外送李司倉赴選重陽千騎出送客為踟蹰曠野多揺落寒山滿路隅晴空懸舊斾秋色起菱湖幾日登司㑹揚才盛五都五言送盧孟明還上都江臯北風至歸客獨傷魂楚水逢鄉鴈平陵憶故園征驂嘶别館落日隠寒原應及秦川望春華滿國門五言送李少賔赴舉豈謂江南别心如塞上行苦雲揺陣色亂木攪秋聲周谷雨未散漢河流尚横春司遲爾䇿方用靜妖兵五言畱别閻士和不慣人間别多應忘别時逢山又逢水只畏却來遲五言送李道士常隨山上下忽限江南北共是忘情人何繇肯相憶七言送裴參軍還下邳舊居北望煙鋪驃騎營虜烽無火楚天晴此時千里西歸客泗上春風得及耕七言送文㑹上人還富陽悠悠渺渺屬寒波故寺思歸意若何長憶孤洲二三月春山偏愛富春多七言送維諒上人歸洞庭従來湖上勝人間逺愛浮雲獨自還孤月空天見心地寥寥一水鏡中山七言九月八日送蕭少府歸洪州明日重陽今日歸布帆絲雨望霏霏行過鶴渚知堪住家在龍沙意有違七言同顔魯泛舟送皇甫侍御曾維舟若許暫従容送過重江不厭重霜簡别来今始見雪山歸去又難逢五言送孫侍御遊越不知持斧客吟㑹是何情丹陛恩猶在滄洲賞暫行江橈隨月泛山䇿逐雲行佳句傳零雨詩流許盛名五言送顔處士還長沙覲省西候風信起三湘孤客心天寒漢水廣鄉逺楚雲深服綵將侍膳擷芳思滿襟歸人忘艱阻别恨獨何任五言送還本上人遊江西欲廣分何教心將江漢期雲招望寺處月待泝盃時真侶誰傷别降猿汝自悲多應過廬阜幽賞却来遲五言送路少府使京兼覲侍御兄國賦推能吏今朝發貢湖佇瞻雙闕鳯思見栢臺烏樹向秦關逺江分楚驛孤榮君有兄弟相繼騁長途五言於成原従送盧士舉落日獨歸客空山走馬嘶蕭條古關外岐路更東西大澤雲寂寂長亭雨凄凄君還到湘水寒夜滿猿啼五言送烏程李明府得陟狀赴京驛吏滿江城深仁見此情士林推玉振公府薦氷清為政移風乆承恩就日行仲容綸綍貴南巷有光榮五言送裴秀才往㑹稽山讀書一身齎萬巻編室寄煙蘿硯滴穿池小書衣種楮多吟詩山響荅泛瑟竹聲和鶴板求儒術深居意若何五言送崔詹事論之上都崔嘗典呉興金虎城池在銅龍劍珮新重看前浦栁猶憶舊洲蘋逺思秦雲暮歸心臘月春青園昔遊處惆悵別離人五言京口送盧孟明還揚州蕭蕭北風起孤棹下江濆暮客去来盡春流南北分萋萋御亭草渺渺蕪城雲相送日千里空山獨望君五言送沙彌大智游五臺童年隨法侶家世本儒流章句三生學清涼萬里遊雲歸龍沼暗木落鴈門秋長老應相問傳予向祖州五言送禀上人遊越雲泉誰不賞獨見爾情髙投石輕龍窟臨流笑鷺濤折荷為片席灑水浄方袍剡路逢禪侶多應問我曹五言送潘秀才之舒州楚水清風生揚舲泛月行荻洲寒露彩雷㟁曙潮聲東道思才子西人望客卿従来金谷集相繼有詩名五言送王山人遊廬山千里訪靈竒山資亦相隨葉舟過鶴市花漏宿龍池峰頂應閑散人間足别離白雲將世事吾見爾心知五言送道契上人之越覲大夫叔楚僧推後輩唐本學新經外國傳香氎何人施竹瓶秋風别李寺春日向柯亭大阮今為郡㸔君眼最青五言送沙彌長文遊京白版年猶小黄花褐已通若為詩思逸早欲似休公邁俗多真氣傳家有素風應須學心地宗旨在關東五言秋日送擇髙上人往江西謁曹王超然獨遊趣無限别山情予病不同賞雲閑應共行齋容秋水照香㲲早風輕曾被陳王識遥知江上迎七言送如獻上人遊長安關中四子教猶存􅀢説新經待爾翻為法應過七祖寺忘名不到五侯門閉尋鄠杜㸔修竹獨上風涼望古原髙逸詩情無别怨春遊従遣落花繁七言日曜上人還潤州送君何處最堪思孤月停空欲别時露茗猶芳邀重㑹寒花落盡不成期鶴令先去看山近雲愛初飛到寺遲莫倚禪功放心定蕭家陵樹誤人悲七言寺院聽胡笳送李殷一奏胡笳客未停野僧還欲廢禪聽難將此意臨江别無限春風葭菼青七言送僧繹斜日揺揚在栁絲孤亭寂寂水逶迤誰堪别後行人盡唯有春風起路岐七言荅裴評事澄荻花間送梁肅拾遺波上荻花非雪花風吹撩亂滿袈裟如今嵗晏無芳草獨對離樽作物華七言送勝雲小師昨日雪山記爾名吾今坐石巳三生少年道性易流動莫遣秋風入别情雜言誚士和别今日同明日隔何事悠悠乆為客君憐溪上去来雲我羨磷磷水中石五言送呉馮遊京北期何意促蕙草夜来繁清月思淮水春風望國門此時休旋逸萬里忽飛翻若憶山陰㑹孤琴為我援七言送僧遊宣州楚山千里一僧行念爾初縁道未成莫向舒姑泉口泊此中嗚咽為傷情五言宿支硎寺上房上方精舍逺共宿白雲端寂寞千峰夜蕭條萬木寒山光霜下見松色月中看却與西林别歸心即欲閑杼山集巻五
