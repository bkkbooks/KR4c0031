  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_WYG_000-1a, image: WYG1071/WYG1071-0775a.png}
body:
  text: 杼山集别集類一唐提要臣等謹案杼山集十巻唐僧皎然撰案唐書藝文志皎然字清晝湖州人謝靈運十世孫居杼山顔真卿為刺史集文士撰韻海鏡源預其論著貞元中取其集藏集賢御書院刺史于頔為序此集巻數與唐志合頔序亦存葢猶本前有贊寜所為傳葢自髙僧傳録入末有集外詩則毛晉所補緝也皎然及貫休齊已皆以詩名今觀所作弱於齊已而雅於貫休在中唐作者之間可厠末席集末附載雜文數篇則聊以備體非其所長矣别本附刋杼山詩式一巻按唐志晝公詩式詩評皆載文史類中不附本集今亦析出别著録焉乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀杼山集原序詩自風雅道息二百餘年而騷人作其旨愁思其文婉麗亡楚之變風歟至西漢李陵蘇武始全為五言詩體源於風流於騷故多憂傷離逺之情梁昭明所撰文選録古詩十九首亡其名氏觀其辭蓋東漢之世亦蘇李之流也洎建安中王仲宣曹子建皷其風晉世陸士衡潘安仁揚其波王曹以氣勝潘陸以文尚氣勝者魏祖興武功於二京已覆文尚者晉武亡帝圖於劉淵肇亂觀其人文興亡之跡人焉廋哉人焉廋哉宋髙祖平桓𤣥定江表文帝繼業五十年間江左寧謐魏晉文章欝然復興康樂矦謝靈運獨歩江南俯視潘陸其文炳而麗其氣逸而暢驅風雷於江山變晴昏於洲渚煙雲以之慘淡景氣為其澄霽信江表之文英五言之麗則者也迨於齊世宣城守謝𤣥暉亦得其辭調涵於氣格不侔康樂矣梁陳已降雖作者不絶而五言之道不勝其情矣有唐呉興開士釋皎然字清晝即康樂之十世孫得詩人之奥旨傳乃祖之菁華江南詞人莫不楷範極於緣情綺靡故辭多芳澤師古興制故律尚清壯其或發明𤣥理則深契真如又不可得而思議也貞元壬申嵗余分刺呉興之明年集賢殿御書院有命徵其文集余遂採而編之得詩筆五百四十六首分為十巻納於延閣書府上人以余嘗著詩述論前代之詩遂託余以集序辭不獲已畧志其變上人之植性清和稟質端懿中秘空寂外開方便妙言説於文字了心境於定惠又釋門之慈航智炬也余游方之内者何足以扣𤣥關謝氏世為詩人豈佛書所為習氣云爾于頔撰
