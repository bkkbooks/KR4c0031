body:
  text: 杼山集巻四唐釋皎然撰五言送梁拾遺肅歸朝明主重文諫才臣岀江東束書辭東山改服臨北風萬里望皇邑九重當曙空天開芙蓉闕日上蒲桃宮天子初未起金閨籍先通身逢軒轅世名貴鴛鸞中故人榮此别何用悲絲桐秦陪楊使君頊送段校書赴南海幕碩賢靜廣州信為天下貞屈茲大將佐籍彼延閣英聲動栁呉興郊餞意不輕吾知段夫子髙論關蒼生處以徳為藩出則道有行遥知南樓㑹新景當詩情天髙林瘴洗秋逺海色清時泰罷飛檄唯應頌公成五言送陸侍御士佳赴上京長安三千里喜行不言永清路黄塵飛大河滄流靜更懐西川府主公昔和鼎伊欝瑶瑟情威遟花驄影此時已難别日又無停景出餞闕相従心隨過前嶺五言奉陪顔使君真卿登峴山送張侍御嚴歸堂峴首千里情北轅自茲發煙霞正登覽簮筆限趨謁黄鶴望天衢白雲歸帝闕客心南浦栁離思西樓月留賞景不延感時芳易歇他晨有山信一為訪林樾五言酬元主簿子球别贈故人方逺適訪我陳别情此夜偶禪室一言了無生覽君緘中寳如搴清玉瑛胡為藴髙價嵗晚徒營營辭秩貧且病何人見艱貞出無黄金槖空歌白苧行威遟䇿駑馬獨望故關樹渺渺千里心春風起中路近聞新拜命鸞鳳猶棲棘勸君寄一枝且養𡨕𡨕翼甘泉多竹花明年待君食荅道素上人别春色遍逺道寂寞閩中行碧水何渺渺白雲亦英英離人不可望日暮芳洲情黄鶴有逸翮翹首白雲傾欲為山中侶肯秘遼天聲藍縷真子褐葳㽔近臣纓以茲奪爾懐常恐道不成吾門弟子中不减惠休名一性研已逺五言功更精従君汗漫遊莫廢學無生忍草肯揺落禪枝不枯榮采采慰長路知吾心不輕幻情有去住真性無離别留取老桂枝歸来共攀折霅溪館送韓明府章辭滿歸洛令従告還故人東門餞惠愛三年積軒車一夜逺曉月離館空秋風故山晚榮君有嘉薦顧我阻遊衍宿昔峰頂心依依不可巻送穆寂赴舉天子錫𤣥纁傾山禮隠淪君抛青霞去榮資觀國賔劍光既陸離瓊彩何璘玢夙駕别情逺商絃秋意新㝠㝠鴻鵠姿數尺看蒼旻殘冦近宋郊西行惡飈塵立身素耿介處難思經綸春府搜才日髙科得一人送張彛歸長沙早聞凌雲彩謂在鴛鷺儔華髪始相遇滄江仍旋遊䇿名忘茍進澹慮輕所求常服逺遊誡緬懐經世謀片帆背風渚萬里還湘洲別望荆雲積歸心漢水流蘭苕行采采桂棹思悠悠宿昔無機者為君動離憂秋日毘陵南寺送潘述之揚州孤客秋易傷嘶蟬靜仍續佳晨亦已屢歡㑹常不足禪地非路岐我心豈羈束情生逺别時坐恨清景促望中千里隔暮歸西山曲蕭條月中道彩蒨原上緑不見同心人幽懐增躑躅春日又送潘述之揚州别渚望䢴城岐路春日遍柔風吹楊栁芳景流郊甸日日東林期今夕異鄉縣文房曠佳士禪室阻清盻潘生曾受禪印離恨奪賞心不得諧所願莫憶山中人碧雲遥可見新秋送盧判官故人念宿昔欲别增逺情入座炎氣屏為君秋景清繇来空山客不怨離絃聲唯有暮蟬起相思碧雲生奉送袁髙使君詔徵赴行在効曹劉體皇心亭毒廣蝥賊皆陶甄未刈蚩尤旗方同軒后年天子幸漢中轘轅阻氛煙璽書召幕牧名在列岳仙國難倚長城廟謀資大賢清損休汝騎仁留述職篇遐路渺天末繁笳思河邊飾徒促逺期祗命赴急宣䛕才豈足稱深仁顧何偏那堪臨流意千里望旗旃奉送陸中丞長源詔徵入朝詔下鄼侯幕徵賢寵上勲才當持漢典道可致堯君藩牧今榮餞詩流此盛文水従呉渚别樹向楚門分宿寺期嘉月看山識故雲歸心復何奈怊悵在江濆奉送中丞道昌入朝文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新銜鳳車看舊飾熊去思今武子餘教昔文翁清在如江水仁留是國風光徵二千石掃第望司空冬日送顔延之明府撫州覲叔父臨川千里别惆悵上津橋日暮人歸盡山空雪未消鄉雲心渺渺楚水路遥遥林下方歡㑹山中獨寂寥天寒驚斷鴈江信望廻朝嵗晚流芳歇思君在此宵五言送關小師還金陵如何有歸思愛别欲忘難白鷺沙洲晚青龍水寺寒蕉花鋪浄地桂子落空壇持此心為境應堪月夜看五言峴山送裴秀才赴舉漢家招秀士峴上送君行萬里見秋色兩河傷逺情王師出西鎬敵寇避東平天府登名後廻看楚水清五言酬别襄陽詩僧少微詩中荅上人歸夢之意證心何有夢示説夢歸頻文字齎秦本詩騷學楚人蘭開衣上色栁向手中春别後須相見浮雲是我身五言送契上人遊揚州西陵古江口逺見東揚州渌水不同泛春山應獨遊尋僧白巖寺望月謝家樓宿昔心期在人寰非乆留五言送徳清衛明府赴選栁黙陟有薦狀八使慎求能東人獨薦君身猶千里限名已九霄聞逺路翻喜别離言暫惜分鳳門多士㑹擁珮入卿雲五言送鄭孝亷淮西覲省離袂翠華滿晨羞欲早行春風生楚樹曉角發隋城野靄濕衣綵江鴻增客情征途不用戒坐見白波清五言送沈秀之閩中越客不成歌春風起渌波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何五言送清㑹上人遊京佳遊限衰疾一笑向西風思見清門外曾臨素滻東峰明雲際寺寺名日出露寒宮宫名行道禪長在香塵不染空五言送沈居士還太原辭官因世難家族盛南朝名重郊居賦沈休文作郊居賦才髙獨酌謡沈文之作浪花飄一葉峰色向三條髙逸雖成性弓旌肯忘招奉同顔使君真卿峴山送李法曹陽氷西上獻書時㑹有詔徵赴京漢日中郎妙周王太史才雲書捧日去鶴版下天来草見呉洲發花思御苑開羊公惜風景欲别幾遅廻五言兵後送姚太祝赴選兩河兵已偃處處見歸舟日夜故人散江臯芳樹秋楚雲傷逺思秦月憶佳遊名動春官籍翩翩才少儔五言兵後送薛居士移家安吉舊遊經喪亂道在復何人寒草心易折閑雲性常真交情别後見詩句比来新向我桃州住惜君東嶺春五言送鄔傪之洪州覲兄弟年少足詩情西江楚月清書囊山翠濕琴匣雪花輕乆别經離亂新正憶弟兄贈君題樂府為是豫章行五言送乾封李成羽檄飛未息離情逺近同感君繇泛瑟關我是征鴻眇黙歸人盡疎蕪夜渡空還期當嵗晚獨在路行中五言送崔判官還揚子輕傳祗逺役依依下姑亭秋聲滿楊栁暮色繞郊坰煙水揺歸思山當楚驛青奉酬袁使君西樓餞秦山人與晝同赴李侍御招三韻秋風怨别情江守上西城行署寒流淺琴窓宿雨晴治書招逺意知共楚狂行送清涼上人何意欲歸山道髙繇境勝花空覺性了月靜知心證永夜出禪吟清猿自相應送李丞使宣州結駟何翩翩落葉暗寒渚夢裏春穀泉愁中洞庭雨聊持剡山茗以代宜城醑五言送至洪沙彌遊越知爾學無生不應傷此别相逢宿我寺獨往遊靈越早晚花㑹中經行剡山月七言送皇甫侍御曾還丹陽别業雲陽别夜憶春耕花發菱湖問去程積水悠揚何處夢亂山稠疊此時情將離有月教絃斷贈逺無蘭覺意輕朝右要君持漢典明年北墅可須營白蘋洲送洛陽李丞使還蘋洲北望楚山重千里廻軺止一封臨水情来還共載看花醉去更相従罷官風渚何時别寄隠雲陽幾處逢後㑹那應似疇昔年年覺老雪山容送履霜上人還金陵西山攜錫西山步緑莎禪心未了奈情何湘宮水寺清秋夜月落風悲松栢多送辨聰上人還廣陵莫學休公學逺公了心須與我心同隋家古栁數株在看取人間萬事空送清勵上人遊福建禪子自矜禪性成將来擬照建溪清南看閩樹花不落更取何縁了妄情送顧道士遊洞庭山見説洞庭無上路春遊亂踏五靈芝含桃風起花狼籍正是仙翁碁散時送邢台州濟海上仙山屬使君石橋琪樹古来聞他時畵出白團扇乞取天台一片雲送栁察諫議叔東城南陌强經過怨别無心亦放歌明日院公應問我閑雲長在石門多送栁淡扶侍赴洪州此子素少宦情共子有西山之好中林許師友忽阻夙心期自顧青緺好来將黄鶴辭少年輕逺渉世道得無欺煙雨孤舟上晨昏千里時離魂渺天末相望在江湄無限江南栁春風巻亂絲同李司直題武邱寺兼留諸公與陸羽之無錫陵寢成香阜禪枝出白楊劍池留故事月樹即他方應世縁須別栖心趣不忘還將陸居士晨發泛歸航夏日題鄭谷江上納涼館迢遥山意外清風又對君若為於此地翻作路岐分别館琴徒語前州鶴自群明朝天畔逺何處逐閑雲太湖館送殷秀才赴舉春風洞庭路揺蕩暮天多衰疾見芳草别離傷逺波詩名推首薦賦甲擬前科數日聞天府山衣製芰荷送重鈞上人遊天台漸看華頂出幽賞意隨生十里行松色千重過水聲海容雲正盡山色雨初晴事事將心證知君道可成早春送顔主簿遊越東兼謁元中丞輕舸趣不已東風吹緑蘋欲看梅市雪知賞栁家春别意傾呉醑芳聲動越人山陰三月㑹内史得嘉賔同顔使君清明日遊因送蕭主簿誰知賞嘉節别意忽相和暮色汀洲遍春情楊栁多髙城戀旌斾極浦宿風波惆悵支山月今宵不再過送道琚上人還金陵一與鍾山别山中得信稀經年求法後及夏問安歸野實充甘膳池花當綵衣慈親莫返拜外禮欲無為送裴邕之上京辭山偶世清挾䇿忽西行帆過隋江疾衣沾楚雪輕尚文須獻賦重道莫論兵東觀今多事應髙白馬生送珍上人還天竺兼寄廣通上人秦山人江寺名天竺多居躡逺蹤春帆依栁浦輕履上蓮峰禪子兼三隠空書共一封因君逹山信應向白雲逢送張孝㢘赴舉名在諸生右家經見素風春田休學稼秋賦出儒宮别路殘雲濕離情晚桂叢明年石渠署應繼叔孫通送劉司法之越蕭蕭鳴夜角驅馬背城濠雨後寒流急秋来朔吹髙三山期望海八月欲觀濤幾日西陵路應逢謝法曹送簡栖上人之建州覲使君舅亂峰江上色羨爾及秋行釋氏惟真子郗家許貴甥􅀈花新雨浄帆葉好風輕千里依元舅廻潮亦有情海人以木葉為帆登開元寺樓送崔少府還平望驛登望思慮積長亭樹連連悠揚下樓日杳映傍帆煙入夜四郊靜南湖月待船送王居士遊越野性配雲泉詩情屬風景愛作爛漫游閑尋東路永何山最好望須上蕭然嶺雜言重送皇甫侍御曾人獨歸日將暮孤帆帶孤嶼逺水連逺樹難作别時心還看别時路送演上人之撫州覲使君叔臨川内史憐諸謝爾在生縁比惠宗逺别應將秦本去幽尋定有楚僧逢停船夜坐親孤月把錫秋行入亂峰便道須過大師寺白蓮池上訪髙蹤送大寳上人歸楚山厭上烏橋送别頻湖光爛熳望行人欲將夜舸陪嘉月肯住空林伴老身獨鶴翩翻飛不定歸雲蕭散㑹無因従何得道懐惆悵莫是人間屢見春送侯秀才南遊芳草隨君自有情不關山色與猿聲為看嚴子灘頭石曾憶題詩不著名别洞庭維諒上人白雲關我不關他此物留君情最多情着春風生橘樹歸心不怕洞庭波康造録事宅送太祝姪之䖍吉訪兄弟阮咸别曲四座愁賴是春風不是秋漫漫江行訪兄弟猿聲幾夜宿蘆洲冬日梅溪送裴方舟宣州平明疋馬上村橋花發梅溪雪未消日短天寒愁送客楚山無限路遥遥送韋向睦州謁獨孤使君汜才子南看多逺情閑舟蕩漾任春行新安江色長如此何似新安太守清送至嚴山人歸山初到人間栁始陰山書昨夜報春深朝朝花落幾株樹惱殺禪僧未證心送僧遊揚州平明擇鉢向風輕正及隋堤栁色行知爾禪心還似我故宮春物肯傷情杼山集巻四
