body:
  text: 杼山集巻七唐釋皎然撰弔靈均詞昧天道兮有無聽汨音覓渚兮躊躇期靈均兮若存問神理兮何如願君精兮為月出孤影兮示予天獨何兮有君君在萬兮不群既水心兮皎潔上問天兮胡不聞天不聞神莫覩若雲㝠㝠兮雷霆怒蕭條杳眇兮餘草莽古山春兮為誰今猿哀兮何思風激洌兮楚竹死國殤人悲兮雨颸颸雨颸颸兮望君時光茫蕩漾兮化為水萬古忠貞兮徒爾為步虚詞因覽真訣遂感西城君玉皇下青㝠人間未曾聞日華鍊精魄精魄無垢氛謂我有仙骨且令餌氤氲俯仰媿靈顔願隨鸞鵠群俄然動風馭縹渺歸青雲奉應顔尚書真卿觀𤣥真子置酒張樂舞破陣畫洞庭三山歌道流迹異人共驚寄向畫中觀道情如何萬象自心出而心澹然無所營手援毫足蹈節披縑灑墨稱麗絶石文亂㸃急管催雲態徐揮慢歌發樂音洛縦酒酣狂更好攅峰若雨縦横埽天波澶漫意無涯片嶺崚嶒勢將倒盻睞方知造境難象忘神遇非筆端昨日幽竒湖上見今朝舒巻手中看興餘輕拂逺天色曾向峰東海邊識秋空暮景䬃䬃容翻疑是真畫不得顔公素髙山水意常恨三山不可至賞君狂盡忘逺遊不出軒墀坐蒼翠荅韋山人隠起龍文藥瓢歌野人藥瓢天下絶全如渾金割如月彪炳文章智使然生成在我不在天若言有物不繇物何意中虚道性全韋生能詩兼好異獲此靈瓢逺相遺仙侯王帖人漫傳若士青囊世何秘一捧一開如見君藥盛五色香氛氲堦上驪龍蟠不睡張鱗擺頷生風雲世人强知金丹道黙仙不成穢仙老年少紛如陌上塵不見吾瓢盡枯槁聊將繫肘步何輕便有三山孤鶴情東方小兒乏此物遂令仙籍獨無名桃花石枕歌贈康従事卞山幽石産竒璞荆人至死採不著何人琢枕持贈君片片桃花開未落劍工見兮可為劍昆吾石鐵可鑄為劍玉工辯兮知非石至寳繇來覽者稀今君獨鑒應欲惜何辭集與章天真幸得提攜近玉人可中弃置君不顧天生秀色徒璘玢四座喧喧爭目悦巧過造化稱一絶莫言昨日因錯磨看取従來無㸃缺六月江南暑未闌一尺花氷試枕看髙窗正午風颯變室中不減春天寒主人所重重枕徳文章外飾徒相惑更有堅貞不易心與君天下為士則張伯英草書歌伯英死後生伯髙朝看手把山中毫先賢草律我草狂風雲陣發愁鍾王須臾變態皆自我象形類物無不可閬風遊雲千萬朶驚龍蹴踏飛欲堕更覩鄧林花落朝狂風亂攪何飄颻有時凝然筆空握情在寥天獨飛鶴有時取勢氣更髙憶得春江千里濤張生竒絶難再遇王小令草書古今稱草絶草罷臨風展輕素陰慘陽舒如有道鬼狀魑容若可懼寒栖子歌曾居廬山欲有事羅浮之行君在廬山知有疑是鶴又是雲生死塵埃汙不得眼前榮利徒紛紛今日惠然來訪我酒榼書囊肩背荷拂除衣上餌烟霞昨夜胥門宿蔡家天然不飲亦不食抛名換姓覓不得且向人間作酒仙不肯將身生羽翼停形為餌天地根胎息道成世人皆死我獨存洗慮因荅清明籙世人皆貪我常足栖子妙今道已成手把𤣥樞心運㝠能令鬼哭神效靈身如飄風不可絆朝遊崆峒夕汗漫向來坐客猶未散忽憶羅浮欲去時遥指孤雲作路岐海上仙遊不可見人間日落空桑枝翔隼歌送王端公古人賞神駿何如秋隼擊獨立髙標望霜翮應看天宇如咫尺低廻拂地凌風翔鵬鶵敢下鴈斷行晴空囘顧忽不見有時獨出青霞傍窮陰萬里落寒日氣殺草枯增奮逸雲塞斜飛攪葉迷雪天直上穿花疾見君髙情有所屬贈别因歌翔隼曲離亭慘慘客散時歌盡路長意不足白雲歌寄陸中丞使君長源一見西山雲使人情意逺憑髙發詠何超遥道妙如君有舒巻縈空疉景多麗容衆峰峰上自為峰潔白不繇陰雨積髙明肯共雜烟重萬物有形皆有著白雲有形無繫縳黄金被爍玉亦瑕一片飄然汙不得或逢天上或人間人自營營雲自閒忽然飛去莫能攀逸民對雲效髙致禪子逢雲增道意白雲遇物無偏頗自是人心見同異閶闔天門宜曙看為纓作葢擁千官従龍合沓臨清暑殿名就日逶迤繞露寒宮名誰憐西山雲亭亭處幽絶坐石長看非我羈手中欲攪待君説貞白先生那得知只向空山自怡悦裴端公使君清席賦得青桂歌送徐長史昔年攀桂為留人今朝攀桂送歸客秋風桃李揺落盡為君青青伴松柏謝公南樓送客還髙歌桂樹凌寒山應憐獨秀空林上空賞敷華積雪間昨夜一枝生在月嬋娟可望不可折若為天上堪贈行徒使亭亭照離别周長昉畫毗沙門天王歌長史畫神獨感神髙步區中無兩人雅而逸髙且真形生虚無忽可親降魔大㦸縮在手倚天長劍横諸紳慈威示物雖凜凜在徳無秋唯有春吾知真象本非色此中妙用君心得茍能下筆合神造誤㸃一㸃亦為道寫出霜縑可舒巻何人應識此情逺秋齊清寂無外物盥手焚香聊自展憶昔胡兵圍未解感得此神天上下至今雲旗圖我形為君一顧煙塵清奉和顔魯公真卿落𤣥真子舴艋舟歌楚章華臺成影願諸侯落之滄浪子後𤣥真子㝠㝠釣隠江之汜刳木新成舴艋舟諸侯落舟自茲始得道身不繫無機舟亦閒従水逺逝兮任風還朝五湖兮夕三山停綸乍入芙蓉浦擊汰時過明月灣太公取璜我不取龍伯釣鼇我不釣竹竿嫋嫋魚簁簁此中自得還自笑汗漫一遊何可期後來誰遇氷雪姿上古初聞出堯世今朝還見在堯時鄭容全成蛟形木机歌萬物貴天然天然不可得渾朴無勞剞劂工幽姿自可蛟龍質欲騰未去何翩翩揚袂爭前誰敢拂可中風雨一朝至還應不是池中物蒼山萬重採一枝形如器車生意竒風號雨噴心不折衆木千藂君獨知廣徳中鄭生避賊呉興毗山於稠人之中遇予獨見稱賞髙人心多越格有時就月吟春風持來座右驚神客愛君開閤江之濵白雲黄鶴長相親南郭子綦我不識非君獨是是何人奉同顔使君真卿清風樓賦得洞庭歌送呉鍊師歸林屋洞名山洞府到金庭三十六洞稱最靈不有古仙啟其秘今日安知靈寳經中山鍊師栖白雲道成仙秩號元君安之髙仙者有元君次有夫人元有君秩比左仙公三千甲子朝玉帝世上如今名始聞吐納青牙養肌髮花冠玉舄何髙潔不聞天上来謫仙自是人間授真訣呉興太守道家流仙師逺放清風樓應將内景還飛去且従分風當此留湖之山兮樓上見山㝠㝠兮水悠悠世人不到君自到縹緲仙都誰與儔黄鶴孤雲天上物物外飄然自天匹一别千年未可期仙家不數人間日戛銅椀為龍吟歌并序唐故太尉房公琯早嵗嘗隠終南山峻壁之下徃徃聞龍吟聲清而靜滌人邪想時有好事僧潛戛之以三金寫之唯銅聲酷似他日房公偶至山寺聞林嶺間有此聲乃曰龍吟復遷于茲矣僧因出其器以告公命戛之驚曰真龍吟也大厯十三祀秦僧傳至桐江手使童兒戛金倣之亦不減秦聲也緇人或有譏者曰此逹僧之事可以嬉娯爾曹無以瑣行自拘因賦龍吟歌以見其意逸僧戛椀為龍吟世上未曾聞此音一従太尉房公賞遂使秦人傳至今初戛徐徐聲漸顯樂音不管何人辯似出龍泉萬丈底乍怪聲来近而逺未必全繇戛者功真生虚無非椀中寥亮掩清笛縈廻凌細風遥聞不斷在煙杪萬籟無聲天境空聽専一境則衆音乍向天台㝛華頂秋宵一吟更清迥能令聽者易常性憂人忘憂躁人靜今日鏗鍠江上聞蛟螭奔飛如得群聲過陰嶺恐成雨響駐晴天將起雲坐来吟盡空江碧却尋向者聽無跡人生萬事將此同暮賤朝榮動還寂飲茶歌誚崔石使君越人遺我剡溪茗採得金牙㸑金鼎素瓷雪色縹沫香何似諸仙瓊蘂漿一飲滌昬寐情来朗爽滿天地再飲清我神忽如飛雨灑輕塵三飲便得道何須苦心破煩惱此物清髙世莫知世人飲酒多自欺愁看畢卓甕間夜笑向陶潛籬下時崔侯啜之意不已狂歌一曲驚人耳孰知茶道全爾真唯有丹邱得如此買藥歌送楊山人華陰少年何所希欲餌丹砂化骨飛江南藥少淮南有暫別胥門上京口京口斜通江水流徘徊應上青山頭夜驚潮没鸕鷀堰朝看日出芙蓉樓揺蕩春風亂帆影片雲無數是揚州揚州喧喧賣藥市浮俗無繇識仙子荷間婉女直千金紫陽夫人服不死吾於此道復何如昨朝新得蓬莱書薛卿教長行歌時量移湖州别駕桂楊仙栁道家説昔傳蘇君今是薛聊將握槊偶時人便被人間稱冠絶黄楊文局龜螭蟠琢成骰子雙琅玕初疑月破雲中堕復怪星移指下攅誰識兵竒勢可保坐看將軍上一道長行有將軍梁有時彩王去聲非所希笑擎單于出重圍鳬驚隼擊疾若飛左顧右盻生光輝家本聯姻漢戚里身是長安貴公子名髙藝絶何翩翩幾廻決勝君王前扈遊長樂與祈年人望青雲白日邊謫宦江南嵗陰晚還將此道聊自遣繇来君子行最長長行經有君子行小人行予亦知君寄心逺桃花石枕歌送安吉康丞并序安吉古桃州也今為呉興右扈士遐副焉於南山獲桃花石異而重之珍于席上士遐將赴京師故帥詩人以君所寳之物髙歌贈行君吏桃州尚竒跡桃州採得桃花石爛疑朝日照巳舒含似春風吹未坼珪璋特逹世所珍吾知此物亦其倫應羨花開不凋悴應嘉玉片無緇磷立性堅剛平若砥君子偏將交道比何人亦秉堅剛姿吾見君心得如此君心所好我獨知别多見少長相思従来賞翫安左右萬里提攜君莫辭賦得呉王送女潮歌送李判官之河中府見説呉王送女時行宫直到荆溪口溪上千年送女潮為感呉王至今有乃知昔人繇志誠流水無情翻有情平波忽起二三尺此上疑與神仙宅今人猶望荆之湄長令望者增所思呉王已殁女不返潮水無情那有期溪草何草號帝女溪竹何竹號湘妃靈濤旦暮自堪傷的皪嬋娟又爭發客歸千里自茲始覽古髙歌感行子不知别後相見期君意何如此潮水觀李中丞洪二美人唱歌軋箏歌時量移湖州長史君家雙美姬善歌工箏人莫知軋用蜀竹絃楚絲清哇哇音娃歌聲也宛轉聲相隨夜靜酒闌佳月前髙張水引何淵淵美人矜名曲不誤蹙響時時如迸泉趙琴素所嘉齊謳世稱絶箏歌一動凡音輟凝絃且莫停金罍滛聲已闋雅聲来遊魚噞喁鶴徘徊主人髙情始為開髙情放浪出常格偶世有名道無跡勲業先登上將科文章已冠諸人籍每笑石崇無道情輕身重色禍亦成君有佳人當禪伴於中不廢學無生愛君天然性寡欲家貧禄薄常知足謫官無愠如古人交道忘言比前躅不意全家萬里来湖中再見春山緑呉興公舍幽且閑何妨寄隠在其間時議名齊謝太傅更有􅂝奴似東山陳氏童子草書歌書家孺子有竒名天然大草令人驚僧䖍老時把筆法孺子如今皆暗合飈揮電灑眼不及但覺毫端鳴颯颯有時作㸃險且能太行片石看欲崩偶然長掣濃入燥少室枯松欹不倒夏室炎炎少人歡山軒日色在闌干桐花飛盡子規思主人髙歌興不至濁醪不飲嫌昬沉欲翫草書開我襟龍爪狀竒䑕鬚鋭水牋白晳越人惠王家小令草最狂為予灑出驚騰勢飲茶歌送鄭容丹邱羽人輕玉食採茶飲之生羽翼天台記云丹邱出大茗服之羽化名蔵仙府世空知骨化雲宫人不識雲山童子調金鐺楚人茶經虚得名霜天半夜芳草折爛漫緗花啜又生賞君此茶祛我疾使人胸中蕩憂慄日上香罏情未畢醉踏虎溪雲髙歌送君出花石長枕歌荅章居士贈楚山有石郢人琢琢成長枕知是玉全疑氷片坐恐銷間發花藂驚不足贈予比之金琅玕瓊花爛爛浮席端吾師道吾不執寳今日感君因執看試叩鏗然應清律纎塵不留蠅敢拂萬物皆因造化資如何獨負清貞質南山有雲鵠在空長松為我生涼風髙友朗詠樂其中行住四儀皆道意不學小乗一曲士唯將此物安座隅取次閒眠有禪味觀王右丞維滄洲圖歌滄洲誤是真萋萋忽盈視便有春渚情褰裳掇芳芷颯然風至草不動始悟丹青得如此丹青變化不可尋翻空作有移人心猶言雨色斜拂座乍似水涼来入襟滄洲説近三湘口誰知春得在君手披圖擁褐臨水時翛然不異滄洲叟洞庭山維諒上人院堦前孤生橘樹歌洞庭仙山但生橘不生凡木與梨栗真子無私自不栽感得一株堦下出細葉繁枝委露新四時常緑不關春若言此物無道性何意孤生就来人二月三月山初暖最愛低簷數枝短白花不用烏銜来自有風吹手中滿九月十月爭破顔金實離離色殷殷一夜天晴香滿山天生珍木異於俗俗士来逢不敢觸清陰獨歩禪起時徙倚前看看不足春夜賦得漉水囊歌送鄭明府呉縑楚練何白皙居士持来遺禪客禪客能裁漉水囊不用衣工秉刀尺先師遺我式無缺一濾一翻心敢賖夕望東峰思潄盥曨曨斜月懸燈紗徙倚花前漏初斷白猿爭嘯驚禪伴玉瓶徐瀉賞涓涓濺著蓮衣水珠滿因識仁人為宦情還如漉水愛蒼生聊歌一曲與君别莫忘寒泉見底清湛處士枸把架歌天生靈草生靈地誤生人間人不貴獨君井上有一根始覺人間衆芳異拖線垂絲宜曙看徘徊滿架何珊珊春風亦解愛此物裊裊時來傍香實濕雲綴葉擺不去翠羽銜花驚畏失肯羨孤松不凋色皇天正氣肅不得我獨全生異此輩順時榮落不相背孤松自被斧斤傷獨我柔枝保無害黄油酒囊石棊局吾羨湛生心出俗擷芳生影風灑懐其致翛然此中足觀裴秀才松石障歌誰工此松唯拂墨巧思丹青營不得初寫松梢風正生此中勢與真松爭髙柯細葉動颯颯乍聽幽飀如有聲左右雙松更竒絶龍鱗麈尾仍半折經春寒色聚不散逼座陰陰將下雪荆門石狀凌璵璠蹙成數片倚松根何年蒨蒨苔黏跡幾夜潺潺水擊痕裴生詩家後来客為我開圖翫松石對之自有髙世心何事勞君上山屐送顧處士歌即呉興邱司儀之女聓即况也呉門顧子予早聞風貌真古誰似君人中黄憲與顔子物表孤髙將片雲性背時人髙且逸平生好古無儔匹醉書在篋稱絶倫神畫開厨怕飛出謝氏檀郎亦可儔道情還似我家流安貧日日讀書坐不見將名干五侯知君別業長洲外欲行秋田循畎澮門前便取觳觫乗腰上還將鹿盧佩禪子有情非世情御荈貢餘聊贈行滿道喧喧遇君别爭窺玉潤與氷清水精數珠歌西方真人為行宻臂上記珠皎如日佛名無著心亦空珠去珠来體常一誰道佛身千萬身重重只向心中出兵後西日溪行并序沈羲仙記銅峴地肺可以逃水又聖桃源記天地改花源在即此地也此一章靈澈上人可以志之一従清氣上為天仙叟何年見乾海黄河幾度濁復清此水如今未曾改西尋仙人渚誤入桃花穴風吹花片使我迷時時問山驚踏雪石梁丹竈意更竒石梁丹竈銅峴仙人渚靈跡有四所春草不生多故轍我来隠道非隠身如今世上無風塵路是武陵路人非秦代人飯松得髙侶濯足偶清津數片昔賢磐石在幾廻竝坐戴綸巾姑蘇行古臺不見秋草衰却憶呉王全盛時千年月照秋草上呉王在時幾廻望至今月出君不還世人空對姑蘇山山中精靈安可覩轍跡人蹤麋鹿聚嬋娟西子傾國容化作寒陵一堆上短歌行古人若不死吾亦何所悲蕭蕭煙雨九原上白楊青松葬者誰貴賤同一塵死生同一指人生在世共如此何似浮雲與流水短歌行短歌無窮日已傾鄴宮梁苑徒有名春草秋風傷我情何為不學金仙侶一悟空王無死生山月行家家望秋月不及秋山望山心萬境長寂寥夜夜孤明我山上海人皆言生海東山人自謂出山中憂虞歡樂皆占月月本無心同不同自従有月山不改古人望盡今人在不知萬世今夜時孤月將明誰更待顧渚行寄裴方舟我有雲泉隣渚山山中茶事頗相關鶗鴂鳴時芳草死山家漸欲收茶子伯勞飛日芳草滋山僧又是採茶時繇来慣採無近逺陰嶺長兮陽崖淺大寒山下葉未生小寒山中葉初巻二山名呉婉攜籠上翠微䝉䝉香㓨罥春衣迷山乍被落花亂度水時驚啼鳥飛家園不逺乗露摘歸時露彩猶滴瀝初看怕出欺玉英更取煎来勝金液昨夜西峰雨色過朝尋新茗復如何女宫露澀青芽老堯市人稀紫筍多紫筍青芽誰得識日暮採之長太息清泠真人待子元仙傳清泠真人斐君與道人支子元為友貯此芳香思何極武源行贈邱卿岑昔年群盜阻江東呉山動揺楚澤空齊人亦戴蜂蠆毒美稷化為荆棘藂洶洶四顧多窟穴浮雲白波名不同萬人死地當虎口一旦生涯懸彀中昨日將軍狥死節悉向生民陷成血胸中豹畧張陣雲握内虵矛揮白雪長洲南去接孤城居人散盡皷譟驚三春不見芳草色四面唯聞刁斗聲此時狂寇紛如市君當要衝固深壘縦横計出皆獲全士卒身先每輕死埽平氛祲望呉門人閒嵗美桑柘繁比屋生全受君賜連營罷戰賴君恩如何棄置功不録通籍無名滯江曲灞亭不重李將軍漢爵猶輕蘇屬國荒營寂寂隠山椒春意空驚故栁條野戰攻城盡如此即今誰是霍嫖姚長安少年行翠樓春酒蝦蟇陵長安少年皆共矜紛紛半醉緑槐道躞蹀花騘驕不勝風入松西嶺松聲落日秋千枝萬葉風飀飀美人援琴弄成曲寫得松間聲斷續琴聲清我魂流波壊陵安足論美人夜坐月明裏含少商兮㸃清徵風何凄兮飄飄攬寒松兮又夜起夜未央曲何長金徽更促聲泱泱何人此時不得意意苦絃悲聞客堂杼山集巻七
