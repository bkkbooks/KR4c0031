body:
  text: 杼山集巻二唐釋皎然撰五言奉酬袁使君髙春遊鶺鴒峰蘭若見懐鶺鴒中峰近髙竒古人遺常欲乞此地養松挂藤絲昨聞雙旌出一川花滿時恨無翔雲步逺赴關山期躋險與誰賞折芳應自怡遥知忘歸趣喜得春景遲已見郢人唱新題石門詩五言荅裴濟従事遲遲雲鶴意奮翅知有期三秉綱紀局累登清白資應懐青塘居蕙草没前墀舊月照秋水廢田留故陂至今髙風在為君吹桂枝昨逢洞庭客果得故人詩何異王内史来招道林師欲攜山侶出難與白雲辭五言白雲上精舍尋杼山禪師兼示崔子向何山道上人望逺涉寒水懐人在幽境為髙皎皎姿及愛蒼蒼嶺果見栖禪子潺湲灌真頂積疑一念破澄息萬縁靜世事花上塵惠心空中境清閑誘我性遂使腸慮屏許共林客遊欲従山王請木栖無名樹水汲忘機井持此一日髙未肯謝箕潁夕霽山態好空月生俄頃識妙聆細泉悟深滌清茗此心誰得失笑向西林永五言酬薛員外誼苦熱行見寄六月金數伏茲辰日在庚炎曦爍肌膚毒霧昏性情安得奮輕翮超遥出雲征不知天地心如何匠生成火徳燒百卉瑶草不及榮省客當此時忽貽懐中瓊捧翫煩袂滌嘯歌美風生遟君佐元氣調使四序平中令霜不袚大餘氣常貞江南詩騷客休吟苦熱行五言採實心竹杖寄贈李蕚侍御竹杖裁碧鮮步林賞髙直實心去内矯全節無外飾行樂聊自持扶危資爾力初生在榛莽孤秀豈封殖千雪不死枝贈君期君識五言酬薛員外誼見戲一首方知正始作麗掩碧雲詩文彩盈懐袖風規發詠思遺弓逢大敵摩壘怯偏師頻有移書讓多慙繫組遟殘才迂且拙虚譽喜還疑猶倚披沙鑒長歌向子期五言奉酬李中丞洪湖州西亭即事見寄兼呈呉馮處士時中丞量移湖州長史愛君溪上住遟月開前扄山火照書巻野風吹酒缾為誰留此物意在眼中清樵子逗煙墅漁翁宿沙汀主人非楚客莫謾譏獨醒宿昔邢城功道髙心已㝠貪將到處士放醉烏家亭五言苕溪草堂自大厯三年夏新營洎秋及春彌覺境勝因紀其事簡潘丞述湯評事衡四十三韻萬慮皆可遺愛山情不易自従東溪住始與人群隔應物非宿心遺身是吾䇿先民崆峒子淪景事金液綺里猶近名於陵未泯跡吾師逆流教禪隠殊古昔僧傳云人皆隠於山我獨隠於禪洗足臨潺湲銷聲寄松栢緗荷採堪服柔草持可席道心制野猿法語授幽客境浄萬象真寄目皆有益原上無情花聖教意草木等器世間雖無情而理通又云欝欝黄花無非般若是其義山中聽經石髙僧詮公詩曰學徒數愧石生公有通經石竹生自蕭散雲性常潔白却見羇世人逺髙摩霄翮逹賢觀此意煩想遂氷蘖伊子戰苦勝覽境情不溺智以動念昏功繇無心積形骸爾何有生死誰忻戚為與勝悟㝠不憂頺齡迫春風自駘蕩禪地常閴寂擲札成栁枝僧傳北逺法師涅槃經疏畢擲札於庭栁枝生焉溉瓶養泉胍道人知止足盥潄聊自適學外見古賢頗令我心惕眇綿雲官世夢幻羽陵籍鬼籙徒相矜九原誰家宅俗情封淺近至理昧堯跖蹈善嗟沉㝠履仁傷堙阨匠心聖亦尤攻異天見責世論謂堯聖徳而嗣不肖盜跖毁行而享長富無福仁禍淫之應師心攻異之士反怨天責聖不知有昭昭之業論空者人失信空之實試以慧眼觀斯言諒可覿外事非吾道忘縁倦所歴中宵廢耳目形靜神不役色天夜清迥花漏時滴瀝髙僧要公刻蓮花漏東風吹杉梧幽月到石壁此中一悟心可與十載敵故交徒好我筐中無咫尺潘生入空門祖師傳秘賾潘生曾受曹溪禪門湯子自天徳精詣功不僻放世與成名兩圖在所擇逺公謂劉處士云世聞唯是想耳茍放有世之見心即道豈有世外物来羇爾耶吾髙鴟夷子身退無瑕摘吾嘉魯仲連功成棄珪璧二賢兼彼才晚節何感激不然作山計改服我下澤君隳元亮冠我脱潛師屐僧傳沙門法潛着山屐入朝倚臥髙松根共逃金閨籍五言荅裴集陽伯明二賢各垂贈二十韻今以一章用酬兩作知音如瓊枝天生為予有攀折若無階何殊天上栁裴生清通嗣陽子盛徳後詩名比元長二子詩比王融為俱少年著名賦體凌延夀賦如文孝亦俱盛年珠生驪龍頷或生靈蛇口何似雙瓊章英英曜吾手白日不可汗清源肯容垢持此山上心待君忘情友且伴邱壑賞未隨名宦誘坐石代瓊茵製荷損艾綬清霄集我寺烹茗開禪牖發論教可垂正文言不朽白雲供詩用清吹生座右不嫌逸令醉莫試仙壺酒皎皎尋陽隠千年可為偶一従漢道卒世事無紛糺星文齊七政天軸明二斗召士揚弓旌知君在林藪莫學潁陽子請師髙山叟出處藩我君還来㑹厓阜五言荅豆盧居士春夜遊東園見懐春意賞不足承夕步東園事表精慮逺月中華木繁開襟寄清景遐想屬空門安得纚芳屣看君幽徑萱五言寄崔萬芳夏氣殺髙隼擊惜芳步寒林風揺蒼琅根霜剪荍音翹􅀢心歸思忽眇眇佳期亦沉沉我身豈遐逺如隔湘漢深事邇智莫及願乖情不任遲君忘言侶一笑開吾襟五言訪朱放山人野人未相識何處異鄉隔作逢雲陽信教向雲陽覓空聞天上風飄颻不可覿應非矍爍翁或是滄浪客早晚從我遊共􅂝春山䇿五言晚冬廢溪東寺懐季同直縱廢溪無人跡益見離思深歸来始昨日恍惚驚嵗隂清想屬遥夜圓景當空林宿昔月未改何如故人心遊從間芳趾揺落棲寒岑眇眇湖上别含情初至今道流安寂寞世路倦嶇嶔此意欲誰見懐賢獨難任徽聲反㝠黙夕籟何哀吟禪念破離夢吾師誡援琴耿耿已及旦曷繇開此襟幽期諒未偶勝境徒自尋安得西歸雲因之傳素音五言兵後與故人别予西上至今在楊楚因有是寄日月不相待思君魂屢驚草𤣥寄楊子作賦得蕪城温温獨游跡遥遥相望情淮上春草歇楚子秋風生辟士天下盡君何獨屏營運開應佐世業就可成名誰借楚山住年年事耦耕五言因遊支硎寺寄邢端公大厦資多士掄材得豫章清門推問望早嵗騁康莊作用方開物聲名乆擅塲丹延分塞郡宿昔領戎行始馭屏星乗旋陰蔽茀棠始佐延州俄典茲郡朝端瞻鶚立關右仰鷹揚威令兼寧朔英聲重䕶羌三軍成父子雜虜避封疆身執金吾貴時遭寳運昌雍容持漢矟肅穆衛周堂排難知臣節攻疑定國章一言明大義千載揖休光踐職勲庸列修躬志行彰優游應慕陸止足定師張中扆懐殊政南州佇小康仁為桂江雨威是栢臺霜自桂州除侍御史謇諤言無隠公忠禍不防譴深辭紫禁恩在副朱方左遷温州治中量移潤州長史切玉鋒休淬垂天翅罷翔論文徵賈馬述隠許求羊肘後看金碧腰間笑水蒼詩題白羽扇酒挈緑油囊曠逹機何有深沉器莫量時應登古寺佳趣在春崗止水平香砌鮮雲滿石床山情何寂樂塵世自飛揚已遇鑪峰社還思緝蕙房外心親地主内學事空王花㑹宜春淺禪遊喜夜涼髙明依月境蕭散躡庭芳得道殊秦佚隳名似楚狂餘生於此足不欲返韶陽五言同諸公奉侍祭岳瀆使大理盧幼平自㑹稽廻經平望將赴于朝廷期過故林不至用題中韻望祀崇周典皇華出漢庭紫泥傾㑹計𤣥酒薦芳馨聖慮多䖍肅齋心合至靈占祥刋史竹筮日數堯蓂禮秩加新命朝章篤理刑敷誠通北闕遺愛在南亭苕水思曾泛磯山憶重經清風門客仰佳頌國人聽攀桂留卿月徵文待使星春郊廻駟牡遥識故林青五言早秋桐廬思歸示道諺上人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿来觸浄水鳥下啄寒梨可即關吾事歸心自有期五言勞勞山居寄呈呉處士山事繇来别只應中老身寒園掃綻栗秋浪拾乾薪楚人呼養柴為秋浪領鶴閑書竹誇雲笑向人俗家相去逺野水作東隣五言寄報徳寺従上人鼓吹山在寺西宗流許身子物表養髙閑空色清涼寺秋聲鼓吹山看心水磬後行道雨花間七葉翻章句時時啟義關五言山中月夜寄無錫長官湖上涼風早雙峰月色秋遥知秣陵令今夜在西樓别葉蕭蕭下含霜處處流如何共清景異縣不同遊五言奉賀顔使君真卿二十八郎絶自河北逺歸相失值氛煙纔應掌上年乆離驚貌長多難喜身全比信尚書重如威太守憐滿庭看玉樹更有一枝連五言題湖上蘭若示清㑹上人峰心惠忍寺嵊頂謝公山何似南湖近芳洲一畝間意中雲木秀事外水堂閑永日無人到時看獨鶴還五言秋宵書事寄呉馮真性在方丈寂寥無四隣秋天月色正清夜道心真大夢觀前事浮名悟此身不知庭樹意榮落感何人五言題山壁示道維上人獨居何意足山色在前門身野長無事心㝠自不言閑行數亂竹靜坐照清源物外従知少禪徒不耐煩五言晚秋登佛川南峰懐裴例登嶺望落日眇然傷别魂亭臯秋色遍遊子在荆門世故東西客山空斷續猿此心誰復見寂寞偶芳蓀五言訪陸處士羽太湖東西路呉主古山前所思不可見歸鴻自翩翩何山賞春茗何處弄春泉莫是滄浪子悠悠一釣船五言酬李侍御蕚題看心道塲賦以眉毛腸心牙等五字晝得牙字我法従誰悟心師是貫花三塵觀種子一雨發萌牙定起輪燈缺宵分印月斜了空如藏史始肯㑹禪家辯正論亦有九流一曰禪家者流五言酬姚補闕南仲雲溪館中戲題隨書見寄寺溪臨使府風景借仁祠補袞周官貴能名漢主思臥雲知獨處望月憶同時忽枉緘中贈瓊瑶滿手持五言春夜期裴都曹濟集心上人院不至東林期隠吏日月為虚盈逺望浮雲隔空憐定水清逍遥方外侶荏苒府中情漸聽寒鞞發淵淵在郡城五言和裴少府懐京兄弟宦遊三楚外家在五陵原涼夜多歸夢秋風滿故園北書無逺信西候獨傷魂空念青門别殷勤岐路言五言和閻士和望池月荅人片月忽臨池雙蛾憶畵時光浮空似粉影散不成眉孤枕應驚夢寒林正入帷情知兩處望莫怨獨相思五言遥和塵外上人與陸澧夜集山寺問涅槃義兼賞陸生文巻上人自號北山子共是竹林賢孫綽僧史以七人配徳嵇阮號竹林七賢心従貝葉傳説經看月喻開巻愛珠連清浄遥城外蕭踈古塔前應隨北山子髙頂枕雲眠五言春日和盧使君幼平開元寺聽妙奘上人講時上人將遊五臺仁聖垂文在虚空日月懸陵遟遟哲匠宗旨發幽詮法受諸侯請心教四子傳春生雪山草香下棘林天顧我従今日聞經悟宿縁涼山萬里去應為教猶偏七言荅李侍御問入道曾經離亂前長千古寺住多年愛貧唯製蓮花足取性閑書樹葉篇自笑不歸看石牓誰髙無事弄名泉身外空名何足問吾心已出第三禪七言奉酬李員外使君嘉祐蘇臺屏營居春首有懐昔嵗為邦初未識今朝休沐始相親移家水巷貪依靜種栁風窓欲占春詩思先邀烏府客山情還訪白樓人登臨許作煙霞伴髙在方袍間幅巾七言和李舍人使君紓題雲明府道室許令如今道性雲曾經西岳事桐君流霞手把應憐夀黄鶴心期擬作群金籙時教弟子檢砂牀不遣世人聞桂陽亦是神仙守分别無嗟兩地分七言奉和陸中丞使君長源寒食日作寒食江天氣最清庾公晨望動髙情因逢内火千家靜便覩行春萬木榮深淺山容飛雨細縈紆水態拂雲輕腰章本郡誰相似數日臨人政已成五言奉酬袁使君送陸灞却廻期過寺院欲别湖上客暮期西林還髙歌風音表放舟月色間更人莫報夜禪閣本無關五言招韓武康章山僧雖不飲酤酒引陶潛此意無人别多為俗士嫌五言秋居法華寺下院望髙頂贈如獻上人峰色秋天見松聲靜夜聞影孤長不出行道在寒雲五言贈韋早陸羽只將陶與謝終日可忘情不欲多相識逢人懶道名五言戲呈薛彛山僧不厭野才子㑹須狂何處銷君興春風擺緑楊五言贈顔主簿漢家儀禮盛名教出諸顔更見尚書後能文在子山五言贈融上人常愛西林寺池中月出時芭蕉一片葉書取寄吾師五言聽寒更寄朱兵曹巨川欹枕聽寒更寒更發還住一夜千萬聲㡬聲到君處五言早春書懐寄李少府仲宣并序予故里在長城卞山㫺嵗屬狂宼䧟沒江左親故離散永望枌梓不覺傷懐因李使君長城遂寄是詩以見情也早年初問法因悟目中花忽值胡雛起芟夷若亂麻脱身投彼岸弔影念生涯跡與空門合心將世路賖東田已蕪沒東部公有東田詩南澗益傷嗟秣陵記曰南澗竭謝氏滅崇替驚人事凋殘感物華知君過我里惆悵舊煙霞七言贈和評事判官廷評年少法家流心似澄江月正秋學究天人知逺識權分鹽鐡許良籌春風憶酒烏家近好月論禪謝寺幽清白比来誰見賞憐君獨有富人侯七言酬秦系山人題贈雲林出空烏未歸松吹時飄雨浴衣石語花愁徒自苦吾心見境盡為非七言酬秦系山人戲贈正論禪寂忽狂歌莫是塵心顛倒多白足行花曾不染黄嚢貯酒欲如何七言貽李湯茅氏常論七真記壺公愛説三山事寧知梅福在人間獨為蒼生作仙吏日服丹砂骨自清膚如氷雪心更明山中玉筍是仙藥袖裏素書題養生願隨黄鶴一輕舉仰望青霄獨延佇平生好駿君已知何必山陰訪王許七言述祖徳贈湖上諸沈我祖文章有盛名千年海内重嘉聲雪飛梁苑操竒賦梁苑出惠連公雪賦春發池塘得佳句康樂云池上樓詩夢惠連方得池塘生芳草之句世業相承及我身風流自謂過時人初看甲乙矜言語對客偏能鴝鵒舞尚公少年善焉飽用黄金無所求長裾曵地干王侯一朝金盡長裾裂吾道不行計亦拙嵗晚髙歌悲苦寒空堂危坐百憂攅昔時軒葢金陵下何處不傳沈與謝田公與約俱是西邸八支綿綿芳藉至今聞眷眷通宗有數君誰見予心獨飄泊依山寄水似浮雲七言舟行懐閻士和二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲兩三片七言贈張道士玉京真子名太一因服日華心如日此心不許世人知只向仙宮未曾出七言戲呈呉馮世人不知心是道只言道在他方妙還如瞽老望長安長安在西向東笑雜言宿山寺寄季中丞洪偶来中峰宿閑坐見真境寂寂孤月心亭亭圓泉影闕滿山花落始知靜従他半夜愁猿驚不廢此心長杳㝠雜言戲贈呉馮予讀古人書遂識古人面不是識古人邪正心自見貴義輕財求俗譽一錢與人便驕倨昨朝為火今為氷此道非君獨撫膺五言感興贈烏程李明府伯宜兼簡諸秀才門前峴山近無路可登陟徒愛峴山髙仰之常歎息不如松與桂生在重巖側五言晚秋宿李軍道所居清溪路不遥都尉每相招落日休戎馬秋風罷射鵰术花生野徑栢實滿寒條永夜依山府禪心共寂寥杼山集巻二
