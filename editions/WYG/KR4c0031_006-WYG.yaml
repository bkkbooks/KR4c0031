body:
  text: 杼山集巻六唐釋皎然撰五言従軍行五首雙騎出紛紛元戎霍冠軍漢鞞秋聒地羌火書燒雲萬里戈城合三邊羽檄分烏孫驅未盡肯顧遼陽勲韓斾拂丹霄漢軍新破遼紅塵驅鹵簿白羽擁嫖姚戰苦軍猶樂功髙將不驕至今丁零塞朔吹空蕭蕭百萬逐呼韓頻年不解鞍兵屯絶漠暗馬飲濁河乾破敵功未録勞師力巳殫須防肘腋下飛禍出無端飛將下天来竒謀閫外裁水心龍劍動地肺鴈山開望氣燕師鋭當鋒敵陳摧従今射鵰騎不敢過雲堆黄紙君王詔青泥校尉書誓師張虎落選將擐犀渠霧暗津蒲失天寒塞栁疎横行千萬騎欲掃塞塵餘五言隴頭水二首隴頭水欲絶隴水不堪聞碎影揺槍壘寒聲咽慢軍素従鹽海積緑帶栁城分日落天邊望逶迤入塞雲秦隴逼𤣥羌征人去未央如何幽咽水併欲斷君腸西注悲窮漠東分憶故鄉旅魂聲攪亂無夢到咸陽七言塞下曲二首寒塞無因見落梅羌人吹入笛聲来勞勞亭上春應度夜夜城南戰未廻都䕶今年破武威塵沙萬里鳥空飛旄竿瀚海掃雲出氊騎天山踏雪歸五言覽史黄綺皆皓髪秦時隠商山嘉謀匡帝道髙步遊天關不愛珪組紲却思林壑還放歌長松下日與孤雲閒五言詠史獨負髙世姿㝠㝠寄浮俗卞子去不歸何人辯荆玉鬻舂意不淺汚迹身豈辱鸞鎩樂迍邅虬蟠甘窘束五噫譎且正可以見心曲雜言詠史田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問髙車與珠履何如卑賤一書生五言讀張曲江集相公乃天葢人文佐王成立程正頽靡繹思何縦横春杼弄緗綺陽林敷玉英飄然飛動姿邈矣髙簡情後輩驚失步前修敢爭衡始忻耳目逺再使機慮清體正力已全理精識何妙昔年歌陽春徒推郢中調今朝聽鸞鳯豈獨羨門嘯帝命鎮雄州待濟寄上流才兼荆衡秀氣助瀟湘秋逸蕩子山疋經竒文暢儔沉吟未終巻變態紛難數曜耳代明璫襲衣同芳杜愔愔聞玉磬寤寐在靈府五言奉詶陸使君見過各賦院中一物得江蘺江蘺生古砌花每落禪床嘉客未採掇空門自馨香名因詩目見色對道心忘不遇陸内史誰知殊衆芳五言賦得謝墅送王長史其墅即晝七代祖呉興守舊居世業西山墅移家長我身蕭疎遺樹老寂寞廢田春車巷傷前轍蘺溝憶舊隣何堪再過日更送北歸人五言夏日同崔使君論登城樓賦得逺山逺山湖上小青翠望依稀纔向窗中列還従林表微色濃春草在峰起夏雲歸不是蓬莱島如何人去稀五言詠數探得七鄒子談天嵗黄童對日年求真初作傳鍊魄巳成仙鶴駕迎緱嶺星橋下蜀川逢君竹林客相對弄清絃五言奉同顔使君真卿送李侍御蕚賦得荻塘路落日車遥遥客心在歸路細草暗囘塘春泉縈古渡遺蹤歎蕪没逺道悲去住寂寞荻花空行人别無數五言賦顔氏古今一事得晉仙傳送顔逸梁湘東王國常侍顔協著晉仙傳五篇曾看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春畱鬢髪白日向雲烟逺别賫遺簡囊中有幾篇五言賦得石梁泉送崔逵架石通霞壁懸崖散碧沙天晴虹影渡風細練文斜舉陟幽期阻沿洄客意賖河梁非此路别恨亦無涯五言賦得夜雨滴空堦送陸羽歸龍山同字閑堦夜雨滴偏入別情中斷續清猿應淋漓候館空氣令煩慮散時與早秋同歸客龍山道東来雜好風五言賦得燈心送李侍御蕚光字燈心生衆草因有始知芳綵妓窗偏麗金桃動更香花驚春未盡焰喜夜初長别後空離室何人借末光五言賦得竹如意送詳師赴講青字縹竹湘南美吾師尚毁形仍畱負霜節不變在林青每入楊枝手因談貝葉經誰期沃州講持此别東亭五言聽素法師講法華經法子出西秦名齊漆道人纔敷藥草義便見雪山春䕶講龍来逺聞經鶴下頻應機如一雨誰不滌心塵五言詠􅆒上人座右畫松寫得長松意千尋數尺中翠陰疑背日寒色欲生風真樹孤標在髙人立操同一枝遥可折吾欲問生公五言夏日登觀農樓和崔使君片雨拂簷楹煩襟四坐清霏微過麥隴蕭散傍莎城靜愛和花落幽聞入竹聲朝觀趣無限髙詠寄深情五言妙喜寺逵公院賦得夜磬送呂評事一磬寒山至凝心轉清越細和虚籟盡疎繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别寂厯無性中真聲何起滅五言詠小瀑布瀑布小更竒潺湲二三尺細脉穿亂沙叢聲咽危石初因智者賞果㑹幽人迹不向定中聞那知我心寂五言仙女臺寂寂舊桑田誰家女得仙應無鷄犬在空有子孫傳古木花猶發荒臺路未遷暮来雲一片疑是欲歸年五言靈澈上人何山寺七賢石詩七石配七賢隠僧山上移石性殊磊落君子又髙竒跂禪服宜壊坐客冠可隳夜倚月樹影晝傾風竹枝集質患追琢表頑用磷緇佚火玉亦害塊然長在茲五言潘丞孩子愛子性情竒初生玉樹枝人曾天上見名向月中知我識嬰兒意何須待佩觿五言南池雜詠五首并序余草堂在池上洲昔栁呉興詩汀洲採白蘋即此地也左右雲山滿目一坐遂有終焉之志㑹廣徳中寇盜淮海騷動宵人肆志吾屬不安因賦南池五詠聊以自適水月夜夜池上觀禪身坐月邊虚無色可取皎潔意難傳若向空心了長如影正圓溪雲舒巻意何窮縈流復帶空有形不累物無迹去隨風莫怪長相逐飄然與我同虚舟虚舟動又靜忽似去逢時觸物知無迕為梁幸見遺因風到此岸非有濟川期寒山侵空撩亂色獨愛我中峰無事負輕䇿閒行躡幽蹤衆山揺落盡寒翠更重重寒竹裊裊孤生竹獨立山中雪蒼翠揺動風嬋娟帶寒月狂花不相似還共凌冬發度前溪不意入前溪愛溪従錯路清清鑒不足非是深難度望逺村林杪不可分水步遥難辨一片山翠邊依稀見村逺惜暮景踈隂花下動片景松梢度黄昏破梅信南枝漸噪烏待山月夜夜憶故人長教山月待今宵故人至山月君何在五言效古天寳十四年日出天地正煌煌闢晨曦六龍驅羣動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡扶桑枝渴死化爝火嗟嗟徒爾為空畱鄧林在折盡令人嗤雜言古别離代人荅閻士和太湖三山口呉王在時道寂寞千載心無人見春草誰識緘怨者持此傷懐抱孤舟畏狂風一夜宿烟島望所思兮若何月蕩漾兮空波雲離離兮北斷鴻眇眇兮南多身去兮天畔心折兮湖岸春風胡為兮塞路使我歸夢兮撩亂五言擬長安春詞春信在河源春風蕩妾魂春歌雜鶗鴂春夢繞轘轅春絮愁偏滿春絲悶更繁春期不可定春曲嬾新翻七言效古思君轉戰度交河强弄胡琴不成曲日落應愁隴底難春来定夢江南數萬丈游絲是妾心惹蝶縈花亂相續七言昭君自倚嬋娟望主恩誰知美惡忽相翻黄金不買漢宫貌青塚空埋胡地魂七言銅雀妓强開罇酒向陵看憶得君王舊日歡不覺餘歌悲自斷非關艶曲轉聲難七言長門怨春風日日閉長門揺蕩春心似夢魂誰遣花開只笑妾不如桃李正無言五言哭呉縣房聳明府仁人邁厚徳可謂名實全撫迹若疎曠㑹心極精研履危節詎屈廣徳初江南寇盜充斥賊通名宰長城縣屢至害而竟不就著論識不偏公著道性論一篇恨以榮級淺嘉猷未及宣伊人期逺大志業難比肩昭世既合并吾君籍陶甄奈何明明理與善徒空詮徵教或稽聖窮源反問天一官自呉邑六翮委江壖始是牽絲日翻成撤瑟年金膏果不就房公昔日就沈道士學長生之術書以佛理難之玉珮長此捐倚伏信㝠盻夭脩驚後先安知忘情子愛網素已褰為有深仁感遂令真性遷心悲空林下淚灑秋景前夫子寡兄弟撫孤傷藐然傾雲為慘結弔鶴共聯翩割念命歸駕訣詞向空筵樹桃陰始合愛客位常懸幡然逺行時崇望歸朝旋悟茲歡宴隔哀被嵗月延書帶變芳草履痕移緑錢㝠期儻可逢生盡㑹無縁王坦之與生法師為㝠期前死者歸報其罪福幸願示因業代君運精專沈約死後㝠中見十因師云師急為我造經捨我苦難相思轉寂寞獨往西林泉欲見故人心時閲所贈篇素髙陶靖節今重楚先賢芳躅將遺愛可為終古傳五言哭覺上人憶君南適越不作買山期昨得耶溪信翻為逝水悲神交如可見生盡杳難思白日東林下空懐步影時五言題餘不溪廢寺武原離亂後真界積塵埃殘月生秋水悲風起故臺居人今已盡棲鴿暝還来不到無生理應堪賦七哀五言同李洗馬入餘不溪經辛將軍故城慘慘寒城望將軍下世時髙墉暮草遍大樹野風悲壁壘今惟在勲庸近可思蒼然古溪上川逝共悽其五言憶天台箬溪朝雨散雲色似天台應是東風便吹従海上来靈山遊汗漫仙石過莓苔誤到人間世經年不早廻五言萬囘寺萬里稱逆化愚惷性亦全紫紱拖身上妖姬安膝邊見他拘坐寂故我是眠禪吾知至人心杳若青㝠天五言禪詩萬法出無門紛紛使智昬徒稱誰氏子獨立天地元實際且何有物先安可存須知不動念照出萬重源五言哀教本師不得已强為我著書知盡百慮遣名存萬象拘如何工言子終日論虚無伊人獨㝠㝠時人以為愚五言聞鐘古寺寒山上逺鐘揚好風聲餘月樹動響盡霜天空永夜一禪子泠然心境中五言溪上月秋水月姢姢初生色界天蟾光散浦溆素影動淪漣何事無心見虧盈向夜禪五言山雪夕陽在西峰疊翠縈殘雪狂風巻絮廻驚猿攀玉折何意山中人誤報山花發雜言江上風江風西復東飄暴忽何窮初生虚無際稍起蕩漾中應吹夏口檣竿折定蹙湓城浪花咽今朝莫怪沙岸崩昨夜聲狂巻成雪雜言山雨一片雨山半晴長風吹落西山上滿樹蕭蕭心耳清雲鶴驚亂下水香凝不然風廻雨定芭蕉濕一滴時時入晝禪雜言問遥山禪老天與松子夀獨飲日月精復令顔子賢胡為天其生吾將尋河源上天問天何不平吾將詰仙老大道無私誰强名仙老難逢天不近世人何人解應盡明朝欲向趐頭山問取禪公此義還五言禪思真我性無主誰為塵識昏奈何求其本若拔大木根妄以一念動勢如波翻傷哉子桑扈蟲臂徒虚言神威與外論宗邪生異源空何妨色在妙豈廢身存寂滅本非寂諠譁曽未諠嗟嗟世上禪不共智者論七言支公詩支公養馬復養鶴率性無機多脱畧天生支公與凡異凡情不到支公地得道繇来天上仙為僧却下人間寺道家諸子論自然此公唯許逍遥篇山陰詩友喧四座佳句縱横不廢禪七言述夢夢中歸見西陵雪渺渺茫茫行路絶覺来還在剡東峰鄉心繚繞愁夜鍾寺北禪岡猶記得夢歸長見山重重七言赤松縁㟁蒙籠出見天晴沙瀝瀝水濺濺何處羽人長洗藥殘花無數逐流泉七言戲題松樹為愛松聲聽不足每逢松樹遂忘還翛然此外更何事笑向閒雲似我閒七言戲題二首看飲逢歌日屢曛我身何以繫浮雲時人不解野僧意歸去溪頭作鳥群喧喧共在是非間終日誰知我自閒偶客狂歌何所為欲於人事强相關五言雜寓興嗟嗟號呶子世稱謫仙儔媚俗被蛟綃欺天薦昫脩奔景謂可致馳齡言易留燕昭昧徃事嬴政亡前籌三山果不見九仙忽悠悠君看牛山樂君見麋浦遊昨日千金子聯綿成古邱居將攬明月照爾生死流至樂亭爰居慙貽達者尤㝠㝠光塵内機喪成海漚五言雜興六首吾觀談天客工言喪其精萬物資廣庇此中何有情若為昧顔跖修短怨太清髙論讓鄒子放詞徵屈生請從象外推至論尤明明短齡役長世擾擾悟不早嬪女身後空歡娯夢中好從教西陵樹千載傷懐抱鶴駕何㝠㝠鼇洲去浩浩柔顔感三花凋發悲蔓草月中伐桂人是誰翻使年年不衰老誰髙齊公子泣聽雍門琴死且何足傷殊非達人心獨髙庭中鶴意逺貴氛埃有時青㝠遊顧我還下来白雲琅玕色一片生虚無此物若無心若何巻還舒疎散遂吾性栖山更無機寥寥髙松下獨有閒雲歸精意不可道㝠然還掩扉五言偶然五首樂禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂偶然寂無喧吾了心性源可嫌蟲食木不笑鳥能言隠心不隠迹却欲住人寰欠樹移春樹無山看畫山居喧我未錯真意在其間禪語嫌不學梵音従不翻説禪顛倒是樂殺金王孫真隠須無矯忘名要似愚只將兩條事空却漢潛夫五言問天天公何時有談者皆不經誰道賢人死今為傅説星五言寓言吾道本無我未曾嫌世人如今到城市彌覺此心真五言前溪作春歌已寂寂古水自涓涓徒誤時人輩傷心作逝川五言戲作乞我百萬金封我異姓王不如獨悟時大笑放清狂雜言浮雲三章并序浮雲刺讒也葢取夫盛明之時為浮雲所䝉非不明也小人比於君側讒言熒惑亦如浮雲之害明覽古史極觀君臣之際敗亡之兆生於讒慝遂作是詩浮雲浮雲集于扶桑扶桑茫茫日暮之光匪日之暮浮雲之汙嗟我懐人憂心如蠧浮雲浮雲集于咸池咸池微微日􅉴之時匪日之昊浮雲之惑嗟我懐人憂心如織浮雲浮雲集于髙舂髙舂濛濛日夕之容匪日之夕浮雲之積嗟我懐人憂心如慗七言寓言人生百年我過半天生才定不可換東海釣鼇鼇不食南山坐石石欲爛五言若邪春興春生若邪水雨後漫流通芳草行無盡清源去不窮野烟迷極浦斜日起微風數處乗流望依稀似剡中五言晨登樂遊原望終南積雪凌晨擁弊裘徑上古原頭雪霽山疑近天髙思若浮瓊峰埋積翠玉嶂掩飛流曜彩含朝日揺光奪寸眸寒空標瑞色爽氣襲皇州清眺何人得終當獨再遊杼山集巻六
