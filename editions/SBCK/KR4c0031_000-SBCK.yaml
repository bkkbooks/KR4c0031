front:
  text: 敕浙西觀察使牒湖州
  hash: sha256:2dcb28d279731350d4d17a77dda08c22f4013ab85b3e589d66216f844c58f814
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_000-1a}
body:
  text: 當州皎然禪師集牒得集賢殿御書院牒前件集庫内無本交闕進奉牒使請速寫送院訖垂報者牒州寫送使者故牒貞元八年正月十日牒都團練副使權判兼侍御史李元使潤州刺史兼御史中丞王緯呉興晝上人集序朝議郎大夫守湖州刺史于頔􅁧詩自風雅道息二百餘年而騷人作其㫖愁思其文婉麗亡楚之變風歟至西漢李陵蘇武始全為五言詩體源扵風流於騷故多憂傷離逺之情梁昭明所􅁧文􅃟録古詩十九首亡其名氏觀其詞葢東漢之世亦李蘇之流也洎建安中王仲宣曹子建鼓其風晉世陸士衡潘安仁􅀭其波王曹以氣勝潘陸以文尚氣勝者魏祖興武功扵二京巳覆文尚者晉武亡帝圗於五胡肇亂觀其人文興亡之蹟人焉瘦哉人焉瘦哉宋髙祖平桓玄定江表文帝􅁇業五十年間江左寧謐魏晉文章鬰然復興康樂侯謝靈運獨歩江南俯視潘陸其文炳而麗其氣逸而暢驅風雷於江山變晴昏於洲渚烟雲以之慘淡景象為其澄霽信江表之文英五言之麗則者也迨于齊世宣城守謝玄暉亦得其詞調涵於氣格不侔康樂矣梁陳巳降雖作者不絶而五言之道不勝其情矣有唐呉興開士釋皎然字清晝即康樂之十世孫得詩人之奥㫖傳乃祖之菁華江南詞人莫不楷範極扵緣情綺靡故詞多芳澤師古典制故律尚清壮其或􅀤朙玄理則深契眞如又不可得而思議也貞元壬申􅀊余分刺呉興之眀年集賢殿御書院有命徴其文集余遂而編之得詩筆五百四十六首分為十卷納扵延閣書府上人以余嘗書述論前代之詩遂託余以集序辭不􅀗巳畧志其變上人之植性清和禀質端懿中秘空寂外開方便玅言説於文字了心境扵定慧又釋門之慈航智炬也余游方之内者何足以扣玄􅀜謝氏世為詩人豈佛書所謂習氣云爾
  hash: sha256:47ccdd6dea7c78ada01f94d0a53ee66445eb4a96b6433f00d0fb588d6676cf47
