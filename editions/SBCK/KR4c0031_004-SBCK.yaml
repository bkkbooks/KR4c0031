front:
  text: 晝上人集卷第四
  hash: sha256:d3a2d7f8a692332957c5ba96fae08d69e109d85c2318be5a67f870d0f961d59d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_004-1a}
body:
  text: 呉興釋皎然五言送梁拾遺肅歸朝眀主重文諫才臣出江東束書辤東山改服臨北風萬里望皇邑九重當曙空天開芙蓉闕日上蒲桃宫天子初未起金閨籍先通身逢軒轅丗名貴鵷鸞中故人榮此别何用悲絲桐奉陪楊使君頊送叚校書赴南海幕碩賢静廣州信為天下貞屈玆大將佐藉彼延閣英聲動栁呉興郊餞意不䡖吾知叚夫子高論􅀜蒼生處以徳為籓出則道可行遥知南樓㑹新景當詩情天髙林瘴洗秋逺海色清時㤗罷飛檄唯應頌功成五言送陸侍御士佳赴上京長安三千里喜行不言永清路黄塵飛大河滄流靜更懷四川府主公昔和􅂦伊鬰瑶瑟情威遲花騘影此時已難别日又無停景出餞闕相從心隨過前嶺五言奉陪顔使君真卿登峴山送張侍御嚴歸堂峴首千里情北轅自兹發烟霞正登覽􅆪筆限趨謁黃鶴望天衢白雲歸帝闕客心南浦栁離思西樓月留賞不延景感時方易歇他晨有山信一為訪林樾五言酬元主簿子球别贈故人方逺適訪我陳别情此夜偶禪室一言了無生覽君緘中寳如搴青玉瑛胡為藴髙價􅀊晚徒營營辤秩貧且病何人見艱貞出無黄金槖空􅁔白苧行威遲䇿駑馬獨望故􅀜􅀣􅄅渺千里心春風􅁸中路近聞新拜命鸞鳯猶棲􅁄勸君寄一枝且飬冥冥翼甘泉多竹花眀年待君食畣道素上人别春色遍逺道􅄫寞閩中行碧水何􅄅渺白雲亦英英離人不可望日暮芳洲情黄鶴有逸翮翹白雲傾欲為山中侣肯􅀻遼天聲藍縷真子􅄄葳㽔近臣纓以兹奪爾懷常恐道不成吾門弟子中不减恵休名一性研巳逺五言功更精從君汗澷㳺莫廢學無生忍草肯揺落禅枝不枯榮采采慰長路知吾心不䡖幻情有厺住真性無離别留取老桂枝歸来共攀折霅谿館送韓明府章辤满歸洛令從告還故人東門餞恵愛三年積軒車一夜逺曉月離館空秋風故山晩榮君有佳薦􅂅我阻逰衍􅀫㫺峯頂心依依不可卷送穆􅄫赴舉天子􅃬玄纁傾山禮􅀮淪君抛青霞厺榮資觀國賔劒光既陸離瓊彩何璘珍夙駕別情逺啇弦秋意新冥冥鴻鵠姿數尺看蒼旻殘㓂近宋郊西行惡颷塵立身素耿介䖏難思􅀴綸春府搜才日髙科得一人送張仲􅃔歸長沙早聞凌雲彩謂在鴛鷺儔華髮始相遇滄江仍旋逰䇿名忘苟進澹慮䡖􅀁求常服逺逰戒緬懷􅀴丗謀片㠶背風渚萬里還湘洲别望荆雲積歸心漢水流蘭苕行采采桂棹思悠悠􅀫㫺無機者為君動離憂秋日昆陵南寺送潘述之􅀭州􅀌客秋易傷嘶蟬静仍續佳辰亦巳屢歡㑹常不足禪地非路岐我心豈拘束情生逺别時坐恨清景促望中千里隔暮歸西山曲蕭條月中道彩蒨原上緑不見同心人幽懐増躑躅春日又送潘述之揚州别渚望䢴城岐路春日遍柔風吹楊桞芳景流郊甸日日東林期今夕異郷縣文房曠佳士禪室阻清眄潘生曽受禅印離恨奪賞心不得諧􅀁􅂅莫憶山中人碧雲遥可見新秋送盧判官故人念􅀫昔欲别増逺情入座炎氣屏為君秋景清由来空山客不怨離弦聲唯有暮蟬起相思碧雲生奉送袁髙使君詔徴赴行在効曹劉體皇心亭毒廣蝥賊皆陶甄未刈蚩尤旗方同軒后年天子幸漢中轘轅阻氛烟璽書召英牧名在列岳仙國難􅀝長城廟謨資大賢清損休汝騎仁留述職篇遐路􅄅天末繁笳思何􅁁飾徒促逺期祗命赴急宣謏才豈足稱深仁􅂅何偏那堪臨流意千里望旗旃奉送陸中丞長源詔徴入朝詔下鄼侯幕徴賢寵上勲才當持漢典道可致堯君藩牧今榮餞詩流此盛文水從呉渚别樹向楚門分􅀫寺期嘉月看山識故雲歸心復何託惆悵在江濆奉送中丞道昌入朝文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新銜鳳車看舊飾熊去思今武子餘教昔文翁清在如江水仁留是國風光徴二千石掃苐望司空奉送顏延之眀府撫州覲􅅩父臨川千里别惆悵上津橋日暮人歸盡山空雪未銷鄊雲心􅄅渺楚水路遥遥林下方歡㑹山中獨􅄫寥天寒驚㫁雁江信望廻潮􅀊晩流芳歇思君在此宵五言送􅀜小師還金陵如何有歸思愛别欲忘難白鷺汀沙晚青龍水寺寒蕉花鋪淨地桂子落空壇持此心為境應堪月夜㸔五言峴山送裴秀才赴舉漢家招秀士峴上送君行萬里見秋色兩河傷逺情王師出西鎬虜冦避東平天府登名後􅅆㸔楚水清五言酬别襄陽詩僧少徴詩中荅上人歸夢之意證心何有夢示說夢歸頻文字齎秦本詩騷學楚人蘭開衣上色栁向手中春别後須相見浮雲是我身五言送􅆻上人逰􅀭州西陵古江口逺見東􅀭州渌水不同泛春山應獨逰尋僧白巖寺望月謝家樓􅀫昔心期在人寰非乆留五言送沈秀才之閩中越客不成􅁔春風起渌波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何五言送徳清衛眀府赴選時栁黜陟有薦状八使慎求能東人獨薦君身猶千里限名巳九霄聞逺路翻喜别離言暫惜分鳯門多士㑹擁佩入卿雲五言送鄭孝亷淮西覲省離袂翠華满晨羞欲早行春風生楚樹曉角發随城野靄濕衣綵江鴻増客情征途不用戒坐見白波清五言送清㑹上人逰佳逰限衰疾一􅀏向西風思見青門外曽臨素滻東峰眀雲際寺寺名日出霧寒宫宫名行道禪長在香塵不染空五言送居士還太原辤郷因丗難家族盛南朝名重郊居賦沈休文之作郊居賦才髙獨酌謡沈文子作浪花飄一葉峰色向三條髙逸雖成性弓旌肯望招奉同顔使君真卿峴山送李法曹陽冰西上獻書時㑹有詔徴赴京漢日中郎玅周王太史才雲書捧日厺鶴版下天来草見呉洲發花思御苑開芉公惜風景欲别㡬遲徊五言兵後送姚太祝赴選兩河兵巳偃䖏䖏見歸舟日夜故人散江皋芳􅀣秋楚雲傷逺思秦月憶佳逰名動春官籍翩翩才少儔五言兵後送薛居士移家安吉舊逰經䘮亂道在復何人寒草心易折閒雲性常真交情别後見詩句比来新向我挑州住惜君東嶺春五言送鄔傪之洪州覲兄弟年少足詩情西江楚月清書嚢山翠濕琴匣雪花䡖久别經離亂新正憶弟兄贈君題樂府為是豫章行五言送乾封李成羽檄飛来息離情逺近同感君由泛瑟􅀜我是征鴻􅄅黙歸人盡踈蕪夜渡空還期當􅀊晩獨在路行中五言送崔判官還􅀭子䡖傳秪逺役依依下姑亭秋聲满􅀭栁暮色繞郊坰烟水揺歸思山當楚驛青奉酬􅀽使君西樓送秦山人與晝同赴李侍御招三韻秋風怨别情江守上西城竹署寒流淺琴窓􅀫雨晴治書招逺意知共楚狂行送清凉上人何意欲歸山道髙由境勝花空覺性了月静知心證永夜出禪吟清猿自相應送李丞使宣州結駟何翩翩落葉暗寒渚夢􅂻春穀泉愁中洞庭雨聊持剡山茗以代宣城醑五言送至洪沙門逰越知爾學無生不應傷此别相逢􅀫我寺獨徃逰靈越早晚花㑹中經行剡山月七言送皇甫侍御曽還丹陽别業雲陽别夜憶春耕花發菱湖問厺程積水悠􅀭何䖏夢亂山稠疊此時情􅀅離有月教弦㫁贈逺無蘭􅁴意䡖朝右要君持漢典眀年北墅可須營白蘋洲送洛陽李丞使還蘋洲北望楚山重千里􅅆軺止一封臨水情來還共載㸔花醉厺更相從罷官風渚何時別寄􅀮雲陽㡬䖏逢後㑹那應似疇昔年年覺老雪山容送􅂂霜上人還金陵西山攜錫西山歩緑莎禪心未了奈情何湘宫水寺清秋夜月落風悲松柏多送辨聦上人還廣陵莫學休公學逺公了心須與我心同隋家古栁數株在㸔取人間萬事空送清勵上人逰福建禪子自矜禪性成􅀅来擬照建谿清南看閩􅀣花不落更取何縁了妄情送顧道士逰洞庭山見說洞庭無上路春逰亂踏五靈芝含桃風起花狼籍正是仙翁碁散時送邢台州濟海上仙山屬使君石橋琪樹古来聞他時􅀞出白􅇛扇乞取天台一片雲送栁察諫議􅅩東城南陌強經過怨别無心亦放􅁔眀日院公應問我閒雲長在石門多送栁淡扶侍赴洪州此子素少官情共予有西山之好中林許師友忽阻夙心期自顧青緺好來􅀅黄鶴詞少年䡖逺涉丗道得無欺烟雨􅀌舟上晨昏千里時離魂􅄅天末相望在江湄無限江南栁春風卷亂􅁝同李司直縱題武丘寺兼留諸公與陸羽之無錫陵寝成香阜禪枝出白楊劒池留故事月􅀣即他方應丗縁須别栖心􅃐不忘還􅀅陸居士晨􅀤泛歸航夏日題鄭谷江上納凉館迢遥山意外清風又對君若為扵此地翻作路岐分别館琴徒語前洲鶴自群眀朝天畔逐何䖏逐閒雲太湖館送殷秀才赴舉春風洞庭路揺落暮天多衰疾見芳草别離傷逺波詩名推首薦賦甲擬前科數日聞天府山衣製芰荷送重鈞上人逰天台漸看華頂出幽意尚随生十里行松色千重過水聲海容雲正盡山態雪初晴事事將心證知君道可成早春送顔主簿逰越東兼謁元中丞䡖軻􅃐不巳東風吹緑蘋欲看梅市雪知賞栁家春别意傾呉醑芳聲動越人山隂三月㑹内史得嘉賔同顔使君清眀日逰因送蕭主簿誰知賞佳節别意忽相和暮色汀洲遍春情楊栁多髙城戀旌斾極浦􅀫風波惆悵友山月今宵不再過送道琚上人還金陵一與鍾山别山中得信稀􅀴年求㳒後及夏問安歸野實充甘膳池花當彩衣慈親莫返拜外禮欲無爲送裴邕之上京辤山偶世清挾䇿忽西行帆過隋江疾衣霑楚雪䡖尚文須獻賦重道莫論兵東觀今多事應髙白馬生送珍上人還天竺兼寄廣通上人秦山人江寺名天竺多君躡逺蹤春帆依栁浦䡖􅂂上蓮峯禪子兼三􅀮空書共一封因君逹山信應向白雲逢送張孝廉赴舉名在諸生右家􅀴見素風春田休學稼秋賦出儒宫别路殘雲濕離情晚桂叢眀年石渠署應􅁇􅅩孫通送劉司㳒之越州蕭蕭鳴夜角驅馬背城濠雨後寒流急秋来朔吹髙三山期望海八月欲觀濤㡬日西陵路應逢謝㳒曺送簡栖上人之建州覲使君舅亂峰江上色羡爾及秋行釋氏推真子郗家許貴甥氎花新雨淨帆葉好風䡖海人以木葉為帆千里以元舅􅅆潮亦有情登開元寺樓送雀少府還平望驛登望思慮積長亭􅀣連連悠􅀭下樓日杳映􅅖帆烟入夜四郊静南湖月待船送王居士㳺越野性配雲泉詩情屬風景愛作爛熳逰間尋東路永何山􅇰好望須上蕭然嶺雜言重送皇甫侍御曽人獨歸日􅀅暮􅀌帆􅅁􅀌嶼逺水連逺􅀣難作别時心還看别時路送大寳上人歸楚山猒上烏橋送别頻湖花爛熳望行人欲將夜舸陪嘉月肯住空林伴老身獨鶴翩翻飛不定歸雲蕭散㑹無因從何得道懐惆悵莫是人間屢見春送演上人之撫州覲使君􅅩臨川内史憐諸謝爾在生縁比惠宗逺別應捋秦本厺幽尋定有楚僧逢停船夜坐親􅀌月把錫秋行入亂峰便道須過太守寺白蓮池上訪髙蹤送侯秀才南逰芳草随君自有情不􅀜山色與猿聲為看嚴子灘頭石曽憶題詩不着名别洞庭維諒上人白雲􅀜我不􅀜他此物留君情􅇰多情着春風生橘􅀣歸心不怕洞庭波康造録事宅送太祝姪之䖍􅁻訪兄弟阮咸别曲四座愁頼是春風不是秋澷澷江行訪兄弟猿聲㡬夜到蘆洲冬日梅谿送裴方舟之宣州平眀匹馬上村橋花􅀤梅谿雪未銷日短天寒愁送客楚山無限路遥遥送韋向睦州謁獨􅀌使君汜才子南㸔多逺情閒舟蕩􅃞任春行新安江色長如此何似新安太守清送至嚴山人歸山􅀄到人間栁始隂山書昨夜報春深朝朝花落㡬株􅀣惱殺禪僧未證心送僧逰􅀭州平眀擇鉢向風輕正及隋隄栁色行知爾禪心還似我故宫春物可傷情晝上人集卷第四
