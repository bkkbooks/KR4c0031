front:
  text: 晝上人集卷第三
  hash: sha256:0cc72a6ea5539b08a157b7435d8a8e74d7974441715b3db6c07c55b99985a938
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_003-1a}
body:
  text: 呉興釋皎然五言奉和顏使君眞卿與陸䖏士羽登玅喜寺三癸亭即陸生所創秋意西山多列岑縈左次繕亭歴三癸䟽趾隣竹寺元化􅀮靈蹤始君啓髙誄誅榛飬翹楚鞭草理芳穂俯砌披水容逼天掃峯翠境新耳目换物逺風烟異􅀝石忘丗情援雲得真意嘉林幸勿翦禪侶欣可庇衛㳒大臣過佐逰群英萃龍池護清澈虎節到深􅃉徒想􅌘頂期于今沒遺記五言奉陪陸使君長源裴端公樞奉逰東西武丘寺雲水夾􅀟刹遥疑湧平陂入門見藏山元化何由窺曵組探詭恠停騘訪幽竒情髙氣爲爽徳煖春亦随瑶草自的皪􅈍樓爭蔽虧金精落壊陵劒彩沉靈池一覽帀天界中峯歩未移應嘉生公石列坐援松枝五言奉和陸使君長源夏月逰太湖此時公權領湖州􅁃公心曠逺府事局耳目遂與南湖逰􅁭滌煩燠始知皇天意積水在亭育細流信不讓動物欣􅀁蓄萬頃合天容洗然無雲族峻蒨矚仙嶺神仙􅀓洞庭神仙所居也超遥隨眀牧知公愛澄清波静氣亦肅巳見横流極况聞長鯨戮㑹北使至王師巳􅀵長安中洲暫採即栁惲汀洲採白蘋之意也南郡思剖竹公時改授信州向夕分好風飄然送歸舳五言奉和崔中丞使君論李侍御登爛柯山􅀫石橋寺効小謝體常愛謝公郡幽期􅂅相從果廻青騘臆共躡玄仙蹤靈境若彷彿爛柯思再逢飛梁丹霞接古局蒼菭封徃想冥昧理誰親氷雪容􅈍樓聳空界蓮宇開中峰今為仙寺普是仙山遺局古橋昇仙之處見在昔化冲虗鶴今藏護㳒龍雲窺香􅀣沓月見色天重永夜寄幽􅄫清言滌心􅎍盛逰千年後書在巖中松五言同顏使君真卿李侍御蕚逰㳒華寺登鳯翅山望太湖􅀟峰開􅃫翅秀出南湖州地􅀔抱郊􅀣山威増郡樓正逢周柱史来㑹魯諸侯緩歩凌彩蒨清鐃􅀤颼飀披雲得靈境拂石臨芳洲積翠遥空碧含風廣澤秋蕭辰資麗思髙論驚精修何似鍾山集徵文及恵休五言奉陪陸使君長源諸公逰支硎寺寺即支公學道處嘗覽髙逸􅀓山僧有遺蹤佐逰􅁇雅篇嘉㑹何由逢塵世即下界色天當上峯春暉遍衆草寒色留高松繚繞彩雲合參差綺樓重瓊葩灑巾舄石瀃清心胸靈境若可託道情知􅀁從五言奉陪鄭使君諤逰太湖至洞庭山登上真觀却望湖水郡齋得無事放舟下南湖湖中見仙邸果與心賞俱不逺風物變忽如寰宇殊背雲視層厓别是登蓬壺突兀盤水府參差沓天衢􅅆瞻平蕪盡洪流豁中區氣吞江山􅀔色淨氛靄無靈長習水徳勝􅀔當地樞朝宗動歸心萬里思鴻途五言奉和􅀽使君髙郡中新亭㑹張練師晝㑹二上人置亭􅀮城堞事簡跡易幽公性崇儉素雅才非廣求􅅖檐竹雨清拂按杉松秋不移府中歩登兹如逺逰坐覺詩思髙俯知物伇休虚􅄫偶禪子逍遥親道流更聞臨川作下節安能酬五言奉和陸使君長源水堂納凉效曹劉體栁家陶暑亭意逺不可齊煩􅁭蕩朱絃髙歩援緑荑愛公满亭客来是清風攜瀅渟前谿上曠望古郡西六月正中伏水軒氣常凄野香襲荷芰道性親鳬鷖禪子顧恵林逸民重劉􅀺乃知髙丗量不以出處暌五言夏日奉陪陸使君長源公堂集府中自清逺六月高梧間寥亮泛雅瑟逍遥扣玄關嶺雲與人静庭鶴隨公閒動息諒兼遂兹情即東山五言伏日就湯評事衡湖上避暑大火方燥召停雲晝亦􅀵􅀅從賞心侣寸景難逺逰擁几苦炎伏出門望汀洲􅅆谿照軒宇廣陌臨梧楸釋悶命雅瑟放情思亂流更持無生論可以清煩憂五言奉和顏使君真卿修韻海畢㑹諸文生東堂重校外學宗碩儒㳺焉從後進恃以仁恕廣不學門欄峻著書禆理化奉上表誠信探討始河圖紛綸歸海韻親承大匠琢况覩頽波振錯簡記鈆暫音籖閱書移玉鎮􅂚由旌不朽盛羙流􅁔引五言喜義興權眀府自君山至集陸處士羽青塘别業應難久辤秩暫寄君陽􅀮巳見縣名花㑹逢闈是粉本自尋人至寧因㸔竹引身關白雲多門占青山盡最賞無事心籬􅁁釣谿近五言夏日集李司直縱谿齋修景屬良㑹逺飈生煩􅁭泄雲收淨緑衆木積芳隂䟽滌府中務迢遥湖上心習閒得招我賞夜冝泛琴山近資性靜月来寄情深澹然若事外豈隨隳華簪五言夏日題桐廬楊眀府納凉山齋陶家無炎暑自有林中峰席上落山影桐梢􅅆水容放懐凉風至緩歩清隂重何事親堆桉猶多髙丗蹤五言和楊眀府早秋逰㳒華寺釋事出縣閤初聞兹山靈寺扉􅀮天色影刹遥丁丁碧峰委合沓香􅕃垂蓂苓清景為公有放曠雲邉亭秋賞石潭㓗夜嘉山月青誦空性不昧助道跡又經是以扵物理紛然若未形移来字人要全與此道冥五言􅀫道士觀古觀秋木秀泠然屬鮮颷瓊葩被修􅕃柏實满寒條影殿山􅄫􅄫寥天月昭昭幽期寄仙侣習定至中宵清佩聞虚歩真官方􅀫朝五言冬日天井西峰張錬師􅀁居採旅逢野泉漸見栖閒􅀁坎坎山上聲幽幽林中語仙卿何代􅀮郷服言亦楚開水淨藥苗掃雲候山侣零葉聚敗籬幽花積寒渚冥冥􅀌鶴性天外思䡖舉五言奉同顔使君真卿開元寺經藏院㑹觀􅀣文􅊋碑萬􅀦布殊私千年降祖師雁門􅀓㳒至龍藏立言時故實刋周典新聲播魯詩六銖那更拂刼石盡無期五言奉同盧使君㓜平逰精舍寺刹影西方在虚空翠色分人天霽後見猿鳥定中聞眞界􅀮青壁春山凌白雲今朝石門㑹千古仰斯文五言奉同顏使君真卿􅀽侍御駱駝橋翫月山中常見月不及共逰時水上恐􅀅缺林端愛落遲烏驚憲府客人咏鮑家詩永夜南橋望徘徊若有期五言奉和邢端公登春臺春望句句有春字之什春日繡衣䡖春臺别有情春烟間草色春鳥隔花聲春樹亂無次春山遥得名春風正飄蕩春甕莫須傾五言經仙人渚即沈山下古人沈義白日昇仙處日月人間短何時此得仙古山春巳盡遺渚事空􅀓不見騰雲駕徒臨洗藥泉如今成逝水翻使恨流年五言獨逰二首性野趣無端春晴路又乾逢泉岐石弄放鶴向雲㸔好僻誰相似從狂我自安芳洲亦有意歩上白沙灘又臨水興不盡虚舟可同嬉還雲與歸鳥若共山僧期世事吾不預此心誰得知西峰有禪老應見獨逰時五言逰谿待月谿色思泛月沿洄欲未歸殘燈逢水店踈磬憶山扉夜浦魚驚少空林鵲繞稀可中纔望見撩亂擣寒衣五言西谿獨泛道情何􅀁寄素舸澷流間真性憐高鶴無名羡野山經寒叢竹秀入靜片雲間泛泛誰為侣唯應共月還五言早秋陪韓眀府泛阮元公谿公嘗言禪功可入而官情詎能忘故詩中有此意􅃧之雨信清殘暑蕭條古縣西早凉生浦溆秋意满髙低前事雖堆案間情得泝谿何言戰未勝空􅄫用還齊五言九日顔使君真卿登水樓重陽荆楚尚髙㑹此難陪偶見登龍客同逰􅃧馬臺風文向水疊雲態擁􅁔􅅆持菊煩相問捫􅁭媿不才五言與盧孟眀别後􅀫南湖對月五湖生夜月千里满寒流曠望烟霞盡凄凉天地秋相思路􅆌眇獨夢水悠悠何處空江上徘徊送客舟五言自義亭驛送李長史後夜􅀫臨平東湖長亭賓馭散岐路起悲風千里懃王事驅車明月中寒生洞庭水夜度塞門鴻䖏䖏堪傷别歸来山又空五言出逰少時不見山便覺無竒􅃐狂發從亂􅁔情来任閒歩此心誰共證􅀏㸔風吹􅀣五言界石守風望天竺靈􅀮二寺山頂東西寺江中旦暮潮歸心不可到松路在青霄五言奉和顏使君修海韻畢州中重宴世學髙南郡身封盛魯􅀖九流宗韻海七字揖文江借賞雲歸堞留歡月在窓不知名教樂千載與誰􅀟五言晦日陪顔使君白蘋洲集南朝分古郡山水似湘東隄月呉風在湔􅅂楚客同桂寒初結斾蘋小欲成叢時晦佳㳺促高􅁔聴未終五言冬至日陪裴端公使君清水堂集亞􅀊崇髙宴華軒照渌波渚芳迎氣早山翠向晴多推徃知時訓書雲辨政和從公借日短留賞夜如何五言陪盧判官水堂夜宴暑氣當宵盡徘徊坐月前靜依山堞近凉入水扉偏久是栖林客初逢佐幕賢愛君高野意烹茗釣淪漣五言新秋同盧侍御薛貟外白蘋洲月夜隔暑蘋洲近迎凉欲泛舟榮從憲府至喜㑹夕郎㳺氣奪滄江色風吹汗澷流誰言三伏夜獨此月前秋五言夏日集裴録事北亭避暑前林夏雨歇為我生凉風一室煩暑外衆山清景中忘歸親野水適性喜雲鴻蕭散都曹吏還􅀅静者同五言與王録事㑹張徴君姉妹錬師院翫雪兼懷清㑹上人何意㢘從事還来㑹黙仙寒空驚雪遍春意入􅁔偏瑶草三花發瓊林七葉連飄颻過桞寺應满驛經前五言和李侍御蕚􅀊初夜集處士書閣書閣即侍御所創遲賢新置閣高意此郊居古徑行春早新窓見月初放􅁔還􅀝瑟講道亦􅀚書為我留禅位来逢此㑹踈五言湯評事衡水亭㑹覺禪師山侣相逢少清晨㑹水亭雪晴松葉翠烟煖藥苗青靜對滄洲鶴閒㸔古寺經應憐叩關子了義共心冥五言與朝陽山人張朝夜集湖亭賦得各言其志洞庭􅀌月在秋色望無􅁁零露積衰草寒螿鳴古田茫茫區中想􅄫􅄫塵外縁從此悟浮丗胡為傷暮年五言晦夜李侍御蕚宅集招潘述湯衡海上人飲茶賦晦夜不生月琴軒猶為開墻東􅀮者在淇上逸僧来茗愛􅀓花飲詩㸔卷素裁風流髙此㑹曉景屢徘徊五言寄昱上人上方居猒向人間住逢山欲􅂴歸片雲閒似我白日在禪扉地静松隂遍門空鳥語稀夜凉踈磬盡師友自相依五言夏日與綦母居士昱上人納凉為依鑪峰住境勝増道情凉日暑不變空門風自清坐援香實近轉愛緑蕪生宗炳青霞士如何知我名五言建元寺集皇甫侍御書閣不因居佛里無事得相逢名重朝端望身髙俗外蹤公愛講佛􅀴嘗云慕劉䖏士深詣至理機閒㸔淨水境􅄫聴踈鐘宣室恩長在知君志未從五言郭北㝷徐主簿别業近依城北住幽徑少人知積雪行深巷閒雲繞古籬竹花冬更發橙實晚仍垂還共巗中鶴今朝下渌池五言題報徳寺清幽上人西峯寺即陳文帝故郷陳丗凋亡後仁祠識舊山帝郷喬木在空見白雲還雙墖寒林外三陵暮雨間此中難􅀾勝君獨啓禪関五言題鄭谷江畔桐齋鄭生好琴性逹兼寡欲客齊開别住坐占緑江濆流水非外物閒雲嘗屬君浮榮未可累曠逹􅀂為群風起髙梧下清絃日日聞五言和閻士和李􅈍冬夜重集郡理日閒曠洗心􅀫香峰雙林秋見月萬壑靜聞鐘佩玉行山翠交麾動水容如何股肱守塵外得相從五言春日陪顏使君真卿皇甫曽西亭重㑹海韻諸生爲重南臺客朝朝㑹魯儒暄風衆木變清景片雲無峰翠飄檐下谿光照􅚋隅不􅀅簪艾隔知與道情俱五言寒食日同陸士行報徳寺􅀫解公房古寺章陵下潛公住㡬年安心生輭草灌頂引春泉􅄫􅄫􅀓燈地寥寥禁火天丗間多暗室白日為誰懸五言兵馬曺季良宅夜集清景不可失尋君􅃐有餘身髙避事後道長問心初出䖏名則異逰從跡何踈吟看刻盡燭􅀏卷讀殘書露彩生筆研風音入庭除平眀山侣散觳觫動􅅆車五言同李侍御萼李判官集陸䖏士羽新宅素風千户􅃻新語陸生能借宅心常逺移籬更弘釣絲初種竹衣􅅁近裁藤戎佐推兄弟詩流得友朋栁隂容過客花徑許招僧不為墻東􅀮人家到未曽五言題報恩寺惟照上人房上界雨色乾凉官日遲遲水文披菡萏山翠動罘罳中有清眞子愔愔歩閒墀手縈頗􅀺縷􅂅證黄金姿旋草階下生㸔心當此時亦名苾蒭草枝葉皆右旋故名旋草草有五徳七言尋天目徐君常見仙翁變姓名豈知松子號初平逢人不道徃来䖏賣藥還􅀅雞犬行獨鶴天􅁁俱得性浮雲世上共無情三花落盡君猶在􅀏撫安期昨日生七言同李著作縱題塵外上人院百縁唯有什公瓶万㳒但看一字經從遣鳥喧心不動任教香醉境常冥蓮花天漏浮雲捲貝葉官春好月停禪伴欲邀何著作空音冝向夜中聴七言題周諫别業予寺與周生所俱臨苕水􅀮身苕上欲如何不着青入水籬從破許船過昻藏獨鶴閒心逺􅄫歴秋花野意多若訪禪齋遥可見竹窓書幌共烟波七言同李中丞洪水亭夜集佳人且莫吹參差正憐月色生酒巵山公取醉不關我為愛尊前白鷺鷥七言題秦系山人麗句亭獨􅀅詩教領諸生但看青山不愛名满院竹聲堪愈疾亂牀花片足忘情七言春夜集陸處士翫月欲賞芳菲肯待辰忘情人訪有情人西林可是無清景祗為忘情不記春七言寄題雲門寺梵月無側房時人相􅀓是實月道人後身也越山千万雲門絶西僧㒵古還名月清朝掃石行道歸林下眠禪㸔松雪七言㳒花寺上方題江上人禪室路入松聲逺更竒山光水色共參差中峯禪􅄫一僧在坐對梁朝老桂枝五言冬日山行遇薛徴君我行倦修坂四顧無平陸雨霽鳴鷹鸇天寒聚麋􅎷幽人訪名士家在南岡曲菜實縈小園稻花繞山屋深居寡憂悔勝境怡耳目徴心尚與我永言謝浮俗雜言徃丹陽尋陸䖏士不遇逺客殊未歸我來㡬惆悵叩關一日不見人繞屋寒花􅀏相向寒花􅄫􅄫遍芳阡栁色蕭蕭愁暮蟬行人無數不相識獨立雲陽古驛􅁁鳯翅山中思本寺魚竿村口望歸船歸船不見見寒烟離心逺水共悠然他日相期那可定閒僧着䖏即經年五言集湯評事衡湖上望微雨蒼凉逺景中雨色縁山有雲送满洞庭風吹繞楊栁蕭蕭解䡖􅃑盡日随林叟五言九日與陸處士羽飲茶九日山僧院東籬菊也黄俗人多泛酒誰解􅂇茶香七言夜過康録事造㑹兄弟愛君門館夜来清瓊􅀣雙枝是弟兄月在詩家偏足思風過客位更多情晝上人集卷第三
