  text: 晝上人集卷第九
  hash: sha256:ab48dbcac07b7561538c92d2655c8a4e777c69ab443387423f4ec54507271c01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_009-1a}
body:
  text: 呉興釋皎然蘇州支硎山報恩寺㳒華院故大和尚碑并序我先大師曰佛嘉言孔碩大造人天張无生極宗懸衡扵群教之表自第一義諦皆我之蘧廬也况儒墨名㳒道家之流哉教之斯行咨乎哲匠今大師即其人也師諱道遵字宗逹呉興張氏之子崇勲茂徳世為呉中右族大師夙負殊操㓗士􅁛之榮耀不足􅀜其心聲塵未曽觸其性其年二十詣天竺威大師􅀄受具戒事報恩興大師首宗毗尼依佛教也常愀然而歎曰孔老之學不眀三世昭昭之業何異夫適郢而求㝠山哉先大師則不然觀萬象無根我獨以無生一念覆疑山之峻知四流妄有我獨以妄動二字停倒海之波室是逺而悟者天隔㫺在漢眀永平之際大教洋溢霈然而東與生靈滌心觀天地更始正士自摩騰巳降持㳒有如􅀜中者秉律有如南山者海内髦士亟歸乎我如凱風㣲􅀭嘉木先發齊恵文大師傳龍􅀣智論一性之教教即我釋伽如来九世祖師文殊􅀁承也恵文傳南岳南岳傳天台授一心三觀之㫖以十身佛刹㣲塵數修多羅如懸帝網不出正念無違即中盖如来一期教扃鐍也天下弘經之士窺我宗者不得其門而入天台厺世教傳章安章安傳縉雲縉雲傳東陽東陽傳左谿自龍􅀣巳還至天台四祖事具諌議大夫杜正論傳教記今大師則親承左谿一受心宗方造其極物有凋折而苦莭不衰時有晦眀至行不變㳒華三昧淵乎我􅂨甞從容謂門人曰堯舜之民不必獨義教之至也教若不至民何咎焉吾恐大教未周群機未發陷諸子扵邪見之網吾徒得無過乎乃欲廣冩㳒華經置道塲闢經院以燭繼景􅀭大雄慈聲盖平生之願歟一之日􅀤其心二之日䂓其址作不逾序厥功成焉居山之福地於􅃧群峰合沓以就我當大藏而􅀌峙疑天作以待用此持經之境也及以清晝山空杉吹不動真念凝乎􅄫寞經聲在乎窅㝠此持經之心也大暦元祀州􅀅韋公元甫兵部尚書劉公晏侍御史王公圎開州刺史陸公向殿中侍御史陸公迅大理評事張公象境誘真心共􅀗殊勝乃相與飛表奏聞詔書特下署名曰㳒華道塲焯哉盛乎經王之恵日升于天乎自江以東揔一十七所皆因大師之􅈡置也舉釋行大徳二十七人常持㳒華報主恩也大師以無縁慈眼極觀四生多溺空見乃鑄盧舍那及毗盧遮那像眀智身不有㳒體非無􅀅欲顯古佛證經之由乃起多寳玅墖開淨土當生之業遂作彌陀色身㳒華一經駭聲聞得記方等四部喜廣教盡􅀵無垢淨光盖是如来極開方便跡雖有作功乃無為接人天機使知有殊常之福又寫天台一教溢乎道塲真詮昭昭與清景不極大師有言佛法夀命其惟常住乎常住不存我法安􅀉扵是置荘二􅀁世田為義俟嘉榖以登身田是修期聖禾不絶非夫大師平等之施孰能扵事理􅀟全哉物投我慈日用不足門人有􅈈廢者接彼退機講法華玄義天台止觀四分鈔文臨壇度人授心楊律􅂅盈乎石室之籌天寳年扵靈巖道塲行㳒華三昧忽覩大眀上燭天界我身正念儼在光中異日問天台然公公曰智恵光眀從心流出非精致之􅀁在耶又扵本寺入㳒華道塲忽覩此身在空中坐先證者知是大師滌垢之相不然則萬㳒有無礙之用哉其年春秋七十一僧臘四十六以興元元年七月二十九日告終扵支山夲寺嗚呼像㳒梁壊苦流増波無數人天從今失怙􅀄當寺葢公輪公一夜同夢大殿忽崩得非㳒匠􅀅亡之􅀿乎示疾之日驕陽久􅄽嘉苗若燎辤世之夕風號雨㬥天地惨黷亦我㳒凌遲之變也傳教門人靈輪㳒盛道欣可入如来之室豈唯宣父之室哉俾厥鴻猷張而未㢮奉教門人猶子靈源等髙志警㧞徳隣先賢精細行以檢儀敷大乗以基性予雖後學夙聆徳聲􅂚云不騫貽諸樂石銘曰泓澄吴江静㡬扵道清氣蓄焉誕我僧寳洸洸大師與道為藩義天無孛慈釭不昏巋然支山繋公􅀁􅂂建墖闢院夷荒而址乃基靈峰靈峰崇崇乃啟秘藏秘藏彤彤天色在下日輪當中真經無言至象非象眀理徹性不昧不朗三觀一心如懸帝網雪山峩峩有時而裂香􅀣偃蹇有時而折世相若斯師何示㓕示㓕何之天泣人悲高丘漠漠細雨霏霏攜􅂂西去相逢是誰見海未乾疑山尚阻囂囂魔民爰得其􅀁吾師􅄫寥空留㳒語入室數子皆弘我經安公如月逺公如星㳟恭秩秩釋氏儀形墖影亭亭長在寒樹天上花落人間日暮猶飄苦雲以我為喻唐湖州大雲寺故禪師瑀公碑銘并序昔在穆天子我如来大聖沒扵西土葢示身也其聲教紛綸湮滅而復紀者九十六種外道持衡扵五天是僣佛号俾戒月生魄寳星為彗􅄺槃河水汨􅅺􅀭波而天下騰口襲心夐然而䘮精矣我本師爰敕大士中興南州激童􅀩竅禱杌摧異道破邪黨彼日月是出爝火不息其為光也不亦難乎有其躡清氣㣧種性雲龍相召與蒼生為春則我大師矣大師諱瑞字真瑛俗姓沈氏呉興徳清人也其先仕國扵沈因以為氏按春秋沈子之後也五代祖敏梁東陽太守不言而理不猛而威􅀭之以和風灑之以甘雨殷氏既丧公其嗣焉髙祖某勇而仁直而信少好理體機若釭轉六􅀊讀孝經至參不敏略而不讀師問之故曰此大人稱之而小子􅂚稱之十七州舉孝亷陳侍中徐陵特相器重名位不逹終于丘園曽祖某學藏于晦辯守扵訥大業之際州辟不起祖某考三教之源精一貫之㫖結廬于金鵝山下怡然獨得父某湖山是傑言行孔􅆇里有不爽而訓之隣有不給而􅃬之燠􅀆春風凛􅀆寒松心可以育物徳可以垂􅁉以五世􅀣善而瑀公生生而聦慧不以師受年未捴角辤親出家患身之資忘若遺跡爽口之味飲如我仇以如意年大赦度人壊衣削髪煤炱丗事怡懌至道弱冠逰東京大福先寺厥受大戒懇懇勤勤不遑假寐三日之夕戒相出焉見有神人假然在目倐來忽徃㦯同或異得非至誠乎扵是燭如来燈佩菩薩印證聖中歸于大雲道塲堅執律柄僧綱􅁵舉不亦冝哉公素􅂂純厖無咎無譽使天下之士有外道焉有闡提焉心如飄風言若泉湧撓我聖教齊我玅門公示以從容誘以方便莫不稽首挫色而聞命焉常禮一萬五千佛名兼慈悲懴日夜一匝或二日㦯三日一帀苦節貞勵飲氷茹霜夜有聖僧九人降扵禮懴之􅀁相與行道弹指而厺或夜無燈燭心口是念圎光照室如坐月中如此則徃徃有之公甞喟然曰自眀帝夢金人孫權􅀗舍利茫茫中土是有正法而徳清偏邑罕有墖寺使蒼生蒙昧㒺知􅀁之悲夫至人無名陶鑄而名之耳糠粃有為金壁無相二見齊楚瞽性者流豈短􅂂如之功萬法無外此菩薩自在之盛行吾􅀅為爾行焉扵是繕以香臺作以茝殿卿雲蓄泄于户外麗月眀囘扵檐下是知觀象大壮㳒時雲室豈不冝哉前後冩經二藏凡一萬六千卷不以皮為􅁓不以血為墨是身臰􅁾靡潔書冩非難捨哉晩節工于襌門頓入懸解言越性靈之外心㝠文字之表天寳初臨安足法師死經三宿􅀅入地獄􅁳見瑀公引至王􅀁謂王曰此師解講􅄺槃經大王宥之王曰唯聞嚴􅀎講不聞此師名何也如此􅂯三王不􅀎屈因赦之嗟乎至人之作用不動此身而流形于彼非無縁慈力何哉曽是郷人施音桃牛者天然不孕因而出乳及瑀公􅆍疾日有饋之非夫人含動植徳感眀神亦何􅀎􅆀此希有之事也他日蹙然改容㩀梧而歎昔孔子蚤作悲􅁔于門者此聖人􅀁以同我生亦同我死荘生曰適厺夫子順也吾亦何懼哉以十一年秋襌坐滅度嗚呼婉婉蓮歩應随白雲寥寥香林空見􅀌月予不知其至人幽機玅用彷彿化為人星乎飛為白霓乎不然􅀅有異名扵他􅀦乎某月某日飭以靈龕崇以寳墖撃以㳒鼔吹以㳒螺門人號慟扵是葬歛十二年春􅀅欲啟靈龕遷寳墖炎炎金火以求舍利豈知容色不壞凛然如生識者以為􅄺槃夲義絶動涉之知窮􅄫照之恵存不壊之身滅大化之體此四者而公得之㫺少林孕􅂡蘄春育髪何獨嘉也寺主玄等皆秉大眀恵開道區中吠琉璃天移夕為晝彼什公四子亦季孟之間歟大理評事攝監御史姚澹主客郎中姚沛禀􅀛谿之靈鵝山之英門多才傑世著匡佐而瑀公善焉刺史楊恵才識深敏器宇調暢虞譚之流也今呉測㣲清慎有度奸囘無欺賀循之流也皆入境問俗飲風眷徳徘徊歔欷有恨来暮嗟乎㳒夲無名是歸􅄫樂門人隨淚願刻豐碑予誠不敏哀以見託銘曰㳒本無生示生􅀆法夲無名強名􅀆大師振振冲邈􅀆蒼生茫茫啟􅁴􅀆堅持律藏是非􅀆深入禪門杏微􅀆鵝峯岑崟莫涉􅀆􅀛渚澹蕩莫測􅀆五千佛懴是禮􅀆十二經文是啟􅀆聖僧異人降語􅀆㹇牛非孕垂乳􅀆同衆生病罔差􅀆同衆生沒罔壊􅀆門徒病矣號絶􅀆姻族澘然嗚咽􅀆烏臺華省思人􅀆􅀖君邑宰敬神􅀆無言可象湛􅄫􅀆身謝名非刻石􅀆唐杭州靈隠山天竺寺大徳詵㳒師墖銘并序西周之􅅩世夲師淪跡扵拘尸那城千有餘年教行東漢玄綱遐属殆如綴旒而先經異時至機終義我唐聖暦中大方廣梵文四譯斯僃雷霆始懼于魔耳天地再造扵人心曈曈無邉佛曰正出其時弘道之士有燉煌公得他心稱是文殊後身洎四葉傳于吾師夲孫氏之子長沙桓王十有三世孫母也初感夢吞眀珠遂黜鱻惡葷誕彌厥月生有異表中􅀊若成寥􅀆真姿不棲于俗顧移榮扵道忘錫羡于家至十五辤親從師依年受具行學一集鬰為教宗終卷伊吕立功之致陋黄綺肆志之適遺形理性與山水為群故地思貞大師属我以華嚴經菩薩戒起信論心以静銳智與經冥徹照淵玄萬法一念霄景盈空而不見晨曦溢目而何有有而不可有者吾其見真師之心㢤受經彌時乃疑未契其夕夢乗大艑直截滄溟横山當峻與天極不􅁴􅀌帆鳶戾懐襄止濟峯竦竦而忽焉雲溶溶而在下既寤形若委衣流汗輕醒自此句義不思而得一部全文常現心境事事無礙之㫖如貫花焉天寳六年扵蘇州常樂寺畫盧舍那像􅄫念􅀄萌十身竝現日月何咎唯吾師自知大暦二年講于常州龍興寺纔登法座忽有異光如曳紅縷漸大縈扵香空久修行者㑹中先覩前後講大經十遍制義記十二卷誠感之事此􅁼固多今畧而不載受業比丘太􅀄付以香鑪談柄知其意有歸深扵吾道者則有尋陽正􅁴㑹稽神秀亦猶儒門之有㳺夏荀孟雔賢議徳其造形之異乎至大暦十三年十一月七日沙門恵􅁴夢巨墖横仆䧟地二級無何如吾師示疾顧門人曰生死者衆人之桎梧至人之作用昔尼父逍遙曵杖􅀤太山之歌盖欲顯夲知終示動歸静吾雖不敏幸異夫流遁不返者乎言己奄然與物而化春秋六十一恵命三十二以其年某月日甲乙建墖于某䖏終終之義也噫素旌晨出異昔經行衆􅄜啾啾以風號細雨茫茫而天泣世流有逝㳒流何逝而常清世山自騫法山何騫而常存吾知夫一貫而何言時䢴城肅公得離性之文代予為銘刻石松門詞曰銘無贈李舍人使君書自湖一辤十有餘載公貴為方伯晝跡在空林出䖏殊踈音塵不接葢理然也晝從辤後謂年多志固名踈道親唯慕空門若有􅀁詣然未曽遇知巳一知常􅃧為一章自詠曰樂音洛禪心似蕩吾道不相妨獨悟歌還􅀏誰言老更狂昔謝太傅每賞支公喜標宗要若九方堙之相馬略其玄黄而取駿逸晝今日扵公即道琳逢太傅之秋也又晝扵文章理心之外或有􅀁作意在適情性樂雲泉亦何能若徤羡於其間哉頃者目疾相嬰􅄥濛如隔烟霧患脚氣行李不迨昨承至止病中不􅀗躬詣門䦨披叙離闊形礙神徃有所恨也謹状兼簡雜文晝性野思拙機淺忽若偶中風律終期匠者賞鍳不遺幸甚釋晝白贈包中丞書改年伏惟永感罔極晝之理心夲在忘情及經節序惘然悲愴厺􅀊馬三徃巳奉状計上逹孟春猶寒伏惟中丞尊體萬福即此晝􅀩一昨見扶起離披菊一章使晝却顧鄙拙盡欲㷊焼凝思三復彌得精㫖中丞􅀉重任大堆按日盈而言詩至此豈非凝心悉到耶今海內詩人以中丞爲龍門賢與不肖雷同願登仰測中丞之爲心固進善而拒不工也晝無西施之羙不合􅂺議西施之羙然心之服矣其敢蔽諸今之馳䟽實有􅀁薦有㑹稽沙門靈澈年三十有六知其有文十餘年而未識之此則聞扵故秘書郎嚴維随州劉使君長卿前殿中皇甫侍御曾常􅀁稱耳及上人自浙右来湖上見存并示製作觀其風裁味其情致不下古手不傍古人則向之嚴劉皇甫􅀁許疇今所覿三君之言猶未盡上人之羙矣讃其道邉古墳詩則有松􅀣有死枝塜上唯莓菭石門無人入古木花不開荅范降晝作則有緑竹􅀊寒在故人衰老多雲門雪夜則有天寒猛虎呌巖雪松下無人空有月千年像教人不聞焼香獨為􅀑神説石帆山作則有月色静中見泉聲深䖏聞題李尊師堂則有古觀茒山下諸峯欲曙時真人是黄子玉堂生􅂵芝題曹溪能大師􅅄山居則有禪門至六祖衣鉢無人待登天姥岑望天台山作則有天台衆山外􅀊晩當寒空有時半不見崔嵬在雲中傷古墓作則有古墓碑表折荒隴松栢稀福建還登梨䫈望越中作則有秋深知氣正家近􅁴山寒九日則有山僧不記重陽日因見茱茰憶厺年宿延平懐古則有今非古獄下莫向斗邉看又有歸湖南詩則有山邉水邉待月眀暫向人間借路行如向還向山邉去唯有湖水無路行此僧諸作皆玅獨此一篇使老僧見欲棄筆研伏惟中亟髙鍳弘量其進諸乎其捨諸乎方今天下有故大賢勤王􅂺以非急干請視聽亦昭愚老不􅓤時也然上人秉心立節不可多得其道行空恵無慚安逺甞著律宗引源二十一卷為緇流􅀁歸至扵玄言道理應接靡􅆡風月之間亦足以助君子髙興也晝疾弊未期奉展伏深瞻望近應府公三五首謹慿徹上人呈上年暮思蹇多慮迷錯􅀁希宗匠一為指瑕幸甚晝白畣權從事徳輿書權三從事足下傳吏至辱書謬􅀩􅀤楊殊増悚恧觀其立言典麗文眀意精實耳目􅀁未接也幸甚幸甚貧道􅈥名之人萬慮都盡强留詩道以樂性情葢由瞥起餘塵未泯豈有健羡扵其間哉初貧道聞足下盛名未覩製述因問越僧靈澈居士豆盧次方僉曰掦馬崔蔡之流貧道以二子之言心期足下日巳乆矣但未識長卿子雲之面􅀁恨耳先軰作者故李貟外遐􅅩故皇甫􅀘闕茂正故嚴秘書正文故房呉縣元警故閻評事士和故朱拾遺長通故䖏士韋此数子疇昔為林下之逰遐􅅩當時極許貧道四十韻之作其略曰中宵􅀤耳目形静神不伇色天夜清逈花漏眀滴􅄋東風吹杉梧幽月到石壁此中一悟心可與千載敵又曰不然作山計改服乗下澤君隳元亮冠我脫濳師􅄚各􅀝髙松根共逃金閨籍又􅀎秀三祖義門讃其畧曰二公之心如月如日四方無雲當空而出遐叔因此相重元警著道交論比扵髙雲獨鶴意謂􅀜扵詩而不􅀜扵事貧道亦無推焉今再遇足下見知則東山遺民時免擗琴絶絃扵知巳矣靈澈上人足下素識具文章挺􅅛竒自齊梁巳来詩僧未見其偶但此子跡􅁳累遣心無營營雖然至扵月下風前猶未廢是公逹之友豆盧次方才識超邁􅀁得經竒飄飄然有凌雲之氣而不䡖浮此乃山僧恵眼見亦甞與論物理極天人之際言至簡正意不虚誕足下精鍳豈無此子乎在于貧道不得不言耳承索弊文見巳繕冩開元二十一判官木夹中緘封甚難以此未及􅀉上彼来使無限請近作三五章至至之言㫄通我法佇以適山情􅂇襌教耳幸甚十二月二十日皎然白報􅀿傳序語曰死生有命冨貴在天葢垂教之意也或曰盗跖日殺不􅇳而終天年顔囘積仁累行而不幸短命天之報施是耶此皆夲扵天也今請以釋氏論之夫生生之理罔有不􅀜于業則報施有歸報施有歸則因果不爽因果不爽則空見不生有厺来三世之殊故巨細必顯有染淨二心之别故涇渭既分性自我􅀎命自我有豈神授而天與乎􅄺槃經云無有自作他人受果豈怨天由聖乎知遍計有如􅀛毛兔角决定無也依他縁生非自然也圎成寳性體則玅有相乃真空具一􅋀􅁪沙功徳不周靈空無爲而無用也有若沙門法海字文􅁢俗姓張氏朱方人也圎入一性學階空王擅當代獨悟之名剖先賢不决之義一時學外儒釋該通六書究其源流三易變化嘗謂予曰佛法一門獨開心地皆􅅦論也扵􅃧天造溟滓惑􅃠髙張非大圎真詮􅂚􅀎示眀眀之業俾群生知正修之路哉日者象季之数吾道陵夷朋溺妄空謂無因果公乃救􅀅㢮式帋及之教衰弱䘮之子其報應昭驗見聞可慿者因採而託之編爲三卷鱗羽有性之􅀋亦皆附焉以為動物尚爾而况扵人乎况于􅀑神乎下以􅁤正扵邪宗上以禆益扵真理若佛日未墜于地庶㡬􅀅有證焉强居士傳人生性静而􅁶乎可欲可欲萌乎憂喜憂喜者病之原也故至人觀其性見萬物之真觀其動見萬物之過客有强君􅀮山之儔也埋昭淈俗􅀉扵和扁之伎而時人無􅀎知者予甞問君以上醫之術君對曰夫玅有綂扵心而通扵物理其静為性其照為􅁴覺也者日月之謂乎性也者太虚之謂乎故理世為儒可以敷五典理性為釋可以越四流理病為醫可以空六府使定命可逭業疾可亡而世教罕􅀎迨之故醫王未悉辨也予曰至哉斯言命小子志之座右偈水月無根縁生則有莫辨其端莫窺其後以有為瑕以無為垢不廢不立誰觸誰受􅄫念淵玄紛然何咎晝上人集卷第九
