body:
  text: 呉興釋皎然五言從軍行五首􅀟􅀐出紛紛元戎霍冠軍漢鞞秋聒地羗火晝燒雲萬里戈城合三邉羽檄分烏孫驅未盡肎顧遼陽勲又韓斾拂丹霄漢軍新破遼紅塵驅鹵簿白羽擁嫖姚戰苦軍猶樂功髙􅀅不驕至今丁零塞朔吹空蕭蕭又百萬逐呼韓頻年不解鞍兵屯絶漠暗馬飲濁河乾破虜功未錄勞師力巳殫須傍肘腋下飛祻出無端又飛􅀅下天来竒謀閫外裁水心龍劒動地肺雁山開望氣燕師銳當鋒虜凍摧􅀙今射鵰􅀐不敢過雲堆又黄紙君王詔青􅅺校尉書誓師張虎落選􅀅擐犀渠露暗津蒲失天寒塞栁踈横行十萬􅀐欲掃虜塵餘五言隴頭水二首隴頭水欲絶隴水不堪聞碎影揺槍壘寒聲􅍋㡢軍素從鹽海積緑帯栁城分曰落天邉望逶迤入塞雲又秦隴逼玄羗征人厺未央如何幽􅍋水併欲㫁君膓西注悲窮漠東分憶故郷旅魂聲攪亂無夢到咸陽七言塞下曲二首寒塞無因見落梅胡人吹入笛聲来勞勞亭上春應度夜夜城南戰未􅅆都護今年破武威胡沙萬里鳥空飛旄竿瀚海掃雲出氈􅀐天山踏雪歸五言覽史黄綺皆皓髪秦時隠商山嘉謀匡帝道髙􅇍逰天􅀜不愛珪組紲􅁍思林壑還放􅁔長松下曰與􅀌雲閑五言詠史獨負髙丗資􅁳冥􅀉浮俗卞子厺不歸何人辨荆玉鬻春意不淺汚迹身豈辱鸞鎩樂迍邅虬蟠甘窘束五噫譎且正可以見心曲雜言詠史田氏門下客馮公衆中賤一朝市義還百代名獨擅使知下客不可輕能使主人功業成借問髙車與珠履何如卑賤一書生五言讀張曲江集相公乃天益人文佐王成立程正頽靡繹思何縦横春杼弄緗綺陽林敷玉英飄然飛動姿邈矣高簡情後軰驚失􅇍前修敢争衡始忻耳目逺􅂯使機慮清體正力巳全理精識何妙昔年􅁔陽春徒推郢中調今朝聴鸞鳳豈獨羡門嘯帝命鎮雄州待濟􅀉上流才兼荆衡秀氣助瀟湘秋逸蕩子山匹經竒文暢儔沉吟未終卷變態紛難􅁆耀耳代眀璫襲衣同芳杜愔愔聞玉聲窹寐在靈府五言奉酬陸使君見過各賦院中一物得江籬江籬生古砌花每落禪牀嘉客未采掇空門自馨香名因詩目見色對道心忘不遇陸内史誰知殊衆芳五言賦得謝墅送王長史其墅即晝七代祖吴興守舊居世業西山墅移家長我身蕭踈遺􅀣老􅄫寞廢田春車巷傷前轍籬溝憶舊隣何堪再過日更送北歸人五言夏日同崔使君論登城樓賦得逺山逺山湖上小青翠望依俙纔向窓中列還從林表微色濃春草在峰起夏雲歸不是蓬莱島如何人厺稀五言詠􅁆探得七鄒子談天􅀊黄童對日年永真􅀄作傳錬魄巳成仙鶴駕迎緱䫈星橋下蜀川逢君竹林客相對㺯清弦五言奉同顔使君真卿送李侍御萼賦得荻塘路落日車遥遥客心在歸路細草暗囘塘春泉榮古渡遺蹤歎蕪沒逺道悲厺住􅄫寞荻花空行人别無􅁆五言賦顔氏古今一事得晋仙傳送顔逸梁湘東王國常侍顔恊著晋仙傅五篇曽㸔顔氏傳多記晋時仙􅁍憶桐君老俱還桂父年青春留􅁂髪白日向雲􅃄逺别齎遺簡嚢中有幾篇五言賦得石梁泉送崔逵架石通霞壁懸厓散碧沙天晴虹影渡風細練文斜攀􅕾幽期阻㳂􅋡客意賖河梁非此路别恨亦無涯五言賦得夜雨滴空階送陸羽歸龍山同字閒階夜雨滴偏入别情中㫁續清猿應淋漓􅃸館空氣令煩慮散時與早秋同歸客龍山道東来雜好風五言賦得燈心送李侍御萼光字燈心生衆草因有始知芳綵妓窓偏麗金桃動更香花驚春未盡焰喜夜􅀄長别後空離室何人惜末光五言賦得竹如意送言師赴講青字縹竹湘南羙吾師尚毁形仍留負霜節不變在林青每入楊枝手因談貝葉經誰期沃洲講持此别東亭五言聽素汯師講汯華經㳒子岀西秦名齊􅃮道人纔敷藥草義便見雪山春䕶講龍来逺聞經鶴下頻應機如一雨誰不滌心塵五言詠􅏡上人座右􅀞松冩得長松意千㝷􅁆尺中習隂疑背日寒色欲生風貞􅀣􅀌標在髙人立操同一枝遥可折吾欲問生公五言夏日登觀農樓和崔使君片雨拂檐檻煩􅁭四座清霏微過麥隴蕭散􅅖蓑城静愛和花落幽聞入竹聲朝觀趣無限髙詠􅀉深情五言妙喜寺逹公院賦得夜磬送吕評事一磬寒山至凝心轉清越細和虗􅄜盡踈繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别􅄫歴無性中真聲何起滅五言詠小􅓬布􅓬布小更竒潺湲二三尺細脉穿亂沙叢聲􅍋危石􅀄因智者賞果㑹幽人迹不向定中聞那知我心􅄫五言仙女臺寂寞舊桑田誰家女得仙􅀿無雞犬在空有子孫傳古木花猶發荒臺月尚懸片雲低不散疑是􅁍歸年五言靈澈上人何山寺七賢石詩七石配七賢􅀮僧山上移石性殊磊落君子又髙竒􅉥禪服冝壞坐客冠可隳夜􅀝月􅀣影晝傾風竹枝集質患追琢表頑用磷淄佚火玉亦害塊然長在兹五言潘丞孩子愛子性情竒􅀄生玉􅀣枝人曽天上見名向月中知我識嬰兒意何須待佩觽五言南池雜詠五首并序余草堂在池上洲㫺栁呉興詩汀洲采白蘋即此地也左右雲山滿目一坐遂有終焉之志㑹廣徳中㓂盗淮海騷動宵人肆志吾屬不安因賦南池五詠聊以自適水月夜夜池上觀禪心坐月邉虗無色可取皎潔意難傳若向空心了長如影正圎谿雲舒卷意何窮榮流復帯空有形不累物無迹厺随風莫恠長相逐飄然與我同虗舟虗舟動又静忽似厺逢時觸物知無迕為梁幸見遺因風到此岸非有濟川期寒山侵空撩亂色獨愛我中峯無事負䡖䇿閒行躡幽蹤衆山揺落盡寒翠更重重寒竹裊裊􅀌生竹獨立山中雪蒼翠揺勁風嬋姢帯寒月狂花不相似還共凌冬發度前谿不意入前谿愛谿従錯路清清鑒不足非是深難度望逺村林杪不可分水歩遥難辨一片山翠邉依俙見村逺惜暮景踈隂花下動片景松梢度待山月夜夜憶故人長教山月待今宵故人至山月君何在五言効古天寳十四年日出天地正煌煌闢晨曦六龍驅群動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡長桑枝渇死何爝火嗟嗟徒爾為空留鄧林在折盡令人嗤雜言古别離代人荅閻士和太湖三山口吴王在時道􅄫寞千載心無人見春草誰識緘怨者持此傷懐抱􅀌舟畏狂風一夜􅀫􅃄島望􅀁思􅀆若何月蕩􅃞􅀆空波雲離離􅀆北㫁鴻􅄅渺􅀆南多身去􅀆天畔心折􅀆湖岸春風胡為􅀆寒路使我歸夢􅀆撩亂五言擬長安春詞春信在河源春風蕩妾魂春􅁔雜鶗鴂春夢繞轘轅春絮愁偏滿春絲悶更繁春期不可定春曲􅈸新翻七言効古思君轉戰度交河强弄胡琴不成曲日落應愁隴底難春来定夢江南􅁆萬丈㳺絲是妾心惹蜨縈花亂相續七言昭君自􅀝嬋娟望主恩誰知羙惡忽相飜黄金不買漢宫㒵青塜空埋胡地魂七言銅雀妓强開尊酒向陵㸔憶得君王舊日歡不􅁴餘􅁔悲自㫁非􅀜艶曲轉聲難七言長門怨春風日日閉長門揺蕩春心似夢魂誰遣花開只􅀏妾不如桃李正無言五言哭呉縣房􅋍眀府仁人邁厚徳可謂名實全撫迹若踈曠㑹心極精研􅂂危節詎屈廣徳􅀄江南㓂盗充斥賦通名宰長城縣屡至害而竟不就著論識不倫公著道性論一篇恨以榮級淺嘉猷未及宣伊人期逺大志業難比肩昭世既合并吾君藉陶甄奈何眀眀理與善徒空詮徴教或稽聖窮源反問天一官自呉邑六翮委江壖始是牽絲日翻成撤瑟年金膏果不就房公昔就沈道士學長生之術晝以佛理難之玉佩長此捐􅀝伏信冥盻夭修驚後先安知忘情子愛網素巳褰為有深仁感遂令真性遷心悲空林下淚灑秋景前夫子寘兄弟撫􅀌傷藐然傾雲為惨結弔鶴共聮翩割念命􅀌駕訣詞向空筵樹桃隂始合愛客位常懸帆然逺行時崇望歸朝旋悟玆歎㝠隔哀彼􅀊月延書帯變芳草􅂂痕移綠錢冥期儻可逢生盡㑹無縁王坦之與生法師為冥期前死者歸報其罪福幸願示因業代君運精􅌹沈約死後冥中見十因師云師急為我造經捨我罪苦相思轉􅄫寞獨徃西林泉欲見故人心時閲􅀁贈篇素髙陶靖節今重楚先賢芳躅將遺愛可為終古傳五言哭􅁴上人憶君南適越不作買山期昨得耶谿信翻為逝水悲神交如可見生盡杳難思白日東林下空懐歩影時五言題餘不谿廢寺武原離亂後真界積塵埃殘月生秋水悲風起故臺居人今巳盡栖鴿暝還来不到無生理􅀿堪賦七哀五言同李洗馬入餘不谿經辛􅀅軍故城惨惨寒城望􅀅軍下世時髙墉暮草遍火樹野風悲壁壘今惟在勲庸近可思蒼然古谿上川逝共凄其五言憶天台箬谿朝雨散雲色似天台應是東風便吹從海上来􅂕山逰汗澷仙石過莓菭誤到人間丗經年不早􅅆五言萬囘寺萬里􅁛逆化愚蠢性亦全􅂵紱拖身上妖姬安膝邉見他拘坐寂顧我是眠禪吾知至人心杳若青冥天五言禪詩萬汯出無門紛紛使智昏徒􅁛誰氏子獨立天地元實際且何有物先安可存湏知不動念照出萬重源五言哀教本師不得巳强為我著書知盡百慮遣名存萬象拘如何工言子終日論虚無伊人獨㝠㝠時人以為愚五言聞鍾古寺寒山上逺鐘􅀭好風聲餘月􅀣動響盡霜天空永夜一禪子泠然心境中五言谿上月秋水月姢姢􅀄生色界天蟾光散浦溆素影動淪漣何事無心見虧盈向夜禪五言山雪夕陽在西峰疊翠縈殘雪狂風卷絮􅂞驚猿攀玉折何意山中人誤報山花􅀤雜言江上風江風西復東飄􅍊忽何窮􅀄生虚無際稍起蕩􅃞中􅀿吹夏口檣竿折定蹙湓城浪花咽今朝莫恠沙㟁眀昨夜聲狂卷成雪雜言山雨一片雨山半晴長風吹落西山上滿􅀣蕭蕭心耳清雲鶴驚亂下水香凝不然風迴雨定芭蕉濕一滴時時入晝禪雜言問遥山禪老天與松子夀獨飲日月精復令顔子賢胡為夭其生吾􅀅尋河源上天問天何不平吾將詰仙老大道無私誰强名仙老難逢天不近世人何人解應盡明朝欲向翅頭山問取禪公此意還五言禪思真我性無主誰為塵識昏奈何求其本若技大木根妄以一念動􅀔如千波翻傷哉子桑扈􅆉臂徒虚言神威興外論宗邪生異源空何妨色在妙豈廢身存􅄫㓕夲非􅄫諠譁曽未喧嗟嗟世上禪不共智者論七言支公詩支公飬馬復飬鶴率性無機多脫畧天生支公與凡異凡情不到支公地得道由来天上僊為僧􅁍下人間寺道家諸子論自然此公惟許逍遥篇山隂詩友諠四􅚋佳句縦横不廢禪七言述夢夢中歸見西陵雪􅄅渺􅃼􅃼行路絶􅁴来還在剡東峰郷心繚亂愁夜鐘寺北禪岡猶記得夢歸長見山重重七言赤松縁岸􅀩籠出見天晴沙􅄋􅄋水濺濺何䖏羽人長洗藥殘花無數逐流泉七言戯題松樹為愛松聲聽不足每逢松樹定忘還翛然此外更何事􅀏向閒雲似我閒七言􅃧題二首㸔飲逢􅁔日屢曛我身何似繋浮雲時人不解野僧意歸厺谿頭作鳥羣喧喧共在是非間終日誰知我自閒偶客狂􅁔何􅀁為欲扵人事强相􅀜五言雜寓興嗟嗟號呶子世􅁛謫仙儔媚俗破蛟綃欺天薦昫修奔景謂可致馳齡言易流燕昭昧往事嬴政立前籌三山果不見九仙忽悠悠君㸔牛山樂君見麋浦逰昨日千金子聨綿成古丘吾􅀅􅄃眀月照爾生死流至樂亭爰居慙貽逹者尤冥冥光塵内機䘮成海漚五言雜興六首吾觀談天客工言䘮其精萬物資廣庇此中何有情若為昧顔跖修短怨太清髙論讓鄒子放詞徴屈生請從象外推至論尤眀眀短齡伇長世擾擾悟不早嬪女身後空歡娱夢中好從教西陵樹千載傷懐抱鶴駕何冥冥鼇洲厺浩浩柔顔感三花凋發悲􅟵草月中伐桂人是誰翻使年年不衰老誰髙齊公子泣聽雍門琴死且何足傷殊非逹人心獨髙庭中鶴意逺貴氛埃有時青冥㳺顧我還下来白雲琅玕色一片生虗無此物若無心若何卷還舒踈散遂吾性栖山更無機寥寥髙松下獨有閒雲歸精意不可道冥然還掩扉五言偶然五首樂禪心似蕩吾道不相妨獨悟歌還􅀏誰言老更狂偶然􅄫無喧吾了心性源可嫌􅆉食木不􅀏鳥能言􅀮心不􅀮迹􅁍欲住人寰欠樹移春樹無山㸔􅀞山居喧我錯真意在其間虜語嫌不學胡音從不翻說禪顛倒是樂殺金王孫真隠須無矯忘名要似愚只􅀅兩條事空􅁍漢濳夫五言問天天公何時有談者皆不經誰道賢人死今為傅說星五言寓言吾道本無我未曽嫌丗人如今到城市彌􅁴此心真五言前谿作春􅁔巳􅄫􅄫古水自㳙㳙徒誤時人軰傷心作逝川五言􅃧作乞我百萬金封我異姓王不如獨悟時大􅀏放清狂雜言浮雲三章有序浮雲刺䜛也葢取夫盛眀之時為浮雲􅀁蒙非不眀小人比扵君側䜛言熒惑亦如浮雲之害眀予覧古史極觀君臣之際敗亡之兆生扵䜛慝遂作是詩浮雲浮雲集于扶桑扶桑茫茫日暮之光匪日之暮浮雲之汙嗟我懐人憂心如蠧浮雲浮雲集于咸池咸池㣲㣲日昃之時匪日之昃浮雲之惑嗟我懐人憂心如織浮雲浮雲集于高春髙春濛濛日夕之容匪日之夕浮雲之積嗟我懐人憂心如惄七言寓言人生百年我過半天生才定不可换東海釣鼇鼇不食南山坐石石欲爛晝上人集卷苐六
