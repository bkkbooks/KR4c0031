  text: 晝上人集卷第一
  hash: sha256:265d392b88523f1fca7429779e2a3145304b97ac36769aea7cf1416830ab6126
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_001-1a}
body:
  text: 吳興釋皎然五言奉酬于中丞使君郡齋卧病見示一首􅀫昔祖師教了空無不可枯稿未死身理心寄行坐仁公施春令和氣来澤我生成一草木大道無負荷論入空王室明月開心胸性起妙不染心行寂無蹤若非禪中侣君為雷次宗比聞朝端名今貽郡齋作眞思凝瑶瑟髙情屬雲鶴抉得驪龍珠光彩耀掌握若作詩中友君為謝康樂盤薄西山氣貯在君子衿澄澹秋水影用為字人心群物如鳬鷖游翔愛清深格居第一品髙歩凌前躅精義究天人四坐聴不足伊昔栁太守曾賞汀洲蘋如何五百年重見江南春公每省徃事詠􅁔懐昔辰以兹得髙卧任物化自湻還因訪禪􅀮知有雪山人郡齋卧疾贈晝上人上人早名皎然晚字畫湖州刺史于頔夙陪翰墨徒深論窮文格麗則風騷後然公我詞客晩依方外友極理探精􅞾􅘈合南北宗晝公我禪伯光眀性不染故我行貞白隨順令得解故我言芳澤霅水􅃞清潯呉山横碧岑含珠復藴玉價重􅀟南金的皪曜竒彩凄清流雅音商聲􅀤楚調調􅋀諧瑶琴呉山為我髙霅水為我深萬景徒有象􅀌雲本無心衆木豈無聲椅桐有清響衆耳豈不聆鍾期有真賞髙潔古人操素懐夙􅀁仰覿君氷雪姿祛我􅁋􅆡想常吟桞惲詩苕浦久相思逮此逺爲郡蘋洲芳草衰逢師年臘長值我病容羸共話無生理聊用契心期五言贈李中丞一首深沉閫外畧奕世當榮寄地裂大􅀅封家􅀓介珪瑞至今漳河俗猶受仁人賜公初鎮惟邢决勝無精兵重圍逼大敵六月守􅀌城政用仁恕立恩由賞罰明遂令麾下士感徳不顧生于時聞王師諸􅀅兵頗瀆天子狩南漢烟塵满凾谷純臣獨耿介下士多反覆眀公仗忠節一言感萬夫物性如蒺藜化作春蘭敷見說金被爍終期玉有瑜移官萬里道君子情何如伊昔避心事乃是方􅂁客頓了空王㫖仍髙致君䇿安知七十年一朝值宗伯言如及清風醒然開我懷晏息與逰樂不將衣褐乖海底取明月鯨波不可渡上有巨蠎吞下多毒龍護一與吾師言乃扵中心悟咄哉冥冥子胡爲自塵汚五言杼山禪居寄贈東谿呉䖏士馮一首青雲何潤澤下有賢人􅀮路入菱湖深蹟與黄鶴近野風􅁔白芷山月揺清軫詩祖呉叔庠致君才不盡身當青山秀詩曰家住青山下青山有吳均故宅後改爲吳均山文體多郢聲澄澈湘水碧泬􅋁楚山清時人格不同至今罕知名昔賢敦師友此道君獨行既得廬霍􅃐乃髙雷逺情别時春風多掃盡雪山雪為君中夜起􅀌坐石上月悠然遺塵想邈矣逹性説故人不在兹幽桂惜未結五言玅喜寺髙房期靈澈上人不至重招之一首晨起峰頂心懐人望空碧掃雪開寺門灑水淨僧席言􅀏形外阻風儀想中覿馳心驚葉動傾耳聞泉滴豈慮咆虎逢乍疑崩湍隔前期或不顧知爾隳常格如今誰山下秋霖歩浙􅄋吾亦聊自得行禪荷䡖策松聲暢幽情山意導遐蹟舉目無世人題詩足竒石貧山何所有特此邀来客五言奉和薛貟外􅁩贈湯評事衡反招􅀮之蹟兼見寄十二韻喜友稱髙儒曠懷羙無度近為東田誘遂躭西山􅃐庭有介􅀮心得無雲泉誤府公中司貴頻貽咫尺素郡佐仙省髙亦贈瓊瑶句誚兹長往志紆彼獨㳺歩禪子方外期夢想山中路艱難親稼穡晨夕苦烟霧􅂚若孟嘗門日榮􅀦士遇鏗鏘聆綺瑟攀折邇瓊樹幽踐隨鹿麋久期怨蟾兔情同不繋舟有跡道􅀁惡五言畣􅀺士曹􅀺生前適越後之楚楚木紛如麻髙松自􅀌直願得苦寒枝與君比顏色故郷􅆌天末覊旅滄江隅委質在忠信苦心無變渝何由表明義贈君金轆轤何以羙知才投我懸􅀺珠遽為千里别南風思越絶愛君隨海鷗􅀝棹􅀫沙月不栖惡木上肯蹈巴虵穴台人表朝逆命故君不踐其土一上蕭然峰擬縱幽人轍晨興獨西望郢水期泝㳂夜到洞庭月秋􅀴雲夢天􅀺生知吾道此地不澘然欲寄楚人住學拏漁子船柰何北風至攪我窓中絃逰子動歸思江蘺亦綿綿箧中封禪書欲獻無由縁豈乏晨風翼翻飛到日􅁁五言畣豆盧次方吾愛道交論為髙貴世名昔􅁛柴桑令今聞豆盧生彼生清淮氣獨鍾文中彩近作公讌詩如逢何栁在吾用古人耳採君四坐珍賢士勝朝暉温温無冬春朝暉爍我肌賢士清我神微爾與雲鵠幽懐何由申别来秋風至獨坐楚山碧髙月當清㝠禪心正􅄫歴増波徒相駭人逺情不隔有書遺瓊什以代貂䄡䄖風教凌越絶聲名掩呉趨懸璧安可詶徙倚還踟蹰五言畣蘇州韋應物郎中詩教殆淪缺庸音互相傾忽觀風騷韻㑹我夙昔情蕩􅃞學海資鬰為詩人英格將寒松髙氣與秋江清何必鄴中作可為千載程受詞分堯竹萬里臨江城到日掃煩政况今休瀆兵應憐禪家子林下􅄫無營跡隳世上華心得道中精脫畧文字累免為外物嬰書衣流埃積研石駮蘚生恨未識君子空􅀓手中瓊安可誘我性始􅂅愆素誠爲無鸑鷟音􅁇公雲和笙吟之向禪藪反媿幽松聲􅀉皎然上人韋應物呉興老釋子野雪盖精廬詩名徒自振道心長晏如想兹棲禪夜見月東峰初鳴鐘驚巗壑㷊香满空虚叨慕端成舊未識豈爲踈􅂅以碧雲思方君怨别餘茂苑文華地流水古僧居何當一逰詠􅀝閣吟躊蹰五言畣鄭方囘獨禪外念入中夜不成定顧我顦顇容澤君陽春詠詞貞思且逸瓊彩何暉映如聆雲和音况覩聲明盛琴語掩為去聲聞山心聲宐聴是時寒光澈萬境澄以静髙秋日月清中氣天他正逺情偶兹夕道用増􅋁􅳋思君䖏虗室一操不可更時羙城北徐家承谷口鄭軒車未有轍蒿蘭且同徑荘生誡近名夫子罕言命是時耕楚田曠然殊獨行萎㽔鸞鳯彩特逹珪璋性通􅀮嘉黄綺髙儒重荀孟世汚平聲我未起道蹇吾猶病逸翮思冥冥濳鱗樂㳺泳宗師許學外恨不逢孔聖說詩迷頽靡偶俗傷趨競此道誰共詮因君情欲罄五言畣俞校書冬夜夜閑禪用精空界亦清逈子真仙曹吏好我如宗炳一􅀫覿幽勝形清煩慮屏新聲殊激楚麗句同􅁔郢遺此感予懐沉吟忘夕永月彩散瑶碧示君禪中境真思在杳冥浮念寄形影遥得四眀心荅四眀何須蹈岑嶺詩情聊作用空性惟􅄫静若許林下期看君辭簿領五言玅喜寺逹公禪齋寄李司直公孫房都曹徳􅁉從事方舟顔武康士騁四十二韻我祖􅀓六􅀴精義思朝徹荘子曰守之九日而後能外生外生而後能朝徹方舟頗周覽逸書亦傋閱墨家傷刻薄墨流刻薄而不仁可以理身不可以濟世儒氏知優劣弱植庶可彫苦心未嘗輟中年慕仙術永􅂅􅀓其訣􅀊駐若木景日飱瓊禾屑嬋娟羡門子斯語豈徒設天上生白榆葳㽔信好折實可返柔顔花堪養玄髮求之性分外業弃金亦竭藥化成白雲􅄱彫辭素穴素穴山名一聞西天㫖初禪巳無􅀬苐四禪中有天台無􅀬無三災之患故以為名今初禪即得葢詩人美巳證超出常㳙子非我宗然公有真訣􅁍尋丘壑􅃐始與纓􅌧别野飯敵膏􅆝山楹代藻梲與君比巗侣逰寓日常昳靜對春谷泉晴披陽林雪境清覺神王道勝知機滅詣􅄫常杳冥忘歸暫采擷物生豈有心麗容俟予别桂子何蓂苓琪葩亦皎潔此木生意髙亦與衆芳列賞墨識屢换省躬悟彌􅋀㣲尚若不虧足以全吾莭北風吹􅈍帯蕭寥聞蜻蛚􅀫昔廬峰期流芳巳再歇不有清屏鍳使我商弦絶􅂅寄千里心月髙不可掇優㳺􅀖之直逺矣踵肯烈立俗忘毁譽遇物遺巧拙真氣獨翛然軒裳詎能紲都曹風韻整綱紀信明决於交必傾冩立行豈矜伐政與清渭同分流自澄澈裴侯資亮直中誠豈徒説古人比朙義清士􅂅交結温温躬珪彩終始聲不缺顔生烱介士有志不可越仗義冐險艱持操厺淄􅄺丗論髙二賢即魯公猶子也賢賢􅁇前哲四子遭明盛褎然皆秀傑理名雖殊迹悟道寧異轍愛爾竹柏姿為予寒不折五言遥酬􅀽使君髙春暮行縣過報徳寺見懐江春行求瘼偶與真景期見説三陵下前朝開佛祠停舟仰麗刹繡組􅀤香墀咫尺空界色天人花落時盛游限羸疾悚踴矅旌旗峰翠羡閒歩松聲入遥思素髙淮陽理况負東山姿迨此一登覧深情見新詩五言冬日遥和盧使君㓜平綦母居士游㳒華寺髙頂臨湖亭仁坊標絶境亷守躡高踪天曉纔分刹風􅀓欲盡鍾城中歸路逺湖上碧山重水照千花界雲開七葉􅄘寒空艾綬满空翠白綸濃逸韻知難繼佳逰恨不逢仍聞撫禪石為我久從容五言秋日遥和盧使君逰何山寺􅀫􅏡上人房論􅄺槃經義江郡當秋景期􅀅道者同跡髙憐竹寺夜静賞蓮宫古磬清霜下寒山曉月中詩情緣境發㳒性寄筌空翻譯推南本何人􅁇謝公五言酬秦山人題贈出齋􅇍杉影手自開禅扉花满不汚地雲多從觸衣思山石癬淨擬客露葵肥果得宗居士論心到極㣲五言奉酬􅀽使君高寺院新亭對雨其亭即使君所創兹亭跡素淺勝事併隨公㳒界飄香雨禪窓灑竹風浮烟披夕景髙鶴下秋空㝠􅄫四山久寕期此㑹同五言奉使君真卿見過郭中寺寺無山水之賞故予述其意以畣焉州西桞家寺禪舍􅀮人間證性䡖觀水栖心不買山􅂂聲知客貴雲影悟身閑彦㑹前賢事方今可得攀五言酬烏程楊明府華雨後小亭對月見呈夜凉喜無訟霽色揺閒情暑退不因雨陶家風自清凝弦停片景􅀤詠靜秋聲何事禪中􅀮詩題忽記名五言自蘇州訪醫􅂞酬盧士􅀜判官見贈㝷醫初疾理忽憶故山雲逺訪桑公子還依栁使君周還承恵愛佩服比蘭薫從事因髙唱秋風起處聞五言畣李師尚雅篇忽見遺婉開緘􅀤恵風揺精思瓊蘂疑花空門青山月潘生獨不見清景屢盈缺林下長􅄫寥人間自離别何時解䡖佩来稅丘中轍五言贈烏程李明府伯冝沈兵曺仲昌水國苦彫瘵東􅆏豈遺􅁰雲隂無盡時日岀常􅅁雨昨夜西谿漲扁舟入檐廡野人同鳥巢㬥客􅀂蠭聚􅀊晏無斗粟寄身欲何􅀁空羡鸞鶴姿翩翩自䡖舉五言奉酬顔使君真卿王貟外圎􅀫寺兼送貟外使迴魯公邀省客貧寺人過少錦帳唯野花竹屏有窓篠朝行日色淨夜聴泉聲小釋事情巳髙依禪境無擾超遥長路首悵望空林杪離思從此生還􅀅此心了五言杼山上峯和顔使君真卿袁侍御五韻賦得印字仍期眀日登開元寺楼之㑹道情􅀉逺岳放曠臨千仞香路延絳騶華泉冩金印日欹諸天近雨過三華潤留客雲外心忘機松中韻靈嘉早晚期為布東山信五言同薛員外􅁩喜雨詩兼上楊使君積旱忽飛澍蒸民心亦傾郊雲不待簇雨色飛江城燋稼濯又􅀤敗荷滋更榮時隨霧縠重乍集栁絲䡖一􅀫恐魚飛數朝徴鸛鳴毒暑澄為冷髙塵滌還清乃知隂隲数制在造化情及此接歡賀臨風聞頌聲五言南湖春泛有客自北至說友人岑元和見懷因叙相思之志以寄焉故人隔楚水日夕望芳洲春草思渺渺征雲暮悠悠心期無形影跡曠成阻修有客江上至知君佐雄州鏗鏘佩蒼玉􅉜蝶驅絳騶伊昔中峰心從来非此流資子長生訣予嘗受以胎息之訣希彼髙仙儔此情今如何􅀫昔師吾謀别後謁禪老更添石室籌深見人間世飄如水上漚蟬號齊王邸月苦隨帝樓聲華盡㝠寞麋鹿徒􅊯􅊯我有一字教坐似遺此憂何煩脫珪組不用辤王侯秪在名位中空門兼可逰五言同薛貟外􅁩久旱感懐兼寄呈上楊使君皇天鑒不昧愐農何亢極絲雨久愆期綺霞徒相惑隂雲舒又卷濯枝安可得涸井不纍瓶乾谿一憑軾赤地芳草死颷塵驚四塞戎冦夜刺􅀜民荒􅀊傷國頼以王猷盛中原無凶慝楊公當此辰省災常旰食獨感下堂雨自州南諸郷降甘澤長城顧渚平地雨一尺水分流澤数郷也偏嘉越境域秋郊天根見我􅆠看稼穡請迴雲漢詩為君􅁔樂職五言兵後早春登故鄣南樓望崑山寺白鶴觀示清道人幷沈道士新陽故樓上眇眇傷遐睠違世情易忘覊時得無倦春歸華樓􅀤丗故陵谷變擾擾陌上心悠悠夢中見蒼林有靈境杳映遥可羡春心􅀝東峯華泉落西甸鐘聲在空碧幡影揺葱蒨緬想山中人神期如㑹面别離芳月積􅄮路浮雲遍正入空門仙君依苦縣隳形捨􅆪􅌧烹玉思精練事外宜我心人間豈予戀身遺丗自薄道勝名必賤耳目何􅀁娯白雲與黄卷五言酬烏程楊眀府華􅀅赴渭北對月見懐釋印及秋夜身閒境亦清風􅁭自瀟灑月意何髙明聞説武安君萬里驅妖精開府秀士先招士林英晉家用元凱亦是魯諸生北望撫長劔感君知已行邉塵昬玉帳殺氣凝金鉦大敵折齊爼一書下聊城翻飛青雲路􅀫昔滄洲情荅云詩中悠然顧仙侣之句五言酬邢端公濟春日蘇臺有呈􅀽州李使君兼書并寄辛陽王三侍御大賢佐當世堯時難退身如何丹霄侣􅁍在滄江濵桞色變又遍鸎聲聞亦頻頼逢冝春守共賞南湖春營道知止足飾躬無淄磷家將詩流近跡與禪僧親放曠臨海門翺翔望雲津雖髙空王說不久山中人上句荅端公學無爲之句五言奉和裴使君清春夜南堂聴陳山人彈白雪春宵凝麗思閒坐開南圍郢客彈白雪紛綸􅀤金徽􅤖從天上至集向瓊臺飛弦上疑䬃䬃虗中想霏霏通幽􅀑神駭合道精鑒稀變態風更入含情月初歸方知阮太守一聴識其微五言畣孟秀才羸疾依小院空閒􅃐自深躡苔憐淨色掃􅀣共芳隂物外好風至意中佳客㝷虗名誰欲累世事我無心投贈荷君芷馨香满幽􅁭五言酬崔侍御見贈市􅀮何妨道禪栖不廢詩與君為此説長破小乗疑五言贈栁喜得嵩山㳒門自號嵩山老一見嵩山老吾生恨太遲問君年㡬許曽出上皇時五言酬李補闕紓不住東林寺雲泉處處行近臣那得識禪客本無名七言兵後經永安㳒空寺寄悟禪師其寺賊􅀁㷊常說人間法自空何言出丗法還同微蹤舊是香林下餘燼今成火宅中後夜池心生素月春天􅀣色起悲風吾知世代相㸔盡誰悟浮生似影公七言春日杼山寄李員外縱南山唯與北山隣古寺連拳伴我身黄鶴有心多不位白雲無事獨相親閒持竹錫深看水􅈸繋麻衣出見人欲掇幽芳聊贈逺郎官那賞石門春七言酬秦山人贈别二首知君髙􅀮占賢星卷葉時時注佛經姓被名公題舊里秦君里詩將麗句號新亭麗句亭來觀新月依清室欲漱香泉䕶觸瓶我有主人江太守如何相伴住禪靈江淹為宣城守常㑹禪靈寺又誰知卧疾不妨禪跡寄詩流性似偏葉示黃金童子愛書題青字古人傳時髙獨鶴来雲外每羡閒花在眼前對此㽞君還欲别因思石瀃訪春泉七言山居示靈澈上人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閒始覺隳名是心了方知苦行非外物􅄫中誰似我松聲草色共無機七言遥和康録事李侍御蕚小寒食夜重集康氏園林習家寒食㑹何頻應恐流芳不待人巳愛治書詩句逸更聞從事酒名新􅒉蕪暗積承䨇􅂂林蘤雷飛􅓬幅巾誰見柰園時節共還持綠茗賞殘春七言釋裴循春愁蜨舞鸎􅁔喜􅀊芳栁絲􅒁褭􅈍帯長江南春色共君有何是君心獨自傷十言西白谿期裴方舟不至望君不見復何情野草閒雲處處生應向秦時武陵路花開􅄫歴一人行七言勞山憶栖霞寺道素上人久期不至逺寺蕭蕭獨坐心山情自得􅃐何深泉聲稍滳芙蓉漏月影纔分鸚鵡林满地雲䡖常礙􅄚繞松風近每吹􅁭貪閒不記前心偈念别聊為出世吟更待花開山似雪山山相似若為㝷七言酬秦山人出山見尋手􅂝酒榼共書幃廻語長松我即歸􅀂是出山機巳息嶺雲何事背君飛七言酬秦山人見尋左右香童不識君擔簦訪我領鷗群山僧待客無俗物唯有窓前片碧雲奉寄晝公蓑笠􅀟童􅅖酒船湖山相引到房前芭蕉何事敎人見暫借空牀守坐禪七言􅀫㳒華寺簡靈澈上人至道無機但杳冥􅀌燈寒竹自青熒不知何䖏小乗客一夜風来聞誦經晝上人集卷苐一
