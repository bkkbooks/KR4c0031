front:
  text: 晝上人集卷第七
  hash: sha256:135498841f59ae35138f081241d077fef52097b71372b8cabf8add6507c3f006
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_007-1a}
body:
  text: 呉興釋皎然弔靈均詞昧天道􅀆有無聴汨音覓渚􅀆躊躇期靈均􅀆若存問神理􅀆何如願君精􅀆為月出􅀌影􅀆示予天獨何􅀆有君君在萬􅀆不群既氷心􅀆皎潔上問天􅀆胡不聞天不聞神莫覩若雲㝠㝠􅀆雷霆怒蕭條杳眇􅀆餘草莾古山春􅀆為誰今猿哀􅀆何思風激冽􅀆楚竹死􅀦殤人悲􅀆雨颸颸雨颸颸􅀆望君時光茫蕩􅃞􅀆化為水萬古忠貞􅀆徒爾為歩虗詞予因覽真訣遂感西城君玉皇下青㝠人間未曽聞日華錬精􅅎精􅅎無垢氛謂我有仙骨且令餌氤氲俯仰媿靈顔􅂅随鸞鵠群俄然動風馭縹緲歸青雲奉􅀿顔尚書真卿觀玄真子置酒張樂舞破陣􅀞洞庭三山􅁔道流迹異人共驚􅀉向􅀞中􅀚道情如何萬象自心出而心澹然無􅀁營手援毫足蹈莭披縑灑墨􅁛麗絶石文亂􅀧急管催雲態徐揮􅗦􅁔􅀤樂音洛縱酒酣狂更好攅􅈐若雨縦横掃尺波澶澷意無涯片嶺崚嶒􅀔􅀅倒盼睞方知造境難象忘神遇非茟端昨日幽竒湖上見今朝舒卷手中㸔興餘􅁿拂逺天色曽向峯東海邉識秋容暮景䬃䬃容翻疑是真􅀞不得顔公素高山水意常恨三山不可至賞君狂􅀞忘逺逰不出軒遲坐蒼翠荅韋山人隠起龍文藥瓢􅁔野人藥瓢天下絶全如渾金割如月彪炳文章智使然生成在我不在天若言有物不由物何意中虚道性全韋生能詩兼好異從此􅂕瓢逺相遺仙侯玉帖人澷傳若士青嚢丗何秘一捧一開如見君藥盛五色香氛氲背上驪龍蟠不睡張鱗擺領生風雲丗人強知金丹道黙仙不成畏仙老年少紛如陌上塵不見吾瓢盡枯稿聊􅀅繫肘歩何䡖便有三山􅀌鶴情東方小兒乏此物遂令仙籍獨無名桃花石枕􅁔贈康從事卞山幽石産竒璞荆人至死采不着何人􅅣枕持贈君片片桃花開未落劒工見􅀆可為劔昆吾石鐵可鑄為劒玉工辨􅀆知非石至寳由来覽者稀今君獨鍳應欲惜何辤售與韋天真幸得提攜近玉人可中棄置君不顧天生秀色徒璘玢四座喧喧爭目恱巧過造化稱一絶莫言昨日因錯磨㸔取從来無􅀧缺六月江南暑未䦨一尺花氷試枕㸔髙窓正午風䬃變室中不減春天寒主人所重重枕徳文章外飾徒相惑更有堅貞不易心與君天下為士則張伯英草􅁔伯英死後生伯高朝㸔手把山中毫先賢草律我草狂風雲陣發愁鍾王須􅁷變態皆自我象形􅁼物無不可閬風逰雲千萬朶驚龍蹴踏飛欲随更覩鄧林花落朝狂風亂攪何飄颻有時凝然茟空握情在􅋁天獨飛鶴有時取􅀔氣更高憶得春江千里濤張生竒態難􅂯遇王小令草書古今稱草絶草罷臨風展􅁿素隂􅃤陽舒如有􅀑状魑容若可懼黄公酒壚興偏入阮籍不嗔嵇亦顧長安酒牓醉後書此日騁君千里歩寒栖子􅁔曽居廬山欲有事羅浮之行君在廬山知有疑是鶴又是雲生死塵埃汙不得眼前榮利徒紛紛今日恵然来訪我酒榼書囊肩背荷拂除衣上餌烟霞昨日胥門宿蔡家天然不飲亦不食抛名换姓覓不得且向人間作酒仙不肎􅀅身生羽翼停形為餌天地根胎息道成丗人皆死我獨存洗慮因吞清眀籙世人皆貪我常足栖子妙今道巳成手把玄樞心運􅁳能令􅀑哭神敢靈身如飄風不可絆朝逰崆峒夕汗澷向来坐客猶未散忽憶羅浮欲厺時遥指􅀌雲作路岐海上仙逰不可見人間日落空桑枝翔隼􅁔送王端公古人賞神駿何如秋隼撃獨立髙標整霜翮應㸔天宇如咫尺低􅅆拂地凌風翔􅉇雛敢下雁㫁行晴空四顧忽不見有時獨出青霞傍窮隂萬里落寒曰氣殺草枯増奮逸雲塞斜飛攪葉迷雪天直上穿花疾見君髙情有􅀁屬贈别因􅁔翔隼曲離亭惨惨客散時􅁔盡路長意不足白雲􅁔􅀉中丞使君長源一見西山雲使人情意逺慿高發詠何超遥道妙如君有舒卷縈空疊景多麗容衆峯峯上自為峯潔白不由隂雨積高眀肎共雜烟重萬物有形皆有着白雲有形無繋縳黄金􅀍爍玉亦瑕一片飄然汚不得或逢天下㦯人間人自營營雲自閒忽爾飛来暫為侣忽然飛去莫能攀逸民對雲効髙致禪子逢雲増道意白雲遇物無偏頗自是人心見同異閶闔天門冝曙㸔為纓為葢擁千官從龍合沓臨清暑殿名就日逶迤繞露寒宫名誰憐西山雲亭亭䖏幽絶坐石長㸔非我覊手中欲􅄃待君􅀃貞白先生那得知只向空山自怡恱裴端公使君清席賦得青桂􅁔送徐長史昔年攀桂為留人今朝攀桂送歸客秋風桃李揺落盡為君青青伴松柏謝公南樓送客還髙􅁔桂樹凌寒山應憐獨秀空林上空賞敷華積雪間昨夜一枝生在月婵姢可望不可折若為天上堪贈行徒使亭亭照離别周長史昉􅀞毗沙天王􅁔長史􅀞神獨感神髙歩區中無兩人雅而逸高且真形生虗無忽可親降魔大㦸縮在手􅀝天長劒横諸紳慈威示物雖凛凛在徳無秋唯有春吾知真象夲非色此中玅用君心得苟能下筆合神造誤􅀧一􅀧亦爲道寫出霜縑可舒卷何人應識此情逺秋齋清寂無外物盥水㷊香聊自展憶昔胡兵圍未觧感得此神天上擺至今雲旗圗我形爲君一顧􅃄塵清奉和顔魯公真卿落玄真子舴艋舟􅁔楚章華臺成影願諸侯落之滄浪子後玄真子冥冥釣􅀮江之汜刳木薪成舴艋舟諸侯落舟自兹始得道身不繋無機舟亦閑從水逺逝􅀆任風還朝五湖􅀆夕三山停綸乍入芙蓉浦撃洑時過眀月灣太公取璜我不取龍伯釣鼇我不釣竹竿嫋嫋魚簁簁此中自得還自􅀏汗澷一逰何可期後来誰遇氷雪姿上古􅀄聞出堯世今朝還見在堯時鄭容全成蛟形木几􅁔萬物貴天然天然不可得渾朴無勞剖劂工幽姿自可蛟龍質欲騰未厺何翩翩􅀭􅃑爭前誰敢拂可中風雨一朝至還應不是池中物蒼山萬重採一枝形如器車生意竒風號雨噴心不折衆木千叢君獨知廣徳中鄭生避賦呉興毗山扵稠人之中遇予獨見􅁛賞高人心多越格有時就月吟春風持来座右驚神客愛君開閣江之濵白雲黄鶴長相親南郭子綦君不識非君獨是何人奉同顔使君真卿清風樓賦得洞庭山􅁔送呉錬師歸林屋洞名山洞府到金庭三十六洞􅁛最靈不有古仙啓其秘今日安知靈寳經中山錬師栖白雲道成仙秩號元君安之高仙者有元君次有夫人元有君秩比左仙公三千甲子朝玉帝丗上如今名始聞吐納青牙飬肌髪花冠玉舄何髙㓗不聞天上来謫仙自是人間受真訣呉興太守道家流仙師逺放清風樓􅀿􅀅內景還飛厺且􅀙分風當此留湖之山􅀆樓上見山冥冥􅀆水悠悠世人不到君自到縹緲仙都誰與儔黄鶴􅀌雲天上物物外飄然自天匹一别千年未可期仙家不􅁆人間日戞銅椀為龍吟􅁔并序唐故太尉房公琯早􅀊常􅀮終南山峻壁之下往徃聞龍吟聲清而静滌人邪想時有好事僧潜戞之以三金冩之唯銅聲酷似他日房公偶至山寺聞林嶺間有此聲乃曰龍吟復􅁶于兹矣僧因出其器以告公命戞之驚曰真龍吟也大暦十三祀秦僧傳至桐江予使童兒戞金倣之亦不减秦聲也緇人或有譏者曰此逹僧之事可以嬉嬋爾曺無以􅃈行自拘因賦龍吟􅁔以見其意逸僧戞椀為龍吟丗上未曽聞此音一從太尉房公賞遂使秦人傳至今􅀄戞徐徐聲漸顯樂音不管何人辨似出龍泉萬丈底乍恠聲来近西逺未必全由戞者功真生虗無非椀中寥亮掩清狖縈􅅆凌細風遥聞不㫁在烟杪萬􅄜無聲天境空聽􅌹一境則衆音不聞非萬􅄜之無聲也乍向天台􅀫華頂秋霄一吟更清逈􅀎令聽者易常性憂人忘憂躁人静今日鏗鍠江上聞蛟螭奔飛如得群聲過陰嶺恐成雨響駐晴天􅀅起雲坐来吟盡空江碧􅁍尋向者聽無跡人生萬事􅀅此同暮賤朝榮動還寂飲茶􅁔誚崔石使君越人遺我剡溪茗採得金芽㸑金􅂦素瓷雪色縹沬香何似諸仙瓊繠􅄴一飲滌昬寐情來朗爽滿天地再飲清我神忽如飛雨灑䡖塵三飲便得道何須苦心破煩惱此物清髙世莫知丗人飲酒多自欺愁㸔畢卓甕間夜􅀏向陶潜籬下時崔侯啜之意不巳狂􅁔一曲驚人耳孰知全道全爾真唯有丹丘得如此買茶􅁔送楊山人華隂少年何􅀁希欲餌丹砂化骨飛江南藥少淮南有暫别胥門上京口京口斜通江水流徘徊應上青山頭夜驚潮沒鸕鷀堰朝㸔日出芙蓉樓揺蕩春風亂帆影片雲無數是􅀭州􅀭州喧喧賣藥市浮俗無由識仙子荷間姹女直千金紫陽夫人服不死吾扵此道復何如昨朝新得蓬莱書薛卿教長行歌時量移湖州别駕桂楊仙栁道家說昔傳蘇君今是薛聊􅀅握槊偶時人便􅀍人間􅁛冠絶黃楊文局􅀛螭蟠􅅣成骰子􅀟琅玕􅀄疑月破雲中随復恠星移指下攅誰識兵竒􅀔可保坐看􅀅軍上一道長行有􅀅軍槊有時彩王去聲非􅀁希􅀏擎單于出重圍鳬驚隼撃疾若飛左顧右盻生光輝家本聮􅊚漢戚里身是長安貴公子名高藝絶何翩翩㡬廻决勝君王前扈逰長樂與祈年人望青雲白日邉謫官江南􅀊隂晚還􅀅此道聊自遣由来君子行最長長行􅀴有君子行小人行予亦知君􅀉心逺桃花石枕􅁔送安吉康丞并序安吉古桃州也今為吴興右邑士遐副焉扵南山􅀗桃花石異而重之珍扵席上士遐􅀅赴京師故帥詩人以君􅀁寳之物髙歌贈行君吏桃州尚竒跡桃州採得桃花石爛疑朝日照已舒含似春風吹未坼珪璋特逹丗􅀁珍吾知此物亦其倫應羡花開不凋悴應嘉玉片無緇潾立性堅剛平若砥君子偏􅀅交道比何人亦比堅剛姿吾見君心得如此君心􅀁好我獨知别多見少長相思從来賞翫安左右萬里提攜君莫辤賦得吴王送女潮􅁔送李判官之河中府見説吴王送女時行宫直到荆谿口谿上千年送女潮為感呉王至今有乃知㫺人由志誠流水無情翻有情平波忽起二三尺此上疑與神仙宅今人猶望荆之􅎠長令望者増􅀁思吴王巳殁女不返潮水無情那有期谿草河草號帝女谿竹河竹號湘妃靈濤旦暮自堪傷的皪嬋姢又争發客歸千里自兹始覽古高􅁔感行子不知别後相見期君意何如此潮水觀李中丞洪二羙人唱歌軋筝􅁔時量移湖州長史君家􅀟羙姬善歌工筝人莫知軋用蜀竹弦楚絲清哇哇娃音􅁔聲也宛轉聲相随夜静酒䦨佳月前髙張水引何淵淵羙人矜名曲不誤蹙響時時如迸泉趙琴素􅀁嘉齊謳世稱絶筝􅁔一動凡音輟凝弦且莫停金罍滛聲巳闋雅聲来㳺魚噞喁鶴徘徊主人髙情始為開髙情放浪出常格偶丗有名道無跡勲業先登上􅀅科文章巳冠諸人籍每􅀏石崇無道情䡖身重色􅍔亦成君有佳人當禪伴扵中不廢學無生愛君天然性寡欲家貧禄薄常知足謫宦無愠如古人交道忘言比前躅不意全家萬里来湖中􅂯見春山緑呉興公舍幽且閒何妨􅀉􅀮在其間時議名齊謝太傅更有攜妓似東山陳氏童子草書􅁔書家孺子有竒名天然大草令人驚僧䖍老時把筆㳒孺子如今皆暗合飊揮電灑眼不及但􅁴毫端鳴颯颯有時作􅀧險且􅀎大行片石㸔欲崩偶然長掣濃又燥少室枯松欹不倒夏室炎炎少人歡山軒日色在䦨干桐花飛盡子䂓思主人高􅁔興不至濁醪不飲嫌昏沉欲翫草書開我􅁭龍􅀲状竒䑕􅂡銳氷牋白晢越人恵王家小令草􅇰狂為予灑出驚騰􅀔飲茶􅁔送鄭容丹丘羽人䡖玉食採茶飲之生羽翼天台記云丹丘出大茗服之羽化名藏仙府丗空知骨化雲宫人不識雲山童子調金鐺楚人茶􅀴虗得名霜天半夜芳草折爛熳緗花啜又生賞君此茶祛我疾使人􅅐中蕩憂慓日上香鑪情未畢辭􅂿虎谿雲高歌送君出花石長枕􅁔畣章居士贈楚山有石郢人琢琢成長枕知是玉全疑氷片坐恐銷間發花叢驚不足贈予比之金琅玕瓊花爛爛浮雲端吾師遣吾不執寳今日感君因執㸔試扣鏗然􅀿清律纎塵不留蠅敢拂萬物皆因造化資如何獨負清真質南山有雲鵠在空長松為我生凉風高友朗詠樂其中行住四儀皆道意不學小乗一曲士唯􅀅此物安坐隅取次閑眠有禪味觀王右丞維滄洲圖􅁔滄洲誤是真凄凄忽盈視便有春渚情褰裳掇芳芷颯然風至草不動始悮丹青得如此丹青變化不可尋翻空作有移人心猶言雨色斜拂座乍似水凉來入􅁭滄洲說近三湘口誰知卷得在君手披圗擁􅄄臨水時翛然不異滄洲叟洞庭山維諒上人院階前􅀌生橘樹􅁔洞庭仙山但生橘不生凡木與梨栗真子無私自不栽感得一株階下出細葉繁枝委露新四時常緑不􅀜春若言此物無道性何意􅀌生就来人二月三月山􅀄暖最愛低檐􅁆枝短白花不用鳥銜来自有風吹手中滿九月十月争破顔金實離離色殷殷一夜天晴香滿山天生珍木異扵俗俗士来逢不敢觸清隂獨歩禪起時徙􅀝前㸔㸔不足春夜賦得漉水囊􅁔送鄭眀府呉縑楚練何白皙居士持来遺禪客禪客􅀎裁漉水囊不用衣工秉刀尺先師遺我或無缺一濾一翻心敢賖夕望東峰思漱盥朧朧斜月懸燈紗徙􅀝花前漏􅀄㫁白猿爭嘯驚禪伴玉瓶徐瀉賞㳙㳙濺着蓮衣水珠滿因識仁人為宦情還如漉水愛蒼生聊􅁔一曲與君别莫忘寒泉見底清湛䖏士枸杞架􅁔天生􅂕艸生􅂕地誤生人間人不貴獨君上有一根始􅁴人間衆芳異拖線垂絲冝曙㸔徘徊滿架何􅃢􅃢春風亦解愛此物裊裊時来􅅖香實濕雲綴葉擺不去翠羽銜花驚畏失肎羡􅀌松不凋色皇天正氣肅不得我獨全生異此軰順時榮落不相背􅀌松自破斧斤傷獨我柔枝保無害黄油酒囊石棋局吾羡湛生心出俗擷芳坐影風灑懐其致翛然此中足觀裴秀才松石障歌誰工此松唯拂墨巧思丹青管不得􅀄寫松梢風正生此中􅀔與真松争高柯細葉動颯颯乍聽幽飀如有聲左右􅀟松更竒絶龍鱗麈尾仍半折􅀴春寒色聚不散逼座隂隂􅀅下雪荆門石状凌璵璠蹙成􅁆片􅀝松根何年蒨蒨菭黏跡㡬夜潺潺水撃痕裴生詩家後来客為我開圖玩松石對之自有髙丗心何事勞君上山􅄚送顧䖏士歌即吴興丘司儀之女壻即况也呉門顧子予早聞風貌真古誰似君人中黄憲與顔子物表􅀌髙􅀅片雲性背時人髙且逸平生好古無儔匹醉書在箧􅁛絶倫神􅀞開厨怕飛出謝氏檀郎亦可儔道情還似我家流安貧日日讀書坐不見將名干五侯知君别業長洲外欲行去聲秋田循畎澮門前便取觳觫乗腰上還􅀅鹿盧佩禪子有情非丗情御荈貢餘聊贈行滿道喧喧遇君别争窺玉潤與氷清水清數珠歌西方真人為行宻臂上記珠皎如日佛名無着心亦空珠去珠来體常一誰道佛身千里身重重只向心中出兵後西日谿行并序沈羲仙記銅峴地肺可以逃水又聖桃源記天地改桃源在即此地也此一章靈澈上人可以志之一從清氣上為天仙叜何年見海乾黄河㡬度濁復清此水如今未曽改西尋仙人渚誤入桃花穴風吹花迸使我迷時時問山驚踏雪石梁丹竈意更竒石梁丹竈銅峴山人渚靈跡有四􅀁春艸不生多故轍我来􅀮道非􅀮身如今世上無風塵路似武陵路人非秦代人飯松得髙侣濯足偶清津􅂾片昔賢􅋥石在㡬廻玆坐戴綸巾姑蘇行古臺不見秋草衰􅁍憶呉王全盛時千年月照秋艸上吴王在時㡬廻望至今月出君不還丗人空對姑蘇山山中精靈安可覩轍迹人蹤麋鹿聚嬋姢西子傾國容化作寒陵一堆土短歌行古人若不死吾亦何􅀁悲蕭蕭􅃄雨九原上白楊青松葬者誰貴賤同一塵死生同一指人生在丗共如此何似浮雲與流水短􅁔行短歌無窮日巳傾鄴宫梁苑徒有名春艸秋風傷我情何為不學金仙侣一悟空王無死生山月行家家望秋月不及秋山望山心萬境長􅄫寥夜夜􅀌眀我山上海人皆言生海東山人自謂出山中憂虞歡樂皆占月月夲無心同不同自從有月山不改古人望盡今人在不知萬丗今夜時􅀌月將誰更待顧渚行􅀉裴方舟我有雲泉臨渚山山中茶事頗相􅀜鶗鴂鳴時芳艸死山家漸欲􅀵茶子伯勞飛日芳艸滋山僧又是採茶時由来慣採無近逺隂䫈長􅀆陽厓淺大寒山下葉未生小寒山中葉􅀄卷二山名呉姹攜籠上翠微蒙蒙香刺􅇢春衣迷山乍􅀍落花亂度水時驚啼鳥飛家園不逺乗露摘歸時露彩猶滴􅄋􅀄㸔怕出欺玉英更取煎来勝金液昨夜西峯雨色過朝尋新茗復如何女宫露澀青牙老堯市人稀紫笋多􅂵笋青芽誰得識日暮採之長太息清冷真人待子元仙傳清冷真人裴君與道人支子元為友貯此芳香思何極武原行贈丘卿岑㫺年群盗阻江東吴山摇蕩楚澤空齊人亦戴蠭蠆毒羙稷花為荆􅁄叢匈匈四顧多窟穴浮雲白波名不同萬人死地當虎口一旦生涯懸殼中昨日􅀅軍徇死莭悉向生民䧟成血􅅐中豹畧張陣雲握內虵矛揮白雪長洲南厺接􅀌城居人散盡鼓譟驚三春不見芳草色四面唯聞刀斗聲此時狂㓂紛如市君當要衝固深壘縦横計出皆􅀗全士卒身先每􅁿死掃平氛祲望吴門人間􅀊羙桑柘繁比屋生全受君賜連營罷戰頼君㤙如何棄置功不錄通籍無名􅆡江曲㶚亭不重李􅀅軍漢爵猶􅁿蘇屬􅀦荒營􅄫􅄫􅀮山􅎛春意空驚故栁條野戰攻城盡如此即今誰是􅂕嫖姚長安少年行翠樓春酒蝦蟇陵長安少年皆共矜紛紛半醉綠槐道蹀􅉜花騘驕不勝風入松西嶺松聲落日秋千枝萬葉風飀飀羙人援琴弄成曲冩得松間聲㫁續琴聲清我魂流波壊陵安足論羙人夜坐眀月禋含少商􅀆􅀧清徴風何凄􅀆飄飄􅄃寒松􅀆又夜起夜未央曲何長金徽更促聲泱泱何人此時不得意意苦弦悲聞客堂晝上人集卷第七
