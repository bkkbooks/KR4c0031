  text: 晝上人集卷第二
  hash: sha256:266f9448d9e3f9fdaff6bba8114db82dc2ccaf86b69ba5d06f72781550be3fec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_002-1a}
body:
  text: 呉興釋皎然五言奉酬袁使君髙春逰鶺鴒峯蘭若見懐鶺鴒中峰近高竒古人遺常欲乞此地飬松挂藤絲昨聞雙旌出一川花满時恨無翔雲步逺赴關山期躋險與誰賞折芳應自怡遥知忘歸趣喜得春景遲巳見郢人唱新題石門詩五言畣裴濟從事遲遲雲鶴意奮翅知有期三秉紀綱局兼登清白資應懐青塘居蕙草沒前墀舊月照秋水廢田留故陂至今髙風在為君吹桂枝昨逢洞庭客果得故人詩何異王内史来招道林師欲攜山侣出難與白雲辭五言白雲上精舍尋杼山禪師兼示崔子向何山道上人望逺涉寒水懐人在幽境為髙皎皎姿及愛蒼蒼嶺果見栖禪子潺湲灌真頂精疑一念破澄息萬緣静世事花上塵慧心空中境清閒誘我性遂使腸慮屏許共林客逰欲從山王請木栖無名樹水汲忘機井持此一日髙未肯謝箕頴夕霽山態好空月生俄頃識玅聆細泉悟深滌清茗此心誰復得笑向西林永五言酬薛貟外誼苦熱行見寄六月金數伏兹辰日在庚炎曦爍肌膚毒霧昏性情安得奮輕翮超揺出雲征不知天地心如何象生成火徳燒百卉瑶草不及榮省客當此時忽貽懐中瓊捧翫煩𬒮滌嘨歌羙風生遲君佐元氣調使四序平中令霜不祓大餘氣常貞江南詩騷客休吟苦熱行五言採實心竹杖寄贈李蕚侍御竹杖裁碧蘚歩林賞髙直實心厺内矯全節無外飾行樂聊自持扶危資爾力初生在榛莾孤秀豈封殖千雪不死枝贈君期君識五言酬薛貟外誼見戲一首方知正始作麗掩碧雲詩文彩盈懐䄂風䂓發詠思遺弓逢大敵摩壘怯偏師煩有移書讓多慚繋組遲淺才迃且拙虗譽喜還疑猶倚披沙鑒長歌向子期五言奉酬李中丞洪湖州西亭即事見寄兼呈呉凴處士時中丞量移湖州長史愛君谿上住遲月開前扃山火照書卷野風吹酒缾為誰留此物意在眼中青樵子逗烟墅漁翁宿沙行主人非楚客莫謾譏獨醒宿昔刑城功道髙心巳冥貪将到䖏士放醉烏家亭五言苕谿草堂自大暦三年夏新營洎秋及春彌覺境勝因紀其事簡潘丞述湯評事衡四十三韻萬慮皆可遺愛山情不易自從東谿住始與人羣隔頗令我心惕渺綿雲官世夢幻羽陵籍鬼録徒相矜九原誰家宅俗情封淺近至理昧堯跖蹈善嗟沉冥履仁傷陻阨匠心聖亦尤攻異天見責世論謂堯聖徳而嗣不肖盗跖毁行而享長福無福仁旤淫之應師心攻異之士反怨天責聖不知有昭昭之業論空者又失性空之實試以慧眼觀斯言諒可覿外事非吾道忘緣倦所歴中宵廢耳言形靜神不伇色天夜清迥花漏時滴􅅹高僧要公刻蓮花漏東風吹杉梧幽月到石壁此中一悟心可與千載敵故交徒好我筐中無咫尺潘生入空門祖師傳秘賾潘子曽愛曺溪禪門湯子自天徳精詣功不僻放世與成名兩圗在所擇遠公謂劉䖏士云世間唯是想耳苟放有丗之見心即道豈有世外物來覊爾耶吾髙鴟夷子身退無瑕謫吾嘉魯仲連功成棄珪璧二賢兼彼才晩節何感激不然作山計改服我下澤君隳元亮冠我脱濳師屐僧傳沙門㳒潛着山屐入朝卧髙松根共逃金閨籍五言畣裴集陽伯眀二賢各垂贈二十韻今以一章用酬兩作知音如瓊枝天生為予有攀折若無階何殊天上栁裴生清通嗣陽子盛徳後詩名比元長二子詩比王融為俱少年著名賦體凌延壽賦如文孝亦俱少年珠生驪龍頷或生靈虵口何似雙瓊章英英曜吾手白日不可汚清源肎容垢持此山上心待君忘情友且伴丘壑賞禾遂名宦誘坐石代瓊茵製荷捐艾綬清宵集我寺烹茗開禪牗發論敎可垂正文言不朽白雲供詩用清吹生座右不嫌逸令醉莫試仙童酒皎皎潯陽隠千年可為偶一從漢道平世事無紛糺星文齊七政天軸眀二斗召士揚弓旌知君在林藪莫學潁陽子請師髙山叟出䖏藩我君還来㑹厓阜五言畣豆盧居士春夜逰東閣見懷春意賞不足承夕步東園事表精慮逺月中華木繁開襟寄清景遐想属空門安得纚芳辰看君幽徑萱五言寄崔萬芳䕫氣殺髙隼撃惜芳歩寒林風摇蒼琅根霜剪荍音翹心歸思忽眇眇佳期亦沉沉我身豈遐逺如隔湘漢深事邇智莫及碩乖情不任遲君忘言侣一笑開吾襟五言訪朱放山人野人未相識何䖏異郷隔昨逢雲陽信教向雲陽覓空聞天上風飄颻不可覿應非矍鑠翁或是滄浪客早晩從我逰共攜春山䇿五言晩冬廢谿東寺懐李司直縱廢谿無人蹟益見離思深歸来始昨日怳忽驚歲隂清想屬遥夜圎景當空林宿昔月未改何如故人心游從間芳趾揺落栖寒岑眇眇湖上别含情初至今道流安寂寞世路倦嶇􅋂此意欲誰見懐賢獨難任徽聲反冥黙夕籟何哀吟禪念破離夢吾師誡援琴耿耿巳及旦曷由開此襟幽期諒未偶勝境徒自尋安得西歸雲因之傳素音五言兵後與故人别予西上至今在揚楚因有是寄日月不相待思君魂屢驚草玄寄揚子作賦得蕪城温温獨逰迹遥遥相望情淮上春草歇楚子秋風生辟士天下盡君何獨屏營運開應佐世業就可成名誰借楚山住年年事耦耕五言因逰支硎寺寄郉端公大厦資多士掄材得豫章清門推問望早歲騁康莊作用方開物聲名乆擅塲丹延分塞郡宿昔領戎行始馭屏星乗旋隂蔽苃棠始佐延州俄典兹郡朝端瞻鶚立關右仰鷹揚威令兼寧朔英聲重護羌三軍成父子雜虜避封疆身執金吾貴時遭寳運昌雍容持漢矟肅穆衛周堂排難知臣節攻疑定國章一言眀大義千載揖休光踐職勳庸列修躬志行彰優㳺應慕陸止足定師張中扆懐殊政南州佇小康仁為桂江雨威是柏臺霜自桂州除侍御史謇諤言無隱公忠旤不防譴深辭紫禁恩在副朱方左遷温州治中量移潤州長史􅋀玉鋒休淬垂天翅罷翔論文徵賈馬述隱許求芉肘後看金碧腰間笑水蒼詩題白羽扇酒挈綠油嚢曠逹機何有深沉器莫量時應登古寺佳趣在春岡止水平香砌鮮雲满石牀山情何寂樂塵世自飛揚巳遇鑪峰社還思緝蕙房外心親地主内學事空王花㑹冝春淺禪逰喜夜凉髙眀依月境蕭散躡庭芳得道殊秦佚隳名似楚狂餘生扵此足不欲返饒陽五言同諸公奉侍祭岳瀆使大理盧㓜平自㑹稽廻經平望将赴于朝廷期過故林不至用題中韻望祀崇周典皇華出漢庭紫泥傾㑹計玄酒薦芳馨聖慮多䖍肅齋心合至靈占祥刋史竹筮日數堯蓂禮秩加新命朝章篤理刑敷誠通北闕遺愛在南亭苕水思曽泛磯山憶重經清風門客仰佳頌國人聴攀桂留卿月徴文待使星春郊廻駟牡遥識故林青五言早秋桐廬思歸示道諺上人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿來觸淨水鳥下喙寒梨可即關吾事歸心自有期五言勞勞山居寄呈呉䖏士山事由来别只應中老身寒園掃綻栗秋浪拾乾薪楚人呼飬柴為秋浪領鶴閒書竹誇雲笑向人俗家相厺逺野水作東隣五言寄報徳寺從上人鼓吹山在寺西宗流許身子物表飬髙閒空色清凉寺秋聲鼔吹山㸔心水磬後行道雨花間七葉翻章句時時啓義關五言山中月夜寄無錫長官湖上凉風早雙峰月色秋遥知秣陵令今夜在西樓别葉蕭蕭下含霜處處流如何共清景異縣不同㳺五言奉賀顔使君真卿二十八郎隔絶自河北逺歸相失値氛烟纔應掌上年乆離驚貌長多難喜身全比信尚書重如威太守憐满庭㸔玉樹更有一枝連五言題湖上蘭若示清㑹上人峰心慧忍寺􅌘頂謝公山何似南湖近芳洲一畆間意中雲木秀事外水堂閒永日無人到時㸔獨鶴還五言秋宵書事寄吴憑真性在方丈寂寥無四隣秋天月色正清夜道心真火夢觀前事浮名悞此身不知庭樹意榮落感何人五言題山璧示道維上人獨居何意足山色在前門身野長無事心㝠自不言閒行數亂竹靜坐照清源物外從知少禪徒不耐煩五言晩秋登佛川南峯懐裴例登嶺望落日眇然傷别魂亭皋秋色遍逰子在荆門世故東西客山容㫁續猿此心誰復見寂寞偶芳蓀五言訪陸䖏士羽太湖東西路吳王古山前所思不可見歸鴻自翩翩何山賞春茗何處弄春泉莫是滄浪子悠悠一釣船五言酬李侍御蕚題㸔心道塲賦以睂毛腸心牙等五字晝得牙字我㳒從誰悟心師是貫花三塵觀種子一雨發萌牙定起輪燈缺宵分印月斜了空如藏史如肯㑹禪家辯正論亦有九流一日禪家者流五言酬姚補闕南仲雲谿館中戲題隨書見寄寺谿臨使府風景借仁祠補衮周官貴能名漢主思卧雲知獨處望月憶同時忽枉緘中贈瓊瑶满手持五言春夜期裴都曹濟集心上人院不至東林期隱吏日月為虗盈逺望浮雲隔空憐定水清逍遙方外侣荏苒府中情漸聴寒鞞發􅚡淵在郡城五言和裴少府懐京兄弟宦逰三楚外家在五陵原凉夜多歸夢秋風满故園北書無逺信西候獨傷魂空念青門别殷勤𡵨路言五言和閻士和望池月畣人片月忽臨池雙蛾憶畫時光浮空似粉影散不成睂孤枕應驚夢寒林正入帷情知兩䖏望莫怨獨相思五言遥和塵外上人與陸澧夜集山寺問涅槃義兼賞陸生文卷上人自號北山子共是竹林賢孫綽僧史以七人配徳嵇阮號竹林七僧心從貝葉傳説經聞月喻開卷愛珠連清淨遥城外蕭踈古墖前應隨北山子髙頂枕雲眠五言春日和盧使君㓜平開元寺聴玅奘上人講時上人将㳺五臺仁聖垂文在虗空日月懸陵遲遲哲匠宗旨發幽詮㳒受諸侯請心教四子傳春生雪山草香下棘林天顧我從今日聞經悟宿緣凉山萬里厺應為教猶偏七言畣侍御問李入道曽經離亂前長干古寺住多年愛貧唯置蓮花足取性閒書樹葉篇自笑不歸㸔石牓誰髙無事弄菭泉身外空名何足問吾心巳岀苐三禪七言奉酬李貟外使君嘉祐蘇臺屏營居春首有懐昔歲為邦初未識今朝休沐始相親移家水巷貧依静種栁風窓欲占春詩思先邀烏府客山情還訪白樓人登臨許作烟霞伴高在方袍間幅巾七言和李舍人使君紓題雲眀府道室許令如今道性雲曽經西岳事桐君流霞手把應憐壽黄鶴心期擬作群金籙時教弟子撿砂牀不遣丗人聞桂陽亦是神仙守分别無嗟兩地分七言奉和陸中丞使君長源寒食日作寒食江天氣最清庾公晨望動髙情因逢内火千家静便覩行春萬木榮淺山容飛雨細縈紆水態拂雲䡖腰章本郡誰相似數日臨人政巳成五言奉酬袁使君送陸㶚却廻期過寺院欲别湖上客暮期西林還髙歌風音表放舟月色間更人莫報夜禪閤本無關五言招韓武康章山僧雖不飲沽酒引陶濳此意無人别多為俗士嫌五言秋居㳒華寺下院望髙頂贈如獻上人峯色秋天見松聲靜夜聞影孤長不出行道在寒雲五言贈韋早陸羽只將陶與謝終日可忘情不欲多相識逢人懶道名五言戲贈薛彜山僧不厭野才子㑹須狂何䖏銷君興春風擺緑楊五言贈顔主簿漢家儀禮盛名教出諸顏更見尚書後能文在子山五言贈融上人常愛西林寺池中月出時芭蕉一片葉書取寄吾師五言聴寒更寄朱兵曹巨川欹枕聴寒更寒更發還住一夜千萬聲㡬聲到君處五言早春書懷寄李少府仲宣并序予故里在長城卞山昔歲屬狂冦陷沒江左親故離散永望枌梓不覺傷懷因李使君長城遂寄是詩以見情也早年初問㳒因悟日中花忽值胡雛起殳夷若亂麻脫身投彼岸弔影念生涯跡與空門合心将丗路賖東田巳蕪沒東部公有東田詩南澗益傷嗟秣陵記曰南澗竭謝氏滅崇替驚人事凋殘感物華如君過我里惆悵舊烟霞七言贈和評事判官廷評年少㳒家流心似澄江月正秋學究天人知逺識權分鹽鐵許良籌春風憶酒烏家近好月論禪謝寺幽清白比来誰見賞憐君獨有冨人侯七言酬秦系山人題贈雲林出空鳥未歸松吹時飄雨浴衣石語花悲徒自詫吾心見境盡為非七言酬秦系山人戲贈正論禪寂忽狂歌莫是塵心顛倒多白足行花曽不染黄囊貯酒欲如何七言貽李蕩茅氏常論七真記壺公愛說三山事寧知梅福在人間獨為蒼生作仙吏日服丹砂骨自清膚如氷雪心更眀山中玉笋是仙藥䄂裡素書題飬生碩隨黄鶴一輕舉仰望青霄獨延佇平生好駭君巳知何必山隂訪王許七言述祖徳贈湖上諸沈我祖文章有盛名千年海内重嘉聲雪飛梁苑操竒賦梁苑出惠連公雪賦春發池塘得佳句康樂云池上楼詩夢恵連方得池塘生芳草之句世業相承及我身風流自謂過時人初看甲乙矜言語對客偏能鴝鵒舞尚公少年善焉飽用黃金無所求長裾曵地干王侯一朝金盡長裾裂吾道不行計亦拙歲晩髙歌悲苦寒空堂危坐百憂攢昔時軒葢金陵下何䖏不傳沈與謝田公與約俱是西邸八支綿綿芳籍至今聞眷眷通宗有數君誰見予心獨飄泊依山寄水似浮雲七言舟行懐閻士和二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲兩三片七言贈張道士玉京真子名太一因服日華心如日此心不許世人知只向仙宫未曽出七言戲呈吳慿丗人不知心是道只言道在他方玅還如瞽老望長安長安在西向東笑雜言宿山寺寄李中丞洪偶来中峯宿閒坐見眞境寂寂孤月心亭亭圎泉影满山花落始知静從他半夜愁猿驚不廢此心長杳冥雜言戲贈呉慿予讀古人書遂識古人面不是識古人邪正何由見貴義輕財求俗譽一錢與人便驕倨昨朝為火今為氷此道非君獨撫膺五言感興贈烏程李眀府伯冝兼簡諸秀才
