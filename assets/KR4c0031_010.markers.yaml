  - {type: variant, offset: 5, length: 0, content: '', WYG: 撰五言奉酬袁使君髙春遊鶺鴒峰蘭若見懐鶺鴒中峰近髙竒古人遺常欲乞此地養松挂藤絲昨聞雙旌出一川花滿時恨無翔雲步逺赴關山期躋險與誰賞折芳應自怡遥知忘歸趣喜得春景遲已見郢人唱新題石門詩五言荅裴濟従事遲遲雲鶴意奮翅知有期三秉綱紀局累登清白資應懐青塘居蕙草没前墀舊月照秋水廢田留故陂至今髙風在為君吹桂枝昨逢洞庭客果得故人詩何異王内史来招道林師欲攜山侶出難與白雲辭五言白雲上精舍尋杼山禪師兼示崔子向何山道上人望逺涉寒水懐人在幽境為髙皎皎姿及愛蒼蒼嶺果見栖禪子潺湲灌真頂積疑一念破澄息萬縁靜世事花上塵惠心空中境清閑誘我性遂使腸慮屏許共林客遊欲従山王請木栖無名樹水汲忘機井持此一日髙未肯謝箕潁夕霽山態好空月生俄頃識妙聆細泉悟深滌清茗此心誰得失笑向西林永五言酬薛員外誼苦熱行見寄六月金數伏茲辰日在庚炎曦爍肌膚毒霧昏性情安得奮輕翮超遥出雲征不知天地心如何匠生成火徳燒百卉瑶草不及榮省客當此時忽貽懐中瓊捧翫煩袂滌嘯歌美風生遟君佐元氣調使四序平中令霜不袚大餘氣常貞江南詩騷客休吟苦熱行五言採實心竹杖寄贈李蕚侍御竹杖裁碧鮮步林賞髙直實心去内矯全節無外飾行樂聊自持扶危資爾力初生在榛莽孤秀豈封殖千雪不死枝贈君期君識五言酬薛員外誼見戲一首方知正始作麗掩碧雲詩文彩盈懐袖風規發詠思遺弓逢大敵摩壘怯偏師頻有移書讓多慙繫組遟殘才迂且拙虚譽喜還疑猶倚披沙鑒長歌向子期五言奉酬李中丞洪湖州西亭即事見寄兼呈呉馮處士時中丞量移湖州長史愛君溪上住遟月開前扄山火照書巻野風吹酒缾為誰留此物意在眼中清樵子逗煙墅漁翁宿沙汀主人非楚客莫謾譏獨醒宿昔邢城功道髙心已㝠貪將到處士放醉烏家亭五言苕溪草堂自大厯三年夏新營洎秋及春彌覺境勝因紀其事簡潘丞述湯評事衡四十三韻萬慮皆可遺愛山情不易自従東溪住始與人群隔應物非宿心遺身是吾䇿先民崆峒子淪景事金液綺里猶近名於陵未泯跡吾師逆流教禪隠殊古昔僧傳云人皆隠於山我獨隠於禪洗足臨潺湲銷聲寄松栢緗荷採堪服柔草持可席道心制野猿法語授幽客境浄萬象真寄目皆有益原上無情花聖教意草木等器世間雖無情而理通又云欝欝黄花無非般若是其義山中聽經石髙僧詮公詩曰學徒數愧石生公有通經石竹生自蕭散雲性常潔白却見羇世人逺髙摩霄翮逹賢觀此意煩想遂氷蘖伊子戰苦勝覽境情不溺智以動念昏功繇無心積形骸爾何有生死誰忻戚為與勝悟㝠不憂頺齡迫春風自駘蕩禪地常閴寂擲札成栁枝僧傳北逺法師涅槃經疏畢擲札於庭栁枝生焉溉瓶養泉胍道人知止足盥潄聊自適學外見古賢頗令我心惕眇綿雲官世夢幻羽陵籍鬼籙徒相矜九原誰家宅俗情封淺近至理昧堯跖蹈善嗟沉㝠履仁傷堙阨匠心聖亦尤攻異天見責世論謂堯聖徳而嗣不肖盜跖毁行而享長富無福仁禍淫之應師心攻異之士反怨天責聖不知有昭昭之業論空者人失信空之實試以慧眼觀斯言諒可覿外事非吾道忘縁倦所歴中宵廢耳目形靜神不役色天夜清迥花漏時滴瀝髙僧要公刻蓮花漏東風吹杉梧幽月到石壁此中一悟心可與十載敵故交徒好我筐中無咫尺潘生入空門祖師傳秘賾潘生曾受曹溪禪門湯子自天徳精詣功不僻放世與成名兩圖在所擇逺公謂劉處士云世聞唯是想耳茍放有世之見心即道豈有世外物来羇爾耶吾髙鴟夷子身退無瑕摘吾嘉魯仲連功成棄珪璧二賢兼彼才晚節何感激不然作山計改服我下澤君隳元亮冠我脱潛師屐僧傳沙門法潛着山屐入朝倚臥髙松根共逃金閨籍五言荅裴集陽伯明二賢各垂贈二十韻今以一章用酬兩作知音如瓊枝天生為予有攀折若無階何殊天上栁裴生清通嗣陽子盛徳後詩名比元長二子詩比王融為俱少年著名賦體凌延夀賦如文孝亦俱盛年珠生驪龍頷或生靈蛇口何似雙瓊章英英曜吾手白日不可汗清源肯容垢持此山上心待君忘情友且伴邱壑賞未隨名宦誘坐石代瓊茵製荷損艾綬清霄集我寺烹茗開禪牖發論教可垂正文言不朽白雲供詩用清吹生座右不嫌逸令醉莫試仙壺酒皎皎尋陽隠千年可為偶一従漢道卒世事無紛糺星文齊七政天軸明二斗召士揚弓旌知君在林藪莫學潁陽子請師髙山叟出處藩我君還来㑹厓阜五言荅豆盧居士春夜遊東園見懐春意賞不足承夕步東園事表精慮逺月中華木繁開襟寄清景遐想屬空門安得纚芳屣看君幽徑萱五言寄崔萬芳夏氣殺髙隼擊惜芳步寒林風揺蒼琅根霜剪荍音翹􅀢心歸思忽眇眇佳期亦沉沉我身豈遐逺如隔湘漢深事邇智莫及願乖情不任遲君忘言侶一笑開吾襟五言訪朱放山人野人未相識何處異鄉隔作逢雲陽信教向雲陽覓空聞天上風飄颻不可覿應非矍爍翁或是滄浪客早晚從我遊共􅂝春山䇿五言晚冬廢溪東寺懐季同直縱廢溪無人跡益見離思深歸来始昨日恍惚驚嵗隂清想屬遥夜圓景當空林宿昔月未改何如故人心遊從間芳趾揺落棲寒岑眇眇湖上别含情初至今道流安寂寞世路倦嶇嶔此意欲誰見懐賢獨難任徽聲反㝠黙夕籟何哀吟禪念破離夢吾師誡援琴耿耿已及旦曷繇開此襟幽期諒未偶勝境徒自尋安得西歸雲因之傳素音五言兵後與故人别予西上至今在楊楚因有是寄日月不相待思君魂屢驚草𤣥寄楊子作賦得蕪城温温獨游跡遥遥相望情淮上春草歇楚子秋風生辟士天下盡君何獨屏營運開應佐世業就可成名誰借楚山住年年事耦耕五言因遊支硎寺寄邢端公大厦資多士掄材得豫章清門推問望早嵗騁康莊作用方開物聲名乆擅塲丹延分塞郡宿昔領戎行始馭屏星乗旋陰蔽茀棠始佐延州俄典茲郡朝端瞻鶚立關右仰鷹揚威令兼寧朔英聲重䕶羌三軍成父子雜虜避封疆身執金吾貴時遭寳運昌雍容持漢矟肅穆衛周堂排難知臣節攻疑定國章一言明大義千載揖休光踐職勲庸列修躬志行彰優游應慕陸止足定師張中扆懐殊政南州佇小康仁為桂江雨威是栢臺霜自桂州除侍御史謇諤言無隠公忠禍不防譴深辭紫禁恩在副朱方左遷温州治中量移潤州長史切玉鋒休淬垂天翅罷翔論文徵賈馬述隠許求羊肘後看金碧腰間笑水蒼詩題白羽扇酒挈緑油囊曠逹機何有深沉器莫量時應登古寺佳趣在春崗止水平香砌鮮雲滿石床山情何寂樂塵世自飛揚已遇鑪峰社還思緝蕙房外心親地主内學事空王花㑹宜春淺禪遊喜夜涼髙明依月境蕭散躡庭芳得道殊秦佚隳名似楚狂餘生於此足不欲返韶陽五言同諸公奉侍祭岳瀆使大理盧幼平自㑹稽廻經平望將赴于朝廷期過故林不至用題中韻望祀崇周典皇華出漢庭紫泥傾㑹計𤣥酒薦芳馨聖慮多䖍肅齋心合至靈占祥刋史竹筮日數堯蓂禮秩加新命朝章篤理刑敷誠通北闕遺愛在南亭苕水思曾泛磯山憶重經清風門客仰佳頌國人聽攀桂留卿月徵文待使星春郊廻駟牡遥識故林青五言早秋桐廬思歸示道諺上人桐江秋信早憶在故山時靜夜風鳴磬無人竹掃墀猿来觸浄水鳥下啄寒梨可即關吾事歸心自有期五言勞勞山居寄呈呉處士山事繇来别只應中老身寒園掃綻栗秋浪拾乾薪楚人呼養柴為秋浪領鶴閑書竹誇雲笑向人俗家相去逺野水作東隣五言寄報徳寺従上人鼓吹山在寺西宗流許身子物表養髙閑空色清涼寺秋聲鼓吹山看心水磬後行道雨花間七葉翻章句時時啟義關五言山中月夜寄無錫長官湖上涼風早雙峰月色秋遥知秣陵令今夜在西樓别葉蕭蕭下含霜處處流如何共清景異縣不同遊五言奉賀顔使君真卿二十八郎絶自河北逺歸相失值氛煙纔應掌上年乆離驚貌長多難喜身全比信尚書重如威太守憐滿庭看玉樹更有一枝連五言題湖上蘭若示清㑹上人峰心惠忍寺嵊頂謝公山何似南湖近芳洲一畝間意中雲木秀事外水堂閑永日無人到時看獨鶴還五言秋宵書事寄呉馮真性在方丈寂寥無四隣秋天月色正清夜道心真大夢觀前事浮名悟此身不知庭樹意榮落感何人五言題山壁示道維上人獨居何意足山色在前門身野長無事心㝠自不言閑行數亂竹靜坐照清源物外従知少禪徒不耐煩五言晚秋登佛川南峰懐裴例登嶺望落日眇然傷别魂亭臯秋色遍遊子在荆門世故東西客山空斷續猿此心誰復見寂寞偶芳蓀五言訪陸處士羽太湖東西路呉主古山前所思不可見歸鴻自翩翩何山賞春茗何處弄春泉莫是滄浪子悠悠一釣船五言酬李侍御蕚題看心道塲賦以眉毛腸心牙等五字晝得牙字我法従誰悟心師是貫花三塵觀種子一雨發萌牙定起輪燈缺宵分印月斜了空如藏史始肯㑹禪家辯正論亦有九流一曰禪家者流五言酬姚補闕南仲雲溪館中戲題隨書見寄寺溪臨使府風景借仁祠補袞周官貴能名漢主思臥雲知獨處望月憶同時忽枉緘中贈瓊瑶滿手持五言春夜期裴都曹濟集心上人院不至東林期隠吏日月為虚盈逺望浮雲隔空憐定水清逍遥方外侶荏苒府中情漸聽寒鞞發淵淵在郡城五言和裴少府懐京兄弟宦遊三楚外家在五陵原涼夜多歸夢秋風滿故園北書無逺信西候獨傷魂空念青門别殷勤岐路言五言和閻士和望池月荅人片月忽臨池雙蛾憶畵時光浮空似粉影散不成眉孤枕應驚夢寒林正入帷情知兩處望莫怨獨相思五言遥和塵外上人與陸澧夜集山寺問涅槃義兼賞陸生文巻上人自號北山子共是竹林賢孫綽僧史以七人配徳嵇阮號竹林七賢心従貝葉傳説經看月喻開巻愛珠連清浄遥城外蕭踈古塔前應隨北山子髙頂枕雲眠五言春日和盧使君幼平開元寺聽妙奘上人講時上人將遊五臺仁聖垂文在虚空日月懸陵遟遟哲匠宗旨發幽詮法受諸侯請心教四子傳春生雪山草香下棘林天顧我従今日聞經悟宿縁涼山萬里去應為教猶偏七言荅李侍御問入道曾經離亂前長千古寺住多年愛貧唯製蓮花足取性閑書樹葉篇自笑不歸看石牓誰髙無事弄名泉身外空名何足問吾心已出第三禪七言奉酬李員外使君嘉祐蘇臺屏營居春首有懐昔嵗為邦初未識今朝休沐始相親移家水巷貪依靜種栁風窓欲占春詩思先邀烏府客山情還訪白樓人登臨許作煙霞伴髙在方袍間幅巾七言和李舍人使君紓題雲明府道室許令如今道性雲曾經西岳事桐君流霞手把應憐夀黄鶴心期擬作群金籙時教弟子檢砂牀不遣世人聞桂陽亦是神仙守分别無嗟兩地分七言奉和陸中丞使君長源寒食日作寒食江天氣最清庾公晨望動髙情因逢内火千家靜便覩行春萬木榮深淺山容飛雨細縈紆水態拂雲輕腰章本郡誰相似數日臨人政已成五言奉酬袁使君送陸灞却廻期過寺院欲别湖上客暮期西林還髙歌風音表放舟月色間更人莫報夜禪閣本無關五言招韓武康章山僧雖不飲酤酒引陶潛此意無人别多為俗士嫌五言秋居法華寺下院望髙頂贈如獻上人峰色秋天見松聲靜夜聞影孤長不出行道在寒雲五言贈韋早陸羽只將陶與謝終日可忘情不欲多相識逢人懶道名五言戲呈薛彛山僧不厭野才子㑹須狂何處銷君興春風擺緑楊五言贈顔主簿漢家儀禮盛名教出諸顔更見尚書後能文在子山五言贈融上人常愛西林寺池中月出時芭蕉一片葉書取寄吾師五言聽寒更寄朱兵曹巨川欹枕聽寒更寒更發還住一夜千萬聲㡬聲到君處五言早春書懐寄李少府仲宣并序予故里在長城卞山㫺嵗屬狂宼䧟沒江左親故離散永望枌梓不覺傷懐因李使君長城遂寄是詩以見情也早年初問法因悟目中花忽值胡雛起芟夷若亂麻脱身投彼岸弔影念生涯跡與空門合心將世路賖東田已蕪沒東部公有東田詩南澗益傷嗟秣陵記曰南澗竭謝氏滅崇替驚人事凋殘感物華知君過我里惆悵舊煙霞七言贈和評事判官廷評年少法家流心似澄江月正秋學究天人知逺識權分鹽鐡許良籌春風憶酒烏家近好月論禪謝寺幽清白比来誰見賞憐君獨有富人侯七言酬秦系山人題贈雲林出空烏未歸松吹時飄雨浴衣石語花愁徒自苦吾心見境盡為非七言酬秦系山人戲贈正論禪寂忽狂歌莫是塵心顛倒多白足行花曾不染黄嚢貯酒欲如何七言貽李湯茅氏常論七真記壺公愛説三山事寧知梅福在人間獨為蒼生作仙吏日服丹砂骨自清膚如氷雪心更明山中玉筍是仙藥袖裏素書題養生願隨黄鶴一輕舉仰望青霄獨延佇平生好駿君已知何必山陰訪王許七言述祖徳贈湖上諸沈我祖文章有盛名千年海内重嘉聲雪飛梁苑操竒賦梁苑出惠連公雪賦春發池塘得佳句康樂云池上樓詩夢惠連方得池塘生芳草之句世業相承及我身風流自謂過時人初看甲乙矜言語對客偏能鴝鵒舞尚公少年善焉飽用黄金無所求長裾曵地干王侯一朝金盡長裾裂吾道不行計亦拙嵗晚髙歌悲苦寒空堂危坐百憂攅昔時軒葢金陵下何處不傳沈與謝田公與約俱是西邸八支綿綿芳藉至今聞眷眷通宗有數君誰見予心獨飄泊依山寄水似浮雲七言舟行懐閻士和二月湖南春草遍横山渡口花如霰相思一日在孤舟空見歸雲兩三片七言贈張道士玉京真子名太一因服日華心如日此心不許世人知只向仙宮未曾出七言戲呈呉馮世人不知心是道只言道在他方妙還如瞽老望長安長安在西向東笑雜言宿山寺寄季中丞洪偶来中峰宿閑坐見真境寂寂孤月心亭亭圓泉影闕滿山花落始知靜従他半夜愁猿驚不廢此心長杳㝠雜言戲贈呉馮予讀古人書遂識古人面不是識古人邪正心自見貴義輕財求俗譽一錢與人便驕倨昨朝為火今為氷此道非君獨撫膺五言感興贈烏程李明府伯宜兼簡諸秀才門前峴山近無路可登陟徒愛峴山髙仰之常歎息不如松與桂生在重巖側五言晚秋宿李軍道所居清溪路不遥都尉每相招落日休戎馬秋風罷射鵰术花生野徑栢實滿寒條永夜依山府禪心共寂寥杼山集巻二欽定四庫全書杼山集巻三唐釋皎然撰五言奉和顔使君真卿與陸處士羽登妙喜寺三癸亭亭即陸生所創秋意西山多列岑縈左次繕亭厯三癸疏趾隣什寺元化隠靈蹤始君啓髙誄誅榛養翹楚鞭草理芳蕙俯砌披水容逼天掃峰翠境新耳目換物逺風煙異倚石忘世情援雲得真意嘉林幸勿剪禪侣欣可庇衛法大臣過佐遊群英萃龍池䕶清澈虎節到深邃徒想嵊頂期于今没遺記五言奉陪陸使君長源裴端公樞春遊東西武邱寺雲水夾雙刹遥疑涌平陂入門見蔵山元化何繇窺曳組探詭怪停驄訪幽竒情髙氣為爽徳暖春亦隨瑶草自的皪蕙樓爭蔽虧金精落壊陵劍彩沉古池一覽帀天界中峰步未移應嘉生公石列坐援松枝五言奉和陸使君長源夏月遊太湖此時公權領湖州庾公心曠逺府事局耳目遂與南湖遊虚襟滌煩燠始知皇天意積水在亭育細流信不讓動物欣所蓄萬頃合天容洗然無雲族峭蒨曯仙嶺神仙傳洞庭神仙所居也超遥隨明牧知公愛澄清波靜氣亦肅已見横流極况聞長鯨戮㑹北信至王師已收長安中洲暫採蘋即栁惲汀洲採白蘋之意也南郡思剖竹公時改授信州向夕分好風飄然送歸舳五言奉和崔中丞使君論李侍御登爛柯山宿石橋寺効小謝體常愛謝公郡幽期願相従果廻青驄臆共躡𤣥仙蹤靈境若髣髴爛柯思再逢飛梁丹霞接古局蒼苔封往想㝠昧理誰親氷雪容蕙樓聳空界蓮宇開中峰今為仙寺晉是仙山遺局古橋昇仙之處見在昔化冲虚鶴今蔵䕶法龍雲窺香樹沓月見色天重永夜寄岑寂清言滌心胸盛遊十年後書在巖中松五言同顔使君真卿李侍御蕚遊法華寺登鳯翅山望太湖雙峰開鳯翅秀出南湖州地勢抱郊樹山威增郡樓正逢周柱史来㑹魯諸侯緩步凌彩蒨清鐃發颼颼披雲得靈境拂石臨芳洲積翠遥空碧含風廣澤秋蕭辰資麗思髙論驚精修何似鍾山集微文及惠休五言奉陪陸使君長源諸公遊支硎寺寺即支公學道處嘗覽髙逸傳山僧有遺蹤佐遊繼雅篇嘉㑹何繇逢塵世即下界色天當上峰春暉遍衆草寒色留髙松繚繞彩雲合參差綺樓重瓊葩灑巾舄石瀃清心胸靈境若可託道情知所従五言奉陪鄭使君諤遊太湖至洞庭山登上真觀却望湖水郡齋得無事放舟下南湖湖中見仙邸果與心賞俱不逺風物變忽如寰宇殊背雲視層崕别是登蓬壺突兀盤水府參差沓天衢廻瞻平蕪盡洪流豁中區氣呑江山勢色淨氛靄無靈長習水徳勝勢當地樞朝宗動歸心萬里思鴻途五言奉和袁使君髙郡中新亭㑹張鍊師晝㑹二上人置亭隠城堞事簡跡易幽公性崇儉素雅才非廣求傍簷竹雨清拂案杉風秋不移府中步登茲如逺遊坐覺詩思髙俯知物役休虚寂偶禪子逍遥親道流更聞臨川作下節安能詶五言奉和陸使君長源水堂納涼効曹劉體栁家陶暑亭意逺不可齊煩襟蕩朱絃髙步援緑荑愛公滿亭客来是清風攜瀅渟前溪上曠望古郡西六月正中伏水軒氣常凄野香襲荷芰道性親鳬鷖禪子顧惠休逸民重劉黎乃知髙世量不以出處暌五言夏日奉陪陸使君長源公堂集府中自清逺六月髙梧間寥亮泛雅瑟逍遥扣𤣥關嶺雲與人靜庭鶴隨公閑動息諒兼遂茲情即東山五言伏日就湯評事衡湖上避暑大火方燥石停雲晝亦收將従賞心侶寸景難逺遊擁几苦炎伏出門望汀洲廻溪照軒宇廣陌臨梧楸釋悶命雅瑟放情思亂流更持無生論可以清煩憂五言奉和顔使君真卿修韻海畢㑹諸文生東堂重挍外學宗碩儒游焉従後進恃以仁恕廣不學門欄峻著書禆理化奉上表誠信探討始河圖紛綸歸海韻親承大匠琢况覩頽波振錯簡記鈆槧音籖閲書移玉鎮曷繇旌不朽盛美流歌引五言喜義興權明府自君山至集陸處士羽青塘别業應難乆辭秩暫寄君陽隠已見縣名花㑹逢闈是粉本自尋人至寧因看竹引身關白雲多門占春山盡最賞無事心籬邊釣溪近五言夏日集李司直縦溪齋修景屬良㑹逺飈生煩襟泄雲收浄緑衆木積芳陰疏滌府中務迢遥湖上心習閑得招我賞夜宜泛琴山近資性靜月来寄情深澹然若事外豈藉隳華簮五言夏日題桐廬楊明府納涼山齋陶家無炎暑自有林中峰席上落山影桐梢廻水容放懐涼風至緩步清陰重何事親堆按猶多髙世蹤五言和楊明府早秋遊法華寺釋事出縣閤初聞茲山靈寺扉隠天色影刹遥丁丁碧峰委合沓香蔓垂蓂苓清景為公有放曠雲邊亭秋賞石潭潔夜嘉杉月清誦空性不昧助道跡又經是以於物理紛然若未形移来字人要全與此道㝠五言宿道士觀古觀秋木秀泠然屬鮮飈瓊花被修蔓栢實滿寒條影殿山寂寂寥天月昭昭幽期寄仙侶習定至中宵清佩聞虚步真官方宿朝五言冬日天井西峰張鍊師所居採薪逢野泉漸見栖閑所坎坎山上聲幽幽林中語仙卿何代隠鄉服言亦楚開水淨藥苗掃雪候山侶零葉聚敗籬幽花積寒渚㝠㝠孤鶴性天外思輕舉五言奉同顔使君真卿開元寺經蔵院㑹觀樹文殊碑萬國布殊私千年降祖師鴈門傳法至龍蔵立言時故實刋周典新聲播魯詩六銖那更拂刼石盡無期五言奉同盧使君幼平遊精舍寺影刹西方在虚空翠色分人天霽後見猿鳥定中聞真界隠青壁春山凌白雲今朝石門㑹千古仰斯文五言奉同顔使君真卿袁侍御駱駝橋翫月山中常見月不及共遊時水上恐將缺林端愛落遲鳥驚憲府客人詠鮑家詩永夜南橋望徘徊若有期五言和邢端公登臺春望句句有春字之什春日繡衣輕春臺别有情春煙間草色春鳥隔花聲春樹亂無次春山遥得名春風正飄蕩春甕莫須傾五言經仙人渚即沈山下古人沈義白日昇天處日月人間短何時此得仙古山春已盡遺渚事空傳不見騰雲駕徒臨洗藥泉如今成逝水翻使恨流年五言獨遊二首性野趣無端春晴路又乾逢泉破石弄放鶴向雲看好僻誰相似従狂我自安芳洲亦有意步上白沙灘又臨水興不盡虚舟可同嬉還雲與歸鳥若共山僧期世事吾不預此心誰得知西峰有禪老應見獨遊時五言遊溪待月溪色思泛月沿洄欲未歸殘燈逢水店踈磬憶山扉夜浦魚驚少空林鵲遶稀可中纔望見撩亂𢷬寒衣五言西溪獨泛道情何所寄素舸漫流間真口憐髙鶴無名羨野山經寒叢竹秀入靜片雲閒泛泛誰為侶唯應共月還五言早秋陪韓明府泛阮元公溪公嘗言禪功可入而官情詎能忘故詩中有此意戲之雨信清殘暑蕭條古縣西早涼生浦溆秋意滿髙低前事雖堆案閒情得泝溪何言戰未勝空寂用還齊五言九日陪顔使君真卿登水樓重陽荆楚尚髙㑹此難陪偶見登龍客同遊戲馬臺風文向水疊雲態擁歌廻持菊煩相問捫襟愧不才五言與盧孟明别後宿南湖對月五湖生夜月千里滿寒流曠望煙霞盡凄涼天地秋相思路渺渺獨夢水悠悠何處空江上徘徊送客舟五言自義亭驛送李長史縦夜泊臨平東湖長亭賔馭散岐路起悲風千里勤王事驅車明月中寒生洞庭水夜度塞門鴻處處堪傷别歸来山又空五言出遊少時不見山便覺無竒趣狂發従亂歌情来任閒步此心誰共證笑看風吹樹五言界石守風望天竺靈隠二寺山頂東西寺江中旦暮潮歸心不可到松路在青霄五言奉和顔使君真卿修韻海畢州中重宴世學髙南郡身封盛魯邦九流宗韻海七字揖文江借賞雲歸堞留歡月在窓不知名教樂千載與誰雙五言晦日陪顔使君白蘋洲集南朝分古郡山水似湘東堤月呉風在湔裾楚客同桂寒初結斾蘋小欲成叢時晦佳游促髙歌聽不終五言冬至日陪裴端公使君清水堂集亞嵗崇佳宴華軒照渌波渚芳迎氣早山翠向晴多推往知時訓書祥辨政和従公惜日短留賞夜如何五言陪盧判官水堂夜宴暑氣當宵盡徘徊坐月前靜依山堞近涼入水扉偏乆是棲林客初逢佐幕賢愛君髙野意烹茗釣淪漣五言新秋同盧侍御薛員外白蘋洲月夜隔暑蘋洲近迎涼欲泛舟榮従憲府至喜㑹夕郎遊氣奪滄浪色風欺汗漫流誰言三伏夜獨此月前秋五言夏日集裴録事北亭避暑前林夏雨歇為我生涼風一室煩暑外衆山清景中忘歸親野水適性許雲鴻蕭散都曹吏還將靜者同五言與王録事㑹張徵君姊妹鍊師院翫雪兼懐清㑹上人何意亷従事還来㑹黙仙寒空驚雪遍春意入歌偏瑶草三花發瓊林七葉連飄颻過栁寺應滿譯經前五言和李侍御蕚嵗初夜集處士書閣書閣即侍御所創遲賢新置閣髙意此郊居古逕行春早新窓見月初放歌還倚瑟講道亦觀書為我留禪位来逢此㑹疎五言湯評事衡水亭㑹覺禪師山侶相逢少清晨㑹水亭雪晴松葉翠煙暖藥苖青靜對滄洲鶴閑看古寺經應憐叩關子了義共心㝠五言與朝陽山人張朝夜集湖亭賦得各言其志洞庭孤月在秋色望無邊零露積衰草寒螿鳴古田茫茫區中想寂寂塵外縁従此悟浮世胡為傷暮年五言晦夜李侍御蕚宅集招潘述湯衡海上人飲茶賦晦夜不生月琴軒猶為開墻東隠者在淇上逸僧来茗愛傳花飲詩看巻素裁風流髙此㑹曉景屢徘徊五言寄昱上人上方居厭向人間住逢山欲懶歸片雲閑似我日日在禪扉地靜松陰遍門空鳥語稀夜涼踈磬盡師友自相依五言夏日與綦母居士昱上人納涼為依爐峰住境勝增道情涼日暑不變空門風自清坐援香實近轉愛緑蕪生宗炳青霞士如何知我名五言建元寺集皇甫侍御書閣不因居佛里無事得相逢名重朝端望身髙俗外蹤公愛講佛經嘗云暮劉處士深詣至理機閑看淨水境寂聽踈鐘宣室恩長在知君志未従五言郭北尋徐主簿别業近依城北住幽逺少人知積雪行深巷閑雲繞古籬竹花冬更發橙實晚仍垂還共巖中鶴今朝下渌池五言題報恩寺清幽上人西峰寺即陳文帝故鄉陳世凋亡後仁祠識舊山帝鄉喬木在空見白雲還雙塔寒林外三陵暮雨間此中難戰勝君獨啟禪關五言題鄭谷江畔桐齋鄭生好琴性逹兼寡欲客齋開别住坐占緑江濆流水非外物閑雲長屬君浮榮未可累曠逹若為群風起髙梧下清絃日日聞五言和閻士和李蕙冬夜重集郡理日閑曠洗心宿香峰雙林秋見月萬壑靜聞鐘珮玉行山翠交麾動水容如何股肱守塵外得相従五言春日陪顔使君真卿皇甫曾西亭重㑹韻海諸生為重南臺客朝朝㑹魯儒暄風衆木變清景片雲無峰翠飄簷下溪光照座隅不將簪艾隔知與道情俱五言寒食日同陸士行報徳寺宿解公房古寺章陵下潛公住幾年安心生輭草灌頂引春泉寂寂傳燈地寥寥禁火天世間多暗室白日為誰懸五言兵馬曹季良宅夜集清景不可失尋君趣有餘身髙避事後道長問心初出處名則異遊従跡何踈吟看刻盡燭笑巻讀殘書露彩生筆硯風音入庭除平明仙侶散觳觫動廻車五言同李侍御蕚李判官集陸處士羽新宅素風千户敵新語陸生能借宅心常逺移籬力更𢎞釣絲初種竹衣帶近裁藤我佐推兄弟詩流得友朋栁陰容過客花逕許招僧不為墻東隠人家到未曾五言題報恩寺惟照上人房上界雨色乾涼宮日遲遲水文披􅔽萏山翠動罘罳中有清真子愔愔步閑墀手縈頗黎縷願證黄金姿旋草堦下生看心當此時亦名苾蒭草枝葉皆右旋故名旋草草有五徳七言尋天目徐君常見仙翁變姓名豈知松子號初平逢人不道往来處賣藥還將鷄犬行獨鶴天邊俱得性浮雲世上共無情三花落地君猶在笑撫安期昨日生七言同李著作縱題塵外上人院百縁唯有什公瓶萬法但看一字經従遣鳥喧心不動任教香醉境常㝠蓮花天晝浮雲巻貝葉宮春好月停禪伴欲邀何著作空音宜向夜中聴七言題周諫别業予寺與周生所俱臨苕水隠身苕上欲如何不著青袍愛緑蘿栁巷任踈容馬入水籬従破許船過昻藏獨鶴閑心逺寂厯秋花野意多若訪禪齋遥可見竹窓書幌共煙波七言同李中丞洪水亭夜集佳人但莫吹參差正憐月色生酒巵山公取醉不關我為愛樽前白鷺鶿七言題秦系上人入麗句亭獨將詩教領諸生但看青山不愛名滿院竹聲堪愈疾亂牀花片足忘情七言春夜集陸處士翫月欲賞芳菲肯待辰忘情人訪有情人西林可是無清景祗為忘情不記春七言寄題雲門寺梵月無側房時人相傳是寳月道人後身也越山千萬雲門絶西僧貌古還名月清朝掃石行道歸林下眠禪看松雪七言法華寺上方題江上人禪室路入松聲逺更竒山光水色共參差中峰禪寂一僧在坐對梁朝老桂枝五言冬日山行過薛徵君我行倦修坂四顧無平陸雨霽鳴鷹鸇天寒聚麋鹿幽人訪名士家在南崗曲菜實縈小園稻花遶山屋深居寡憂悔勝境怡耳目徵心尚與我永言謝浮俗雜言往丹陽尋陸處士不遇逺客殊未歸我来幾惆悵叩關一日不見人繞屋寒花笑相向寒花寂寂遍荒阡栁色蕭蕭愁暮蟬行人無數不相識獨立雲陽古驛邊鳯翅山中思本寺魚口村口望歸船歸船不見見寒煙離心逺水共悠然他日相期那可定閑僧著處即經年五言集湯評事衡湖上望微雨蒼涼逺景中雨色縁山有雲送滿洞庭風吹繞楊栁蕭蕭解輕袂盡日隨林叟五言九日與陸處士羽飲茶九日山僧院東籬菊也黄俗人多泛酒誰解助茶香七言夜過康録事造㑹兄弟愛君門館夜来清瓊樹雙枝是弟兄月在詩家偏足思風過客位更多情五言題沈少府書齋不下南昌縣書齋每日閑野花當砌落溪鳥逐人還有興常臨水無時不見山千峰數可盡不出小窓間杼山集巻三欽定四庫全書杼山集巻四唐釋皎然撰五言送梁拾遺肅歸朝明主重文諫才臣岀江東束書辭東山改服臨北風萬里望皇邑九重當曙空天開芙蓉闕日上蒲桃宮天子初未起金閨籍先通身逢軒轅世名貴鴛鸞中故人榮此别何用悲絲桐秦陪楊使君頊送段校書赴南海幕碩賢靜廣州信為天下貞屈茲大將佐籍彼延閣英聲動栁呉興郊餞意不輕吾知段夫子髙論關蒼生處以徳為藩出則道有行遥知南樓㑹新景當詩情天髙林瘴洗秋逺海色清時泰罷飛檄唯應頌公成五言送陸侍御士佳赴上京長安三千里喜行不言永清路黄塵飛大河滄流靜更懐西川府主公昔和鼎伊欝瑶瑟情威遟花驄影此時已難别日又無停景出餞闕相従心隨過前嶺五言奉陪顔使君真卿登峴山送張侍御嚴歸堂峴首千里情北轅自茲發煙霞正登覽簮筆限趨謁黄鶴望天衢白雲歸帝闕客心南浦栁離思西樓月留賞景不延感時芳易歇他晨有山信一為訪林樾五言酬元主簿子球别贈故人方逺適訪我陳别情此夜偶禪室一言了無生覽君緘中寳如搴清玉瑛胡為藴髙價嵗晚徒營營辭秩貧且病何人見艱貞出無黄金槖空歌白苧行威遟䇿駑馬獨望故關樹渺渺千里心春風起中路近聞新拜命鸞鳳猶棲棘勸君寄一枝且養𡨕𡨕翼甘泉多竹花明年待君食荅道素上人别春色遍逺道寂寞閩中行碧水何渺渺白雲亦英英離人不可望日暮芳洲情黄鶴有逸翮翹首白雲傾欲為山中侶肯秘遼天聲藍縷真子褐葳㽔近臣纓以茲奪爾懐常恐道不成吾門弟子中不减惠休名一性研已逺五言功更精従君汗漫遊莫廢學無生忍草肯揺落禪枝不枯榮采采慰長路知吾心不輕幻情有去住真性無離别留取老桂枝歸来共攀折霅溪館送韓明府章辭滿歸洛令従告還故人東門餞惠愛三年積軒車一夜逺曉月離館空秋風故山晚榮君有嘉薦顧我阻遊衍宿昔峰頂心依依不可巻送穆寂赴舉天子錫𤣥纁傾山禮隠淪君抛青霞去榮資觀國賔劍光既陸離瓊彩何璘玢夙駕别情逺商絃秋意新㝠㝠鴻鵠姿數尺看蒼旻殘冦近宋郊西行惡飈塵立身素耿介處難思經綸春府搜才日髙科得一人送張彛歸長沙早聞凌雲彩謂在鴛鷺儔華髪始相遇滄江仍旋遊䇿名忘茍進澹慮輕所求常服逺遊誡緬懐經世謀片帆背風渚萬里還湘洲別望荆雲積歸心漢水流蘭苕行采采桂棹思悠悠宿昔無機者為君動離憂秋日毘陵南寺送潘述之揚州孤客秋易傷嘶蟬靜仍續佳晨亦已屢歡㑹常不足禪地非路岐我心豈羈束情生逺别時坐恨清景促望中千里隔暮歸西山曲蕭條月中道彩蒨原上緑不見同心人幽懐增躑躅春日又送潘述之揚州别渚望䢴城岐路春日遍柔風吹楊栁芳景流郊甸日日東林期今夕異鄉縣文房曠佳士禪室阻清盻潘生曾受禪印離恨奪賞心不得諧所願莫憶山中人碧雲遥可見新秋送盧判官故人念宿昔欲别增逺情入座炎氣屏為君秋景清繇来空山客不怨離絃聲唯有暮蟬起相思碧雲生奉送袁髙使君詔徵赴行在効曹劉體皇心亭毒廣蝥賊皆陶甄未刈蚩尤旗方同軒后年天子幸漢中轘轅阻氛煙璽書召幕牧名在列岳仙國難倚長城廟謀資大賢清損休汝騎仁留述職篇遐路渺天末繁笳思河邊飾徒促逺期祗命赴急宣䛕才豈足稱深仁顧何偏那堪臨流意千里望旗旃奉送陸中丞長源詔徵入朝詔下鄼侯幕徵賢寵上勲才當持漢典道可致堯君藩牧今榮餞詩流此盛文水従呉渚别樹向楚門分宿寺期嘉月看山識故雲歸心復何奈怊悵在江濆奉送中丞道昌入朝文憲中司盛恩榮外鎮崇諸侯皆取則八使獨推功詔喜新銜鳳車看舊飾熊去思今武子餘教昔文翁清在如江水仁留是國風光徵二千石掃第望司空冬日送顔延之明府撫州覲叔父臨川千里别惆悵上津橋日暮人歸盡山空雪未消鄉雲心渺渺楚水路遥遥林下方歡㑹山中獨寂寥天寒驚斷鴈江信望廻朝嵗晚流芳歇思君在此宵五言送關小師還金陵如何有歸思愛别欲忘難白鷺沙洲晚青龍水寺寒蕉花鋪浄地桂子落空壇持此心為境應堪月夜看五言峴山送裴秀才赴舉漢家招秀士峴上送君行萬里見秋色兩河傷逺情王師出西鎬敵寇避東平天府登名後廻看楚水清五言酬别襄陽詩僧少微詩中荅上人歸夢之意證心何有夢示説夢歸頻文字齎秦本詩騷學楚人蘭開衣上色栁向手中春别後須相見浮雲是我身五言送契上人遊揚州西陵古江口逺見東揚州渌水不同泛春山應獨遊尋僧白巖寺望月謝家樓宿昔心期在人寰非乆留五言送徳清衛明府赴選栁黙陟有薦狀八使慎求能東人獨薦君身猶千里限名已九霄聞逺路翻喜别離言暫惜分鳳門多士㑹擁珮入卿雲五言送鄭孝亷淮西覲省離袂翠華滿晨羞欲早行春風生楚樹曉角發隋城野靄濕衣綵江鴻增客情征途不用戒坐見白波清五言送沈秀之閩中越客不成歌春風起渌波嶺重寒不到海近瘴偏多野戍桄榔發人家翡翠過翻疑此中好君問定如何五言送清㑹上人遊京佳遊限衰疾一笑向西風思見清門外曾臨素滻東峰明雲際寺寺名日出露寒宮宫名行道禪長在香塵不染空五言送沈居士還太原辭官因世難家族盛南朝名重郊居賦沈休文作郊居賦才髙獨酌謡沈文之作浪花飄一葉峰色向三條髙逸雖成性弓旌肯忘招奉同顔使君真卿峴山送李法曹陽氷西上獻書時㑹有詔徵赴京漢日中郎妙周王太史才雲書捧日去鶴版下天来草見呉洲發花思御苑開羊公惜風景欲别幾遅廻五言兵後送姚太祝赴選兩河兵已偃處處見歸舟日夜故人散江臯芳樹秋楚雲傷逺思秦月憶佳遊名動春官籍翩翩才少儔五言兵後送薛居士移家安吉舊遊經喪亂道在復何人寒草心易折閑雲性常真交情别後見詩句比来新向我桃州住惜君東嶺春五言送鄔傪之洪州覲兄弟年少足詩情西江楚月清書囊山翠濕琴匣雪花輕乆别經離亂新正憶弟兄贈君題樂府為是豫章行五言送乾封李成羽檄飛未息離情逺近同感君繇泛瑟關我是征鴻眇黙歸人盡疎蕪夜渡空還期當嵗晚獨在路行中五言送崔判官還揚子輕傳祗逺役依依下姑亭秋聲滿楊栁暮色繞郊坰煙水揺歸思山當楚驛青奉酬袁使君西樓餞秦山人與晝同赴李侍御招三韻秋風怨别情江守上西城行署寒流淺琴窓宿雨晴治書招逺意知共楚狂行送清涼上人何意欲歸山道髙繇境勝花空覺性了月靜知心證永夜出禪吟清猿自相應送李丞使宣州結駟何翩翩落葉暗寒渚夢裏春穀泉愁中洞庭雨聊持剡山茗以代宜城醑五言送至洪沙彌遊越知爾學無生不應傷此别相逢宿我寺獨往遊靈越早晚花㑹中經行剡山月七言送皇甫侍御曾還丹陽别業雲陽别夜憶春耕花發菱湖問去程積水悠揚何處夢亂山稠疊此時情將離有月教絃斷贈逺無蘭覺意輕朝右要君持漢典明年北墅可須營白蘋洲送洛陽李丞使還蘋洲北望楚山重千里廻軺止一封臨水情来還共載看花醉去更相従罷官風渚何時别寄隠雲陽幾處逢後㑹那應似疇昔年年覺老雪山容送履霜上人還金陵西山攜錫西山步緑莎禪心未了奈情何湘宮水寺清秋夜月落風悲松栢多送辨聰上人還廣陵莫學休公學逺公了心須與我心同隋家古栁數株在看取人間萬事空送清勵上人遊福建禪子自矜禪性成將来擬照建溪清南看閩樹花不落更取何縁了妄情送顧道士遊洞庭山見説洞庭無上路春遊亂踏五靈芝含桃風起花狼籍正是仙翁碁散時送邢台州濟海上仙山屬使君石橋琪樹古来聞他時畵出白團扇乞取天台一片雲送栁察諫議叔東城南陌强經過怨别無心亦放歌明日院公應問我閑雲長在石門多送栁淡扶侍赴洪州此子素少宦情共子有西山之好中林許師友忽阻夙心期自顧青緺好来將黄鶴辭少年輕逺渉世道得無欺煙雨孤舟上晨昏千里時離魂渺天末相望在江湄無限江南栁春風巻亂絲同李司直題武邱寺兼留諸公與陸羽之無錫陵寢成香阜禪枝出白楊劍池留故事月樹即他方應世縁須別栖心趣不忘還將陸居士晨發泛歸航夏日題鄭谷江上納涼館迢遥山意外清風又對君若為於此地翻作路岐分别館琴徒語前州鶴自群明朝天畔逺何處逐閑雲太湖館送殷秀才赴舉春風洞庭路揺蕩暮天多衰疾見芳草别離傷逺波詩名推首薦賦甲擬前科數日聞天府山衣製芰荷送重鈞上人遊天台漸看華頂出幽賞意隨生十里行松色千重過水聲海容雲正盡山色雨初晴事事將心證知君道可成早春送顔主簿遊越東兼謁元中丞輕舸趣不已東風吹緑蘋欲看梅市雪知賞栁家春别意傾呉醑芳聲動越人山陰三月㑹内史得嘉賔同顔使君清明日遊因送蕭主簿誰知賞嘉節别意忽相和暮色汀洲遍春情楊栁多髙城戀旌斾極浦宿風波惆悵支山月今宵不再過送道琚上人還金陵一與鍾山别山中得信稀經年求法後及夏問安歸野實充甘膳池花當綵衣慈親莫返拜外禮欲無為送裴邕之上京辭山偶世清挾䇿忽西行帆過隋江疾衣沾楚雪輕尚文須獻賦重道莫論兵東觀今多事應髙白馬生送珍上人還天竺兼寄廣通上人秦山人江寺名天竺多居躡逺蹤春帆依栁浦輕履上蓮峰禪子兼三隠空書共一封因君逹山信應向白雲逢送張孝㢘赴舉名在諸生右家經見素風春田休學稼秋賦出儒宮别路殘雲濕離情晚桂叢明年石渠署應繼叔孫通送劉司法之越蕭蕭鳴夜角驅馬背城濠雨後寒流急秋来朔吹髙三山期望海八月欲觀濤幾日西陵路應逢謝法曹送簡栖上人之建州覲使君舅亂峰江上色羨爾及秋行釋氏惟真子郗家許貴甥􅀈花新雨浄帆葉好風輕千里依元舅廻潮亦有情海人以木葉為帆登開元寺樓送崔少府還平望驛登望思慮積長亭樹連連悠揚下樓日杳映傍帆煙入夜四郊靜南湖月待船送王居士遊越野性配雲泉詩情屬風景愛作爛漫游閑尋東路永何山最好望須上蕭然嶺雜言重送皇甫侍御曾人獨歸日將暮孤帆帶孤嶼逺水連逺樹難作别時心還看别時路送演上人之撫州覲使君叔臨川内史憐諸謝爾在生縁比惠宗逺别應將秦本去幽尋定有楚僧逢停船夜坐親孤月把錫秋行入亂峰便道須過大師寺白蓮池上訪髙蹤送大寳上人歸楚山厭上烏橋送别頻湖光爛熳望行人欲將夜舸陪嘉月肯住空林伴老身獨鶴翩翻飛不定歸雲蕭散㑹無因従何得道懐惆悵莫是人間屢見春送侯秀才南遊芳草隨君自有情不關山色與猿聲為看嚴子灘頭石曾憶題詩不著名别洞庭維諒上人白雲關我不關他此物留君情最多情着春風生橘樹歸心不怕洞庭波康造録事宅送太祝姪之䖍吉訪兄弟阮咸别曲四座愁賴是春風不是秋漫漫江行訪兄弟猿聲幾夜宿蘆洲冬日梅溪送裴方舟宣州平明疋馬上村橋花發梅溪雪未消日短天寒愁送客楚山無限路遥遥送韋向睦州謁獨孤使君汜才子南看多逺情閑舟蕩漾任春行新安江色長如此何似新安太守清送至嚴山人歸山初到人間栁始陰山書昨夜報春深朝朝花落幾株樹惱殺禪僧未證心送僧遊揚州平明擇鉢向風輕正及隋堤栁色行知爾禪心還似我故宮春物肯傷情杼山集巻四欽定四庫全書杼山集巻五唐釋皎然撰兵後餘不亭重送盧孟明遊江西并序孟明常引支子元道人修習禪心兼餌芝术遂與予有棲山之契其宦情未遣故勸勉之攜手曾此分怳如隔胡越倫侯古封邑榮盛風雨歇饑鼯號空亭野草生故轍如何此路岐更作千里别馮軾望逺道春山無斷絶朝行入郢樹夜泊依楚月佳士持操髙揚才日昭晰離言何所贈盈滿有虧缺時節傷蟪蛄芳菲忌鶗鴂予思鹿門隠心跡貴㝠滅頽顔反芝术昔貌成氷雪嵗晏期爾来銷聲坐巖穴别山詩并序時因主人寄風溪蘭若與道士石脇峰相鄰禪僧仙師時得道會至秋中值外縁有請别山懐舊遂有是詩山翁亦好禪借我風溪樹採藥多近峰汲泉有春渡幽僧時相偶仙子或與晤自許戰勝心彌髙獨遊步如何區中事奪我林棲趣辭山下復上戀石行仍顧宿昔情或乖庶幾跡無誤松聲莫相誚此心㝠去住五言同袁髙使君送李判官使廻庾公歡此别路逺意猶賖為出塘口栁榮歸府中花馳陽照古堞遥思凝寒笳延步下前渚泝觴流淺沙湖光引行色輕舸傍殘霞五言陪顔使君餞宣諭蕭常侍江濤凋瘵後逺使發天都昏墊宸心及哀矜詔命敷恤民驅急傳訪舊枉征艫外鎮藩條最中朝顧問殊文皆正風俗名共溢寰區已事方懐闕歸期早戒塗繁笳咽水閣髙葢擁雲衢暮色生千嶂秋聲入五湖離歌猶宛轉歸馭已踟蹰今夕庾公意西樓月亦孤奉陪顔使君修韻海畢東溪泛舟餞諸文士諸侯崇魯學羔鴈日成群外史刋新韻中郎定古文魯公著書依切韻起東字脚皆列古篆菁華兼百氏縑素備三墳國語思開物王言欲致君研精業已就歡宴惜應分獨望西山去將身寄白雲五言今上初登極嵗送皇甫孝亷赴選孝亷即故大夫之子行應㑹府春欲勸及芳辰北極天文正東風漢律新少年逢聖代歡笑别情親况是勲庸後恩榮襲爾身五言同楊使君白蘋洲送陸侍御士佳入朝乆愛呉興客来依道徳藩旋師聞枤杜歸路憶轘轅舊佩蒼玉在新歌白芷繁今朝天地靜北望重飛翻五言雪夜送海上人常州覲叔父上人殷仲文後繼世風流在傳心向一燈望雲裁衲慣翫雪步花能交戰情忘乆銷魂别未曾明朝阮家集知有竹林僧五言送常清上人還舒州􅈞徐林反人思爾法楚信有廻船估客親宵語閑鷗偶晝禪經聲含石瀲塵尾拂江煙常説歸山意誅茅廬霍前五言峴山送崔子向之宣州謁裴使君楚思入詩清晨登峴山情秋天水西寺古木宛陵城琴匣應將往書車亦共行吾知江太守一顧重君名五言送嚴明府入關謁黎京兆春日異秋風何為怨别同潮廻芳渚沒花落晝山空旅候聞嘶馬殘陽望斷鴻應思右内史相見直城中五言送邱秀才遊越山情與詩思爛熳欲何従夜舸誰相逐空江月自逢春期越草秀晴憶剡雲濃便擬將輕錫携居入亂峰五言送楊校書還濟源妖烽昨日靜故里近嵩邱楚月揺歸夢江楓見早秋鄉心無逺道北信减離憂禪子還無事辭君買沃州五言送楊遂初赴選秋風吹别袂客思在長安若得臨觴醉何須减瑟彈秉心凌竹栢㐲信越波瀾春㑹文昌府思君每北看五言送贇上人還京乆遊春草盡還寄北船歸沙鳥窺中食江雲入浄衣秦原山色近楚寺磬聲微見説翻經館多聞似者稀五言送廣通上人遊江西香爐七嶺秀秋色九江清自古多禪隠吾常愛此行尋師經鄂渚受請到青城離别人間事何關道者情五言送羅判官還夀州幕君章才五色知爾得家風故里旋歸駕夀春思奉戎天寒長虵伏飈烈文虎雄定頌張征虜桓桓戡難功五言送李秀才赴婺州招山開江色上孤賞去應遲渌水近呉榜秋風入楚詞猿清獨宿處木落逺行時見説東陽守登樓為爾期五言送薛逢之宣州謁廢使六月鵬盡化鴻飛獨㝠㝠秋烽家不定險路客頻經牛渚何時到漁船幾處停遥知詠史夜謝守月中聽五言送徳守二叔姪上人還國清寺覲師道賢齊二阮俱向竹林歸古偈穿花線春裝巻葉衣僧墟廻水寺佛隴啟山扉愛别吾何有人心强有違五言同明府章送沈秀才還石門山讀書身為郢令客心許楚山雲文墨應經世林泉漫誘君欲隨樵子去惜與道流分肯謝申公輩治詩事漢文五言送吉判官還京赴崔尹幕江南梅雨天别思極春前長路飛鳴鶴離帆聚散煙清晨趨九陌秋色望三邊見説王都尹山陽辟一賢五言送裴判官赴商幕商洛近京師才難赴幕時離歌紛白紵候騎擁青絲㑹喜疲人息應逢猾虜衰看君策髙足自此煙霄期五言送李喻之處士洪州謁曹王獨思賢王府遂作豫章行雄鎮廬霍秀髙秋江漢清見聞驚苦節艱故傷逺情西邸延嘉士遺才得正平五言送唐賛善遊越田園臨漢水離亂寄隋關今日煙塵盡東西又未還長亭百越外孤棹五湖間何處遊芳草雲門千萬山五言送韋秀才晨裝行墮葉萬里望桑乾舊説涇關險猶聞易水寒黄雲戰後積白草暮来看近得君苖信時教旅思寛五言送陳秀才赴舉諸侯懼削地選士皆不羈休隠脱荷芰將鳴矜羽儀甲科争玉片詩句擬花枝君實三楚秀承家有清規五言烏程李明府水堂同盧使君幼平送奘上人遊五臺身將劉令隠經共謝公翻有此宗師在應知我去存問心常寂樂為别豈傷魂獨訪華泉去秋風入鴈門五言送李季良北歸風吹殘栁絲孤客欲歸時掩抑楚絃絶離披湘葉衰前軍猶轉戰故國杳難期北望鴈門雪空吟平子詩五言送淳于蘭陵覲省歡言欲忘别風信忽相驚栁浦歸人思蘭陵春草生擷芳心未及視枕戀常盈此去非長路還如千里情五言送至洪沙彌赴上元受戒上元江中蔡州有梁戒壇不肯資章甫勝衣被木蘭今隨秣陵信欲及蔡州壇野寺鐘聲逺春山戒足寒歸来次第學應見後心難五言九日同盧使君幼平呉興郊外送李司倉赴選重陽千騎出送客為踟蹰曠野多揺落寒山滿路隅晴空懸舊斾秋色起菱湖幾日登司㑹揚才盛五都五言送盧孟明還上都江臯北風至歸客獨傷魂楚水逢鄉鴈平陵憶故園征驂嘶别館落日隠寒原應及秦川望春華滿國門五言送李少賔赴舉豈謂江南别心如塞上行苦雲揺陣色亂木攪秋聲周谷雨未散漢河流尚横春司遲爾䇿方用靜妖兵五言畱别閻士和不慣人間别多應忘别時逢山又逢水只畏却來遲五言送李道士常隨山上下忽限江南北共是忘情人何繇肯相憶七言送裴參軍還下邳舊居北望煙鋪驃騎營虜烽無火楚天晴此時千里西歸客泗上春風得及耕七言送文㑹上人還富陽悠悠渺渺屬寒波故寺思歸意若何長憶孤洲二三月春山偏愛富春多七言送維諒上人歸洞庭従來湖上勝人間逺愛浮雲獨自還孤月空天見心地寥寥一水鏡中山七言九月八日送蕭少府歸洪州明日重陽今日歸布帆絲雨望霏霏行過鶴渚知堪住家在龍沙意有違七言同顔魯泛舟送皇甫侍御曾維舟若許暫従容送過重江不厭重霜簡别来今始見雪山歸去又難逢五言送孫侍御遊越不知持斧客吟㑹是何情丹陛恩猶在滄洲賞暫行江橈隨月泛山䇿逐雲行佳句傳零雨詩流許盛名五言送顔處士還長沙覲省西候風信起三湘孤客心天寒漢水廣鄉逺楚雲深服綵將侍膳擷芳思滿襟歸人忘艱阻别恨獨何任五言送還本上人遊江西欲廣分何教心將江漢期雲招望寺處月待泝盃時真侶誰傷别降猿汝自悲多應過廬阜幽賞却来遲五言送路少府使京兼覲侍御兄國賦推能吏今朝發貢湖佇瞻雙闕鳯思見栢臺烏樹向秦關逺江分楚驛孤榮君有兄弟相繼騁長途五言於成原従送盧士舉落日獨歸客空山走馬嘶蕭條古關外岐路更東西大澤雲寂寂長亭雨凄凄君還到湘水寒夜滿猿啼五言送烏程李明府得陟狀赴京驛吏滿江城深仁見此情士林推玉振公府薦氷清為政移風乆承恩就日行仲容綸綍貴南巷有光榮五言送裴秀才往㑹稽山讀書一身齎萬巻編室寄煙蘿硯滴穿池小書衣種楮多吟詩山響荅泛瑟竹聲和鶴板求儒術深居意若何五言送崔詹事論之上都崔嘗典呉興金虎城池在銅龍劍珮新重看前浦栁猶憶舊洲蘋逺思秦雲暮歸心臘月春青園昔遊處惆悵別離人五言京口送盧孟明還揚州蕭蕭北風起孤棹下江濆暮客去来盡春流南北分萋萋御亭草渺渺蕪城雲相送日千里空山獨望君五言送沙彌大智游五臺童年隨法侶家世本儒流章句三生學清涼萬里遊雲歸龍沼暗木落鴈門秋長老應相問傳予向祖州五言送禀上人遊越雲泉誰不賞獨見爾情髙投石輕龍窟臨流笑鷺濤折荷為片席灑水浄方袍剡路逢禪侶多應問我曹五言送潘秀才之舒州楚水清風生揚舲泛月行荻洲寒露彩雷㟁曙潮聲東道思才子西人望客卿従来金谷集相繼有詩名五言送王山人遊廬山千里訪靈竒山資亦相隨葉舟過鶴市花漏宿龍池峰頂應閑散人間足别離白雲將世事吾見爾心知五言送道契上人之越覲大夫叔楚僧推後輩唐本學新經外國傳香氎何人施竹瓶秋風别李寺春日向柯亭大阮今為郡㸔君眼最青五言送沙彌長文遊京白版年猶小黄花褐已通若為詩思逸早欲似休公邁俗多真氣傳家有素風應須學心地宗旨在關東五言秋日送擇髙上人往江西謁曹王超然獨遊趣無限别山情予病不同賞雲閑應共行齋容秋水照香㲲早風輕曾被陳王識遥知江上迎七言送如獻上人遊長安關中四子教猶存􅀢説新經待爾翻為法應過七祖寺忘名不到五侯門閉尋鄠杜㸔修竹獨上風涼望古原髙逸詩情無别怨春遊従遣落花繁七言日曜上人還潤州送君何處最堪思孤月停空欲别時露茗猶芳邀重㑹寒花落盡不成期鶴令先去看山近雲愛初飛到寺遲莫倚禪功放心定蕭家陵樹誤人悲七言寺院聽胡笳送李殷一奏胡笳客未停野僧還欲廢禪聽難將此意臨江别無限春風葭菼青七言送僧繹斜日揺揚在栁絲孤亭寂寂水逶迤誰堪别後行人盡唯有春風起路岐七言荅裴評事澄荻花間送梁肅拾遺波上荻花非雪花風吹撩亂滿袈裟如今嵗晏無芳草獨對離樽作物華七言送勝雲小師昨日雪山記爾名吾今坐石巳三生少年道性易流動莫遣秋風入别情雜言誚士和别今日同明日隔何事悠悠乆為客君憐溪上去来雲我羨磷磷水中石五言送呉馮遊京北期何意促蕙草夜来繁清月思淮水春風望國門此時休旋逸萬里忽飛翻若憶山陰㑹孤琴為我援七言送僧遊宣州楚山千里一僧行念爾初縁道未成莫向舒姑泉口泊此中嗚咽為傷情五言宿支硎寺上房上方精舍逺共宿白雲端寂寞千峰夜蕭條萬木寒山光霜下見松色月中看却與西林别歸心即欲閑杼山集巻五欽定四庫全書杼山集巻六唐釋皎然撰五言従軍行五首雙騎出紛紛元戎霍冠軍漢鞞秋聒地羌火書燒雲萬里戈城合三邊羽檄分烏孫驅未盡肯顧遼陽勲韓斾拂丹霄漢軍新破遼紅塵驅鹵簿白羽擁嫖姚戰苦軍猶樂功髙將不驕至今丁零塞朔吹空蕭蕭百萬逐呼韓頻年不解鞍兵屯絶漠暗馬飲濁河乾破敵功未録勞師力巳殫須防肘腋下飛禍出無端飛將下天来竒謀閫外裁水心龍劍動地肺鴈山開望氣燕師鋭當鋒敵陳摧従今射鵰騎不敢過雲堆黄紙君王詔青泥校尉書誓師張虎落選將擐犀渠霧暗津蒲失天寒塞栁疎横行千萬騎欲掃塞塵餘五言隴頭水二首隴頭水欲絶隴水不堪聞碎影揺槍壘寒聲咽慢軍素従鹽海積緑帶栁城分日落天邊望逶迤入塞雲秦隴逼𤣥羌征人去未央如何幽咽水併欲斷君腸西注悲窮漠東分憶故鄉旅魂聲攪亂無夢到咸陽七言塞下曲二首寒塞無因見落梅羌人吹入笛聲来勞勞亭上春應度夜夜城南戰未廻都䕶今年破武威塵沙萬里鳥空飛旄竿瀚海掃雲出氊騎天山踏雪歸五言覽史黄綺皆皓髪秦時隠商山嘉謀匡帝道髙步遊天關不愛珪組紲却思林壑還放歌長松下日與孤雲閒五言詠史獨負髙世姿㝠㝠寄浮俗卞子去不歸何人辯荆玉鬻舂意不淺汚迹身豈辱鸞鎩樂迍邅虬蟠甘窘束五噫譎且正可以見心曲雜言詠史田氏門下客馮公衆中賤一朝市義還百代名獨擅始知下客不可輕能使主人功業成借問髙車與珠履何如卑賤一書生五言讀張曲江集相公乃天葢人文佐王成立程正頽靡繹思何縦横春杼弄緗綺陽林敷玉英飄然飛動姿邈矣髙簡情後輩驚失步前修敢爭衡始忻耳目逺再使機慮清體正力已全理精識何妙昔年歌陽春徒推郢中調今朝聽鸞鳯豈獨羨門嘯帝命鎮雄州待濟寄上流才兼荆衡秀氣助瀟湘秋逸蕩子山疋經竒文暢儔沉吟未終巻變態紛難數曜耳代明璫襲衣同芳杜愔愔聞玉磬寤寐在靈府五言奉詶陸使君見過各賦院中一物得江蘺江蘺生古砌花每落禪床嘉客未採掇空門自馨香名因詩目見色對道心忘不遇陸内史誰知殊衆芳五言賦得謝墅送王長史其墅即晝七代祖呉興守舊居世業西山墅移家長我身蕭疎遺樹老寂寞廢田春車巷傷前轍蘺溝憶舊隣何堪再過日更送北歸人五言夏日同崔使君論登城樓賦得逺山逺山湖上小青翠望依稀纔向窗中列還従林表微色濃春草在峰起夏雲歸不是蓬莱島如何人去稀五言詠數探得七鄒子談天嵗黄童對日年求真初作傳鍊魄巳成仙鶴駕迎緱嶺星橋下蜀川逢君竹林客相對弄清絃五言奉同顔使君真卿送李侍御蕚賦得荻塘路落日車遥遥客心在歸路細草暗囘塘春泉縈古渡遺蹤歎蕪没逺道悲去住寂寞荻花空行人别無數五言賦顔氏古今一事得晉仙傳送顔逸梁湘東王國常侍顔協著晉仙傳五篇曾看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春畱鬢髪白日向雲烟逺别賫遺簡囊中有幾篇五言賦得石梁泉送崔逵架石通霞壁懸崖散碧沙天晴虹影渡風細練文斜舉陟幽期阻沿洄客意賖河梁非此路别恨亦無涯五言賦得夜雨滴空堦送陸羽歸龍山同字閑堦夜雨滴偏入別情中斷續清猿應淋漓候館空氣令煩慮散時與早秋同歸客龍山道東来雜好風五言賦得燈心送李侍御蕚光字燈心生衆草因有始知芳綵妓窗偏麗金桃動更香花驚春未盡焰喜夜初長别後空離室何人借末光五言賦得竹如意送詳師赴講青字縹竹湘南美吾師尚毁形仍畱負霜節不變在林青每入楊枝手因談貝葉經誰期沃州講持此别東亭五言聽素法師講法華經法子出西秦名齊漆道人纔敷藥草義便見雪山春䕶講龍来逺聞經鶴下頻應機如一雨誰不滌心塵五言詠􅆒上人座右畫松寫得長松意千尋數尺中翠陰疑背日寒色欲生風真樹孤標在髙人立操同一枝遥可折吾欲問生公五言夏日登觀農樓和崔使君片雨拂簷楹煩襟四坐清霏微過麥隴蕭散傍莎城靜愛和花落幽聞入竹聲朝觀趣無限髙詠寄深情五言妙喜寺逵公院賦得夜磬送呂評事一磬寒山至凝心轉清越細和虚籟盡疎繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别寂厯無性中真聲何起滅五言詠小瀑布瀑布小更竒潺湲二三尺細脉穿亂沙叢聲咽危石初因智者賞果㑹幽人迹不向定中聞那知我心寂五言仙女臺寂寂舊桑田誰家女得仙應無鷄犬在空有子孫傳古木花猶發荒臺路未遷暮来雲一片疑是欲歸年五言靈澈上人何山寺七賢石詩七石配七賢隠僧山上移石性殊磊落君子又髙竒跂禪服宜壊坐客冠可隳夜倚月樹影晝傾風竹枝集質患追琢表頑用磷緇佚火玉亦害塊然長在茲五言潘丞孩子愛子性情竒初生玉樹枝人曾天上見名向月中知我識嬰兒意何須待佩觿五言南池雜詠五首并序余草堂在池上洲昔栁呉興詩汀洲採白蘋即此地也左右雲山滿目一坐遂有終焉之志㑹廣徳中寇盜淮海騷動宵人肆志吾屬不安因賦南池五詠聊以自適水月夜夜池上觀禪身坐月邊虚無色可取皎潔意難傳若向空心了長如影正圓溪雲舒巻意何窮縈流復帶空有形不累物無迹去隨風莫怪長相逐飄然與我同虚舟虚舟動又靜忽似去逢時觸物知無迕為梁幸見遺因風到此岸非有濟川期寒山侵空撩亂色獨愛我中峰無事負輕䇿閒行躡幽蹤衆山揺落盡寒翠更重重寒竹裊裊孤生竹獨立山中雪蒼翠揺動風嬋娟帶寒月狂花不相似還共凌冬發度前溪不意入前溪愛溪従錯路清清鑒不足非是深難度望逺村林杪不可分水步遥難辨一片山翠邊依稀見村逺惜暮景踈隂花下動片景松梢度黄昏破梅信南枝漸噪烏待山月夜夜憶故人長教山月待今宵故人至山月君何在五言效古天寳十四年日出天地正煌煌闢晨曦六龍驅羣動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡扶桑枝渴死化爝火嗟嗟徒爾為空畱鄧林在折盡令人嗤雜言古别離代人荅閻士和太湖三山口呉王在時道寂寞千載心無人見春草誰識緘怨者持此傷懐抱孤舟畏狂風一夜宿烟島望所思兮若何月蕩漾兮空波雲離離兮北斷鴻眇眇兮南多身去兮天畔心折兮湖岸春風胡為兮塞路使我歸夢兮撩亂五言擬長安春詞春信在河源春風蕩妾魂春歌雜鶗鴂春夢繞轘轅春絮愁偏滿春絲悶更繁春期不可定春曲嬾新翻七言效古思君轉戰度交河强弄胡琴不成曲日落應愁隴底難春来定夢江南數萬丈游絲是妾心惹蝶縈花亂相續七言昭君自倚嬋娟望主恩誰知美惡忽相翻黄金不買漢宫貌青塚空埋胡地魂七言銅雀妓强開罇酒向陵看憶得君王舊日歡不覺餘歌悲自斷非關艶曲轉聲難七言長門怨春風日日閉長門揺蕩春心似夢魂誰遣花開只笑妾不如桃李正無言五言哭呉縣房聳明府仁人邁厚徳可謂名實全撫迹若疎曠㑹心極精研履危節詎屈廣徳初江南寇盜充斥賊通名宰長城縣屢至害而竟不就著論識不偏公著道性論一篇恨以榮級淺嘉猷未及宣伊人期逺大志業難比肩昭世既合并吾君籍陶甄奈何明明理與善徒空詮徵教或稽聖窮源反問天一官自呉邑六翮委江壖始是牽絲日翻成撤瑟年金膏果不就房公昔日就沈道士學長生之術書以佛理難之玉珮長此捐倚伏信㝠盻夭脩驚後先安知忘情子愛網素已褰為有深仁感遂令真性遷心悲空林下淚灑秋景前夫子寡兄弟撫孤傷藐然傾雲為慘結弔鶴共聯翩割念命歸駕訣詞向空筵樹桃陰始合愛客位常懸幡然逺行時崇望歸朝旋悟茲歡宴隔哀被嵗月延書帶變芳草履痕移緑錢㝠期儻可逢生盡㑹無縁王坦之與生法師為㝠期前死者歸報其罪福幸願示因業代君運精專沈約死後㝠中見十因師云師急為我造經捨我苦難相思轉寂寞獨往西林泉欲見故人心時閲所贈篇素髙陶靖節今重楚先賢芳躅將遺愛可為終古傳五言哭覺上人憶君南適越不作買山期昨得耶溪信翻為逝水悲神交如可見生盡杳難思白日東林下空懐步影時五言題餘不溪廢寺武原離亂後真界積塵埃殘月生秋水悲風起故臺居人今已盡棲鴿暝還来不到無生理應堪賦七哀五言同李洗馬入餘不溪經辛將軍故城慘慘寒城望將軍下世時髙墉暮草遍大樹野風悲壁壘今惟在勲庸近可思蒼然古溪上川逝共悽其五言憶天台箬溪朝雨散雲色似天台應是東風便吹従海上来靈山遊汗漫仙石過莓苔誤到人間世經年不早廻五言萬囘寺萬里稱逆化愚惷性亦全紫紱拖身上妖姬安膝邊見他拘坐寂故我是眠禪吾知至人心杳若青㝠天五言禪詩萬法出無門紛紛使智昬徒稱誰氏子獨立天地元實際且何有物先安可存須知不動念照出萬重源五言哀教本師不得已强為我著書知盡百慮遣名存萬象拘如何工言子終日論虚無伊人獨㝠㝠時人以為愚五言聞鐘古寺寒山上逺鐘揚好風聲餘月樹動響盡霜天空永夜一禪子泠然心境中五言溪上月秋水月姢姢初生色界天蟾光散浦溆素影動淪漣何事無心見虧盈向夜禪五言山雪夕陽在西峰疊翠縈殘雪狂風巻絮廻驚猿攀玉折何意山中人誤報山花發雜言江上風江風西復東飄暴忽何窮初生虚無際稍起蕩漾中應吹夏口檣竿折定蹙湓城浪花咽今朝莫怪沙岸崩昨夜聲狂巻成雪雜言山雨一片雨山半晴長風吹落西山上滿樹蕭蕭心耳清雲鶴驚亂下水香凝不然風廻雨定芭蕉濕一滴時時入晝禪雜言問遥山禪老天與松子夀獨飲日月精復令顔子賢胡為天其生吾將尋河源上天問天何不平吾將詰仙老大道無私誰强名仙老難逢天不近世人何人解應盡明朝欲向趐頭山問取禪公此義還五言禪思真我性無主誰為塵識昏奈何求其本若拔大木根妄以一念動勢如波翻傷哉子桑扈蟲臂徒虚言神威與外論宗邪生異源空何妨色在妙豈廢身存寂滅本非寂諠譁曽未諠嗟嗟世上禪不共智者論七言支公詩支公養馬復養鶴率性無機多脱畧天生支公與凡異凡情不到支公地得道繇来天上仙為僧却下人間寺道家諸子論自然此公唯許逍遥篇山陰詩友喧四座佳句縱横不廢禪七言述夢夢中歸見西陵雪渺渺茫茫行路絶覺来還在剡東峰鄉心繚繞愁夜鍾寺北禪岡猶記得夢歸長見山重重七言赤松縁㟁蒙籠出見天晴沙瀝瀝水濺濺何處羽人長洗藥殘花無數逐流泉七言戲題松樹為愛松聲聽不足每逢松樹遂忘還翛然此外更何事笑向閒雲似我閒七言戲題二首看飲逢歌日屢曛我身何以繫浮雲時人不解野僧意歸去溪頭作鳥群喧喧共在是非間終日誰知我自閒偶客狂歌何所為欲於人事强相關五言雜寓興嗟嗟號呶子世稱謫仙儔媚俗被蛟綃欺天薦昫脩奔景謂可致馳齡言易留燕昭昧徃事嬴政亡前籌三山果不見九仙忽悠悠君看牛山樂君見麋浦遊昨日千金子聯綿成古邱居將攬明月照爾生死流至樂亭爰居慙貽達者尤㝠㝠光塵内機喪成海漚五言雜興六首吾觀談天客工言喪其精萬物資廣庇此中何有情若為昧顔跖修短怨太清髙論讓鄒子放詞徵屈生請從象外推至論尤明明短齡役長世擾擾悟不早嬪女身後空歡娯夢中好從教西陵樹千載傷懐抱鶴駕何㝠㝠鼇洲去浩浩柔顔感三花凋發悲蔓草月中伐桂人是誰翻使年年不衰老誰髙齊公子泣聽雍門琴死且何足傷殊非達人心獨髙庭中鶴意逺貴氛埃有時青㝠遊顧我還下来白雲琅玕色一片生虚無此物若無心若何巻還舒疎散遂吾性栖山更無機寥寥髙松下獨有閒雲歸精意不可道㝠然還掩扉五言偶然五首樂禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂偶然寂無喧吾了心性源可嫌蟲食木不笑鳥能言隠心不隠迹却欲住人寰欠樹移春樹無山看畫山居喧我未錯真意在其間禪語嫌不學梵音従不翻説禪顛倒是樂殺金王孫真隠須無矯忘名要似愚只將兩條事空却漢潛夫五言問天天公何時有談者皆不經誰道賢人死今為傅説星五言寓言吾道本無我未曾嫌世人如今到城市彌覺此心真五言前溪作春歌已寂寂古水自涓涓徒誤時人輩傷心作逝川五言戲作乞我百萬金封我異姓王不如獨悟時大笑放清狂雜言浮雲三章并序浮雲刺讒也葢取夫盛明之時為浮雲所䝉非不明也小人比於君側讒言熒惑亦如浮雲之害明覽古史極觀君臣之際敗亡之兆生於讒慝遂作是詩浮雲浮雲集于扶桑扶桑茫茫日暮之光匪日之暮浮雲之汙嗟我懐人憂心如蠧浮雲浮雲集于咸池咸池微微日􅉴之時匪日之昊浮雲之惑嗟我懐人憂心如織浮雲浮雲集于髙舂髙舂濛濛日夕之容匪日之夕浮雲之積嗟我懐人憂心如慗七言寓言人生百年我過半天生才定不可換東海釣鼇鼇不食南山坐石石欲爛五言若邪春興春生若邪水雨後漫流通芳草行無盡清源去不窮野烟迷極浦斜日起微風數處乗流望依稀似剡中五言晨登樂遊原望終南積雪凌晨擁弊裘徑上古原頭雪霽山疑近天髙思若浮瓊峰埋積翠玉嶂掩飛流曜彩含朝日揺光奪寸眸寒空標瑞色爽氣襲皇州清眺何人得終當獨再遊杼山集巻六欽定四庫全書杼山集巻七唐釋皎然撰弔靈均詞昧天道兮有無聽汨音覓渚兮躊躇期靈均兮若存問神理兮何如願君精兮為月出孤影兮示予天獨何兮有君君在萬兮不群既水心兮皎潔上問天兮胡不聞天不聞神莫覩若雲㝠㝠兮雷霆怒蕭條杳眇兮餘草莽古山春兮為誰今猿哀兮何思風激洌兮楚竹死國殤人悲兮雨颸颸雨颸颸兮望君時光茫蕩漾兮化為水萬古忠貞兮徒爾為步虚詞因覽真訣遂感西城君玉皇下青㝠人間未曾聞日華鍊精魄精魄無垢氛謂我有仙骨且令餌氤氲俯仰媿靈顔願隨鸞鵠群俄然動風馭縹渺歸青雲奉應顔尚書真卿觀𤣥真子置酒張樂舞破陣畫洞庭三山歌道流迹異人共驚寄向畫中觀道情如何萬象自心出而心澹然無所營手援毫足蹈節披縑灑墨稱麗絶石文亂㸃急管催雲態徐揮慢歌發樂音洛縦酒酣狂更好攅峰若雨縦横埽天波澶漫意無涯片嶺崚嶒勢將倒盻睞方知造境難象忘神遇非筆端昨日幽竒湖上見今朝舒巻手中看興餘輕拂逺天色曾向峰東海邊識秋空暮景䬃䬃容翻疑是真畫不得顔公素髙山水意常恨三山不可至賞君狂盡忘逺遊不出軒墀坐蒼翠荅韋山人隠起龍文藥瓢歌野人藥瓢天下絶全如渾金割如月彪炳文章智使然生成在我不在天若言有物不繇物何意中虚道性全韋生能詩兼好異獲此靈瓢逺相遺仙侯王帖人漫傳若士青囊世何秘一捧一開如見君藥盛五色香氛氲堦上驪龍蟠不睡張鱗擺頷生風雲世人强知金丹道黙仙不成穢仙老年少紛如陌上塵不見吾瓢盡枯槁聊將繫肘步何輕便有三山孤鶴情東方小兒乏此物遂令仙籍獨無名桃花石枕歌贈康従事卞山幽石産竒璞荆人至死採不著何人琢枕持贈君片片桃花開未落劍工見兮可為劍昆吾石鐵可鑄為劍玉工辯兮知非石至寳繇來覽者稀今君獨鑒應欲惜何辭集與章天真幸得提攜近玉人可中弃置君不顧天生秀色徒璘玢四座喧喧爭目悦巧過造化稱一絶莫言昨日因錯磨看取従來無㸃缺六月江南暑未闌一尺花氷試枕看髙窗正午風颯變室中不減春天寒主人所重重枕徳文章外飾徒相惑更有堅貞不易心與君天下為士則張伯英草書歌伯英死後生伯髙朝看手把山中毫先賢草律我草狂風雲陣發愁鍾王須臾變態皆自我象形類物無不可閬風遊雲千萬朶驚龍蹴踏飛欲堕更覩鄧林花落朝狂風亂攪何飄颻有時凝然筆空握情在寥天獨飛鶴有時取勢氣更髙憶得春江千里濤張生竒絶難再遇王小令草書古今稱草絶草罷臨風展輕素陰慘陽舒如有道鬼狀魑容若可懼寒栖子歌曾居廬山欲有事羅浮之行君在廬山知有疑是鶴又是雲生死塵埃汙不得眼前榮利徒紛紛今日惠然來訪我酒榼書囊肩背荷拂除衣上餌烟霞昨夜胥門宿蔡家天然不飲亦不食抛名換姓覓不得且向人間作酒仙不肯將身生羽翼停形為餌天地根胎息道成世人皆死我獨存洗慮因荅清明籙世人皆貪我常足栖子妙今道已成手把𤣥樞心運㝠能令鬼哭神效靈身如飄風不可絆朝遊崆峒夕汗漫向來坐客猶未散忽憶羅浮欲去時遥指孤雲作路岐海上仙遊不可見人間日落空桑枝翔隼歌送王端公古人賞神駿何如秋隼擊獨立髙標望霜翮應看天宇如咫尺低廻拂地凌風翔鵬鶵敢下鴈斷行晴空囘顧忽不見有時獨出青霞傍窮陰萬里落寒日氣殺草枯增奮逸雲塞斜飛攪葉迷雪天直上穿花疾見君髙情有所屬贈别因歌翔隼曲離亭慘慘客散時歌盡路長意不足白雲歌寄陸中丞使君長源一見西山雲使人情意逺憑髙發詠何超遥道妙如君有舒巻縈空疉景多麗容衆峰峰上自為峰潔白不繇陰雨積髙明肯共雜烟重萬物有形皆有著白雲有形無繫縳黄金被爍玉亦瑕一片飄然汙不得或逢天上或人間人自營營雲自閒忽然飛去莫能攀逸民對雲效髙致禪子逢雲增道意白雲遇物無偏頗自是人心見同異閶闔天門宜曙看為纓作葢擁千官従龍合沓臨清暑殿名就日逶迤繞露寒宮名誰憐西山雲亭亭處幽絶坐石長看非我羈手中欲攪待君説貞白先生那得知只向空山自怡悦裴端公使君清席賦得青桂歌送徐長史昔年攀桂為留人今朝攀桂送歸客秋風桃李揺落盡為君青青伴松柏謝公南樓送客還髙歌桂樹凌寒山應憐獨秀空林上空賞敷華積雪間昨夜一枝生在月嬋娟可望不可折若為天上堪贈行徒使亭亭照離别周長昉畫毗沙門天王歌長史畫神獨感神髙步區中無兩人雅而逸髙且真形生虚無忽可親降魔大㦸縮在手倚天長劍横諸紳慈威示物雖凜凜在徳無秋唯有春吾知真象本非色此中妙用君心得茍能下筆合神造誤㸃一㸃亦為道寫出霜縑可舒巻何人應識此情逺秋齊清寂無外物盥手焚香聊自展憶昔胡兵圍未解感得此神天上下至今雲旗圖我形為君一顧煙塵清奉和顔魯公真卿落𤣥真子舴艋舟歌楚章華臺成影願諸侯落之滄浪子後𤣥真子㝠㝠釣隠江之汜刳木新成舴艋舟諸侯落舟自茲始得道身不繫無機舟亦閒従水逺逝兮任風還朝五湖兮夕三山停綸乍入芙蓉浦擊汰時過明月灣太公取璜我不取龍伯釣鼇我不釣竹竿嫋嫋魚簁簁此中自得還自笑汗漫一遊何可期後來誰遇氷雪姿上古初聞出堯世今朝還見在堯時鄭容全成蛟形木机歌萬物貴天然天然不可得渾朴無勞剞劂工幽姿自可蛟龍質欲騰未去何翩翩揚袂爭前誰敢拂可中風雨一朝至還應不是池中物蒼山萬重採一枝形如器車生意竒風號雨噴心不折衆木千藂君獨知廣徳中鄭生避賊呉興毗山於稠人之中遇予獨見稱賞髙人心多越格有時就月吟春風持來座右驚神客愛君開閤江之濵白雲黄鶴長相親南郭子綦我不識非君獨是是何人奉同顔使君真卿清風樓賦得洞庭歌送呉鍊師歸林屋洞名山洞府到金庭三十六洞稱最靈不有古仙啟其秘今日安知靈寳經中山鍊師栖白雲道成仙秩號元君安之髙仙者有元君次有夫人元有君秩比左仙公三千甲子朝玉帝世上如今名始聞吐納青牙養肌髮花冠玉舄何髙潔不聞天上来謫仙自是人間授真訣呉興太守道家流仙師逺放清風樓應將内景還飛去且従分風當此留湖之山兮樓上見山㝠㝠兮水悠悠世人不到君自到縹緲仙都誰與儔黄鶴孤雲天上物物外飄然自天匹一别千年未可期仙家不數人間日戛銅椀為龍吟歌并序唐故太尉房公琯早嵗嘗隠終南山峻壁之下徃徃聞龍吟聲清而靜滌人邪想時有好事僧潛戛之以三金寫之唯銅聲酷似他日房公偶至山寺聞林嶺間有此聲乃曰龍吟復遷于茲矣僧因出其器以告公命戛之驚曰真龍吟也大厯十三祀秦僧傳至桐江手使童兒戛金倣之亦不減秦聲也緇人或有譏者曰此逹僧之事可以嬉娯爾曹無以瑣行自拘因賦龍吟歌以見其意逸僧戛椀為龍吟世上未曾聞此音一従太尉房公賞遂使秦人傳至今初戛徐徐聲漸顯樂音不管何人辯似出龍泉萬丈底乍怪聲来近而逺未必全繇戛者功真生虚無非椀中寥亮掩清笛縈廻凌細風遥聞不斷在煙杪萬籟無聲天境空聽専一境則衆音乍向天台㝛華頂秋宵一吟更清迥能令聽者易常性憂人忘憂躁人靜今日鏗鍠江上聞蛟螭奔飛如得群聲過陰嶺恐成雨響駐晴天將起雲坐来吟盡空江碧却尋向者聽無跡人生萬事將此同暮賤朝榮動還寂飲茶歌誚崔石使君越人遺我剡溪茗採得金牙㸑金鼎素瓷雪色縹沫香何似諸仙瓊蘂漿一飲滌昬寐情来朗爽滿天地再飲清我神忽如飛雨灑輕塵三飲便得道何須苦心破煩惱此物清髙世莫知世人飲酒多自欺愁看畢卓甕間夜笑向陶潛籬下時崔侯啜之意不已狂歌一曲驚人耳孰知茶道全爾真唯有丹邱得如此買藥歌送楊山人華陰少年何所希欲餌丹砂化骨飛江南藥少淮南有暫別胥門上京口京口斜通江水流徘徊應上青山頭夜驚潮没鸕鷀堰朝看日出芙蓉樓揺蕩春風亂帆影片雲無數是揚州揚州喧喧賣藥市浮俗無繇識仙子荷間婉女直千金紫陽夫人服不死吾於此道復何如昨朝新得蓬莱書薛卿教長行歌時量移湖州别駕桂楊仙栁道家説昔傳蘇君今是薛聊將握槊偶時人便被人間稱冠絶黄楊文局龜螭蟠琢成骰子雙琅玕初疑月破雲中堕復怪星移指下攅誰識兵竒勢可保坐看將軍上一道長行有將軍梁有時彩王去聲非所希笑擎單于出重圍鳬驚隼擊疾若飛左顧右盻生光輝家本聯姻漢戚里身是長安貴公子名髙藝絶何翩翩幾廻決勝君王前扈遊長樂與祈年人望青雲白日邊謫宦江南嵗陰晚還將此道聊自遣繇来君子行最長長行經有君子行小人行予亦知君寄心逺桃花石枕歌送安吉康丞并序安吉古桃州也今為呉興右扈士遐副焉於南山獲桃花石異而重之珍于席上士遐將赴京師故帥詩人以君所寳之物髙歌贈行君吏桃州尚竒跡桃州採得桃花石爛疑朝日照巳舒含似春風吹未坼珪璋特逹世所珍吾知此物亦其倫應羨花開不凋悴應嘉玉片無緇磷立性堅剛平若砥君子偏將交道比何人亦秉堅剛姿吾見君心得如此君心所好我獨知别多見少長相思従来賞翫安左右萬里提攜君莫辭賦得呉王送女潮歌送李判官之河中府見説呉王送女時行宫直到荆溪口溪上千年送女潮為感呉王至今有乃知昔人繇志誠流水無情翻有情平波忽起二三尺此上疑與神仙宅今人猶望荆之湄長令望者增所思呉王已殁女不返潮水無情那有期溪草何草號帝女溪竹何竹號湘妃靈濤旦暮自堪傷的皪嬋娟又爭發客歸千里自茲始覽古髙歌感行子不知别後相見期君意何如此潮水觀李中丞洪二美人唱歌軋箏歌時量移湖州長史君家雙美姬善歌工箏人莫知軋用蜀竹絃楚絲清哇哇音娃歌聲也宛轉聲相隨夜靜酒闌佳月前髙張水引何淵淵美人矜名曲不誤蹙響時時如迸泉趙琴素所嘉齊謳世稱絶箏歌一動凡音輟凝絃且莫停金罍滛聲已闋雅聲来遊魚噞喁鶴徘徊主人髙情始為開髙情放浪出常格偶世有名道無跡勲業先登上將科文章已冠諸人籍每笑石崇無道情輕身重色禍亦成君有佳人當禪伴於中不廢學無生愛君天然性寡欲家貧禄薄常知足謫官無愠如古人交道忘言比前躅不意全家萬里来湖中再見春山緑呉興公舍幽且閑何妨寄隠在其間時議名齊謝太傅更有􅂝奴似東山陳氏童子草書歌書家孺子有竒名天然大草令人驚僧䖍老時把筆法孺子如今皆暗合飈揮電灑眼不及但覺毫端鳴颯颯有時作㸃險且能太行片石看欲崩偶然長掣濃入燥少室枯松欹不倒夏室炎炎少人歡山軒日色在闌干桐花飛盡子規思主人髙歌興不至濁醪不飲嫌昬沉欲翫草書開我襟龍爪狀竒䑕鬚鋭水牋白晳越人惠王家小令草最狂為予灑出驚騰勢飲茶歌送鄭容丹邱羽人輕玉食採茶飲之生羽翼天台記云丹邱出大茗服之羽化名蔵仙府世空知骨化雲宫人不識雲山童子調金鐺楚人茶經虚得名霜天半夜芳草折爛漫緗花啜又生賞君此茶祛我疾使人胸中蕩憂慄日上香罏情未畢醉踏虎溪雲髙歌送君出花石長枕歌荅章居士贈楚山有石郢人琢琢成長枕知是玉全疑氷片坐恐銷間發花藂驚不足贈予比之金琅玕瓊花爛爛浮席端吾師道吾不執寳今日感君因執看試叩鏗然應清律纎塵不留蠅敢拂萬物皆因造化資如何獨負清貞質南山有雲鵠在空長松為我生涼風髙友朗詠樂其中行住四儀皆道意不學小乗一曲士唯將此物安座隅取次閒眠有禪味觀王右丞維滄洲圖歌滄洲誤是真萋萋忽盈視便有春渚情褰裳掇芳芷颯然風至草不動始悟丹青得如此丹青變化不可尋翻空作有移人心猶言雨色斜拂座乍似水涼来入襟滄洲説近三湘口誰知春得在君手披圖擁褐臨水時翛然不異滄洲叟洞庭山維諒上人院堦前孤生橘樹歌洞庭仙山但生橘不生凡木與梨栗真子無私自不栽感得一株堦下出細葉繁枝委露新四時常緑不關春若言此物無道性何意孤生就来人二月三月山初暖最愛低簷數枝短白花不用烏銜来自有風吹手中滿九月十月爭破顔金實離離色殷殷一夜天晴香滿山天生珍木異於俗俗士来逢不敢觸清陰獨歩禪起時徙倚前看看不足春夜賦得漉水囊歌送鄭明府呉縑楚練何白皙居士持来遺禪客禪客能裁漉水囊不用衣工秉刀尺先師遺我式無缺一濾一翻心敢賖夕望東峰思潄盥曨曨斜月懸燈紗徙倚花前漏初斷白猿爭嘯驚禪伴玉瓶徐瀉賞涓涓濺著蓮衣水珠滿因識仁人為宦情還如漉水愛蒼生聊歌一曲與君别莫忘寒泉見底清湛處士枸把架歌天生靈草生靈地誤生人間人不貴獨君井上有一根始覺人間衆芳異拖線垂絲宜曙看徘徊滿架何珊珊春風亦解愛此物裊裊時來傍香實濕雲綴葉擺不去翠羽銜花驚畏失肯羨孤松不凋色皇天正氣肅不得我獨全生異此輩順時榮落不相背孤松自被斧斤傷獨我柔枝保無害黄油酒囊石棊局吾羨湛生心出俗擷芳生影風灑懐其致翛然此中足觀裴秀才松石障歌誰工此松唯拂墨巧思丹青營不得初寫松梢風正生此中勢與真松爭髙柯細葉動颯颯乍聽幽飀如有聲左右雙松更竒絶龍鱗麈尾仍半折經春寒色聚不散逼座陰陰將下雪荆門石狀凌璵璠蹙成數片倚松根何年蒨蒨苔黏跡幾夜潺潺水擊痕裴生詩家後来客為我開圖翫松石對之自有髙世心何事勞君上山屐送顧處士歌即呉興邱司儀之女聓即况也呉門顧子予早聞風貌真古誰似君人中黄憲與顔子物表孤髙將片雲性背時人髙且逸平生好古無儔匹醉書在篋稱絶倫神畫開厨怕飛出謝氏檀郎亦可儔道情還似我家流安貧日日讀書坐不見將名干五侯知君別業長洲外欲行秋田循畎澮門前便取觳觫乗腰上還將鹿盧佩禪子有情非世情御荈貢餘聊贈行滿道喧喧遇君别爭窺玉潤與氷清水精數珠歌西方真人為行宻臂上記珠皎如日佛名無著心亦空珠去珠来體常一誰道佛身千萬身重重只向心中出兵後西日溪行并序沈羲仙記銅峴地肺可以逃水又聖桃源記天地改花源在即此地也此一章靈澈上人可以志之一従清氣上為天仙叟何年見乾海黄河幾度濁復清此水如今未曾改西尋仙人渚誤入桃花穴風吹花片使我迷時時問山驚踏雪石梁丹竈意更竒石梁丹竈銅峴仙人渚靈跡有四所春草不生多故轍我来隠道非隠身如今世上無風塵路是武陵路人非秦代人飯松得髙侶濯足偶清津數片昔賢磐石在幾廻竝坐戴綸巾姑蘇行古臺不見秋草衰却憶呉王全盛時千年月照秋草上呉王在時幾廻望至今月出君不還世人空對姑蘇山山中精靈安可覩轍跡人蹤麋鹿聚嬋娟西子傾國容化作寒陵一堆上短歌行古人若不死吾亦何所悲蕭蕭煙雨九原上白楊青松葬者誰貴賤同一塵死生同一指人生在世共如此何似浮雲與流水短歌行短歌無窮日已傾鄴宮梁苑徒有名春草秋風傷我情何為不學金仙侶一悟空王無死生山月行家家望秋月不及秋山望山心萬境長寂寥夜夜孤明我山上海人皆言生海東山人自謂出山中憂虞歡樂皆占月月本無心同不同自従有月山不改古人望盡今人在不知萬世今夜時孤月將明誰更待顧渚行寄裴方舟我有雲泉隣渚山山中茶事頗相關鶗鴂鳴時芳草死山家漸欲收茶子伯勞飛日芳草滋山僧又是採茶時繇来慣採無近逺陰嶺長兮陽崖淺大寒山下葉未生小寒山中葉初巻二山名呉婉攜籠上翠微䝉䝉香㓨罥春衣迷山乍被落花亂度水時驚啼鳥飛家園不逺乗露摘歸時露彩猶滴瀝初看怕出欺玉英更取煎来勝金液昨夜西峰雨色過朝尋新茗復如何女宫露澀青芽老堯市人稀紫筍多紫筍青芽誰得識日暮採之長太息清泠真人待子元仙傳清泠真人斐君與道人支子元為友貯此芳香思何極武源行贈邱卿岑昔年群盜阻江東呉山動揺楚澤空齊人亦戴蜂蠆毒美稷化為荆棘藂洶洶四顧多窟穴浮雲白波名不同萬人死地當虎口一旦生涯懸彀中昨日將軍狥死節悉向生民陷成血胸中豹畧張陣雲握内虵矛揮白雪長洲南去接孤城居人散盡皷譟驚三春不見芳草色四面唯聞刁斗聲此時狂寇紛如市君當要衝固深壘縦横計出皆獲全士卒身先每輕死埽平氛祲望呉門人閒嵗美桑柘繁比屋生全受君賜連營罷戰賴君恩如何棄置功不録通籍無名滯江曲灞亭不重李將軍漢爵猶輕蘇屬國荒營寂寂隠山椒春意空驚故栁條野戰攻城盡如此即今誰是霍嫖姚長安少年行翠樓春酒蝦蟇陵長安少年皆共矜紛紛半醉緑槐道躞蹀花騘驕不勝風入松西嶺松聲落日秋千枝萬葉風飀飀美人援琴弄成曲寫得松間聲斷續琴聲清我魂流波壊陵安足論美人夜坐月明裏含少商兮㸃清徵風何凄兮飄飄攬寒松兮又夜起夜未央曲何長金徽更促聲泱泱何人此時不得意意苦絃悲聞客堂杼山集巻七欽定四庫全書杼山集巻八唐釋皎然撰唐杭州靈隠山天竺寺故大和尚塔銘并序水之性不動而鑒得非無實相之體耶雖積為洪溟而未嘗變其真我自在之妙致也如来大師獨秉至教群聖拱手俾㝠㝠倒識破堅氷之惑豈逾一念之真哉靈隠大師雖外精律儀而第一義諦素所長也故小子誌之大師生縁錢塘范氏諱守真字堅道齊信安太守瑝之八葉禮既冠衆君子器之夙有邱園之期不顧𤣥纁之錫遂詣蘇州支硎寺圓大師受具足戒是夜眼中光現長一丈餘乆而方没葢得戒之禎也後至荆府依真公三年苦行尋禮天下二百餘聖教所至無不至焉至無畏三蔵受菩薩戒香普寂大師傳楞伽心印講起信宗論三十餘遍南山律鈔四十遍平等一雨小大雙機在我圓音未嘗異也乃發殊願誦持華嚴遂於中宵嘗夢神人施珠一顆及覺惘然如珠在握是嵗入五臺山轉華嚴經二百遍追宿心也又轉大蔵經三遍廣正見也至開元二十六年有制舉髙行道俗請正名𨽻大林寺後移籍天竺住靈隠峰時大厯二年也至五年三月寓于龍興淨土院謂左右曰夫至人乗如而来亦乗如而去示其必然也而瞽夫欲以長繩繫彼白日安可得乎非至人而有其盡以此月二十九日告終于茲地春秋七十一僧臈四十五其間臨壇既多度人無數今不復紀也顯名弟子蘇州辨秀湖州惠普道莊越州清江清源杭州擇隣神􅅯常州道進如何鸑鷟之彩共集旃檀之枝江淮名僧難出其右晝之身戒亦忝門人幸參四子之科獨許一時之學斯文在我何敢讓焉詞曰房星在天降為應平聲真好爵縻我視如埃塵既投其簪亦壊其服戒月纔佩禪香乃沐四十餘夏振振盛名大江東南為平聲法長城宣尼既殁微言乃絶我師云亡真乗亦輟靈隠峰上春日秋天風生松柏如師存焉持教門人楚英呉傑儒方荀孟道比文列宿習未盡妄涕猶雪宿已忘真師真如月古之君子名盡彞器大師不書將墜于地紀功者銘傳心者燈蔵諸名山不騫不崩唐蘇州東武邱寺律師塔銘并序律者聖道游入之津為心見所瑕多溺近果不然則極地之階乎武邱律師諱齊翰字等至通教之士也呉興沈氏之子髙祖陳國子祭酒曾祖某隋魏州司馬祖考二世不仕律師綺嵗従大人至山寺覩髙靜無塵之䠱惻然有宿命之知因請出家大人従之至天寳八年八月五日奉制度配名永定九年十月依分壇受具足戒後移名開元大厯中移名武邱皆兩州道俗所請也律師道性淵黙水則淡然跡不近名身不關事長在一室寂如無人豈比夫駢行鼓簧之士哉晝始疑斯人未造精極因問業報之理如何師對曰夫鼓毗嵐之風有物皆壊而靈空不動葢無相也心且無相業何累焉但懼陷於偏空妄撥無耳繇是始知律師心之所至精相部義窟洞法華經王蘇湖戒壇每當諸首大厯十年某月入流水念佛道塲是夜西方念中頓現葢精誠之所致也至某年春秋六十八僧夏四十七遇疾之日謂弟子曰有鶴従空飛下徊翔我前爾曹見乎必謝之期小聖猶病安能免哉即以某年某月終于本院受業門人如隠壇場門人宣兌誠肅禪心律已有時譽晝則律師之鄉僧也戒有一日之長許為法兄昔媿隨肩今傷分影有清規之可採則文石而言焉銘曰漫漫去聲情海多生沒兮超超我師一念越兮舊寺龜溪為僧傑兮新居武邱匠時哲兮適来示生亦示滅兮山上人間有遺轍兮故雲茫茫餘水泱泱留廢房兮黄蘗心苦青松節寒對空壇兮升堂門人結社居士依屝履兮或刻貞石或書勝幡思師存兮唐蘇州開元寺律和尚墳銘并序至人於生死一也物有之我亦有之若日月可蝕靈空可汙乎在至人為宅心之地誡瞽夫不返之瀑流哉於戲我法自五天揚于漢廷八俊四賢横世傑出後之學者聆休風企髙躅何吾師之穆其芬馥歟吾師諱某字某先劉氏之子漢楚王交三十一代孫列祖某永嘉南遷為相丞掾四代祖逺隨東陽守顯其遺榮之跡略載本枝全其拔俗之髙不書後葉葢亦垂訓之意乎吾師幼孤伯父哀字禮如教立孝自天生而宿植縁深心田欲稔因請伯父従師出家伯父哀而捨之事靈隠某禪師因問師入道之次師語曰夫爝火大明乎太虚以爝火之心當太虚之境境非心外心非境中兩不相存兩不相廢今我所證是爾所知曷有萬法之深淺優劣乎畢如涼風入懐醒然清悟天寳四年受戒於東海大師覽真傳講於㑹稽大師曇一至徳中舉髙行𨽻名開元乾元中有詔天下二十五寺各定大徳七人長講戒律吾師其選也頃年淨土一門不愆于念嘗謂人曰昔聞西方之行是有相大乗此乃蓬心不直逹之説何者夫出言即性發意皆如而一色一香無非中道况我正念乎于時六十七天年三十六僧夏十六壇場孤制律樞正持僧綱自緝湖南北皆宗仰焉以建中元年六月十五日寢疾而逝其時有庭樹一本枝葉扶疎及吾師將亡之朝花正新而遽萎條始繁而方折亦恒河水上旃檀樹枝榮枯之意也其年七月五日遷靈龕於武邱西寺松門之右嗚呼青山不歸日林長謝秋原之上萬境皆悲雨㝠㝠而晝陰水浼浼而東逝門人道亮道該清㑹亮以毗尼繼其行會以才學儔其賢該以詞華蹤其美三子之外居廊廡者充江漢焉故觀察使韋公元甫觀察使李公栖筠今虢州刺史李公紓今御史中丞李公道昌林下之跡可追山陰之遊尚想懐人撫事相顧泫然晝實謏才曷足揄揚盛美以吾釋門之事安敢讓焉銘曰本師示終兮𤣥綱絶香山崩兮香海竭大地動兮旃檀折人天㝠兮千光滅我師出嗣兮遺教張如何斯人兮天不臧星既雨兮地亦霜生涯昧昧兮四流長捧遺言兮循徃跡庭無人兮月寂寂百年遐夀兮日長夕萬春上服兮塵已襞門人慟兮世人悲瞻影塔兮山之垂宿昔經行兮舊路岐雲眇眇兮雨霏霏方域盡兮長桑移樂石香名兮不騫不虧唐石圯山故大禪師塔銘并序天作髙山山孕人靈其間氣則賢人當之而動用有異夫黄鶴遊乎天驪龍樂乎淵従其性也賢人治世則匡贊我后出世則誕敷上乗圯山禪祖其人也師諱神悟字通性隴西李氏之子其先屬西晉版蕩遷家于呉之長水世襲儒素幼為諸生及冠忽嬰業疾有不可救之狀咎心補行力將何施開元中詣前溪光律師請醫王之方執門人之禮師示以遣業之教一日理懴二日事懴此仁聖所授行必有徵遂於菩提像前秉不屈之心爇難捨之指異光如月朣朦紺宫極苦可以感明神至精可以動天地葢菩薩之難事歟洎天四中受具足戒身始披緇天八中舉尤異行名𨽻寺逮其晚節益見苦心每嵗置法華道塲九旬入長行禮念觀佛三昧於斯現前因語門人曰夫陰薄日而何傷風運空而不動茍逹於妄誰非性耶方結宇於勞勞山東中據石圯逹分仙渚猛獸馴於禪榻祥雲低於法堂中夜有山神現謂禪師曰弟子即隋故新成曹世安生為列侯死典南嶺今和尚至止願以此永奉經行言訖隠而不見故吏部員外李公華今殿中侍御史崔公益嘗問孔老聖教優劣於吾師師對曰路伽耶典籍皆心外法味之者勞而無證其猶澤朽思春乾水取月之相去天何逺乎去辛夘年春寢疾大漸於戲悼死樂生下士之事吾師了性空豈關情哉便趺坐告終歸于寂樂其時世夀六十三惠夀二十六闍維之日獲舍利五百餘粒珠顆纍纍粲然在矚葢繇専精所致門人湛一圓一潔身力行夏淺功崇亦分河不絶之意也吾聞古之君子生有名而死有諡勲業昭乎彝器箴規煥乎方册何有哲匠作人天師遺徳不書吾誰仰則銘曰聲傳于籥剖之無根象出于鑒窮之不源至人應物體寂名存寂可神照名宜性泯妙用無生示生而盡燈留火續骨化珠分真子徒仰慈聲不聞堂披遺影地起方墳萬木春析諸天晝臐年年世上空望歸雲唐杭州華嚴寺大律師塔銘并序魏晉中穎邁之士多尚出塵白足髙步於海隅青目遐視於湘表千有餘祀禪律宗師吾知若人出秉伊説之鈞處躡黄綺之躅亦躬珪之與和璞隠顯之殊乎我律師其人也法諱道光俗姓褚氏踰齔出家方冠受具詣光州和尚學通毗尼于時夏淺徳崇壇場屬望葢天賚真士為東南義虎雲雨慈味笙鏞道聲常持法華兼創佛廟洎沒身不怠也世夀七十九惠夀五十八上元庚子嵗秋仲月示滅于本寺是日馳陽昧昧滛雨颸颸冽風崇朝嘉木為折乃東土福盡之徵也俄然憙氣五色亭亭如葢移晷不散偏映精廬即西方徃生之意也初吾師未殁其月三日質明支疾凝神依色身觀彌陁其相忽現師前滿庭碧花昔所未覩其四日昧爽有異人請師為和尚遂開目彈指曰但發菩提心五之日曼陁羅花自天而雨悲夫非哲匠去世安至是耶門人神烈義津等攝齋何仰繞塔徒哀履名跡而可師書琬琰之不墜詞曰我法未季哲人是生真慈在物澤灑飈清髙戒嚴身佩月與瓔貽訓徒張逝不可作瑞花㝠濛卿雲縈薄靈輀何止于此山椒寒鼯斷續影塔蕭寥五峰諸子泣望終朝唐湖州佛川寺故大師塔銘并序夫萬有朝徹獨立而不改其玅空乎洎鴻濛已還民溺情海安不幻之跡喪全真之旨若識浪不作幻何有哉我釋迦本師獨開宗極遽而告滅降藴魔也在而言逝為狂子也以八萬四千正法首付飲光飲光已下二十四聖降及菩提逹磨繼傳心教有七祖焉第六祖曹溪能公能公傳方巖策公乃永嘉覺荷澤㑹之同學也方巖即佛川大師也大師諱惠明俗姓陳氏漢太邱長寔之後世居順顯祖某永嘉南遷為司徒掾陳氏受禪四代祖仲文有佐命之勲封丹陽公祖某雙溪穀熟二縣宰考某蘭陵人也大師雖世有榮閥而未嘗自稱葢處塵世之餘累矣先夫人初感之日如持佛戒足惡履於葷圃口不嘗於鱻器神夢髣髴長聞法音既而誕焉年漸及丱方祈捨俗大人従之至受具時即開元七年也耳未誘於聲界眼不瑕於色塵清行尅終如鑒寒玉嘗謂人曰昔者繁刑首作伯成子髙遁焉吾雖不捨律儀而惡乎淨論紛若心即心之法至矣哉西詣方巖頓開心地於戲㝠㝠其機赫赫其師寂乎大空之淵而不疑放乎萬縁之律而不變天寳年將有願於清涼山淮汴阻兵師乃旋䇿偶與禪侶西之宛陵闕文於上石為神明奈何使我蒼生每被血食豈知此事殃爾業耶神曰非弟子本意人自為之禮懴再三大師乃授以菩薩戒神欣然曰若和尚移寺弟子願捨此處永奉禪居言畢不見其後果移寺焉於祠側獲銅盤之底篆文是吾師法號更有異器畧而不書建中元年春忽顧左右愀然而歎曰夫人生百年葢一念耳昧者安知掲日月以趍新哉吾將徃淨方爾曹勉之于時報年八十四僧臈五十一以其年正月十一日有疾其日庭木春悴山雨晝㝠猛虎繞垣悲嘯而去十二日奄然長徃二月十二日建塔於佛湘川西山有慈烏滿林舉衆驚異受法門人自湘淮楚不逺而至有若孤秉律網黙持心印惠解比邱即其人也徳與物敷言隨性寢聲采不飾世謂渾金惠敏比邱即其人也外學以文内修心行跡不疑聖機能造微如知比邱即其人也菩薩戒弟子刺史盧公幼平顔公真卿獨孤公問俗杜公位裴公清惟彼數公深於禪者也謝太傅之通於宗要殷淵源之造於精微常恐大師之言將墜于地顧謂小子志之予曰必使覩至人之奥知地位之極則未敢聞命若盛美之跡人所見聞何嘗敢忘請退而記之刻諸靈石詞曰青山我廬白雲我曹吾師處焉人遐跡髙跡髙伊何降心鍊魔傳教方巖傾珠竭河持而不檢放而不過匪雲異月如水與波見獨超超證法無兩生死誰羈我不可鞅若揺空輪如蹵風響何為告滅亦繇狂子忽示雙桐空棺隻履佛去川在人亡寺留使吾舊境寂寞長秋泣露草繁悲風樹滿此物無心盡如凄斷門人千萬昔為法来悟者不蹙常情自哀祥花雨墜靈峰晝開真子相顧謂全身在哉塔銘并序東漢始有佛塔之制或冶金埏坏琢琰彫杼觸類可作葢惠門之扄鐍也我唐大厯丁已嵗建子月某日沙門某洎居士若干人於思村東北古堤之上樹修塔焉粉欞素簷炯如雪積雖埃氛晝晦月魄宵淪重重入空千里可矚使夫倦鳥有託迷客知歸燎叟弢弧以革心漁童巻緡而易慮作者之志其仁溥哉崇崇靈塔埽氛孤出平砌沓雲層輪麗日瓊容皓曜鴈影依稀初驚地踴忽視天飛塔何情矣監惡斯止塔何言哉誘善不囘至人黙黙與我同徳寂語忘教而人自效明明者闕曷可齊焉上階于天下窮于淵深谷為陵其功不騫唐洞庭山福願寺律和尚墳塔銘并序道賢上游其徳如陽和亭毒萬物生而不子成而不繇或曰異於是葢繇無生空惠㝠乎其間哉暨洪唐盛明之朝我法尤重五教四分飈揚景張南山律宗居天下第一後弟子如大師鮮矣大師望出徐氏諱神皓字𢎞度八代祖摛齊竟陵王西邸學士子陵梁尚書左僕射其文與庾子山齊名逮陳氏革命因佐呉邑遂家姑蘇髙祖碩學通三禮中年即世曾祖曇隨王府咨議參軍祖徳恭潯陽郡詞曹考君定深於釋典不屑名宦大師天情耿潔風韻朗邁幼負脱俗之姿嘗有言曰沙門者髙潔其道秉空王平等之性一念不昧坐登佛階吾自知此生履龍淵取明月曷有三圭之責重侯之髙而能動我心哉乃依杭州龍泉道塲一和尚出家敗髪損容越出流輩鏗然法器如琢玉焉天寳六年天降板詔精擇真行一州許度三人獨居薦首吾以是知大師初扳佛教滌心地也今奉國恩正世名也因𨽻僧籍於包山福願道塲初進具於興大師次通鈔於曇一大師五夏未登學精三蔵天台宗旨難為等夷淵𤣥絶思之科如良庖之導大窽也十講律鈔五昇壇塲傾江而東願禮其足後生學者仰其聰明惠性如追騏驎之步大師嘗引錫西望想包山舊居包山即洞庭仙都之一峰湖澄氣清日出水上疊嶂合沓生乎影中得非天遺此中與師成道耶乃命舟而還使野童誅茅山童埽石顧左右昔者如来崇飾塔廟乃是啟發群信開人天淨境豈為已哉此少隳廢乆之非先師本意乃闢僧院創食堂衆有怠慢者醜其行而理之舍有傾者惡其邪而正之墾田置庄開畎泄澮功既成矣業亦博矣百千人俱皆受其賜曩日洞山水滸業湖之氓罾􅧡咽川繒繳亘渚大師以如来不殺之戒黜彼鱻食廻小人之腹為君子之慮乾元祀有詔天下二十七寺各奏大徳七人長講律戒因請住開元寺欲果願具且懼簡書遂僶俛従命奉戒弟子開州刺史陸公向前給事中嚴公涚服道弟子禮部侍郎劉公太真前大理評事張公象欽風弟子前亷使亞相李公栖筠天誘厥𠂻俾揚我法精識通敏言為世程謝太傅之流也其時常熟地偏僧多闕行李亞相欲以徳撫乃請大師綂而正之一化而革心再化而知道三化而闔邑従風大師末年工於圓宗縦心皆是以文字而用不以文字為病是念佛寫經備行教法置西方社廣淨土因専誦法華經九千餘匝遊四大寺登五老峰遍欲觀古僧得道之所此亦至人之餘事應物如動自視缺然貞元六年十月春秋七十五僧臈四十三其月在開元遇疾忽言曰吾愛夫得道者心如澄溟知如晨曦不染如浮雲自在如游鴻吾雖非斯人亦未肯以有生為累其月十一日顧門人維諒我去世後汝若置塔可歸洞庭故山言畢而逝是夜琉璃色天星霣如雨徃徃有西方之應覩而不書奉遺命也門人維諒有文有道獨步當時執師之喪不以證而廢教也列座門人道超靈俊道濬道稜維誠皆積解以詣空門邁徳以藩象教吾聞古之僧髙者述誄與碑自晉朝始也二三子思吾師盛徳將欲鎔黄金勒貞石垂裕後使昭昭之教長燭於人天銘曰於穆大師立言可經身佩戒光髙月亭亭怖魔以祛襲智以醒如何斯人忽號㝠㝠天樹春折雲花夜零空留一燈寂寂青熒伊昔行道坦坦素履跡難可攀行不可擬乃知我師應世無已優游人天自在生死門人維諒躡彼髙塵嶷嶷靈塔紀功與人于山之峰于湖之濵風凄逺鐸月慘重輪瞻禮雲上如逢化身畫救苦觀世音菩薩讚并序繪工匠意通幽若菩薩出現湛兮凝心于内怡然示相于表非法王妙用何哉誰其主人即湖州刺史諫議大夫樊公夫人范陽縣君盧氏所造也初夫人有恤𦙍之兆常念觀音夢雲初懐育月方誕命曰是女且不正名葢取宜子之意也公以積徳樹仁膺其錫羨雖菩薩大慈不昧亦江漢間氣所鍾詩云維岳降神生甫及申之儔乎於戯至誠既敷上願思荅乃於寳勝殿内按經圖變祗於壁上觀示現之門不捨毫端禮分身之國祠曰至人之體兮有而無迹至人之心兮用而常寂公之小君兮惠性造微我之大士兮慈心莫違保幼子兮永貞無悔覿真儀兮常明不昧慈為雨兮惠為風灑芳襟兮襲輕珮畫藥師琉璃光佛讚并序佛以大慈療生死巨瘵示藥師名以大智證圓明妙身受琉璃稱無私之鑒湛乎不動誠懇之至感而遂通湖州刺史諫議大夫樊公夫人范陽縣君盧氏得之矣頃因懐妊黙念于心先徵佩印之祥載見懸弧之志遂圖此變以荅佛慈光射金扉日月不開於天上影朧珠綴煙霄自出於壁間東方如來瞻仰長世輙揚盛美有愧䛕才詞曰藥師之光隨心至兮十二上願慈不遺兮琉璃之身為我示兮八十種好相畢備兮繪象報徳公夫人兮初祝㣧子果克禋兮早見才童邁人倫兮將成大器應甫申兮如来惠父長可親兮貽厥孫謀夀萬春兮蘭亭古石橋柱讚并序山陰有古卧石一枚即晉永和中蘭亭廢橋柱也大厯八年春大理少卿盧公幼平承詔祭㑹稽山攜至居士陸羽因而得之生好古者與吾同志故讚云古橋石柱亭亭殊類渾璞璘玢亂錢蒼翠遺在蘭渚遷于客位雲狀未銷水痕猶潰在物頗重則人無棄石豈有心求人所貴若瓊與玉呈􅀈藴異如彼陸生不文其器此猶可轉豈君同志烏程李明府水堂觀𤣥真子置酒張樂叢筆亂揮畫武城讚烏程魯邑異日同風洋洋絃歌復聞我公𤣥真跌宕筆狂神王楚奏鏗鍧呉聲瀏亮舒縑雪似頒彩霞狀㸃不誤揮毫無虚放藹藹武城披圖可望咫尺之内天髙水清月疑山吐風恐松聲晴雨雲住春冬草榮比公為政徳暖生成盛烈暉暉雙揚厥靈逹磨大師法門義讚我師西来傳乎真訣大輪當路小乗亡轍㝠㝠世人初見日月權跡有歸光雲不滅天台和尚法門義讚我立三觀即假而真如何果外强欲明因萬象之性空江月輪以此江月還名法身二宗禪師讚裁玉為璧一體殊稱二聖淵淵異名同證安讚天后寂佐𤣥宗巻道就跡與時従容邈邈安公行越常致髙天無言九有咸庇大海無心百川同味不授心印但以無言應世而物無不化曈曈大照有跡可覩不異六宗無慙七祖禪岡一傾人天何怙能秀二祖讚二公之心如月如日四方無雲當空而出三乗同軌萬法斯一南北分宗工言之失志公讚大動之地我安其中髙景無氛靈鶴在空出生死泥隨物有終􅋇形駭俗借繢開蒙常攜刀尺精息誰通唐大通和尚法門義讚觀淨之筌斯言不住四色蓮花白花為喻應知離相或未圓通吾師惠心雲開天空唐鶴林和尚法門義讚真見之體知而不知性猶無主禪何有支我本圓寂湛而不移聿来化人慈力所為大雲寺逸公寫真讚盡與理㝠兩身不異淵情洞識眉睫斯備欲發何言正思何事一牀獨坐道具長隨缾執堪瀉珠傳似移清風拂素若整威儀洞庭山福願寺神皓和尚寫真讚虎頭將軍藝何極但是風神非畫色方顙明眸亦全得我豈無言道貴黙雙扉曙啟趺坐時百千門人自疑惑沈君寫真讚誰識英姿披圖宛在月動光芒風生神彩勻毫㸃天質無改聽似欲言窺不敢怠佩可鳴玉冠宜附蟬鸞翔鶴顧志氣翛然侯伯之量於斯鑒焉王安吉寫真讚性正氣髙外爽神徹逺水瀅渟秋天寥泬鋭工傳逸㸃漆開頤風儀秀發毫髪無遺當獨立處似不言時如嚬如顧何慮何思披影相對真身是誰楊逵處士寫真讚識洞才髙天貸神與霜縑之上逢君不語聳聳山立翹翹鶴舉置之巖石邈然無侣杼山集巻八欽定四庫全書杼山集巻九唐釋皎然撰蘇州支硎山報恩寺法華院故大和尚碑并序我先大師曰佛嘉言孔碩大造人天張無生極宗懸衡於群教之表自第一義諦皆我之蘧廬也况儒墨名法道家之流哉教之斯行資乎哲匠今大師即其人也師諱道遵字宗逹吳興張氏之子崇勲茂徳世為呉中右族大師夙負殊操潔士稱之榮耀不足關其心聲塵未曾觸其性其年二十詣天竺威大師初受具戒事報恩興大師首宗毗尼依佛教也常愀然而歎曰孔老之學不明三世昭昭之業何異夫適郢而求㝠山哉先大師則不然觀萬象無根我獨以無生一念覆疑山之峻知四流妄有我獨以妄動二字停倒海之波室是逺而悟者天隔昔在漢明永平之際大教洋溢霈然而東與生靈滌心觀天地更始正士自摩騰已降持法有如關中者秉律有如南山者海内髦士亟歸乎我如凱風微揚嘉木先發北齊惠文大師傳龍樹智論一性之教教即我釋迦如来九世祖師文殊所承也惠文傳南岳南岳傳天台授一心三觀之㫖以十身佛刹㣲塵數脩多羅如懸帝網不出正念無違即中葢如来一期教之扄鐍也天下𢎞經之士窺我宗者不得其門而入天台去世教傳章安章安傳縉雲縉雲傳東陽東陽傳左溪自龍樹已還至天台四祖事具諫議大夫杜正倫傳教記今大師則親承左溪一受心宗方造其極物有凋折而苦節不衰時有晦明而至行不變法華三昧淵乎我𠂻嘗從容謂門人曰堯舜之民不必獨義教之至也教若不至民何咎焉吾恐大教未周群機未發陷諸子於邪見之網吾徒得無過乎乃欲廣寫法華經置道塲闢經院以燭繼景揚大雄慈聲葢平生之願歟一之日發其心二之日規其趾作不逾序厥功成焉居山之福地於戲群峰合沓以就我當大蔵而孤峙疑天作以待用此持經之境也及以清晝山空杉吹不動真念凝乎寂寞經聲在乎窅㝠此持經之心也大厯元祀州將韋公元甫兵部尚書劉公晏侍御史王公圓開州刺史陸公向殿中侍御史陸公迅大理評事張公象境誘真心共獲殊勝乃相與飛表奏聞詔書特下署名曰法華道塲焯哉盛乎經王之恵日昇于天乎自江以東惣一十七所皆因大師之首置也舉釋行大徳二十七人常持法華報王恩也大師以無緑慈眼極觀四生多溺空見乃鑄盧舍那及毗盧遮那像明智身不有法體非無將欲顯古佛證經之繇乃起多寳妙塔開淨土當生之業遂作彌陁色身法華一經駭聲聞得記方等四部喜廣教盡收無垢淨光葢是如来極開方便跡雖有作功乃無為接人天機使知有殊常之福又寫天台一教溢乎道塲真詮昭昭與清景不極大師有言佛法夀命其惟常住乎常住不存我法安寄於是置莊二所世田為義俟嘉穀以登身田是脩期聖和不絶非夫大師平等之施孰能於事理雙全哉物投我慈日用不足門人有懈廢者接彼退機講法華𤣥義天台止觀四分鈔文臨壇度人授心揚律願盈乎石室之籌天寳年於靈嵓道塲行法華三昧忽覩大明上燭天界我身正念儼在光中異日問天台然公公曰智惠光明従心流出非精志之所致耶又於本寺入法華道塲忽覩此身在空中坐先證者知是大師滌垢之相不然則萬法有無礙之用哉其年春秋七十一僧臈四十六以興元元年七月二十九日告終於支山本寺嗚呼像法梁壊苦流增波無數人天従今失怙初當寺葢公輪公一夜同夢大殿忽崩得非法匠將亡之應乎示疾之日驕陽乆􅄽嘉苖若燎辭世之夕風號雨暴天地慘黷亦我法凌遲之變也傳教門人靈輸法盛道欣可入如来之室豈唯宣父之室哉俾厥鴻猷張而未弛奉教門人猶子靈源等髙志警拔徳隣先賢精細行以撿儀敷大乗以基性予雖後學夙聆徳聲曷云不騫貽諸藥石銘曰泓澄呉江靜幾於道清氣蓄焉誕我僧寳洸洸大師與道為藩義天無孛慈釭不昬巋然支山繄公所履建塔闢院夷荒而趾乃基靈峰靈峰崇崇乃啟秘蔵秘蔵彤彤天色在下日輪當中真經無言至象非象㝠理徹性不昧不朗三觀一心如懸帝網雪山嵳峩有時而裂香樹􅅯蹇有時而折世相若斯師何示滅示滅何之天泣人悲髙邱漠漠細雨霏霏攜履西去相逢是誰見海未乾疑山尚阻囂囂魔民爰得其所吾師寥寂空留法語入室數子皆𢎞我經安公如月逺公如星恭恭秩秩釋氏儀形塔影亭亭長在寒樹天上花落人間日暮猶飄苦雲與我為喻唐湖州大雲寺故禪師瑀公碑銘并序昔在穆天子我如来大聖沒於西土葢示身也其聲教紛綸湮滅而復紀者九十六種外道持衡於五天是僭佛號俾戒月生魄寳星為彗涅槃河水汨泥揚波而天下騰口襲心夐然而䘮精矣我本師爰敕大士中興南州激童䝉竅檮杌摧異道破邪黨彼日月是出爝火不息其為光也不亦難乎有其躡清氣𦙍種性雲龍相召與蒼生為眷則我大師矣大師諱瑀字真瑛俗姓沈氏呉興徳清人也其先仕國於沈因以為氏按春秋沈子之後也五代祖敏梁東陽太守不言而理不猛而威揚之以和風灑之以甘雨殷氏既喪公其嗣焉髙祖某勇而仁直而信少好理體機若缸轉六嵗讀孝經至參不敏略而不讀師問之故曰此大人稱之而小子曷稱之十七州舉孝亷陳侍中徐陵特相器重名位不達終于邱園曾祖某學蔵於晦辨守於訥大業之際州辟不起祖某考三教之源精一貫之旨結廬於金鵝山下怡然獨得父某湖山是傑言行孔臧里有不爽而訓之隣有不給而錫之燠兮春風凜兮寒松心可以育物徳可以垂裕以五世樹善而瑀公生而聦惠不以師受年未總角辭親出家患身之資忘若遺跡爽口之味飲如我仇以如意年大赦度人壊衣削髪煤口世事怡懌至道弱冠遊東京大福先寺厥受大戒懇懇勤勤不遑假寐三日之夕戒相出焉見有神人假然在目倐来忽徃或同或異得非至誠乎於是燭如来燈佩菩薩印證聖中歸于大雲道塲堅執律柄僧綱釐舉不亦宜哉公素履純龎無咎無譽使天下之士有外道焉有闡提焉心如飄風言若泉湧撓我聖教擠我妙門公示以従容誘以方便莫不稽首挫色而聞命焉常禮一萬五千佛名兼慈悲懴日夜一匝或二日或三日一匝苦節貞勵飲氷茹霜夜有聖僧九人降於禮懴之所相與行道彈指而去或夜無燈燭心口是念圓光照室如坐月中如此則徃徃有之公常喟然曰自明帝夢金人孫權獲舍利茫茫中土是有正法而徳清偏邑罕有塔寺使蒼生蒙昧罔知所之悲夫至人無名陶鑄而名之耳安可糠粃有為金璧無相二見齊楚瞽性者流豈知履如之功萬法無外此大菩薩自在之盛行吾將為爾行焉於是繕以香臺作以茝殿卿雲蓄泄於户外麗月昭囘於簷下是知觀象大壯法悞雲室豈不宜哉前後寫經二蔵凡一萬六千巻不以皮為紙不以血為墨是身臰穢靡潔書寫非難捨哉晚節工於禪門頓入懸解言越性靈之外心㝠文字之表天寳初臨安足法師死經三宿將入地獄㝠見瑀公引至王所謂王曰此師解講涅槃經大王宥之王曰唯聞嚴能講不聞此師名何也如此再三王不能屈因赦之嗟乎至人之作用不動此身而流形于彼非無縁慈力何哉曾是鄉人施㹇音桃牛者天然不孕因而出乳及瑀公寢疾日有饋之非夫人含動植徳感明神亦何能致此希有之事也他日蹙然改容據梧而歎昔孔子蚤作悲歌于門者此聖人所以同我生亦同我死莊生曰適去夫子順也吾亦何懼哉以十一年秋禪坐滅度嗚呼婉婉蓮步應隨白雲寥寥香林空見孤月余不知其至人幽機妙用髣髴化為天星乎飛為白霓乎不然將有異名於他國乎某月某日飾以靈龕崇以寳塔擊以法皷吹以法螺門人號慟於是葬斂十二年春將欲啟靈龕遷寳塔炎炎金火以求舍利豈知容色不壊凜然如生識者以為涅槃本義絶動渉之知窮寂照之惠存不壊之身滅大化之體此四者而公得之昔少林孕鬚蘄春育髪何獨嘉也寺主𤣥􅀈等皆秉大明惠開道區中吠琉璃天移夕為晝彼什公四子亦季孟之間歟大理評事攝監察御史姚澹主客郎中姚沛稟龜溪之靈鵝山之英門多才傑世著匡佐而瑀公善焉刺史楊惠才識深敏器宇調暢虞譚之流也今呉測微清慎有度姧囘無欺賀循之流也皆入境問俗飲風眷徳徘徊歔欷有恨来暮嗟乎法本無名是歸寂樂門人垂淚願刻豐碑予誠不敏哀以見託銘曰法本無生示生兮法本無名强名兮大師振振冲邈兮蒼生茫茫啟覺兮堅持律蔵是非兮深入禪門杳微兮鵝峰岑崟莫渉兮龜渚澹蕩莫測兮五千佛懴是禮兮十二經文是啟兮聖僧異人降語兮㹇音桃牛非孕垂乳兮同衆生病同差兮同衆生没罔壊兮門徒病矣號絶兮姻族澘然嗚呼兮烏臺華省思人兮邦君邑宰敬神兮無言可象湛寂兮身謝名飛刻石兮唐杭州靈隠出天竺寺大徳詵法師塔銘西周之叔世本師淪跡於拘尸那城千有餘年教行東漢𤣥綱遐屬殆如綴旒而先經異時至機終義故我唐聖厯中大方廣梵文四譯斯備雷霆始懼於魔耳天地再造於人心瞳瞳無邊佛日正出其時私道之士有燉煌公得他心稱是文殊後身洎四葉傳於吾師本孫氏之子長沙桓王十有三世孫母也初感夢吞明珠遂黜鱻惡葷誕彌厥月生有異表中嵗若成寥兮真姿不棲于俗願移榮於道忘錫羨於家至十五辭親従師依年受具行學一集鬱為教宗終巻伊吕立功之致陋黄綺肆志之適遺形理性與山木為群故地思貞大師屬我以華嚴經菩薩戒起信論心以靜鋭智與經㝠徹照淵𤣥萬法一念宵景盈空而不見晨曦溢目而何有有而不可有者吾其見真師之心哉受經彌時乃疑未契其夕夢乗大艑直截滄溟横山當前峻與天極不覺孤帆鳶戾懐襄止濟峰竦竦而忽焉雲溶溶而在下既寤形若委衣流汗輕醒自此句義不思而得一部全文常現心境事事無礙之旨如貫花焉天寳六年於蘇州常樂寺畫盧舍那像寂念初明十身竝現日月何咎唯吾師自知大厯三年講於常州龍興寺纔登法座忽有異光如曳紅縷漸大縈於香空乆修行者㑹中光覩前後講大經十遍制義記十二巻誠感之事此類固多今略而不載受業比邱大初付以香鑪談柄知其意有歸深於吾道者則有尋陽正覺㑹稽神秀亦猶儒氏之有游夏荀孟雔賢議徳其造形之異乎至大厯十三年十一月七日沙門惠覺夢巨塔横仆陷地二級無何如吾師示疾顧門人曰死生者衆人之桎梏至人之作用昔尼父逍遥曳杖發太山之歌葢欲顯本知終示動歸靜吾雖不敏幸異夫流遁不返者乎言巳奄然與物而化春秋六十一惠命三十二以其年某月日甲乙建塔于某處終終之義也噫素旌晨出異昔經行衆籟啾啾以風號細雨茫茫而天泣世流有逝法流何逝而常清世土自騫法山何騫而常存吾知夫一貫而何言時䢴城肅公得離性之文代為銘刻石松門辭曰銘無本贈李舍人使君書自湖上一辭十有餘載公貴為方伯晝跡在空林出處殊疎音塵不接葢理然也晝従辭後自謂年多志固名疎道親唯慕空門若有所詣然未曾遇知已一知常戲為一章自詠曰樂音落禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂昔謝太傳每賞支公喜摽宗要若九方堙之相馬略其𤣥黄而取其駿逸晝今日於公即道林逢太傳之秋也又晝於文章理心之外或有所作意在適情性樂雲泉亦何能苦健羨於其間哉頃者目疾相嬰濛濛如隔煙霧患脚氣行李不迨昨承至止病中不獲躬詣門闌披敘離闊形礙神徃有所恨也謹狀兼簡雜文晝性野思拙機淺忽若偶中風律終期匠者賞鑒不遺幸甚釋晝白贈包中丞書改年伏惟永感罔極晝之理心本在忘情及經節序惘然悲愴去嵗馬王徃已奉狀計上逹孟春猶寒伏惟中丞尊體萬福即此晝䝉一昨見扶起離披菊一章使晝却顧鄙拙盡欲焚燒凝思三復彌得精旨中丞寄重任大堆桉日盈而言詩至此豈非凝心悉到耶今海内詩人以中丞為龍門賢與不肖雷同願登仰測中丞之為心固進善而拒不工也晝無西施之容不合輙議西施之美然心之服矣其敢蔽諸今之馳疏實有所薦有㑹稽沙門靈澈年三十有六知其有文十餘年而未識之此則聞於故秘書郎嚴維隨州劉使君長卿前後殿中皇甫侍御曾常所稱耳及上人自浙右来湖上見存并示製作觀其風裁味其情致不下古手不傍古人則向之嚴劉皇甫所許疇今所覿則三君之言猶未盡上人之美矣讚其道邊古墳詩則有松樹有死枝塜上唯莓苔石門無人入古木花不開荅范降書作則有緑竹嵗寒在故人衰老多雲門雪夜則有天寒猛虎叫巖雪松下無人空有月千年像教人不聞燒香獨為鬼神説石帆山作則有月色靜中見泉聲深處聞題李尊師堂則有古觀茅山下諸峰欲曙時真人是黄子玉堂生紫芝題曹溪能大師奘山居則有禪門至六祖衣鉢無人得登天姥岑望天台山作則有天台衆山外嵗晚當寒空有時半不見崔嵬在雲中傷古墓作則有古墓碑表折荒壠松柏稀福建還登梨嶺望越中作則有秋深知氣正家近覺山寒九日則有山僧不記重陽日因見茱茰憶去年宿延平懐古則有今非古獄下莫向斗邊看又有歸湖南詩則有山邊水邊待月明暫向人間借路行如今還向山邊去唯有湖氷無行路此僧諸作皆妙獨此一篇使老僧見欲棄筆硯伏惟中丞髙鑒𢎞量其進諸乎其捨諸乎方今天下有故大賢勤王輒以非急干請視聽亦昭愚老不逹時也然上人秉心立節不可多得其道行空惠無慙安逺嘗著律宗引源二十一巻為緇流所歸至於𤣥言道理應接靡滯風月之間亦足以助君子髙興也晝疾弊未期奉展伏深瞻望近應府公三五首謹憑澈上人呈上年暮思蹇多慮迷錯所希宗匠一為指瑕幸甚晝白荅權従事徳輿書權三従事足下傳吏至辱書謬䝉發揚殊增悚恧觀其立言典麗文明意精實耳目所未接也幸甚幸甚貧道隳名之人萬慮都盡强留詩道以樂性情葢繇瞥起餘塵未泯豈有健羨於其間哉初貧道聞足下盛名未覩製述因問越僧靈澈簡古豆盧次方僉曰楊馬崔蔡之流貧道以二子之言心期足下日已乆矣但未識長卿子雲之面所恨耳先輩作者故李員外遐叔故皇甫補闕茂正故嚴秘書正文故房呉縣元警故閻評事士和故朱拾遺長通故處士韋此數子疇昔為林下之遊遐叔當時極許貧道四十韻之作其畧曰中宵發耳目形靜神不役色天夜清迥花漏明滴瀝東風吹杉梧幽月到石壁此中一悟心可與千載敵又曰不然作山計改服乗下澤君隳元亮冠我脱潛師屐各倚髙松根共逃金閨籍又能秀二祖義門讚其畧曰二公之心如月如日四方無雲當空而出遐叔因此相重元警著道交論比於髙雲獨鶴意謂關於詩而不關於事貧道亦無推焉今再遇足下見知則東山遺民時免檘琴絶絃於知已矣靈澈上人足下素識其文章挺拔瓌竒自齊梁已來詩僧未見其偶但此子跡㝠累遣心無營營雖然至於月下風前猶未廢是公逺之友豆盧次方才識超邁所得經竒飄飄然有凌雲之氣而不輕浮此乃山僧惠眼見亦嘗與論物理極天人之際言至簡正意不虚誕足下精鑒豈無此子乎在於貧道不得不言耳承索弊文見已繕寫問元二十一判官木夾中緘封甚難以此未及寄上彼来使無限請近作三五章至至之言旁通我法佇以適山情助禪教耳幸甚十二月二十日皎然白報應傳序語曰死生有命富貴在天葢垂教之意也或曰盜跖日殺不辜而終天年顔囘積仁累行而不幸短命天之報施是耶此皆本於天也今請以釋氏論之夫生生之理罔有不關於業則報施有歸報施有歸則因果不爽因果不爽則空見不生有去来三世之殊故巨細必顯有染淨二心之别故涇渭既分性自我能命自我有豈神授而天與乎涅槃經云無有自作他人受累豈怨天尤聖乎知遍計有如龜毛角決定無也依他縁生非自然也圓成寳性體則妙有相乃真空其一切恒沙功徳不周靈空無為而無用也右若沙門法海字文允俗姓張氏朱方人也圓入一性學階空王擅當代獨悟之名剖先賢不決之義一時學外儒釋該通六書究其源流三易窮於變化嘗謂予曰佛法一門獨開心地皆推輪也於戲天造溟涬惑網髙張非大圓真詮曷能示明明之業俾群生知正修之路哉日者象季之數吾道陵夷朋溺妄空謂無因果公乃救將弛式紙反之教哀弱喪之子其報應昭驗見聞可憑者因採而記之編為三巻鱗羽有性之類亦皆附焉以為動物尚爾而况於人乎况於鬼神乎下以軌正於邪宗上以禆益於真理若佛日未墜于地庻幾將有證焉强居士傳人生性靜而遷乎可欲可欲萌乎憂喜憂喜者病之原也故至人觀其性見萬物之真觀其動見萬物之過客有强君隠山之儔也理昭淈俗寄於和扁之伎而時人無能知者予嘗問君以上毉之術君對曰夫妙有綂於心而通於理其靜為性其照為覺覺也者日月之謂乎性也者太虚之謂乎故理世為儒可以敷五典理性為釋可以越四流理病為醫可以空六腑使定命可逭業疾可亡而世教罕能迨之故醫王未悉辨也予曰至哉斯言命小子志之座右偈水月無根縁生則有莫辨其端莫窺其後以有為瑕以無為垢不廢不立誰觸誰受寂念淵𤣥紛然何咎杼山集巻九欽定四庫全書杼山集巻十唐釋皎然撰}
