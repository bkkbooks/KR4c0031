  - {type: variant, offset: 4, length: 5, content: 卷第十呉興, WYG: 栁絲輕一宿恐魚飛數朝徵鸛鳴毒暑澄為冷髙塵滌還清乃知陰隲數制在造化情及此接歡賀臨風聞頌聲五言南湖春泛有客自北至説友人岑元和見懐因叙相思之志以寄焉故人隔楚水日夕望芳洲春草思眇眇征雲暮悠悠心期無形影跡曠成阻修有客江上至知君佐雄州鏗鏘佩蒼玉躞蹀驅絳騶伊昔中峰心従来非此流資予長生訣予嘗授以胎息之訣希彼髙仙儔此情今如何宿昔師吾謀别後謁禪老更添石室籌深見人間世飄如水上漚蟬號齊王邸月苦隋帝樓聲華盡㝠寞麋鹿徒呦呦我有一字教坐然遺此憂何煩脱珪組不用辭王侯秪在名位中空門兼可遊五言同薛員外誼大旱感懐寄兼呈上楊使君皇天鑒不昧愐想何亢極絲雨乆愆期綺霞徒相惑陰雲舒乂巻濯枝安可得涸井不纍瓶乾溪一憑軾赤地芳草死飈塵驚四塞戎寇夜刺閨民荒嵗傷國賴以王猷盛中原無凶慝楊公當此晨省災常旰食獨感下堂雨自州南諸鄉降甘澤長城顧堵平地雨一尺水分流澤數鄉也偏嘉越境或秋郊天根見我疆看稼穡請廻雲漢詩為君歌樂職五言兵後早春登故鄣南樓望崑山寺白鶴觀示清道人并沈道士新陽故樓上眇眇傷遐睠違世情易忘羇時得無倦春歸華栁發世故陵谷變擾擾陌上心悠悠夢中見蒼林有靈境杳映遥可羨春日倚東峰華泉落西甸鍾聲在空碧幡影揺蔥蒨緬想山中人神期如㑹面别離芳月積岐路浮雲遍正値入空門仙君依苦縣隳形捨簮紱烹玉思精鍊事外宜我心人間豈予戀身遺世自薄道勝名必賤耳目何所娯白雲與黄巻五言酬烏程楊明府華將赴渭北對月見懐釋印及秋夜身閑境亦清風襟自瀟灑月意何髙明聞説武安君萬里驅妖精開府集秀士先招士林英晉家用元凱亦是魯諸生北望撫長劍感君知已行邊塵昏玉帳殺氣凝金鐙大敵折齊爼一書下聊城翻飛青雲路宿昔滄洲情荅云詩中悠然顧山侶之句五言酬邢端公濟春日蘇臺有呈袁州李使君兼書并寄辛陽王三侍御大賢當佐世堯時難退身如何丹霄侶却在滄江濵栁色變乂遍鸎聲聞亦頻賴逢宜春守共賞南湖春營道知止足飾躬無緇磷家將詩流近跡與禪僧親放曠臨海門翺翔望雲津雖髙空王説不久山中人上句荅端公學無為之句五言奉和裴使君清春夜南堂聽陳山人彈白雪春宵凝麗思閑坐開南圍郢客彈白雪紛綸發金徽散従天上至集向瓊臺飛絃上疑颯颯虚中想霏霏通幽鬼神駭合道精鑒稀變態風更入含情月初歸方知阮太守一聽識其微五言荅孟秀才羸疾依小院空閑趣自深躡苔憐靜色掃樹共芳陰物外好風至意中佳客尋虚名誰欲累世事我無心投贈荷君芷馨香滿幽襟五言酬崔侍御見贈市隠何妨道禪棲不廢詩與君為此説長破小乗疑五言贈栁喜得嵩山法門自號嵩山老一見嵩山老吾生恨太遲問君年幾許曾出上皇時五言酬李補闕紓不住東林寺雲泉處處行近臣那得識禪客本無名五言湖南蘭若示大乗諸公未到無為岸空憐不繫舟東山白雲意嵗晚尚悠悠七言兵後經水安法空寺寄悟禪師其寺賊所焚常説人間法自空何言出世法還同微蹤舊是香林下餘燼今成火宅中後夜池心生素月春天樹色起悲風吾知世代相看盡誰悟浮生似影公七言春日杼山寄李員外縦南山唯與北山隣古樹連拳伴我身黄鶴有心多不住白雲無事獨相親閑持竹錫深看水嬾繫麻衣出見人欲掇幽芳聊贈逺郎官那賞石門春七言酬秦山人贈别二首知君髙隠占賢星巻葉時時注佛經姓被名公題舊里秦君里詩將麗句號新亭麗句亭来觀新月依清室欲漱香泉䕶觸瓶我有主人江太守如何相伴住禪靈江淹為宣城守常㑹禪靈寺又誰知臥病不妨禪跡寄詩流性似偏葉示黄金童子愛書題青字古人傳時髙獨鶴来雲外每羨閑花在眼前對此留君還欲别應思石瀃訪春泉七言山居示靈澈上人晴明路出山初暖行踏春蕪看茗歸乍削栁枝聊代札時窺雲影學裁衣身閑始覺隳名是心了方知苦行非外物寂中誰似我松聲草色共無機七言遥和康録事李侍御蕚小寒食夜重集康氏園林習家寒食㑹何頻應恐流芳不待人已愛治書詩句逸更聞従事酒名新庭蕪暗積承雙履林蘤雷飛灑幅巾誰見奈園時節共還持緑茗賞殘春七言釋裴循春愁蝶舞鸎歌喜嵗芳栁絲裊裊蕙帶長江南春色共君有何事君心獨自傷七言西白溪期裴方舟不至望君不見復何情野草閑雲處處生應向秦時武陵路花間寂厯一人行七言勞山憶棲霞寺道素上人乆期不至逺寺蕭蕭獨坐心山情自得趣何深泉聲稍滴芙蓉漏月影纔分鸚鵡林滿地雲輕長礙屣繞松風近每吹襟貪閑不記前心偈念别聊為出世吟更待花開遍山雪山山相似若為尋七言酬秦山人出山見呈手攜酒榼共書幃廻語長松我即歸若是出山機已息嶺雲何事背君飛七言酬秦山人見尋左右香童不識君擔簦訪我領鷗群山僧待客無俗物唯有窓前片碧雲七言宿法華寺簡靈澈上人至道無機但杳𡨕孤燈寒竹自青熒不知何處小乗客一夜風来聞誦經杼山集巻一欽定四庫全書杼山集巻二唐}
