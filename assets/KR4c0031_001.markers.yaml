  - {type: variant, offset: 3149, length: 1, content: 畣, WYG: 題沈道士新亭何處好攀躋新亭俯舊溪坐中千里近簷下四山低小浦依林曲廻塘遶郭西桃花春滿地歸路莫相迷五言送盧仲舒移家海陵世故多離散東西不可嗟小秦非本國楚塞後移家海島無隣里鹽居少物華山中吟夜月相送在天涯五言陪盧使君登樓送方巨之還京一首萬里汀洲上東樓欲别難春風潮水漫正月栁條寒旅逸逢漁浦清髙愛鳥冠雲山寧不起今日向長安五言同裴録事樓上望􅅲食髙樓上湖山向晚晴桐花落萬井月影出重城水竹凉風起簾幃暑氣清蕭蕭獨無事因見蒞人情雜言寓興天下生白榆白榆直上連天根髙枝不知㡬萬丈世人仰望徒攀援誰能上天採其子種向人間笑桃}
  - {type: page-break, offset: 3149, content: '', id: KR4c0031_WYG_001-11b, image: WYG1071/WYG1071-0782d.png}
  - {type: variant, offset: 3151, length: 0, content: '', WYG: 因問老仙求種法老仙咍我口不荅始知此道無所成還如瞽夫學長生七言寄常一上人鴈塞五山臨汗漫雲州一路出青㝠何因請住嘉祥寺内史新修湖上亭五言送祕上人遊京共居方異路山伴與誰同日冷行人少時清古鎮空煖瓶和雪水鳴錫帶江風撩亂終南色遥應入夢中五言賦得啼猿送客萬里巴江外三聲月峡深何年有此路幾客共沾襟斷壁分垂影流泉入苦吟悽涼離别後聞此更傷心五言南樓望月夜月家家望亭亭愛此樓纎雲溪上斷踈栁影中秋漸映千峰出遥分萬𣲖流關山誰復見應獨起邊愁五言尋陸鴻漸不遇移家雖帶郭野徑入桑麻近種籬邊菊秋来未著花扣門無犬吠欲去問西家報道山中去歸時每日斜五言懐舊山一坐西林寺従来未下山不因尋長者無事到人間宿雨愁為客寒花笑未還空懐舊山月童子念經閑五言宿呉匡山破寺雙峰百戰後真界滿塵埃蔓草縁空壁悲風起故臺野花寒更發山月暝還来何事池中水東流獨不囘五言九月十日愛爾柴桑隠名溪近訟庭掃沙開野步揺舸出閑汀宿簡邀詩伴餘花在酒瓶悠然南望意自有峴山情七言晚秋破山寺秋風落葉滿空山古寺殘燈石壁間昔日經行人去盡寒雲夜夜自飛還七言青陽上人院説金陵故事君説南朝全盛日秣陵才子更多人千年秋色古池館誰見齊王西邸春七言送僧之京}
