front:
  text: 晝上人集卷第六
  hash: sha256:3371cd7963204a133001c51894175e33611809bab0d970dce292b34ff04163f8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_006-1a}
body:
  text: 吳興釋皎然五言從軍行五首雙騎出紛紛元戎霍冠軍漢鞞秋聒地羌火晝燒雲萬里戈城合三邉羽檄分烏孫驅未盡肯顧遼陽勳又韓斾拂丹霄漢軍新破遼紅塵驅鹵簿白羽擁嫖姚戰苦軍猶樂功髙將不驕至今丁零塞朔吹空蕭蕭又百萬逐呼韓頻年不解鞍兵屯絶漠暗馬飲濁河乾破虜功未録勞師力巳殫須傍肘腋下飛祻出無端又飛將下天來竒謀閫外裁水心龍劒動地肺雁山開望氣燕師鋭當鋒虜凍摧從今射雕騎不敢過雲堆又黃紙君王詔青泥校尉書誓師張虎落選將擐犀渠露暗津蒲失天寒塞栁踈橫行十萬騎欲掃虜塵餘五言隴頭水二首隴頭水欲絶隴水不堪聞碎影搖槍壘寒聲咽㡢軍素從鹽海積緑帶栁城分曰落天邉望逶迤入塞雲又秦隴逼玄羌征人厺未央如何幽咽水併欲斷君腸西注悲窮漠東分憶故鄉旅魂聲攪亂無夢到咸陽七言塞下曲二首寒塞無因見落梅胡人吹入笛聲來勞勞亭上春應度夜夜城南戰未回都護今年破武威胡沙萬里鳥空飛旄竿瀚海掃雲出氈騎天山踏雪歸五言覽史黃綺皆皓髮秦時隱商山嘉謀匡帝道髙步逰天關不愛圭組紲却思林壑還放歌長松下曰與孤雲間五言詠史獨負髙丗資冥冥寄浮俗卞子厺不歸何人辨荆玉鬻春意不淺汚迹身豈辱鸞鎩樂迍邅虬蟠甘窘束五噫譎且正可以見心曲雜言詠史田氏門下客馮公衆中賤一朝市義還百代名獨擅使知下客不可輕能使主人功業成借問髙車與珠履何如卑賤一書生五言讀張曲江集相公乃天益人文佐王成立程正頽靡繹思何縱橫春杼弄緗綺陽林敷玉英飄然飛動姿邈矣高簡情後輩驚失步前修敢爭衡始欣耳目逺再使機慮清體正力巳全理精識何妙昔年歌陽春徒推郢中調今朝聽鸞鳳豈獨羡門嘯帝命鎮雄州待濟寄上流才兼荆衡秀氣助瀟湘秋逸蕩子山匹經竒文暢儔沉吟未終卷變態紛難數耀耳代眀璫襲衣同芳杜愔愔聞玉聲窹寐在靈府五言奉酬陸使君見過各賦院中一物得江籬江籬生古砌花每落禪牀嘉客未采掇空門自馨香名因詩目見色對道心忘不遇陸內史誰知殊衆芳五言賦得謝墅送王長史其墅即晝七代祖吳興守舊居世業西山墅移家長我身蕭踈遺樹老寂寞廢田春車巷傷前轍籬溝憶舊鄰何堪再過日更送北歸人五言夏日同崔使君論登城樓賦得逺山逺山湖上小青翠望依俙才向窗中列還從林表微色濃春草在峰起夏雲歸不是蓬萊島如何人厺稀五言詠數探得七鄒子談天歲黃童對日年永真𥘉作傳錬魄巳成仙鶴駕迎緱䫈星橋下蜀川逢君竹林客相對㺯清弦五言奉同顔使君真卿送李侍御萼賦得荻塘路落日車遙遙客心在歸路細草暗回塘春泉榮古渡遺蹤歎蕪沒逺道悲厺住寂寞荻花空行人别無數五言賦顔氏古今一事得晉仙傳送顔逸梁湘東王國常侍顔協著晉仙傅五篇曽看顔氏傳多記晉時仙却憶桐君老俱還桂父年青春留鬢髮白日向雲煙逺别齎遺簡囊中有幾篇五言賦得石梁泉送崔逵架石通霞壁懸崖散碧沙天晴虹影渡風細練文斜攀􅕾幽期阻沿洄客意賖河梁非此路别恨亦無涯五言賦得夜雨滴空階送陸羽歸龍山同字間階夜雨滴偏入别情中斷續清猿應淋漓候館空氣令煩慮散時與早秋同歸客龍山道東來雜好風五言賦得燈心送李侍御萼光字燈心生衆草因有始知芳綵妓窗偏麗金桃動更香花驚春未盡焰喜夜𥘉長别後空離室何人惜末光五言賦得竹如意送言師赴講青字縹竹湘南美吾師尚毁形仍留負霜節不變在林青每入楊枝手因談貝葉經誰期沃洲講持此别東亭五言聽素汯師講汯華經法子出西秦名齊􅃮道人才敷藥草義便見雪山春護講龍來逺聞經鶴下頻應機如一雨誰不滌心塵五言詠􅏡上人座右畫松寫得長松意千尋數尺中習隂疑背日寒色欲生風貞樹孤標在髙人立操同一枝遙可折吾欲問生公五言夏日登觀農樓和崔使君片雨拂簷檻煩襟四座清霏微過麥隴蕭散傍蓑城靜愛和花落幽聞入竹聲朝觀趣無限髙詠寄深情五言妙喜寺逹公院賦得夜磬送吕評事一磬寒山至凝心轉清越細和虗籟盡踈繞懸泉發在夜吟更長停空韻難絶幽僧悟深定歸客忘逺别寂歷無性中真聲何起滅五言詠小瀑布瀑布小更竒潺湲二三尺細脈穿亂沙叢聲咽危石𥘉因智者賞果會幽人迹不向定中聞那知我心寂五言仙女臺寂寞舊桑田誰家女得仙應無雞犬在空有子孫傳古木花猶發荒臺月尚懸片雲低不散疑是却歸年五言靈徹上人何山寺七賢石詩七石配七賢隱僧山上移石性殊磊落君子又髙竒跋禪服冝壞坐客冠可隳夜倚月樹影晝傾風竹枝集質患追琢表頑用磷淄佚火玉亦害塊然長在兹五言潘丞孩子愛子性情竒𥘉生玉樹枝人曽天上見名向月中知我識嬰兒意何須待佩觽五言南池雜詠五首并序余草堂在池上洲昔栁吳興詩汀洲采白蘋即此地也左右雲山滿目一坐遂有終焉之志會廣德中寇盜淮海騷動宵人肆志吾屬不安因賦南池五詠聊以自適水月夜夜池上觀禪心坐月邉虗無色可取皎潔意難傳若向空心了長如影正圎溪雲舒卷意何窮榮流復帶空有形不纍物無迹厺隨風莫怪長相逐飄然與我同虗舟虗舟動又靜忽似厺逢時觸物知無忤為梁幸見遺因風到此岸非有濟川期寒山侵空撩亂色獨愛我中峯無事負輕䇿間行躡幽蹤衆山搖落盡寒翠更重重寒竹裊裊孤生竹獨立山中雪蒼翠搖徑風嬋姢帶寒月狂花不相似還共凌冬發度前溪不意入前溪愛溪從錯路清清鑒不足非是深難度望逺村林杪不可分水步遙難辨一片山翠邉依俙見村逺惜暮景踈隂花下動片景松梢度待山月夜夜憶故人長教山月待今宵故人至山月君何在五言效古天寶十四年日出天地正煌煌闢晨曦六龍驅群動古今無盡時夸父亦何愚競走先自疲飲乾咸池水折盡長桑枝渴死何爝火嗟嗟徒爾為空留鄧林在折盡令人嗤雜言古别離代人答閻士和太湖三山口吳王在時道寂寞千載心無人見春草誰識緘怨者持此傷懷抱孤舟畏狂風一夜宿煙島望所思兮若何月蕩漾兮空波雲離離兮北斷鴻渺渺兮南多身去兮天畔心折兮湖岸春風胡為兮寒路使我歸夢兮撩亂五言擬長安春詞春信在河源春風蕩妾魂春歌雜鶗鴂春夢繞轘轅春絮愁偏滿春絲悶更繁春期不可定春曲懶新翻七言效古思君轉戰度交河強弄胡琴不成曲日落應愁隴底難春來定夢江南數萬丈遊絲是妾心惹蝶縈花亂相續七言昭君自倚嬋娟望主恩誰知美惡忽相翻黃金不買漢宫貌青塜空埋胡地魂七言銅雀妓強開尊酒向陵看憶得君王舊日歡不覺餘歌悲自斷非關艷曲轉聲難七言長門怨春風日日閉長門搖蕩春心似夢魂誰遣花開只笑妾不如桃李正無言五言哭吳縣房聳眀府仁人邁厚德可謂名實全撫迹若踈曠會心極精研履危節詎屈廣德𥘉江南寇盜充斥賦通名宰長城縣屢至害而竟不就著論識不倫公著道性論一篇恨以榮級淺嘉猷未及宣伊人期逺大志業難比肩昭世既合并吾君藉陶甄奈何眀眀理與善徒空詮徴教或稽聖窮源反問天一官自吳邑六翮委江壖始是牽絲日翻成撤瑟年金膏果不就房公昔就沈道士學長生之術晝以佛理難之玉佩長此捐倚伏信冥盻夭修驚後先安知忘情子愛網素巳褰為有深仁感遂令真性遷心悲空林下淚灑秋景前夫子置兄弟撫孤傷藐然傾雲為慘結弔鶴共聮翩割念命孤駕訣詞向空筵樹桃隂始合愛客位常懸帆然逺行時崇望歸朝旋悟茲歎冥隔哀彼歲月延書帶變芳草履痕移緑錢冥期儻可逢生盡會無緣王坦之與生法師為冥期前死者歸報其罪福幸願示因業代君運精􅌹沈約死後冥中見十因師云師急為我造經捨我罪苦相思轉寂寞獨往西林泉欲見故人心時閲所贈篇素髙陶靖節今重楚先賢芳躅將遺愛可為終古傳五言哭覺上人憶君南適越不作買山期昨得耶溪信翻為逝水悲神交如可見生盡杳難思白日東林下空懷步影時五言題餘不溪廢寺武原離亂後真界積塵埃殘月生秋水悲風起故臺居人今巳盡栖鴿暝還來不到無生理應堪賦七哀五言同李洗馬入餘不溪經辛將軍故城慘慘寒城望將軍下世時髙墉暮草遍火樹野風悲壁壘今惟在勳庸近可思蒼然古溪上川逝共凄其五言憶天台箬溪朝雨散雲色似天台應是東風便吹從海上來靈山逰汗漫仙石過莓菭誤到人間丗經年不早回五言萬回寺萬里稱逆化愚蠢性亦全𬗋紱拖身上妖姬安膝邉見他拘坐寂顧我是眠禪吾知至人心杳若青冥天五言禪詩萬汯出無門紛紛使智昏徒稱誰氏子獨立天地元實際且何有物先安可存須知不動念照出萬重源五言哀教本師不得巳強為我著書知盡百慮遣名存萬象拘如何工言子終日論虛無伊人獨冥冥時人以為愚五言聞鍾古寺寒山上逺鐘揚好風聲餘月樹動響盡霜天空永夜一禪子泠然心境中五言溪上月秋水月姢姢𥘉生色界天蟾光散浦溆素影動淪漣何事無心見虧盈向夜禪五言山雪夕陽在西峰疊翠縈殘雪狂風卷絮回驚猿攀玉折何意山中人誤報山花發雜言江上風江風西復東飄暴忽何窮𥘉生虛無際稍起蕩漾中應吹夏口檣竿折定蹙湓城浪花咽今朝莫怪沙岸眀昨夜聲狂卷成雪雜言山雨一片雨山半晴長風吹落西山上滿樹蕭蕭心耳清雲鶴驚亂下水香凝不然風回雨定芭蕉濕一滴時時入晝禪雜言問遙山禪老天與松子夀獨飲日月精復令顔子賢胡為夭其生吾將尋河源上天問天何不平吾將詰仙老大道無私誰強名仙老難逢天不近世人何人解應盡明朝欲向翅頭山問取禪公此意還五言禪思真我性無主誰為塵識昏奈何求其本若技大木根妄以一念動勢如千波翻傷哉子桑扈蟲臂徒虛言神威興外論宗邪生異源空何妨色在妙豈廢身存寂滅夲非寂喧譁曽未喧嗟嗟世上禪不共智者論七言支公詩支公飬馬復飬鶴率性無機多脫略天生支公與凡異凡情不到支公地得道由來天上仙為僧却下人間寺道家諸子論自然此公惟許逍遙篇山隂詩友喧四座佳句縱橫不廢禪七言述夢夢中歸見西陵雪渺渺茫茫行路絶覺來還在剡東峰鄉心繚亂愁夜鐘寺北禪岡猶記得夢歸長見山重重七言赤松緣岸蒙籠出見天晴沙瀝瀝水濺濺何處羽人長洗藥殘花無數逐流泉七言戲題松樹為愛松聲聽不足每逢松樹定忘還翛然此外更何事笑向間雲似我間七言戲題二首看飲逢歌日屢曛我身何似繫浮雲時人不解野僧意歸厺溪頭作鳥羣喧喧共在是非間終日誰知我自間偶客狂歌何所為欲于人事強相關五言雜寓興嗟嗟號呶子世稱謫仙儔媚俗破蛟綃欺天薦昫修奔景謂可致馳齡言易流燕昭昧往事嬴政立前籌三山果不見九仙忽悠悠君看牛山樂君見麋浦逰昨日千金子聨綿成古丘吾將攬眀月照爾生死流至樂亭爰居慙貽逹者尤冥冥光塵內機喪成海漚五言雜興六首吾觀談天客工言喪其精萬物資廣庇此中何有情若為昧顔跖修短怨太清髙論讓鄒子放詞徴屈生請從象外推至論尤眀眀短齡伇長世擾擾悟不早嬪女身後空歡娛夢中好從教西陵樹千載傷懷抱鶴駕何冥冥鼇洲厺浩浩柔顔感三花凋發悲􅟵草月中伐桂人是誰翻使年年不衰老誰髙齊公子泣聽雍門琴死且何足傷殊非逹人心獨髙庭中鶴意逺貴氛埃有時青冥遊顧我還下來白雲琅玕色一片生虗無此物若無心若何卷還舒踈散遂吾性栖山更無機寥寥髙松下獨有間雲歸精意不可道冥然還掩扉五言偶然五首樂禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂偶然寂無喧吾了心性源可嫌蟲食木不笑鳥能言隱心不隱迹却欲住人寰欠樹移春樹無山看畫山居喧我錯真意在其間虜語嫌不學胡音從不翻説禪顛倒是樂殺金王孫真隱須無矯忘名要似愚只將兩條事空却漢濳夫五言問天天公何時有談者皆不經誰道賢人死今為傅説星五言寓言吾道本無我未曽嫌丗人如今到城市彌覺此心真五言前溪作春歌巳寂寂古水自涓涓徒誤時人輩傷心作逝川五言戲作乞我百萬金封我異姓王不如獨悟時大笑放清狂雜言浮雲三章有序浮雲刺讒也蓋取夫盛眀之時為浮雲所蒙非不眀小人比于君側讒言熒惑亦如浮雲之害眀豫覽古史極觀君臣之際敗亡之兆生于讒慝遂作是詩浮雲浮雲集于扶桑扶桑茫茫日暮之光匪日之暮浮雲之汙嗟我懷人憂心如蠧浮雲浮雲集于咸池咸池微微日昃之時匪日之昃浮雲之惑嗟我懷人憂心如織浮雲浮雲集于高春髙春濛濛日夕之容匪日之夕浮雲之積嗟我懷人憂心如惄七言寓言人生百年我過半天生才定不可换東海釣鼇鼇不食南山坐石石欲爛晝上人集卷苐六
