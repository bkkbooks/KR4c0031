  text: 晝上人集卷第九
  hash: sha256:ab48dbcac07b7561538c92d2655c8a4e777c69ab443387423f4ec54507271c01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0031_SBCK_009-1a}
body:
  text: 吳興釋皎然蘇州支硎山報恩寺法華院故大和尚碑并序我先大師曰佛嘉言孔碩大造人天張無生極宗懸衡于群教之表自第一義諦皆我之蘧廬也况儒墨名法道家之流哉教之斯行咨乎哲匠今大師即其人也師諱道遵字宗逹吳興張氏之子崇勳茂德世為吳中右族大師夙負殊操潔士稱之榮耀不足關其心聲塵未曽觸其性其年二十詣天竺威大師𥘉受具戒事報恩興大師首宗毗尼依佛教也常愀然而歎曰孔老之學不眀三世昭昭之業何異夫適郢而求冥山哉先大師則不然觀萬象無根我獨以無生一念覆疑山之峻知四流妄有我獨以妄動二字停倒海之波室是逺而悟者天隔昔在漢眀永平之際大教洋溢霈然而東與生靈滌心觀天地更始正士自摩騰巳降持法有如關中者秉律有如南山者海內髦士亟歸乎我如凱風微揚嘉木先發齊惠文大師傳龍樹智論一性之教教即我釋伽如來九世祖師文殊所承也惠文傳南嶽南嶽傳天台授一心三觀之旨以十身佛剎微塵數修多羅如懸帝網不出正念無違即中蓋如來一期教扃鐍也天下弘經之士窺我宗者不得其門而入天台厺世教傳章安章安傳縉雲縉雲傳東陽東陽傳左溪自龍樹巳還至天台四祖事具諌議大夫杜正論傳教記今大師則親承左溪一受心宗方造其極物有凋折而苦莭不衰時有晦眀至行不變法華三昧淵乎我衷嘗從容謂門人曰堯舜之民不必獨義教之至也教若不至民何咎焉吾恐大教未周群機未發陷諸子于邪見之網吾徒得無過乎乃欲廣寫法華經置道場闢經院以燭繼景揚大雄慈聲蓋平生之願歟一之日發其心二之日規其址作不逾序厥功成焉居山之福地於戲群峰合沓以就我當大藏而孤峙疑天作以待用此持經之境也及以清晝山空杉吹不動真念凝乎寂寞經聲在乎窅冥此持經之心也大曆元祀州將韋公元甫兵部尚書劉公晏侍御史王公圎開州刺史陸公向殿中侍御史陸公迅大理評事張公象境誘真心共獲殊勝乃相與飛表奏聞詔書特下署名曰法華道場焯哉盛乎經王之惠日升于天乎自江以東揔一十七所皆因大師之首置也舉釋行大德二十七人常持法華報主恩也大師以無緣慈眼極觀四生多溺空見乃鑄盧舍那及毗盧遮那像眀智身不有法體非無將欲顯古佛證經之由乃起多寶妙塔開淨土當生之業遂作彌陀色身法華一經駭聲聞得記方等四部喜廣教盡收無垢淨光蓋是如來極開方便迹雖有作功乃無為接人天機使知有殊常之福又寫天台一教溢乎道場真詮昭昭與清景不極大師有言佛法夀命其惟常住乎常住不存我法安寄于是置莊二所世田為義俟嘉榖以登身田是修期聖禾不絶非夫大師平等之施孰能于事理雙全哉物投我慈日用不足門人有懈廢者接彼退機講法華玄義天台止觀四分鈔文臨壇度人授心楊律碩盈乎石室之籌天寶年于靈巖道場行法華三昧忽覩大眀上燭天界我身正念儼在光中異日問天台然公公曰智惠光眀從心流出非精致之所在耶又于本寺入法華道場忽覩此身在空中坐先證者知是大師滌垢之相不然則萬法有無礙之用哉其年春秋七十一僧臘四十六以興元元年七月二十九日告終于支山夲寺嗚呼像法梁壞苦流增波無數人天從今失怙𥘉當寺蓋公輪公一夜同夢大殿忽崩得非法匠將亡之應乎示疾之日驕陽久愆嘉苗若燎辭世之夕風號雨暴天地慘黷亦我法凌遲之變也傳教門人靈輪法盛道欣可入如來之室豈唯宣父之室哉俾厥鴻猷張而未弛奉教門人猶子靈源等髙志警拔德鄰先賢精細行以檢儀敷大乘以基性豫雖後學夙聆德聲曷云不騫貽諸樂石銘曰泓澄吳江靜幾于道清氣蓄焉誕我僧寶洸洸大師與道為藩義天無孛慈釭不昏巋然支山繫公所履建塔闢院夷荒而址乃基靈峰靈峰崇崇乃啓祕藏祕藏彤彤天色在下日輪當中真經無言至象非象眀理徹性不昧不朗三觀一心如懸帝網雪山峩峩有時而裂香樹偃蹇有時而折世相若斯師何示滅示滅何之天泣人悲高丘漠漠細雨霏霏攜履西去相逢是誰見海未乾疑山尚阻囂囂魔民爰得其所吾師寂寥空留法語入室數子皆弘我經安公如月逺公如星恭恭秩秩釋氏儀形塔影亭亭長在寒樹天上花落人間日暮猶飄苦雲以我為喻唐湖州大雲寺故禪師瑀公碑銘并序昔在穆天子我如來大聖沒于西土蓋示身也其聲教紛綸湮滅而復紀者九十六種外道持衡于五天是僣佛號俾戒月生魄寶星為彗涅槃河水汨泥揚波而天下騰口襲心敻然而喪精矣我本師爰敕大士中興南州激童蒙竅禱杌摧異道破邪黨彼日月是出爝火不息其為光也不亦難乎有其躡清氣㣧種性雲龍相召與蒼生為春則我大師矣大師諱瑞字真瑛俗姓沈氏吳興德清人也其先仕國于沈因以為氏按春秋沈子之後也五代祖敏梁東陽太守不言而理不猛而威揚之以和風灑之以甘雨殷氏既喪公其嗣焉髙祖某勇而仁直而信少好理體機若釭轉六歲讀孝經至參不敏略而不讀師問之故曰此大人稱之而小子曷稱之十七州舉孝亷陳侍中徐陵特相器重名位不逹終于丘園曽祖某學藏于晦辨守于訥大業之際州辟不起祖某考三教之源精一貫之旨結廬于金鵝山下怡然獨得父某湖山是傑言行孔臧里有不爽而訓之鄰有不給而錫之燠兮春風凛兮寒松心可以育物德可以垂𥙿以五世樹善而瑀公生生而聰慧不以師受年未捴角辭親出家患身之資忘若遺迹爽口之味飲如我仇以如意年大赦度人壞衣削髮煤炱丗事怡懌至道弱冠逰東京大福先寺厥受大戒懇懇勤勤不遑假寐三日之夕戒相出焉見有神人假然在目倐來忽往或同或異得非至誠乎于是燭如來燈佩菩薩印證聖中歸于大雲道場堅執律柄僧綱釐舉不亦冝哉公素履純厖無咎無譽使天下之士有外道焉有闡提焉心如飄風言若泉湧撓我聖教齊我妙門公示以從容誘以方便莫不稽首挫色而聞命焉常禮一萬五千佛名兼慈悲懴日夜一匝或二日或三日一匝苦節貞勵飲氷茹霜夜有聖僧九人降于禮懴之所相與行道彈指而厺或夜無燈燭心口是念圎光照室如坐月中如此則往往有之公嘗喟然曰自眀帝夢金人孫權獲舍利茫茫中土是有正法而德清偏邑罕有塔寺使蒼生蒙昧罔知所之悲夫至人無名陶鑄而名之耳粳粃有為金壁無相二見齊楚瞽性者流豈短履如之功萬法無外此菩薩自在之盛行吾將為爾行焉于是繕以香臺作以茝殿卿雲蓄泄于户外麗月眀回于簷下是知觀象大壯法時雲室豈不冝哉前後寫經二藏凡一萬六千卷不以皮為𥿄不以血為墨是身臰穢靡潔書寫非難捨哉晚節工于襌門頓入懸解言越性靈之外心冥文字之表天寶初臨安足法師死經三宿將入地獄冥見瑀公引至王所謂王曰此師解講涅槃經大王宥之王曰唯聞嚴能講不聞此師名何也如此再三王不能屈因赦之嗟乎至人之作用不動此身而流形于彼非無緣慈力何哉曽是鄉人施音桃牛者天然不孕因而出乳及瑀公寢疾日有饋之非夫人含動植德感眀神亦何能致此希有之事也他日蹙然改容據梧而歎昔孔子蚤作悲歌于門者此聖人所以同我生亦同我死莊生曰適厺夫子順也吾亦何懼哉以十一年秋襌坐滅度嗚呼婉婉蓮步應隨白雲寥寥香林空見孤月豫不知其至人幽機妙用倣佛化為人星乎飛為白霓乎不然將有異名于他國乎某月某日飭以靈龕崇以寶塔擊以法鼓吹以法螺門人號慟于是葬斂十二年春將欲啓靈龕遷寶塔炎炎金火以求舍利豈知容色不壞凛然如生識者以為涅槃夲義絶動涉之知窮寂照之惠存不壞之身滅大化之體此四者而公得之昔少林孕鬚蘄春育髮何獨嘉也寺主玄等皆秉大眀惠開道區中吠琉璃天移夕為晝彼什公四子亦季孟之間歟大理評事攝監御史姚淡主客郎中姚沛稟龜溪之靈鵝山之英門多才傑世著匡佐而瑀公善焉刺史楊惠才識深敏器宇調暢虞談之流也今吳測微清慎有度姦回無欺賀循之流也皆入境問俗飲風眷德徘徊歔欷有恨來暮嗟乎法夲無名是歸寂樂門人隨淚願刻豐碑豫誠不敏哀以見託銘曰法本無生示生兮法夲無名強名兮大師振振沖邈兮蒼生茫茫啓覺兮堅持律藏是非兮深入禪門杏微兮鵝峯岑崟莫涉兮龜渚淡蕩莫測兮五千佛懴是禮兮十二經文是啓兮聖僧異人降語兮犍牛非孕垂乳兮同衆生病罔差兮同衆生沒罔壞兮門徒病矣號絶兮姻族澘然嗚咽兮烏臺華省思人兮邦君邑宰敬神兮無言可象湛寂兮身謝名非刻石兮唐杭州靈隱山天竺寺大德詵法師塔銘并序西周之叔世夲師淪迹于拘尸那城千有餘年教行東漢玄綱遐屬殆如綴旒而先經異時至機終義我唐聖曆中大方廣梵文四譯斯僃雷霆始懼于魔耳天地再造于人心曈曈無邉佛曰正出其時弘道之士有燉煌公得他心稱是文殊後身洎四葉傳于吾師夲孫氏之子長沙桓王十有三世孫母也初感夢吞眀珠遂黜鮮惡葷誕彌厥月生有異表中歲若成寥兮真姿不棲于俗顧移榮于道忘錫羡于家至十五辭親從師依年受具行學一集鬱為教宗終卷伊吕立功之致陋黃綺肆志之適遺形理性與山水為群故地思貞大師屬我以華嚴經菩薩戒起信論心以靜鋭智與經冥徹照淵玄萬法一念霄景盈空而不見晨曦溢目而何有有而不可有者吾其見真師之心哉受經彌時乃疑未契其夕夢乘大艑直截滄溟橫山當峻與天極不覺孤帆鳶戾懷襄止濟峯竦竦而忽焉雲溶溶而在下既寤形若委衣流汗輕醒自此句義不思而得一部全文常現心境事事無礙之旨如貫花焉天寶六年于蘇州常樂寺畫盧舍那像寂念𥘉萌十身並現日月何咎唯吾師自知大曆二年講于常州龍興寺才登法座忽有異光如曳紅縷漸大縈于香空久修行者會中先覩前後講大經十遍制義記十二卷誠感之事此類固多今略而不載受業比丘太𥘉付以香爐談柄知其意有歸深于吾道者則有尋陽正覺會稽神秀亦猶儒門之有遊夏荀孟雔賢議德其造形之異乎至大曆十三年十一月七日沙門惠覺夢巨塔橫仆陷地二級無何如吾師示疾顧門人曰生死者衆人之桎梧至人之作用昔尼父逍遙曵杖發太山之歌蓋欲顯夲知終示動歸靜吾雖不敏幸異夫流遁不返者乎言己奄然與物而化春秋六十一惠命三十二以其年某月日甲乙建塔于某處終終之義也噫素旌晨出異昔經行衆籟啾啾以風號細雨茫茫而天泣世流有逝法流何逝而常清世山自騫法山何騫而常存吾知夫一貫而何言時𨝍城肅公得離性之文代豫為銘刻石松門詞曰銘無贈李舍人使君書自湖一辭十有餘載公貴為方伯晝迹在空林出處殊踈音塵不接蓋理然也晝從辭後謂年多志固名踈道親唯慕空門若有所詣然未曽遇知巳一知常戲為一章自詠曰樂音洛禪心似蕩吾道不相妨獨悟歌還笑誰言老更狂昔謝太傅每賞支公喜標宗要若九方堙之相馬略其玄黃而取駿逸晝今日于公即道琳逢太傅之秋也又晝于文章理心之外或有所作意在適情性樂雲泉亦何能若健羡於其間哉頃者目疾相嬰𪷟濛如隔煙霧患腳氣行李不逮昨承至止病中不獲躬詣門闌披敘離闊形礙神往有所恨也謹狀兼簡雜文晝性野思拙機淺忽若偶中風律終期匠者賞鑒不遺幸甚釋晝白贈包中丞書改年伏惟永感罔極晝之理心夲在忘情及經節序惘然悲愴厺歲馬三往巳奉狀計上逹孟春猶寒伏惟中丞尊體萬福即此晝蒙一昨見扶起離披菊一章使晝却顧鄙拙盡欲焚燒凝思三復彌得精旨中丞寄重任大堆按日盈而言詩至此豈非凝心悉到耶今海內詩人以中丞為龍門賢與不肖雷同願登仰測中丞之為心固進善而拒不工也晝無西施之美不合輒議西施之美然心之服矣其敢蔽諸今之馳疏實有所薦有會稽沙門靈徹年三十有六知其有文十餘年而未識之此則聞于故祕書郎嚴維隨州劉使君長卿前殿中皇甫侍御曾常所稱耳及上人自浙右來湖上見存并示製作觀其風裁味其情致不下古手不傍古人則向之嚴劉皇甫所許疇今所覿三君之言猶未盡上人之美矣讃其道邉古墳詩則有松樹有死枝塜上唯莓菭石門無人入古木花不開答范降晝作則有緑竹歲寒在故人衰老多雲門雪夜則有天寒猛虎呌巖雪松下無人空有月千年像教人不聞燒香獨為鬼神説石帆山作則有月色靜中見泉聲深處聞題李尊師堂則有古觀茒山下諸峯欲曙時真人是黃子玉堂生𬗋芝題曹溪能大師獎山居則有禪門至六祖衣鉢無人待登天姥岑望天台山作則有天台衆山外歲晚當寒空有時半不見崔嵬在雲中傷古墓作則有古墓碑表折荒隴松柏稀福建還登梨䫈望越中作則有秋深知氣正家近覺山寒九日則有山僧不記重陽日因見茱茰憶厺年宿延平懷古則有今非古獄下莫向斗邉看又有歸湖南詩則有山邉水邉待月眀暫向人間借路行如向還向山邉去唯有湖水無路行此僧諸作皆妙獨此一篇使老僧見欲棄筆研伏惟中亟髙鑒弘量其進諸乎其捨諸乎方今天下有故大賢勤王輒以非急干請視聽亦昭愚老不達時也然上人秉心立節不可多得其道行空惠無慚安逺嘗著律宗引源二十一卷為緇流所歸至于玄言道理應接靡滯風月之間亦足以助君子髙興也晝疾弊未期奉展伏深瞻望近應府公三五首謹慿徹上人呈上年暮思蹇多慮迷錯所希宗匠一為指瑕幸甚晝白畣權從事德輿書權三從事足下傳吏至辱書謬蒙發楊殊增悚恧觀其立言典麗文眀意精實耳目所未接也幸甚幸甚貧道墮名之人萬慮都盡強留詩道以樂性情蓋由瞥起餘塵未泯豈有健羡于其間哉初貧道聞足下盛名未覩製述因問越僧靈徹居士豆盧次方僉曰掦馬崔蔡之流貧道以二子之言心期足下日巳久矣但未識長卿子雲之面所恨耳先輩作者故李貟外遐叔故皇甫輔闕茂正故嚴祕書正文故房吳縣元警故閻評事士和故朱拾遺長通故處士韋此數子疇昔為林下之逰遐叔當時極許貧道四十韻之作其略曰中宵發耳目形靜神不伇色天夜清逈花漏眀滴瀝東風吹杉梧幽月到石壁此中一悟心可與千載敵又曰不然作山計改服乘下澤君隳元亮冠我脫濳師屐各倚髙松根共逃金閨籍又能秀三祖義門讃其略曰二公之心如月如日四方無雲當空而出遐叔因此相重元警著道交論比于髙雲獨鶴意謂關于詩而不關于事貧道亦無推焉今再遇足下見知則東山遺民時免劈琴絶絃于知巳矣靈徹上人足下素識具文章挺瓌竒自齊梁巳來詩僧未見其偶但此子迹冥纍遣心無營營雖然至于月下風前猶未廢是公逹之友豆盧次方才識超邁所得經竒飄飄然有凌雲之氣而不輕浮此乃山僧惠眼見亦嘗與論物理極天人之際言至簡正意不虛誕足下精鑒豈無此子乎在于貧道不得不言耳承索弊文見巳繕寫開元二十一判官木夾中緘封甚難以此未及寄上彼來使無限請近作三五章至至之言旁通我法佇以適山情助襌教耳幸甚十二月二十日皎然白報應傳序語曰死生有命冨貴在天蓋垂教之意也或曰盜跖日殺不辜而終天年顔回積仁纍行而不幸短命天之報施是耶此皆夲于天也今請以釋氏論之夫生生之理罔有不關于業則報施有歸報施有歸則因果不爽因果不爽則空見不生有厺來三世之殊故巨細必顯有染淨二心之别故涇渭既分性自我能命自我有豈神授而天與乎涅槃經云無有自作他人受果豈怨天由聖乎知遍計有如龜毛兔角決定無也依他緣生非自然也圎成寶性體則妙有相乃真空具一􅋀恆沙功德不周靈空無為而無用也有若沙門法海字文允俗姓張氏朱方人也圎入一性學階空王擅當代獨悟之名剖先賢不決之義一時學外儒釋該通六書究其源流三易變化嘗謂豫曰佛法一門獨開心地皆榷論也于戲天造溟滓惑網髙張非大圎真詮曷能示眀眀之業俾群生知正修之路哉日者象季之數吾道陵夷朋溺妄空謂無因果公乃救將弛式紙及之教衰弱喪之子其報應昭驗見聞可慿者因採而託之編為三卷鱗羽有性之類亦皆附焉以為動物尚爾而况于人乎况于鬼神乎下以軌正于邪宗上以禆益于真理若佛日未墜于地庶幾將有證焉強居士傳人生性靜而遷乎可欲可欲萌乎憂喜憂喜者病之原也故至人觀其性見萬物之真觀其動見萬物之過客有強君隱山之儔也埋昭淈俗寄于和扁之伎而時人無能知者豫嘗問君以上醫之術君對曰夫妙有統于心而通于物理其靜為性其照為覺覺也者日月之謂乎性也者太虛之謂乎故理世為儒可以敷五典理性為釋可以越四流理病為醫可以空六府使定命可逭業疾可亡而世教罕能逮之故醫王未悉辨也豫曰至哉斯言命小子志之座右偈水月無根緣生則有莫辨其端莫窺其後以有為瑕以無為垢不廢不立誰觸誰受寂念淵玄紛然何咎晝上人集卷第九
